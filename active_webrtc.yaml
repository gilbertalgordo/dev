import asyncio
import os
from pipecat.pipeline.pipeline import Pipeline
from pipecat.pipeline.task import PipelineTask
from pipecat.services.openai import OpenAIRealtimeService
from pipecat.transports.services.daily import DailyTransport
from pipecat.processors.aggregators.llm_response import LLMUserResponseAggregator
from pipecat.vad.silero import SileroVADAnalyzer

async def main():
    # 1. Setup WebRTC Transport with 2026 low-latency defaults
    transport = DailyTransport(
        room_url=os.getenv("DAILY_ROOM_URL"),
        token=os.getenv("DAILY_TOKEN"),
        bot_name="ActiveAI-Pro",
        vad_analyzer=SileroVADAnalyzer() # High-precision Voice Activity Detection
    )

    # 2. Configure Native Realtime AI (Speech-to-Speech)
    # This bypasses separate STT/TTS modules for <300ms latency
    llm = OpenAIRealtimeService(
        api_key=os.getenv("OPENAI_API_KEY"),
        session_config={
            "instructions": "You are a proactive assistant. Interrupt if necessary.",
            "turn_detection": {"type": "server_vad"},
            "modalities": ["audio", "text"]
        }
    )

    # 3. Define the "Active" Pipeline
    # We include a 'user_response' aggregator to manage turn-taking state
    pipeline = Pipeline([
        transport.input(),        # Capture WebRTC stream
        llm,                      # Multi-modal LLM handles STT/Logic/TTS
        transport.output(),       # Direct WebRTC media output
    ])

    task = PipelineTask(pipeline, params={"allow_interruptions": True})

    # 4. Handle Active Events (Barge-in)
    @transport.event_handler("on_participant_joined")
    async def on_joined(transport, participant):
        # AI initiates the conversation actively
        await task.queue_frames([LLMUserResponseAggregator()])

    @transport.event_handler("on_user_started_speaking")
    async def on_interruption(transport):
        # Stop the AI immediately when user speaks
        print("Barge-in detected: Flushing AI buffers.")
        await task.cancel_queued_frames()

    await task.run()

if __name__ == "__main__":
    asyncio.run(main())
