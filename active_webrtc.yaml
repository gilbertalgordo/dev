import asyncio
import aiohttp
import os

from pipecat.frames.frames import EndFrame
from pipecat.pipeline.pipeline import Pipeline
from pipecat.pipeline.task import PipelineTask
from pipecat.processors.aggregators.llm_response import LLMUserResponseAggregator
from pipecat.services.openai import OpenAILLMService
from pipecat.services.deepgram import DeepgramSTTService
from pipecat.services.cartesia import CartesiaTTSService
from pipecat.transports.services.daily import DailyTransport

async def main():
    async with aiohttp.ClientSession() as session:
        # 1. Initialize Services
        # Replace with your actual API keys
        stt = DeepgramSTTService(api_key=os.getenv("DEEPGRAM_API_KEY"))
        llm = OpenAILLMService(api_key=os.getenv("OPENAI_API_KEY"), model="gpt-4o")
        tts = CartesiaTTSService(api_key=os.getenv("CARTESIA_API_KEY"), voice_id="your-voice-id")

        # 2. Configure WebRTC Transport
        transport = DailyTransport(
            room_url="https://your-domain.daily.co/room-name",
            token="your-token",
            bot_name="Active AI"
        )

        # 3. Define the Pipeline
        # User Audio -> STT -> LLM -> TTS -> WebRTC Output
        pipeline = Pipeline([
            transport.input(),    # Receive WebRTC audio
            stt,                  # Speech to Text
            llm,                  # Logic / Brain
            tts,                  # Text to Speech
            transport.output(),   # Send WebRTC audio back
        ])

        # 4. Create and run the task
        task = PipelineTask(pipeline)
        
        @transport.event_handler("on_first_participant_joined")
        async def on_joined(transport, participant):
            # Kick off the conversation
            await task.queue_frame(LLMUserResponseAggregator())

        await task.run()

if __name__ == "__main__":
    asyncio.run(main())



