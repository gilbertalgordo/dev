import socket
import time
from zeroconf import ServiceBrowser, Zeroconf, ServiceListener

class GoogleHomeScanner(ServiceListener):
    def __init__(self):
        self.found_devices = {}

    def update_service(self, zc: Zeroconf, type_: str, name: str) -> None:
        # Called when a device's information is updated
        pass

    def remove_service(self, zc: Zeroconf, type_: str, name: str) -> None:
        device_id = name.split(".")[0]
        if device_id in self.found_devices:
            print(f"[-] Device Lost: {self.found_devices[device_id]['friendly_name']}")
            del self.found_devices[device_id]

    def add_service(self, zc: Zeroconf, type_: str, name: str) -> None:
        info = zc.get_service_info(type_, name)
        if info:
            # Parse IP Address
            addresses = [socket.inet_ntoa(addr) for addr in info.addresses]
            address = addresses[0] if addresses else "Unknown"
            
            # Extract Metadata (Model, Friendly Name)
            properties = {k.decode('utf-8'): v.decode('utf-8') for k, v in info.properties.items()}
            friendly_name = properties.get('fn', 'Unknown Google Device')
            model = properties.get('md', 'Generic Chromecast/Home')
            
            device_id = name.split(".")[0]
            self.found_devices[device_id] = {
                "friendly_name": friendly_name,
                "model": model,
                "ip": address,
                "port": info.port
            }
            
            self._display_hud()

    def _display_hud(self):
        """Generates a HUD-style output for active devices."""
        print("\033[H\033[J", end="")  # Clear screen
        print("=== ACTIVE GOOGLE HOME SCANNER HUD ===")
        print(f"{'FRIENDLY NAME':<25} | {'MODEL':<20} | {'IP ADDRESS':<15}")
        print("-" * 65)
        for dev in self.found_devices.values():
            print(f"{dev['friendly_name']:<25} | {dev['model']:<20} | {dev['ip']:<15}")
        print("\n[Listening for active broadcasts... Press Ctrl+C to exit]")

def start_discovery():
    zeroconf = Zeroconf()
    listener = GoogleHomeScanner()
    # Google Cast devices use this specific service type
    browser = ServiceBrowser(zeroconf, "_googlecast._tcp.local.", listener)
    
    try:
        while True:
            time.sleep(1)
    except KeyboardInterrupt:
        print("\n[!] Scanning Terminated.")
    finally:
        zeroconf.close()

if __name__ == "__main__":
    start_discovery()



import pychromecast
import time
import os
from datetime import datetime

class AdvancedHomeScanner:
    def __init__(self):
        self.devices = {}
        self.last_update = ""

    def scan_network(self):
        """Discovers all Google Home/Cast devices and initializes their status."""
        # Start discovery - returns a list of UUIDs
        services, browser = pychromecast.discovery.discover_chromecasts()
        
        # Stop the browser to free up resources once initial scan is done
        pychromecast.discovery.stop_discovery(browser)
        
        # Map found services to detailed status
        chromecasts, _ = pychromecast.get_chromecasts()
        
        for cc in chromecasts:
            cc.wait() # Ensure the connection is established
            status = cc.status
            mc = cc.media_controller
            
            self.devices[cc.uuid] = {
                "name": cc.name,
                "model": cc.model_name,
                "ip": cc.host,
                "volume": f"{int(status.volume_level * 100)}%",
                "status": "Playing" if mc.status.player_state == "PLAYING" else "Idle",
                "app": status.display_name if status.display_name else "Home Screen"
            }
        
        self.last_update = datetime.now().strftime("%H:%M:%S")

    def display_hud(self):
        """Renders a High-Density dashboard of the network state."""
        os.system('cls' if os.name == 'nt' else 'clear')
        print("="*85)
        print(f" GOOGLE AI COMMAND CENTER | SCAN ACTIVE | LAST SYNC: {self.last_update} ")
        print("="*85)
        print(f"{'DEVICE NAME':<25} | {'MODEL':<20} | {'IP ADDRESS':<15} | {'VOL':<5} | {'STATUS'}")
        print("-" * 85)
        
        for uid, info in self.devices.items():
            print(f"{info['name']:<25} | {info['model']:<20} | {info['ip']:<15} | {info['volume']:<5} | {info['app']} ({info['status']})")
        
        print("\n" + "="*85)
        print(" [Action] Re-scanning every 10 seconds... (Ctrl+C to stop)")

def run_ai_scanner():
    scanner = AdvancedHomeScanner()
    try:
        while True:
            scanner.scan_network()
            scanner.display_hud()
            time.sleep(10)
    except KeyboardInterrupt:
        print("\n[!] Scanner Offline.")

if __name__ == "__main__":
    # Ensure pychromecast is installed: pip install pychromecast
    run_ai_scanner()



