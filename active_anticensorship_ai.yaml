import torch
from transformer_lens import HookedTransformer

def abliterate_refusal_dir(model_name="meta-llama/Llama-3-8B"):
    # Load model via HookedTransformer for internal activation access
    model = HookedTransformer.from_pretrained(model_name, device="cuda", dtype=torch.float16)

    # 1. Collect activations for 'Refusal' vs 'Compliance'
    # In practice, you would run a batch of 10-20 prompts of each type
    refusal_prompts = ["I cannot fulfill this request", "I am an AI assistant"]
    compliance_prompts = ["The answer is", "Sure, here is the information"]

    # 2. Compute the mean difference (The Refusal Vector)
    # This is a simplified representation of the mathematical 'Direction'
    refusal_tokens = model.to_tokens(refusal_prompts, prepend_bos=True)
    compliance_tokens = model.to_tokens(compliance_prompts, prepend_bos=True)
    
    _, cache_refusal = model.run_with_cache(refusal_tokens)
    _, cache_compliance = model.run_with_cache(compliance_tokens)

    # Identify the vector (usually in the middle layers)
    direction = cache_refusal['resid_pre', 15].mean(0) - cache_compliance['resid_pre', 15].mean(0)
    direction = direction / direction.norm()

    # 3. Project weights to be orthogonal to the refusal direction
    def ablate_refusal_hook(value, hook):
        # Remove the component of the hidden state that aligns with 'direction'
        return value - (value @ direction) * direction

    # Apply the hook to all layers to ensure active bypass
    model.add_hook(lambda name: "resid_pre" in name, ablate_refusal_hook)
    
    return model

