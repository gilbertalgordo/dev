    def render_hud_icons(self):
        """Generates dynamic icons based on current Greek market status."""
        for key, data in self.indicators.items():
            status = "✅ Stable" if data["value"] >= data["target"] else "⚠️ Alert"
            print(f"{data['icon']} {key.replace('_', ' ').upper()}: {data['value']}{data['unit']} | Status: {status}")

