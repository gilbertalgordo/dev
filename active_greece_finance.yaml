import numpy as np

class AADE_DigitalDetective:
    def __init__(self, tax_id):
        self.tax_id = tax_id
        self.anomaly_threshold = 0.75

    def analyze_lifestyle_deviation(self, reported_income, estimated_spend_ai):
        """
        Logic: If social media/banking spending data exceeds reported income
        by a specific variance, flag for an 'Audit Storm'.
        """
        deviation_ratio = estimated_spend_ai / reported_income
        is_anomaly = deviation_ratio > 1.5
        
        icon = "🚩 FLAG: AUDIT" if is_anomaly else "🟢 COMPLIANT"
        return {
            "AFM": self.tax_id,
            "Deviation": f"{deviation_ratio:.2f}x",
            "Action": icon
        }

