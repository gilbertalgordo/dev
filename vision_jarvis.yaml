// --- Vertud Vision Shader Material ---
const vertudMaterial = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    baseColor: { value: new THREE.Color(0x00050a) }, // Deep Black/Blue
    iridescentColors: { value: [
        new THREE.Color(0x4b0082), // Indigo
        new THREE.Color(0x8a2be2), // Blue Violet
        new THREE.Color(0xff0000)  // Red Accents
    ]},
    resolution: { value: new THREE.Vector2() }
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vViewPosition;
    varying vec2 vUv;

    void main() {
      vUv = uv;
      vec4 worldPosition = modelMatrix * vec4(position, 1.0);
      vNormal = normalize(normalMatrix * normal);
      vViewPosition = normalize(cameraPosition - worldPosition.xyz);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    varying vec3 vViewPosition;
    varying vec2 vUv;
    uniform float time;

    void main() {
      // 1. Carbon Fiber Weave Pattern
      float weave = step(0.5, fract(vUv.x * 100.0)) * step(0.5, fract(vUv.y * 100.0));
      vec3 carbonBase = mix(vec3(0.02), vec3(0.05), weave);

      // 2. Iridescent Fresnel Effect (The Silhouette Glow)
      float fresnel = pow(1.0 - dot(vNormal, vViewPosition), 3.0);
      
      // Color shift based on angle and time
      vec3 iridescence = 0.5 + 0.5 * cos(time + vUv.xyx + vec3(0, 2, 4));
      iridescence *= vec3(0.5, 0.0, 1.0); // Bias towards Purple/Blue/Indigo

      // 3. Final Composition
      vec3 finalColor = mix(carbonBase, iridescence, fresnel * 0.8);
      
      // Add White/Red HUD Glitches
      float scanline = sin(vUv.y * 200.0 + time * 5.0) * 0.1;
      finalColor += scanline * vec3(1.0, 1.0, 1.0); // White HUD line

      gl_FragColor = vec4(finalColor, 1.0);
    }
  `,
  transparent: true
});



import * as THREE from 'three';

const vertudShader = {
    uniforms: {
        uTime: { value: 0 },
        uResolution: { value: new THREE.Vector2() },
        uColorPrimary: { value: new THREE.Color(0x000814) }, // Deep Black-Blue
        uColorIridescent: { value: new THREE.Color(0x4b0082) }, // Indigo
        uColorAccent: { value: new THREE.Color(0x9400d3) },    // Violet
        uColorHUD: { value: new THREE.Color(0xffffff) }       // White
    },
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        varying vec2 vUv;
        varying vec3 vWorldPosition;

        void main() {
            vUv = uv;
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPosition.xyz;
            vNormal = normalize(normalMatrix * normal);
            vViewPosition = normalize(cameraPosition - worldPosition.xyz);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        varying vec2 vUv;
        varying vec3 vWorldPosition;
        
        uniform float uTime;
        uniform vec3 uColorPrimary;
        uniform vec3 uColorIridescent;
        uniform vec3 uColorAccent;
        uniform vec3 uColorHUD;

        // Procedural Carbon Fiber Pattern
        float carbonPattern(vec2 uv) {
            vec2 grid = fract(uv * 120.0);
            float weave = step(0.5, grid.x) * step(0.5, grid.y);
            return mix(0.1, 0.2, weave);
        }

        void main() {
            // 1. Base Carbon Fiber
            float carbon = carbonPattern(vUv);
            vec3 base = uColorPrimary + carbon;

            // 2. Iridescent Fresnel Silhouette
            float fresnel = pow(1.0 - dot(vNormal, vViewPosition), 3.5);
            
            // Color Shift Logic (Indigo -> Violet -> Red)
            float shift = sin(uTime * 0.5 + vWorldPosition.y * 2.0) * 0.5 + 0.5;
            vec3 iridColor = mix(uColorIridescent, uColorAccent, shift);
            iridColor = mix(iridColor, vec3(1.0, 0.0, 0.1), fresnel * 0.4); // Red Edge

            // 3. Vertud HUD Layer
            float scanline = step(0.98, fract(vUv.y * 15.0 - uTime * 1.2));
            float glitch = step(0.99, sin(uTime * 10.0 + vUv.y * 100.0)) * 0.5;
            vec3 hud = uColorHUD * (scanline + glitch) * fresnel;

            // Final Composition
            vec3 finalOutput = mix(base, iridColor, fresnel);
            finalOutput += hud;

            gl_FragColor = vec4(finalOutput, 1.0);
        }
    `
};

// Application
const material = new THREE.ShaderMaterial(vertudShader);
material.transparent = true;
