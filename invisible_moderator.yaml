/* Base Container for the Icons */
.aim-icon-container {
  width: 64px;
  height: 64px;
  background-color: #1a1a1d; /* Matches the dark gray grid background */
  border-radius: 8px;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* --- Animation for Icon A: The Interceptor --- */
#aim-icon-interceptor .aim-eye {
  animation: interceptor-pulse 4s ease-in-out infinite;
  opacity: 0.8;
}

@keyframes interceptor-pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.6;
    stroke-width: 1.5;
  }
  50% {
    transform: scale(1.05); /* Slight expansion *
    opacity: 1; /* Brightens when 'active' */
    stroke-width: 2.5;
  }
}

/* --- Animation for Icon B: The Ghost Protocol --- */
#aim-icon-ghost .aim-hood {
  animation: ghost-fade 6s infinite;
}

#aim-icon-ghost .aim-nodes circle {
  animation: node-flurry 3s infinite ease-out;
  opacity: 0;
}

/* Staggered particle animation */
#aim-icon-ghost .node-1 { animation-delay: 0s; }
#aim-icon-ghost .node-2 { animation-delay: 0.5s; }
#aim-icon-ghost .node-3 { animation-delay: 1.2s; }
#aim-icon-ghost .node-4 { animation-delay: 1.9s; }
#aim-icon-ghost .node-5 { animation-delay: 2.5s; }

@keyframes ghost-fade {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 0.3; } /* Hood dissolves further */
}

@keyframes node-flurry {
  0% {
    transform: translateY(0) scale(1);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  80% {
    opacity: 0.8;
  }
  100% {
    transform: translateY(-20px) scale(0.5); /* Nodes float up and dissolve */
    opacity: 0;
  }
}



