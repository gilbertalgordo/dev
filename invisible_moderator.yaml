import re
import datetime

class InvisibleModerator:
    def __init__(self):
        # Configurable sensitivity levels
        self.shadow_log = []
        self.restricted_patterns = [
            r"(\bscript\b.*?\b/script\b)", # Basic XSS
            r"(\bdrop\b\s+\btable\b)",      # Basic SQLi
        ]

    def scan_content(self, user_id, message):
        """
        Runs multiple silent checks on the content.
        """
        is_flagged = False
        reason = None

        # Layer 1: Pattern Matching (Regex)
        for pattern in self.restricted_patterns:
            if re.search(pattern, message, re.IGNORECASE):
                is_flagged = True
                reason = "Heuristic Pattern Match"
                break

        # Layer 2: Metadata Analysis (Invisible to user)
        # Check for rapid-fire posting or "burst" behavior
        if len(message) > 2000:
            is_flagged = True
            reason = "Buffer Overflow Risk/Spam"

        # Silently log the event for admin review
        self._log_event(user_id, message, is_flagged, reason)

        return {
            "is_flagged": is_flagged,
            "action": "STRIP" if is_flagged else "PASS",
            "internal_reason": reason
        }

    def _log_event(self, user_id, message, flagged, reason):
        entry = {
            "timestamp": datetime.datetime.now().isoformat(),
            "user": user_id,
            "status": "FLAGGED" if flagged else "CLEAN",
            "reason": reason
        }
        self.shadow_log.append(entry)

