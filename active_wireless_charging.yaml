import numpy as np
import random

class WirelessChargingEnvironment:
    def __init__(self, grid_size=10):
        self.grid_size = grid_size
        self.tx_array_pos = (5, 5) # Center of the charging pad
        self.reset()

    def reset(self):
        # Randomly place a device in 3D space (x, y, z)
        self.device_pos = [random.randint(0, 9), random.randint(0, 9), random.randint(1, 5)]
        return tuple(self.device_pos)

    def get_efficiency(self, phase_angle):
        """
        Simulates Magnetic Resonance Coupling Efficiency.
        Efficiency peaks when phase_angle matches the device's spatial vector.
        """
        optimal_angle = np.arctan2(self.device_pos[1], self.device_pos[0])
        efficiency = np.cos(phase_angle - optimal_angle) ** 2 / (self.device_pos[2] + 1)
        return max(0, efficiency)

class BeamformingAI:
    def __init__(self, actions):
        self.q_table = {} # State-Action Map
        self.actions = actions # Possible phase shifts (0 to 360 degrees)
        self.lr = 0.1
        self.gamma = 0.9

    def choose_action(self, state):
        if state not in self.q_table:
            self.q_table[state] = np.zeros(len(self.actions))
        return np.argmax(self.q_table[state])

    def update(self, state, action_idx, reward, next_state):
        if next_state not in self.q_table:
            self.q_table[next_state] = np.zeros(len(self.actions))
        
        predict = self.q_table[state][action_idx]
        target = reward + self.gamma * np.max(self.q_table[next_state])
        self.q_table[state][action_idx] += self.lr * (target - predict)

# Execution Loop
env = WirelessChargingEnvironment()
actions = np.linspace(0, 2 * np.pi, 36) # 10-degree increments
agent = BeamformingAI(actions)

for episode in range(100):
    state = env.reset()
    for _ in range(10):
        action_idx = agent.choose_action(state)
        efficiency = env.get_efficiency(actions[action_idx])
        
        # Reward is based on high efficiency and low heat loss
        reward = efficiency * 10 
        agent.update(state, action_idx, reward, state)

print(f"AI Beamforming Optimized. Max Efficiency found: {efficiency:.2%}")



