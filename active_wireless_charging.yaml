import numpy as np
import time

class ActiveWirelessChargingAI:
    def __init__(self):
        # Target efficiency (90%)
        self.target_efficiency = 0.90
        self.current_frequency = 100.0  # kHz
        self.learning_rate = 0.05
        
    def get_sensor_feedback(self):
        """
        Simulates hardware feedback from the charging coil.
        In a real scenario, this would read from an ADC or Serial port.
        """
        # Simulated resonance curve: efficiency peaks near 140kHz
        efficiency = np.exp(-((self.current_frequency - 140)**2) / 500)
        return round(efficiency, 4)

    def optimize_charging(self):
        print(f"Starting AI-Managed Charging Cycle...")
        print(f"{'Freq (kHz)':<15} | {'Efficiency':<12} | {'Action'}")
        print("-" * 45)

        for step in range(20):
            efficiency = self.get_sensor_feedback()
            
            # Simple Gradient Ascent (AI logic to find peak efficiency)
            error = self.target_efficiency - efficiency
            
            if efficiency < self.target_efficiency:
                # Adjust frequency to find resonance
                adjustment = (140 - self.current_frequency) * self.learning_rate
                self.current_frequency += adjustment
                action = "Adjusting..."
            else:
                action = "Optimal"

            print(f"{self.current_frequency:<15.2f} | {efficiency:<12.2%} | {action}")
            
            if action == "Optimal" or abs(adjustment) < 0.01:
                print("\n[Status] Resonance Achieved. Active Charging Engaged.")
                break
            
            time.sleep(0.1)

# Initialize and Run
ai_charger = ActiveWirelessChargingAI()
ai_charger.optimize_charging()



