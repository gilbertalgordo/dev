import os
from typing import List, Dict
from pydantic import BaseModel, Field
from langchain_openai import ChatOpenAI, OpenAIEmbeddings
from langchain_community.vectorstores import Chroma
from langchain.agents import tool
from langchain.prompts import ChatPromptTemplate
from langchain_core.output_parsers import JsonOutputParser

# 1. Advanced Schema for Structured Legal Analysis
class LegalAnalysis(BaseModel):
    conclusion: str = Field(description="The final legal answer")
    statutes: List[str] = Field(description="List of specific laws cited (e.g., Art. 1156)")
    confidence_score: float = Field(description="0.0 to 1.0 score of fact-grounding")
    risks: List[str] = Field(description="Potential counter-arguments or legal risks")

class LegalAIAdvanced:
    def __init__(self):
        # Using 2026-era reasoning models (GPT-4o or Claude 3.5 Sonnet)
        self.llm = ChatOpenAI(model="gpt-4o", temperature=0)
        self.embeddings = OpenAIEmbeddings(model="text-embedding-3-large")
        self.db = Chroma(persist_directory="./legal_vector_store", embedding_function=self.embeddings)

    @tool
    def verify_statute(self, citation: str, context: str) -> str:
        """Verifies if a specific statute supports the claim. Returns 'Supported' or 'Unsupported'."""
        # Internally simulates a SemanticCite check (as seen in late 2025/2026 tech)
        verification_prompt = f"Verify if {citation} explicitly supports: {context}. Be pedantic."
        return self.llm.invoke(verification_prompt).content

    def generate_expert_opinion(self, user_query: str):
        # STAGE 1: Hierarchical Retrieval
        # Fetches law + relevant case precedents
        docs = self.db.similarity_search(user_query, k=5)
        context_text = "\n\n".join([d.page_content for d in docs])

        # STAGE 2: Agentic Chain-of-Thought (CoT)
        system_prompt = """
        You are a Senior Legal Analyst. Follow this workflow:
        1. DECONSTRUCT: Identify the specific legal elements of the user's query.
        2. RETRIEVE: Use the provided context to find matching statutes.
        3. VALIDATE: Ensure no 'hallucinated' laws are mentioned. If a law isn't in context, say 'Statute not found'.
        4. STRUCTURE: Output valid JSON with 'conclusion', 'statutes', 'confidence_score', and 'risks'.
        """
        
        prompt = ChatPromptTemplate.from_messages([
            ("system", system_prompt),
            ("human", "Legal Context: {context}\n\nUser Issue: {query}")
        ])

        # STAGE 3: Structured Output Parsing
        parser = JsonOutputParser(pydantic_object=LegalAnalysis)
        chain = prompt | self.llm | parser

        try:
            analysis = chain.invoke({"context": context_text, "query": user_query})
            
            # STAGE 4: Final Verification Loop (The 'Active' Guardrail)
            for statute in analysis['statutes']:
                v_check = self.verify_statute.invoke({"citation": statute, "context": analysis['conclusion']})
                if "Unsupported" in v_check:
                    analysis['confidence_score'] -= 0.2
                    analysis['risks'].append(f"Statute {statute} may be misapplied here.")
            
            return analysis
        except Exception as e:
            return {"error": f"Analysis failed: {str(e)}"}

