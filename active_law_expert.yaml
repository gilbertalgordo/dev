import os
from langchain_community.document_loaders import PyPDFLoader
from langchain_openai import OpenAIEmbeddings, ChatOpenAI
from langchain_community.vectorstores import Chroma
from langchain.chains import RetrievalQA
from langchain.text_splitter import RecursiveCharacterTextSplitter

# 1. Configuration & API Setup
os.environ["OPENAI_API_KEY"] = "your_api_key_here"

class LegalAIExpert:
    def __init__(self, corpus_path):
        self.corpus_path = corpus_path
        self.llm = ChatOpenAI(model_name="gpt-4-turbo", temperature=0)
        self.vector_db = None

    def ingest_legal_documents(self):
        """Loads and indexes legal texts (PDFs)."""
        loader = PyPDFLoader(self.corpus_path)
        documents = loader.load()
        
        # Split text into manageable chunks for high-precision retrieval
        text_splitter = RecursiveCharacterTextSplitter(
            chunk_size=1000, 
            chunk_overlap=100
        )
        texts = text_splitter.split_documents(documents)
        
        # Create a vector database using OpenAI Embeddings
        self.vector_db = Chroma.from_documents(
            documents=texts, 
            embedding=OpenAIEmbeddings(),
            persist_directory="./legal_db"
        )
        print("Legal corpus indexed successfully.")

    def get_legal_opinion(self, query):
        """Queries the AI using RAG to ensure accuracy."""
        if not self.vector_db:
            return "Error: Legal database not initialized."

        # Define the system prompt to enforce expert behavior
        prompt_template = """
        You are a highly specialized Legal AI Expert. 
        Use the following pieces of retrieved context to answer the question. 
        If you don't know the answer based on the context, state that you don't know. 
        Always cite the section or article number from the text.
        
        Context: {context}
        Question: {question}
        
        Expert Legal Analysis:"""

        qa_chain = RetrievalQA.from_chain_type(
            llm=self.llm,
            chain_type="stuff",
            retriever=self.vector_db.as_retriever(search_kwargs={"k": 3}),
            chain_type_kwargs={"prompt": ChatOpenAI.from_template(prompt_template)}
        )
        
        return qa_chain.run(query)

