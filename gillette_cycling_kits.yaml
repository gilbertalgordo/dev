.jacket-base {
  background-color: #F2D800;
  /* Simulates the technical honeycomb mesh look of a cycling jacket */
  background-image: 
    radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1px);
  background-size: 8px 8px;
  border-left: 15px solid #1A1A1A; /* Side panel slimming effect */
  border-right: 15px solid #1A1A1A;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
}

.reflective-piping {
  border-top: 2px solid rgba(255, 255, 255, 0.8);
  filter: drop-shadow(0 0 5px #fff); /* Visibility for night riding */
}



