/* Simulation of the Pro-Kit Weather Coating */
.jacket-surface {
  background-color: #F2D800;
  background-image: 
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 4px);
  box-shadow: 
    inset 10px 0 20px rgba(0,0,0,0.15),
    inset -10px 0 20px rgba(0,0,0,0.15);
  position: relative;
}

/* UCI Rainbow Detail on the Zipper Guard */
.zipper-guard::before {
  content: '';
  position: absolute;
  left: 0;
  width: 5px;
  height: 100%;
  background: linear-gradient(to bottom, 
    #003594 20%, #E31B23 20% 40%, #000000 40% 60%, #FFCD00 60% 80%, #009639 80%);
}

/* Glow effect for Safety Yellow visibility */
.safety-highlight {
  filter: drop-shadow(0 0 2px rgba(242, 216, 0, 0.4));
}
