/* Professional Kit Styling */
.cycling-kit-base {
  background: linear-gradient(145deg, #F2D800 60%, #1A1A1A 40%);
  position: relative;
  overflow: hidden;
}

/* High-Contrast Gillette Branding */
.main-logo-gillette {
  font-family: 'Inter', sans-serif;
  font-weight: 900;
  font-style: italic;
  color: #FFFFFF;
  text-transform: uppercase;
  letter-spacing: -2px;
  filter: drop-shadow(2px 2px 0px #000);
}

/* UCI Rainbow Trim Component */
.uci-cuff-detail {
  display: flex;
  height: 4px;
  width: 100%;
}
.strip-blue   { background: #003594; flex: 1; }
.strip-red    { background: #E31B23; flex: 1; }
.strip-black  { background: #000000; flex: 1; }
.strip-yellow { background: #FFCD00; flex: 1; }
.strip-green  { background: #009639; flex: 1; }



