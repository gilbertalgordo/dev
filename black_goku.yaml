using System;
using System.Collections.Generic;

public enum PowerState { Base, SuperSaiyanRose, Merged }

public class GokuBlack 
{
    public string Name { get; private set; } = "Goku Black";
    public PowerState CurrentState { get; private set; } = PowerState.Base;
    
    // Advanced Stats
    private double _baseKi = 1000000;
    private bool _hasPotaraEquipped = true;
    private bool _hasTimeRing = true;

    // Dictionary for Divine Multipliers
    private Dictionary<PowerState, double> _multipliers = new Dictionary<PowerState, double>()
    {
        { PowerState.Base, 1.0 },
        { PowerState.SuperSaiyanRose, 50.0 }, // Divine equivalent of Blue
        { PowerState.Merged, 500.0 }
    };

    public void Transform()
    {
        if (CurrentState == PowerState.Base)
        {
            CurrentState = PowerState.SuperSaiyanRose;
            Console.WriteLine("Aura color shifted to Rosé. Divine Ki detected.");
        }
    }

    public double CalculateCombatPower()
    {
        double multiplier = _multipliers[CurrentState];
        // The Potara earring provides a 'God' status modifier
        double godModifier = _hasPotaraEquipped ? 1.5 : 1.0; 
        
        return _baseKi * multiplier * godModifier;
    }

    public void TriggerFusion(GokuBlack partner)
    {
        if (this._hasPotaraEquipped && partner._hasPotaraEquipped)
        {
            CurrentState = PowerState.Merged;
            Console.WriteLine("Fusion Complete: Merged Zamasu has arrived.");
        }
    }
}



// Simplified Aura Glow Shader Fragment
fixed4 frag (v2f i) : SV_Target
{
    // Base texture color (Goku Black's Gi)
    fixed4 col = tex2D(_MainTex, i.uv);
    
    // Create the Rosé Aura Effect
    float3 roseColor = float3(1.0, 0.2, 0.6); // Deep Pink/Magenta
    float rim = 1.0 - saturate(dot(normalize(i.viewDir), i.normal));
    
    // Apply the divine "God Ki" glow
    col.rgb += roseColor * pow(rim, _GlowPower);
    
    return col;
}
