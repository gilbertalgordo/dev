class Saiyan:
    def __init__(self, name, power_level):
        self.name = name
        self.base_power = power_level
        self.is_fused = False

    def equip_potara(self, partner_power=0):
        """Logic for Potara Fusion multiplication"""
        self.is_fused = True
        # Simplified fusion multiplier
        fusion_power = (self.base_power + partner_power) * 10
        return fusion_power

# Initialize Goku Black
goku_black = Saiyan("Goku Black", 9001)

print(f"Character: {goku_black.name}")
print(f"Potara Status: {'Active' if goku_black.is_fused else 'Searching for Zamasu'}")

# Simulate Fusion with Future Zamasu
merged_power = goku_black.equip_potara(partner_power=8500)
print(f"Merged Zamasu Power Level: {merged_power}")



