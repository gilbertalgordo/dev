from sentence_transformers import SentenceTransformer, util
import torch

def detect_plagiarism(original_text, suspected_text):
    # Load a pre-trained model optimized for semantic similarity
    model = SentenceTransformer('all-MiniLM-L6-v2')

    # Encode both texts into high-dimensional vectors
    embeddings1 = model.encode(original_text, convert_to_tensor=True)
    embeddings2 = model.encode(suspected_text, convert_to_tensor=True)

    # Compute cosine similarity (score between 0 and 1)
    cosine_score = util.cos_sim(embeddings1, embeddings2)
    
    return cosine_score.item()

# Example Usage
source = "The rapid expansion of artificial intelligence is transforming the global economy."
submission = "The world's financial systems are being reshaped by the quick growth of AI."

similarity = detect_plagiarism(source, submission)
print(f"Similarity Score: {similarity:.4f}")




import nltk
from nltk.tokenize import word_tokenize, sent_tokenize

def get_stylometric_fingerprint(text):
    tokens = word_tokenize(text.lower())
    sentences = sent_tokenize(text)
    
    # Feature 1: Average Sentence Length
    avg_sent_len = len(tokens) / len(sentences)
    
    # Feature 2: Lexical Diversity (Unique words / Total words)
    lex_diversity = len(set(tokens)) / len(tokens)
    
    return {
        "avg_sentence_length": avg_sent_len,
        "lexical_diversity": lex_diversity
    }



import torch
from sentence_transformers import SentenceTransformer, util
import numpy as np

class AdvancedPlagiarismAI:
    def __init__(self, model_name='all-mpnet-base-v2'):
        # Load a high-accuracy transformer model
        self.model = SentenceTransformer(model_name)
        self.corpus_embeddings = None
        self.corpus_metadata = []

    def index_documents(self, documents):
        """Builds an indexed database of original works."""
        print("Indexing reference corpus...")
        self.corpus_metadata = documents
        # Generate dense vectors for the entire corpus
        self.corpus_embeddings = self.model.encode([doc['text'] for doc in documents], 
                                                  convert_to_tensor=True, 
                                                  show_progress_bar=True)

    def scan_submission(self, submission_text, threshold=0.75):
        """Detects paraphrased or direct plagiarism."""
        submission_embedding = self.model.encode(submission_text, convert_to_tensor=True)
        
        # Calculate Cosine Similarity across the entire database
        cosine_scores = util.cos_sim(submission_embedding, self.corpus_embeddings)[0]
        
        # Find matches above the threshold
        results = []
        for i, score in enumerate(cosine_scores):
            if score > threshold:
                results.append({
                    "source_id": self.corpus_metadata[i]['id'],
                    "similarity_score": round(float(score), 4),
                    "match_preview": self.corpus_metadata[i]['text'][:100] + "..."
                })
        
        return sorted(results, key=lambda x: x['similarity_score'], reverse=True)

# Example Usage
docs = [
    {"id": "DOC001", "text": "Photosynthesis is the process used by plants to convert light energy into chemical energy."},
    {"id": "DOC002", "text": "The industrial revolution marked a major turning point in history, affecting almost every aspect of daily life."}
]

ai = AdvancedPlagiarismAI()
ai.index_documents(docs)

# Test with a paraphrased sentence
test_text = "Plants transform sunlight into chemical fuel through a mechanism called photosynthesis."
matches = ai.scan_submission(test_text)
print(f"Potential Matches: {matches}")




import spacy
from collections import Counter

nlp = spacy.load("en_core_web_sm")

def extract_stylometric_fingerprint(text):
    doc = nlp(text)
    
    # 1. Lexical Diversity (Unique words / Total words)
    words = [token.text.lower() for token in doc if token.is_alpha]
    diversity = len(set(words)) / len(words) if words else 0
    
    # 2. Part-of-Speech (POS) Distribution
    pos_counts = Counter([token.pos_ for token in doc])
    total_pos = sum(pos_counts.values())
    pos_dist = {k: v / total_pos for k, v in pos_counts.items()}
    
    # 3. Average Sentence Complexity (Dependency parsing)
    avg_deps = sum(len(list(token.children)) for token in doc) / len(doc)
    
    return {
        "lexical_diversity": round(diversity, 4),
        "pos_distribution": pos_dist,
        "avg_complexity": round(avg_deps, 4)
    }

# This can be used to compare a student's history vs. current submission
print(extract_stylometric_fingerprint(test_text))



