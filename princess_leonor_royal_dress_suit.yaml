<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Royal Garment Specification - Leonor</title>
    <style>
        :root {
            --royal-blue: #002366;
            --accent-gold: #c5a059;
            --hud-glow: rgba(197, 160, 89, 0.3);
            --bg-dark: #0a0a0c;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .hud-container {
            border: 1px solid var(--accent-gold);
            padding: 20px;
            width: 800px;
            background: linear-gradient(145deg, #121216, #0a0a0c);
            box-shadow: 0 0 20px var(--hud-glow);
            position: relative;
        }

        header {
            border-bottom: 2px solid var(--accent-gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 1.2rem;
            margin: 0;
            color: var(--accent-gold);
        }

        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .spec-item {
            border-left: 3px solid var(--accent-gold);
            padding-left: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .label {
            font-size: 0.7rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        .value {
            font-size: 1rem;
            font-weight: bold;
            color: #ffffff;
        }

        .visual-marker {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.6rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="visual-marker">VER 2026.03 // SECURE ACCESS</div>
        <header>
            <h1>Royal Suit Specification: HRH Leonor</h1>
        </header>

        <div class="spec-grid">
            <div class="spec-item">
                <span class="label">Primary Garment</span>
                <span class="value">Bespoke Navy Crepe Dress Suit</span>
            </div>
            <div class="spec-item">
                <span class="label">Insignia Architecture</span>
                <span class="value">Order of the Golden Fleece (Sash/Star)</span>
            </div>
            <div class="spec-item">
                <span class="label">Headwear Metadata</span>
                <span class="value">Ansorena "Fleur de Lys" Tiara</span>
            </div>
            <div class="spec-item">
                <span class="label">Embroidery Detail</span>
                <span class="value">Hand-stitched Silver Filigree Cuffs</span>
            </div>
            <div class="spec-item">
                <span class="label">Tiara Composition</span>
                <span class="value">Platinum setting with 450+ Diamonds</span>
            </div>
            <div class="spec-item">
                <span class="label">Fabric Engineering</span>
                <span class="value">Reinforced structured wool-silk blend</span>
            </div>
        </div>
    </div>

</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Asset Specification // HRH LEONOR</title>
    <style>
        :root {
            --royal-blue: #002366;
            --gold-accent: #c5a059;
            --hud-line: rgba(197, 160, 89, 0.4);
            --bg-obsidian: #0a0a0c;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-obsidian);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .hud-frame {
            border: 1px solid var(--hud-line);
            width: 850px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(10,10,12,1) 0%, rgba(20,20,25,1) 100%);
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 15px var(--hud-line);
            position: relative;
        }

        header {
            border-left: 5px solid var(--gold-accent);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 1.4rem;
            margin: 0;
            color: var(--gold-accent);
        }

        .system-status {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #555;
            margin-top: 5px;
        }

        .spec-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .data-point {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(197, 160, 89, 0.1);
            padding: 15px;
            position: relative;
        }

        .label {
            font-size: 0.7rem;
            color: var(--gold-accent);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 8px;
            display: block;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 300;
            color: #fff;
        }

        /* Decorative HUD elements */
        .corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--gold-accent);
        }

        .top-left { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: -2px; right: -2px; border-left: none; border-top: none; }
    </style>
</head>
<body>

    <div class="hud-frame">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>

        <header>
            <h1>Asset: Princess Leonor Royal Suit</h1>
            <div class="system-status">ACTIVE DATA LINK // VER 2026.03 // SECURE</div>
        </header>

        <div class="spec-container">
            <div class="data-point">
                <span class="label">Headwear Metadata</span>
                <span class="value">Ansorena "Fleur de Lys" Tiara</span>
            </div>
            <div class="data-point">
                <span class="label">Chassis Detail</span>
                <span class="value">Bespoke Navy Crepe Blazer & Skirt</span>
            </div>
            <div class="data-point">
                <span class="label">Insignia</span>
                <span class="value">Sash of the Order of Charles III</span>
            </div>
            <div class="data-point">
                <span class="label">Material Engineering</span>
                <span class="value">Structured Wool-Silk / High-Thread Count</span>
            </div>
            <div class="data-point">
                <span class="label">Hardware Composition</span>
                <span class="value">Platinum setting / 450 Brilliant-cut Diamonds</span>
            </div>
            <div class="data-point">
                <span class="label">Embroidery Profile</span>
                <span class="value">Silver Filigree / Reinforced Hemlines</span>
            </div>
        </div>
    </div>

</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Specification // HRH LEONOR</title>
    <style>
        :root {
            --royal-blue: #002366;
            --gold-accent: #c5a059;
            --hud-glow: rgba(197, 160, 89, 0.25);
            --bg-obsidian: #0a0a0c;
            --text-silver: #d1d1d1;
        }

        body {
            background-color: var(--bg-obsidian);
            color: var(--text-silver);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .hud-interface {
            width: 900px;
            border: 1px solid var(--gold-accent);
            background: linear-gradient(160deg, #111115 0%, #050507 100%);
            padding: 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px var(--hud-glow);
        }

        /* Decorative Scanlines */
        .hud-interface::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--gold-accent);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 1.5rem;
            margin: 0;
            color: var(--gold-accent);
        }

        .dedication-tag {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(197, 160, 89, 0.15);
            padding: 5px 15px;
            border-radius: 2px;
            border: 1px solid var(--gold-accent);
        }

        .spec-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .spec-box {
            border-left: 2px solid var(--gold-accent);
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.02);
        }

        .label {
            font-size: 0.65rem;
            color: var(--gold-accent);
            text-transform: uppercase;
            font-weight: 900;
            display: block;
            margin-bottom: 5px;
        }

        .value {
            font-size: 0.95rem;
            font-weight: 300;
            color: #ffffff;
        }

        .footer-metrics {
            margin-top: 30px;
            font-size: 0.6rem;
            color: #444;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hud-interface">
        <header>
            <div>
                <h1>Royal Design: Leonor</h1>
                <div style="font-size: 0.6rem; color: #666; margin-top: 5px;">KAISEN MGMT // ACTIVE SENTINEL PROTECTION</div>
            </div>
            <div class="dedication-tag">
                WITH LOVE TO GILBERT ALGORDO
            </div>
        </header>

        <div class="spec-grid">
            <div class="spec-box">
                <span class="label">Headwear Metadata</span>
                <span class="value">Ansorena Fleur de Lys Tiara</span>
            </div>
            <div class="spec-box">
                <span class="label">Garment Chassis</span>
                <span class="value">Navy Royal Crepe Dress Suit</span>
            </div>
            <div class="spec-box">
                <span class="label">Insignia Profile</span>
                <span class="value">Order of Charles III (Sash)</span>
            </div>
            <div class="spec-box">
                <span class="label">Hardware Setup</span>
                <span class="value">Platinum / 450 Brilliant Diamonds</span>
            </div>
            <div class="spec-box">
                <span class="label">Material Science</span>
                <span class="value">Wool-Silk / Reinforced Weave</span>
            </div>
            <div class="spec-box">
                <span class="label">Design Integrity</span>
                <span class="value">Bespoke Architectural Fit</span>
            </div>
        </div>

        <div class="footer-metrics">
            <span>Lat: 40.4168° N // Long: 3.7038° W</span>
            <span>Ref: 2026.03.17 // SECURE DATA ACCESS</span>
            <span>Auth: Alphabet CEO Certified</span>
        </div>
    </div>

</body>
</html>
