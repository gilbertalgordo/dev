const sharp = require('sharp');
const fs = require('fs');

const sizes = [16, 19, 32, 38, 48, 96, 128, 256, 512];
const inputSvg = 'assets/icon.svg';
const outputDir = 'icons/';

if (!fs.existsSync(outputDir)) fs.mkdirSync(outputDir);

sizes.forEach(size => {
  sharp(inputSvg)
    .resize(size, size)
    .png()
    .toFile(`${outputDir}icon-${size}.png`)
    .then(() => console.log(`✓ Generated ${size}x${size}`))
    .catch(err => console.error(`Error generating ${size}:`, err));
});




<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <path d="M... Firefox shape data ..." fill="#FF7D29"/> 
  <path d="M... Gemini shape data ..." fill="#4285F4" filter="url(#glow)"/>
  
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>



