{
  "manifest_version": 3,
  "name": "Gemini Quick Access",
  "version": "1.0",
  "description": "Access Gemini AI quickly from your Firefox browser.",
  "permissions": ["sidepanel", "storage"],
  "action": {
    "default_popup": "popup.html",
    "default_icon": "icons/icon-48.png"
  },
  "browser_specific_settings": {
    "gecko": {
      "id": "gemini-extension@yourdomain.com",
      "strict_min_version": "109.0"
    }
  }
}



<!DOCTYPE html>
<html>
