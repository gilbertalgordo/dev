// Opens Gemini in a new tab if the user clicks the icon (alternative to popup)
browser.action.onClicked.addListener(() => {
  browser.tabs.create({
    url: "https://gemini.google.com/app"
  });
});



{
  "manifest_version": 3,
  "name": "Gemini Omni-Assistant",
  "version": "2.0.0",
  "permissions": ["storage", "activeTab", "identity", "scripting"],
  "host_permissions": ["https://*.googleapis.com/*"],
  "action": {
    "default_popup": "ui/popup.html",
    "default_title": "Gemini Omni"
  },
  "background": {
    "scripts": ["background/service-worker.js"],
    "type": "module"
  },
  "content_scripts": [
    {
      "matches": ["<all_urls>"],
      "js": ["content/inject_hud.js"],
      "css": ["content/hud_styles.css"]
    }
  ]
}



import { GoogleGenerativeAI } from '../lib/google-genai.js';

// Securely fetch API Key from storage
async function getApiKey() {
  const data = await browser.storage.local.get("gemini_key");
  return data.gemini_key;
}

// Advanced Reasoning Call
async function generateResponse(prompt) {
  const apiKey = await getApiKey();
  const genAI = new GoogleGenerativeAI(apiKey);
  
  // Using the latest 'gemini-1.5-pro' for scientific accuracy
  const model = genAI.getGenerativeModel({ 
    model: "gemini-1.5-pro",
    generationConfig: { temperature: 0.4, topP: 0.9 }
  });

  const result = await model.generateContent(prompt);
  return result.response.text();
}

// Listen for messages from Mobile or Web UI
browser.runtime.onMessage.addListener((request, sender, sendResponse) => {
  if (request.type === "GENERATE") {
    generateResponse(request.payload)
      .then(text => sendResponse({ status: "success", data: text }))
      .catch(err => sendResponse({ status: "error", message: err.message }));
    return true; // Keep channel open for async
  }
});



const hudContainer = document.createElement('div');
hudContainer.id = 'gemini-hud-overlay';
hudContainer.innerHTML = `
  <div class="hud-header">Gemini Scientific HUD</div>
  <div id="hud-output" class="hud-body">Ready for analysis...</div>
`;
document.body.appendChild(hudContainer);

