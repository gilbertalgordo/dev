// High-Tech Bat-Hybrid Material Shader
const vertexShader = `
  varying vec3 vNormal;
  varying vec3 vEyeVector;
  varying vec2 vUv;

  void main() {
    vUv = uv;
    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
    vEyeVector = normalize(cameraPosition - worldPosition.xyz);
    vNormal = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const fragmentShader = `
  varying vec3 vNormal;
  varying vec3 vEyeVector;
  varying vec2 vUv;

  void main() {
    // Carbon Fiber Texture Simulation (Micro-grid)
    float carbonGrid = sin(vUv.x * 500.0) * sin(vUv.y * 500.0);
    
    // Iridescence Logic: Shift colors based on light angle (Fresnel)
    float fresnel = dot(vNormal, vEyeVector);
    fresnel = clamp(1.0 - fresnel, 0.0, 1.0);

    // Color Palette: Indigo, Blue, Gray, Black
    vec3 colorIndigo = vec3(0.18, 0.21, 0.44);
    vec3 colorBlue = vec3(0.0, 0.4, 0.8);
    vec3 colorGray = vec3(0.3, 0.3, 0.3);
    vec3 colorBlack = vec3(0.02, 0.02, 0.02);

    // Dynamic Blend based on light/viewing angle
    vec3 baseColor = mix(colorBlack, colorIndigo, fresnel);
    vec3 highlightColor = mix(baseColor, colorBlue, pow(fresnel, 3.0));
    vec3 finalColor = mix(highlightColor, colorGray, carbonGrid * 0.1);

    gl_FragColor = vec4(finalColor, 1.0);
  }
`;

// Application of the Bat-Hybrid Material
const batVehicleMaterial = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 1.0 }
  },
  vertexShader: vertexShader,
  fragmentShader: fragmentShader
});

console.log("Batjet/Tumbler Hybrid Material Initialized: Indigo-Gray Carbon Fiber Active.");



/**
 * @file Bat-Hybrid_Vertud_Shader.js
 * @description Advanced PBR Shader for Batjet/Tumbler Conversion
 * @characteristics Superfast Kaizen-optimized transformation logic
 */

const VertudMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uLightPos: { value: new THREE.Vector3(10, 10, 10) },
    uBaseColor: { value: new THREE.Color(0x050505) }, // Deep Black/Gray
    uIndigo: { value: new THREE.Color(0x2E3192) },   // Indigo
    uElectricBlue: { value: new THREE.Color(0x0071BC) } // Blue
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec2 vUv;
    varying vec3 vWorldPos;

    void main() {
      vUv = uv;
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      vNormal = normalize(normalMatrix * normal);
      vViewDir = normalize(cameraPosition - worldPos.xyz);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uIndigo;
    uniform vec3 uElectricBlue;
    uniform vec3 uBaseColor;
    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec2 vUv;

    void main() {
      // 1. Carbon Fiber Micro-Weave Simulation
      float weave = step(0.5, fract(vUv.x * 120.0)) * step(0.5, fract(vUv.y * 120.0));
      vec3 carbonBase = mix(uBaseColor, uBaseColor * 1.5, weave);

      // 2. Fresnel-Based Iridescence (The "Vertud" Effect)
      // High-angle = Indigo, Grazing-angle = Electric Blue
      float dotNV = dot(vNormal, vViewDir);
      float fresnel = pow(1.0 - clamp(dotNV, 0.0, 1.0), 3.0);
      
      // 3. Color Synthesis
      vec3 iridescence = mix(uIndigo, uElectricBlue, fresnel);
      
      // 4. Final Output with Metallic Gloss
      vec3 finalColor = mix(carbonBase, iridescence, fresnel * 0.7);
      float specular = pow(clamp(dotNV, 0.0, 1.0), 32.0); // Sharp highlights
      
      gl_FragColor = vec4(finalColor + (specular * 0.4), 1.0);
    }
  `
});



function initiateConversion(mode) {
    const timeline = gsap.timeline(); // Using GSAP for smooth HD transitions
    
    if (mode === "TUMBLER") {
        // Deploy Wheels, Retract Wings, Adjust HUD to Ground-Track
        timeline.to(vehicle.wings.rotation, { z: Math.PI / 2, duration: 0.8 });
        timeline.to(vehicle.chassis.height, { y: "-=0.5", ease: "bounce.out" });
        console.log("HUD Status: Ground Pursuit Mode Active. Vertud coating optimized for urban light.");
    } else {
        // Extend Wings, Activate Turbines
        timeline.to(vehicle.wings.scale, { x: 2.5, duration: 0.6 });
        console.log("HUD Status: Batjet Flight Dynamics Engaged.");
    }
}
