import random
import time

class SlimQuantumBattery:
    def __init__(self, model="SQB-M100", capacity_mah=8500):
        self.model = model
        self.capacity_mah = capacity_mah
        self.soc = 20.0  # State of Charge (%)
        self.temperature = 25.0  # Celsius
        self.is_charging = False
        self.quantum_coherence = 1.0  # 1.0 is perfect coherence
        self.entropy = 0.01 # Low entropy is stable

    def calculate_quantum_boost(self):
        """
        Simulates the superabsorption effect where charging 
        speed increases with quantum entanglement.
        """
        return 1.5 * self.quantum_coherence

    def update_status(self):
        """Simulates real-time telemetry updates."""
        if self.is_charging and self.soc < 100:
            boost = self.calculate_quantum_boost()
            self.soc += (2.0 * boost)
            self.temperature += 0.5 * (1/self.quantum_coherence)
            self.entropy += 0.005
        
        # Cap SOC at 100%
        self.soc = min(100.0, self.soc)
        
        # Simulate slight decoherence over time
        if self.soc > 90:
            self.quantum_coherence -= 0.02
            
    def get_telemetry(self):
        return {
            "Model": self.model,
            "Charge": f"{self.soc:.2f}%",
            "Temp": f"{self.temperature:.1f}°C",
            "Coherence": f"{self.quantum_coherence:.4f}",
            "Stability": "STABLE" if self.entropy < 0.5 else "CRITICAL"
        }

# --- Initialization ---
my_battery = SlimQuantumBattery()

print(f"Initializing {my_battery.model} Telemetry HUD...")
my_battery.is_charging = True

# --- Simulation Loop ---
for second in range(5):
    my_battery.update_status()
    stats = my_battery.get_telemetry()
    
    print(f"T+{second}s | SOC: {stats['Charge']} | " 
          f"Coh: {stats['Coherence']} | Temp: {stats['Temp']}")
    time.sleep(1)

print("\nCharging Optimal. Quantum Tunneling active.")



import numpy as np
from scipy.linalg import expm

class QuantumBatterySim:
    def __init__(self, n_cells=10, coupling_strength=1.5):
        """
        n_cells: Number of quantum battery units (qubits)
        coupling_strength (g): Interaction strength with the charger
        """
        self.N = n_cells
        self.g = coupling_strength
        self.hbar = 1.0
        
        # Define Pauli Matrices
        self.sigma_x = np.array([[0, 1], [1, 0]], dtype=complex)
        self.sigma_z = np.array([[1, 0], [0, -1]], dtype=complex)
        self.I = np.eye(2)

    def _get_hamiltonian(self):
        """
        Constructs the Global Charging Hamiltonian: H = g * sum(sigma_x_i)
        This drives the transition from ground state |0> to excited state |1>.
        """
        H = np.zeros((2**self.N, 2**self.N), dtype=complex)
        for i in range(self.N):
            # Create operator for the i-th qubit
            op = 1
            for j in range(self.N):
                op = np.kron(op, self.sigma_x if i == j else self.I)
            H += self.g * op
        return H

    def simulate_charging(self, duration=2.0, steps=100):
        H = self._get_hamiltonian()
        dt = duration / steps
        
        # Initial State: All qubits in ground state |000...0>
        state = np.zeros(2**self.N, dtype=complex)
        state[0] = 1.0
        
        history = []
        for _ in range(steps):
            # Unitary evolution: |psi(t+dt)> = exp(-i*H*dt/hbar) * |psi(t)>
            U = expm(-1j * H * dt / self.hbar)
            state = U @ state
            
            # Calculate stored energy (Expectation value of Sigma_z)
            # Energy E = sum( <psi| (I - sigma_z)/2 |psi> )
            energy = 0
            for i in range(self.N):
                sz_op = 1
                for j in range(self.N):
                    sz_op = np.kron(sz_op, self.sigma_z if i == j else self.I)
                
                # Convert Sigma_z (-1 to 1) to Occupancy (0 to 1)
                occupancy = 0.5 * (1 - np.real(np.conj(state).T @ sz_op @ state))
                energy += occupancy
                
            history.append(energy / self.N) # Percentage charged
            
        return history

# --- Execute Simulation ---
n_units = 4 # Kept small for computational speed
sim = QuantumBatterySim(n_cells=n_units)
charge_curve = sim.simulate_charging()

print(f"SQB Advanced BMS: Charging {n_units}-cell array...")
for i, level in enumerate(charge_curve[::20]):
    print(f"Step {i*20}: [{('█' * int(level*10)).ljust(10)}] {level*100:.1f}% Capacity")



