.quantum-icon {
  width: 40px;
  height: 80px;
  border: 2px solid #00ffcc;
  border-radius: 4px;
  position: relative;
  background: rgba(0, 255, 204, 0.05);
  box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
}

.quantum-level {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 65%; /* Dynamic Instance */
  background: linear-gradient(0deg, #00ffcc, #0066ff);
  filter: blur(1px);
  animation: pulse 1.5s infinite ease-in-out;
}

@keyframes pulse {
  0% { opacity: 0.8; filter: brightness(1); }
  50% { opacity: 1; filter: brightness(1.5); }
  100% { opacity: 0.8; filter: brightness(1); }
}



from PIL import Image, ImageDraw

def generate_sqb_icon(filename="sqb_icon.png"):
    # Create a dark background for HUD contrast
    img = Image.new('RGBA', (512, 512), (0, 0, 0, 0))
    draw = ImageDraw.Draw(img)
    
    # Battery Outline
    outline_coords = [180, 50, 332, 462]
    draw.rounded_rectangle(outline_coords, radius=30, outline="#00F2FF", width=12)
    
    # Quantum "Q" Symbol
    draw.ellipse([216, 216, 296, 296], outline="#00F2FF", width=8)
    draw.line([270, 270, 310, 310], fill="#00F2FF", width=8)
    
    # Glow Effect (Simplified)
    draw.ellipse([236, 236, 276, 276], fill="#00F2FF")
    
    img.save(filename)
    print(f"Icon generated: {filename}")

generate_sqb_icon()

