import tensorflow as tf
from tensorflow.keras import layers

def build_audio_denoiser(input_shape):
    """
    AI Model to filter interference from audio streams.
    Uses a GRU architecture for low-latency temporal processing.
    """
    model = tf.keras.Sequential([
        layers.Input(shape=input_shape), 
        layers.Reshape((-1, 1)),
        layers.GRU(64, return_sequences=True),
        layers.Dropout(0.2),
        layers.Dense(1, activation='tanh') # Output cleaned signal
    ])
    
    model.compile(optimizer='adam', loss='mse')
    return model

