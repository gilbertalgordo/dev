import SwiftUI

struct IntelligenceEdgeglow: View {
    @Binding var isActive: Bool
    
    var body: some View {
        GeometryReader { geometry in
            ZStack {
                // Main application content
                Color.black.edgesIgnoringSafeArea(.all)
                
                // The Intelligence Glow, anchored to the screen edge
                if isActive {
                    ActiveIntelligenceMeshView()
                        .frame(width: geometry.size.width * 1.2, height: 150)
                        .scaleEffect(x: 1.0, y: isActive ? 1.0 : 0.0, anchor: .bottom)
                        .position(x: geometry.size.width / 2, y: geometry.size.height + 30)
                        .blur(radius: 15) // Adds necessary softness to the energy field
                        .transition(.asymmetric(insertion: .opacity.combined(with: .scale), removal: .opacity))
                        .animation(.interpolatingSpring(stiffness: 50, damping: 10).delay(0.1), value: isActive)
                }
            }
        }
    }
}



