// Helper View for rendering text along a circular path
struct TextCircleView: View {
    let text: String
    let radius: Double
    
    var body: some View {
        ZStack {
            ForEach(0..<text.count, id: \.self) { index in
                Text(String(text[text.index(text.startIndex, offsetBy: index)]))
                    .kerning(5)
                    .modifier(TextRotationModifier(index: index, count: text.count, radius: radius))
            }
        }
    }
}

// Modifier to handle rotation and positioning for circular text
struct TextRotationModifier: ViewModifier {
    let index: Int
    let count: Int
    let radius: Double
    
    func body(content: Content) -> some View {
        // Calculate the angle for each character, centering the text arc at the bottom
        let angle = Double(index) / Double(count) * .pi - (.pi / 2.0)
        
        return content
            .rotationEffect(.radians(angle))
            .offset(x: 0, y: -radius)
            .rotationEffect(.radians(.pi / 2.0)) // Rotate the entire structure so it arches at the bottom
    }
}
