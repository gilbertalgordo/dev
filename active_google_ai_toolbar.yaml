.hud-icon {
    width: 24px;
    height: 24px;
    color: #00f2ff; /* Your signature cyan */
    filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.6));
    transition: transform 0.2s ease, filter 0.2s ease;
    cursor: pointer;
}

/* Hover & Active States */
.hud-icon:hover {
    transform: scale(1.1) rotate(5deg);
    filter: drop-shadow(0 0 8px rgba(0, 242, 255, 0.9));
}

.hud-icon:active {
    transform: scale(0.9);
}

/* Container for the toolbar icons */
.icon-wrapper {
    display: flex;
    gap: 15px;
    background: rgba(0, 0, 0, 0.4);
    padding: 10px;
    border-radius: 12px;
    border: 1px solid rgba(0, 242, 255, 0.2);
}



