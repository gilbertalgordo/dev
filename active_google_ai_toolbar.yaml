<div id="ai-mode-toolbar" class="ai-toolbar-container">
    <div class="toolbar-hud">
        <span class="status-indicator">● ACTIVE</span>
        <div class="tool-group">
            <button onclick="setMode('vision')" title="Image Analysis">Vision</button>
            <button onclick="setMode('reasoning')" title="Scientific Logic">Reasoning</button>
            <button onclick="setMode('media')" title="Video/Music">Media</button>
        </div>
        <div class="settings-group">
            <label class="switch">
                <input type="checkbox" id="watermark-toggle">
                <span class="slider"></span>
            </label>
            <span class="label-text">No-WM</span>
        </div>
    </div>
</div>



.ai-toolbar-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

.toolbar-hud {
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid #00f2ff;
    border-radius: 12px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 0 15px rgba(0, 242, 255, 0.3), inset 0 0 5px rgba(0, 242, 255, 0.2);
    color: #fff;
}

.status-indicator {
    color: #00f2ff;
    font-weight: bold;
    font-size: 0.8rem;
    letter-spacing: 1px;
}

.tool-group button {
    background: transparent;
    border: 1px solid #444;
    color: #ccc;
    padding: 5px 12px;
    cursor: pointer;
    transition: 0.3s;
    border-radius: 4px;
}

.tool-group button:hover {
    background: #00f2ff;
    color: #000;
}

/* Mobile Adjustments for Safari/Edge/Firefox Mobile */
@media (max-width: 768px) {
    .ai-toolbar-container {
        width: 95%;
        bottom: 10px;
    }
    .toolbar-hud {
        padding: 8px;
        justify-content: space-between;
        font-size: 12px;
    }
    .tool-group button {
        padding: 4px 8px;
    }
}



// Initialize Mode
function setMode(mode) {
    console.log(`AI Mode switched to: ${mode}`);
    // Visual feedback for the HUD
    const buttons = document.querySelectorAll('.tool-group button');
    buttons.forEach(btn => btn.style.borderColor = '#444');
    event.target.style.borderColor = '#00f2ff';
    
    // Logic for specific modes (e.g., triggering scientific reasoning paths)
    if (mode === 'reasoning') {
        applyScientificConstraints();
    }
}

// Watermark Toggle Logic
const wmToggle = document.getElementById('watermark-toggle');
wmToggle.addEventListener('change', (e) => {
    const isActive = e.target.checked;
    localStorage.setItem('ai_watermark_remover', isActive);
    console.log(`Watermark Suppression: ${isActive ? 'ON' : 'OFF'}`);
});

