// Safari-specific fix for backdrop-filter
if (!CSS.supports('backdrop-filter', 'blur(10px)')) {
    document.querySelector('.toolbar-hud').style.background = 'rgba(10, 10, 10, 0.95)';
}



class GoogleAIToolbar extends HTMLElement {
    constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this.state = {
            activeMode: 'Standard',
            watermarkSuppression: true,
            accuracyLevel: 'Scientific'
        };
    }

    connectedCallback() {
        this.render();
    }

    toggleWatermark() {
        this.state.watermarkSuppression = !this.state.watermarkSuppression;
        console.log(`Watermark Suppression: ${this.state.watermarkSuppression}`);
        this.render();
    }

    render() {
        this.shadowRoot.innerHTML = `
        <style>
            :host {
                --hud-cyan: #00f2ff;
                --hud-bg: rgba(5, 15, 25, 0.85);
                position: fixed;
                bottom: 25px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10000;
                font-family: 'Inter', system-ui, sans-serif;
            }

            .hud-container {
                display: flex;
                align-items: center;
                background: var(--hud-bg);
                backdrop-filter: blur(12px) saturate(180%);
                -webkit-backdrop-filter: blur(12px) saturate(180%); /* Safari Support */
                border: 1px solid rgba(0, 242, 255, 0.3);
                border-radius: 100px;
                padding: 8px 24px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 
                            inset 0 0 10px rgba(0, 242, 255, 0.1);
                gap: 20px;
                transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .status-glitch {
                color: var(--hud-cyan);
                font-size: 10px;
                font-weight: 800;
                letter-spacing: 2px;
                text-transform: uppercase;
                animation: pulse 2s infinite;
            }

            .nav-group {
                display: flex;
                gap: 10px;
            }

            button {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: #fff;
                padding: 6px 14px;
                border-radius: 20px;
                cursor: pointer;
                font-size: 13px;
                transition: 0.2s;
            }

            button:hover {
                background: var(--hud-cyan);
                color: #000;
                box-shadow: 0 0 15px var(--hud-cyan);
            }

            .toggle-container {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 11px;
                color: #aaa;
            }

            @keyframes pulse {
                0% { opacity: 0.6; }
                50% { opacity: 1; }
                100% { opacity: 0.6; }
            }

            /* Mobile Optimization */
            @media (max-width: 600px) {
                .hud-container {
                    padding: 6px 12px;
                    gap: 10px;
                    width: 90vw;
                }
                .nav-group button { padding: 4px 8px; font-size: 11px; }
            }
        </style>
        <div class="hud-container">
            <div class="status-glitch">Active AI Mode</div>
            <div class="nav-group">
                <button onclick="this.getRootNode().host.setMode('Reasoning')">Scientific</button>
                <button onclick="this.getRootNode().host.setMode('Visual')">3D Vision</button>
            </div>
            <div class="toggle-container">
                <span>WM Filter</span>
                <input type="checkbox" ${this.state.watermarkSuppression ? 'checked' : ''} 
                       onchange="this.getRootNode().host.toggleWatermark()">
            </div>
        </div>
        `;
    }

    setMode(mode) {
        this.state.activeMode = mode;
        console.log(`Kaizen Management: Switching to ${mode} optimization.`);
        // Trigger high-accuracy logic here
    }
}

customElements.define('google-ai-toolbar', GoogleAIToolbar);



