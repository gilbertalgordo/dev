        <svg class="hud-icon"><use xlink:href="#icon-vision"></use></svg>
    </div>

    <div class="icon-container" title="Toggle Watermark Removal">
        <svg class="hud-icon"><use xlink:href="#icon-watermark"></use></svg>
    </div>
</div>



