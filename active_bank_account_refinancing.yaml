import datetime

class BankAccount:
    def __init__(self, account_id, balance, interest_rate):
        self.account_id = account_id
        self.balance = balance
        self.interest_rate = interest_rate
        self.daily_transaction_total = 0

    def reset_daily_limit(self):
        """Resets daily usage counters for the new fiscal day."""
        self.daily_transaction_total = 0
        return True

class RefinancingAI:
    def __init__(self, target_prime_rate=0.05):
        self.target_prime_rate = target_prime_rate

    def analyze_account(self, account):
        """
        Evaluates if an account qualifies for a rate reduction
        based on balance thresholds and current market rates.
        """
        # Logic: If balance > 10k and rate > prime, suggest refinance
        if account.balance > 10000 and account.interest_rate > self.target_prime_rate:
            new_rate = round(max(self.target_prime_rate, account.interest_rate - 0.01), 4)
            return {"action": "REFINANCE", "old_rate": account.interest_rate, "new_rate": new_rate}
        return {"action": "HOLD", "old_rate": account.interest_rate, "new_rate": account.interest_rate}




def run_daily_cycle(accounts, ai_engine):
    print(f"--- Processing Daily Reset: {datetime.date.today()} ---")
    
    report = []
    for acc in accounts:
        # 1. Reset counters
        acc.reset_daily_limit()
        
        # 2. Run AI Refinancing Check
        decision = ai_engine.analyze_account(acc)
        
        if decision["action"] == "REFINANCE":
            acc.interest_rate = decision["new_rate"]
        
        report.append({
            "ID": acc.account_id,
            "Balance": acc.balance,
            "Action": decision["action"],
            "Final_Rate": f"{acc.interest_rate * 100}%"
        })
    
    return report

# --- Execution Example ---
if __name__ == "__main__":
    # Mock Database
    user_accounts = [
        BankAccount("ACC-001", 15000, 0.08),
        BankAccount("ACC-002", 500, 0.12)
    ]
    
    ai = RefinancingAI(target_prime_rate=0.04)
    daily_report = run_daily_cycle(user_accounts, ai)
    
    for entry in daily_report:
        print(entry)




