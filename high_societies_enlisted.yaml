<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --gold: #d4af37;
            --dark-slate: #1a1a1a;
            --off-white: #f4f4f4;
        }

        body {
            background-color: var(--dark-slate);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        .enlistment-card {
            background: #fff;
            width: 350px;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border-top: 5px solid var(--gold);
        }

        .profile-header h1 {
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: var(--dark-slate);
        }

        .profile-header p {
            font-style: italic;
            color: #777;
            margin-bottom: 25px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .cta-button {
            display: block;
            background: var(--dark-slate);
            color: white;
            text-decoration: none;
            padding: 12px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid var(--dark-slate);
        }

        .cta-button:hover {
            background: transparent;
            color: var(--dark-slate);
        }

        .link-footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #bbb;
        }
    </style>
    <title>Enlistment Profile</title>
</head>
<body>

    <div class="enlistment-card">
        <div class="profile-header">
            <div class="status-badge">High Society Member</div>
            <h1>Gilbert Algordo</h1>
            <p>Developer & Innovator</p>
        </div>

        <a href="https://g.dev/gilbert_algordo" class="cta-button">VIEW OFFICIAL DOSSIER</a>

        <div class="link-footer">
            Verified via Google Dev Profile
        </div>
    </div>

</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gilbert Algordo | Elite Enlistment</title>
    <style>
        :root {
            --accent-gold: #c5a059;
            --hud-border: rgba(197, 160, 89, 0.3);
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 3D HUD Background Elements */
        .hud-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        .enlistment-container {
            position: relative;
            width: 90%;
            max-width: 600px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--hud-border);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
            animation: fadeIn 1.5s ease-out;
        }

        /* Scanline Animation */
        .enlistment-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: var(--accent-gold);
            opacity: 0.5;
            animation: scan 4s linear infinite;
        }

        .header-section {
            border-bottom: 1px solid var(--hud-border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .id-tag {
            font-family: monospace;
            color: var(--accent-gold);
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 200;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .metric-box {
            padding: 15px;
            border-left: 2px solid var(--accent-gold);
            background: rgba(197, 160, 89, 0.05);
        }

        .metric-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
        }

        .cta-wrapper {
            position: relative;
        }

        .portal-btn {
            display: block;
            width: 100%;
            padding: 20px;
            text-align: center;
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            text-decoration: none;
            letter-spacing: 4px;
            font-weight: bold;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .portal-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="hud-overlay"></div>

<main class="enlistment-container">
    <div class="header-section">
        <div class="id-tag">EST. 2026 // AUTH_SUCCESS</div>
        <h1>G. Algordo</h1>
        <p style="color: var(--accent-gold); font-size: 0.8rem; margin-top: 10px;">HIGH SOCIETY ENLISTMENT VERIFIED</p>
    </div>

    <div class="metrics-grid">
        <div class="metric-box">
            <div class="metric-label">Sector</div>
            <div class="metric-value">Advanced Development</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Clearance</div>
            <div class="metric-value">Level Alpha</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Classification</div>
            <div class="metric-value">Elite Tech Strategist</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">Status</div>
            <div class="metric-value">Active Enlisted</div>
        </div>
    </div>

    <div class="cta-wrapper">
        <a href="https://g.dev/gilbert_algordo" class="portal-btn">ACCESS FULL DOSSIER</a>
    </div>
</main>

</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .icon-container {
            position: relative;
            width: 80px;
            height: 80px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .icon-container:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .icon-svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--gold);
            stroke-width: 1.5;
            filter: drop-shadow(0 0 8px var(--gold-glow));
        }

        /* 3D HUD Ring Animation */
        .hud-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 100px;
            height: 100px;
            border: 1px dashed var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <div class="hud-ring"></div>
        <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M4 7V4h16v3M4 11v9h16v-9M4 7h16M10 14h4" />
            <rect x="2" y="7" width="20" height="4" />
        </svg>
    </div>

    <div class="icon-container">
        <div class="hud-ring" style="animation-direction: reverse;"></div>
        <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" />
            <path d="M12 8v8M9 12h6" stroke-width="1" opacity="0.6" />
        </svg>
    </div>

    <div class="icon-container">
        <div class="hud-ring"></div>
        <svg class="icon-svg" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" />
            <path d="M3.6 9h16.8M3.6 15h16.8" />
            <path d="M11.5 3a17 17 0 0 0 0 18M12.5 3a17 17 0 0 1 0 18" />
        </svg>
    </div>

</body>
</html>
