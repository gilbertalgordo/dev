import time
import pandas as pd
import numpy as np

class BuybackAI:
    def __init__(self, ticker, budget):
        self.ticker = ticker
        self.budget = budget
        self.active = True
        
    def get_market_data(self):
        """
        Simulates fetching real-time ticker data.
        In production, replace with a WebSocket or REST API call.
        """
        # Placeholder for real-time price stream
        return np.random.uniform(95, 105)

    def analyze_indicators(self, price_history):
        """
        Calculates if the asset is oversold (RSI < 30).
        """
        if len(price_history) < 14: return False
        
        # Simple RSI Logic (Simplified for brevity)
        delta = pd.Series(price_history).diff()
        gain = (delta.where(delta > 0, 0)).rolling(window=14).mean()
        loss = (-delta.where(delta < 0, 0)).rolling(window=14).mean()
        rs = gain / loss
        rsi = 100 - (100 / (1 + rs))
        
        return rsi.iloc[-1] < 35  # Trigger threshold

    def execute_buyback(self, price, amount):
        """
        Execution layer for the buyback order.
        """
        print(f"[HUD] EXECUTION: Buying {amount} units at ${price:.2f}")
        self.budget -= (price * amount)

    def run_kaizen_loop(self):
        """
        Superfast continuous monitoring loop.
        """
        history = []
        print(f"--- AI ACTIVE: Monitoring {self.ticker} ---")
        
        try:
            while self.active and self.budget > 0:
                current_price = self.get_market_data()
                history.append(current_price)
                
                # Accuracy Check & Analysis
                if self.analyze_indicators(history):
                    # Logical check: Ensure we don't overspend
                    buy_amount = self.budget * 0.1 / current_price 
                    self.execute_buyback(current_price, buy_amount)
                
                # Small sleep to manage rate limits (Kaizen optimization)
                time.sleep(1) 
        except KeyboardInterrupt:
            print("System Paused.")

