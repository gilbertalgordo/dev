import numpy as np
import pandas as pd

class AdvancedBuybackEnv:
    """
    A simplified Reinforcement Learning environment for Buyback optimization.
    """
    def __init__(self, data, total_budget, total_shares_to_buy):
        self.data = data
        self.total_budget = total_budget
        self.shares_remaining = total_shares_to_buy
        self.current_step = 0
        
    def get_state(self):
        # State: [Current Price, Remaining Shares, Budget Left, 20-day SMA]
        price = self.data.iloc[self.current_step]['Close']
        sma = self.data['Close'].rolling(window=20).mean().iloc[self.current_step]
        return np.array([price, self.shares_remaining, self.total_budget, sma])

    def step(self, action):
        """
        Action: 0 = Hold, 1 = Small Buy, 2 = Aggressive Buy
        """
        price = self.data.iloc[self.current_step]['Close']
        execution_cost = 0
        shares_bought = 0
        
        if action == 1: # Small Buy (1% of target)
            shares_bought = self.shares_remaining * 0.01
        elif action == 2: # Aggressive Buy (5% of target)
            shares_bought = self.shares_remaining * 0.05
            
        execution_cost = shares_bought * price
        
        # Apply Logic: Check if budget allows
        if execution_cost <= self.total_budget:
            self.total_budget -= execution_cost
            self.shares_remaining -= shares_bought
            reward = 1 if price < self.data['Close'].mean() else -1
        else:
            reward = -10 # Penalty for trying to spend more than budget
            
        self.current_step += 1
        done = (self.shares_remaining <= 0) or (self.current_step >= len(self.data) - 1)
        
        return self.get_state(), reward, done

