from datetime import date
import holidays

def get_christian_holidays(year):
    # Initialize the Christian holidays subset
    # This includes both Western and some Eastern Orthodox dates
    ch_holidays = holidays.financial_holidays.ChristianHolidays()
    
    # Generate the calendar for the specific year
    calendar_dates = []
    
    # We iterate through a list of common holiday names 
    # to extract their specific dates for the given year
    for date_obs, name in sorted(holidays.CH(years=year).items()):
        calendar_dates.append({
            "Date": date_obs.strftime("%Y-%m-%d"),
            "Holiday": name
        })
    
    return calendar_dates

# Example usage for the current year
current_year = 2026
holiday_list = get_christian_holidays(current_year)

print(f"--- Christian Holidays for {current_year} ---")
for item in holiday_list:
    print(f"{item['Date']}: {item['Holiday']}")



