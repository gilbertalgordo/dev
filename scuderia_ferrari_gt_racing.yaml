import numpy as np

class ScuderiaFerrariGT:
    def __init__(self):
        # Physical Constants
        self.mass = 1250  # kg (GT car weight)
        self.drag_coeff = 0.28  # Ultra-slippery GT concept
        self.frontal_area = 1.9  # m^2
        self.rho = 1.225  # Air density at sea level (kg/m^3)
        
        # Target: 300 mph in m/s
        self.target_v = 300 * 0.44704 
        
    def calculate_drag(self, velocity):
        """Fd = 1/2 * rho * v^2 * Cd * A"""
        return 0.5 * self.rho * (velocity**2) * self.drag_coeff * self.frontal_area

    def simulate_run(self, horsepower):
        velocity = 0.0
        time = 0
        dt = 0.1
        watts = horsepower * 745.7
        
        print(f"--- Simulating 24/7 Endurance Burn at {horsepower} HP ---")
        
        while velocity < self.target_v and time < 100:
            drag_force = self.calculate_drag(velocity)
            
            # Power = Force * Velocity -> Available Force = Power / Velocity
            if velocity > 1:
                propulsion_force = watts / velocity
            else:
                propulsion_force = watts / 1  # Avoid division by zero
                
            net_force = propulsion_force - drag_force
            acceleration = net_force / self.mass
            
            velocity += acceleration * dt
            time += dt
            
        return velocity / 0.44704, time

# Initialize Ferrari Concept
ferrari_gt = ScuderiaFerrariGT()

# To hit 300mph, a GT car needs massive output (approx 1600+ HP)
final_speed, time_taken = ferrari_gt.simulate_run(horsepower=1650)

print(f"Top Speed Reached: {final_speed:.2f} mph")
print(f"Time to Target: {time_taken:.2f} seconds")



import math

class FerrariEnduranceLogic:
    def __init__(self):
        # Configuration for "Super-GT" Specs
        self.mass = 1180.0  # kg
        self.frontal_area = 1.85  # m^2
        self.rho = 1.225  # Air density
        self.target_speed_mps = 135.0  # ~302 mph
        
        # Dynamic Variables
        self.current_speed = 0.0
        self.engine_temp = 85.0  # Celsius
        self.active_drs = False

    def get_dynamic_drag(self):
        """Reduces drag coefficient when DRS is active for 300mph+ runs."""
        # Standard GT3 Cd is ~0.45; we need ~0.24 for 300mph
        base_cd = 0.40
        return base_cd * 0.6 if self.active_drs else base_cd

    def compute_power_requirement(self, velocity):
        """
        Calculates Power (P) needed: P = F_drag * v
        F_drag = 0.5 * rho * v^2 * Cd * A
        """
        cd = self.get_dynamic_drag()
        drag_force = 0.5 * self.rho * (velocity**2) * cd * self.frontal_area
        power_watts = drag_force * velocity
        return power_watts / 745.7  # Returns Horsepower

    def run_telemetry(self, duration_hours=24):
        print(f"--- 24/7 Ferrari GT Telemetry: Target > 300 MPH ---")
        
        # Simulation of a 24-hour cycle
        for hour in range(1, duration_hours + 1):
            # Activate DRS to break the 300mph barrier
            self.active_drs = True
            hp_needed = self.compute_power_requirement(self.target_speed_mps)
            
            # Simulated Thermal Stress
            self.engine_temp = 90 + (hp_needed * 0.01) 
            
            print(f"[Hour {hour:02d}] Speed: 302.4 mph | Output: {hp_needed:.2f} HP | Temp: {self.engine_temp:.1f}°C")

# Execute Simulation
ferrari_sim = FerrariEnduranceLogic()
ferrari_sim.run_telemetry()




