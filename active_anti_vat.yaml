import datetime

class AntiVATEngine:
    def __init__(self, jurisdiction="PH", base_rate=0.12):
        self.jurisdiction = jurisdiction
        self.base_rate = base_rate
        self.tax_history = []

    def process_transaction(self, amount, category, is_exempt=False):
        """
        Calculates recoverable VAT and flags optimization opportunities.
        """
        # Logic for VAT-inclusive price extraction
        # $Price = Total / (1 + Rate)$
        vat_amount = 0
        net_amount = amount

        if not is_exempt:
            net_amount = amount / (1 + self.base_rate)
            vat_amount = amount - net_amount

        entry = {
            "timestamp": datetime.datetime.now(),
            "gross": amount,
            "net": round(net_amount, 2),
            "vat": round(vat_amount, 2),
            "category": category,
            "recoverable": self._check_recoverability(category)
        }
        
        self.tax_history.append(entry)
        return entry

    def _check_recoverability(self, category):
        # Automated logic to identify input tax credits
        recoverable_sectors = ['capital_goods', 'raw_materials', 'services_rendered']
        return category in recoverable_sectors

# Initialize Engine
engine = AntiVATEngine()
print(engine.process_transaction(1120, "raw_materials"))



import pandas as pd
import numpy as np
from datetime import datetime

class ActiveVATSentinel:
    def __init__(self, country_code="PH"):
        self.country_code = country_code
        # Standard configuration for PH (2026 standards)
        self.vat_config = {
            "standard_rate": 0.12,
            "zero_rated_sectors": ["export_sales", "renewable_energy", "it_bpm"],
            "exempt_sectors": ["residential_rent", "education", "medical_services"]
        }
        self.ledger = []

    def classify_supply(self, description, amount, industry_code):
        """
        AI-driven classification logic.
        Determines if a supply is Standard, Zero-Rated, or Exempt.
        """
        classification = "STANDARD"
        effective_rate = self.vat_config["standard_rate"]
        
        if industry_code in self.vat_config["zero_rated_sectors"]:
            classification = "ZERO_RATED"
            effective_rate = 0.0
        elif industry_code in self.vat_config["exempt_sectors"]:
            classification = "EXEMPT"
            effective_rate = 0.0
            
        return classification, effective_rate

    def intercept_transaction(self, tx_data):
        """
        Active interception: Evaluates ITC recoverability before final posting.
        """
        amount = tx_data['gross_amount']
        category = tx_data['category']
        
        # Determine tax treatment
        tax_type, rate = self.classify_supply(tx_data['desc'], amount, category)
        
        # Calculate Net and VAT
        # $Net = Gross / (1 + Rate)$
        net_amount = amount / (1 + rate)
        vat_component = amount - net_amount
        
        # Active Anti-VAT Logic: Maximizing Input Credits
        itc_status = "CLAIMABLE" if tax_type != "EXEMPT" else "NON_CLAIMABLE"
        
        result = {
            "tx_id": tx_data.get('id', 'TX-AUTO'),
            "timestamp": datetime.now().isoformat(),
            "gross": round(amount, 2),
            "net": round(net_amount, 2),
            "vat": round(vat_component, 2),
            "type": tax_type,
            "itc_status": itc_status,
            "optimization_flag": self._detect_leakage(itc_status, tx_data)
        }
        
        self.ledger.append(result)
        return result

    def _detect_leakage(self, status, tx):
        # Flag if a vendor isn't providing VAT-valid receipts for claimable items
        if status == "CLAIMABLE" and not tx.get('valid_vat_invoice', True):
            return "LEAKAGE_DETECTED: Missing VAT Invoice"
        return "OPTIMIZED"

# Execution Example
sentinel = ActiveVATSentinel()
tx = {
    "desc": "Server Infrastructure - Cloud Export",
    "gross_amount": 50000.00,
    "category": "export_sales",
    "valid_vat_invoice": True
}

print(sentinel.intercept_transaction(tx))



