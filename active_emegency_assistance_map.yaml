                type: 'Feature',
                geometry: { type: 'Point', coordinates: [121.0588, 14.3521] },
                properties: { threat: 0.9 }
            }]
        }
    });

    map.addLayer({
        id: 'pulse-layer',
        type: 'circle',
        source: 'emergencies',
        paint: {
            'circle-radius': 15,
            'circle-color': '#00f2ff', // Cyan Neon
            'circle-blur': 0.5,
            'circle-opacity': [
