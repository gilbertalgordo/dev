import time
import json
from dataclasses import dataclass, asdict

@dataclass
class EmergencyLocation:
    id: str
    lat: float
    lng: float
    status: str  # Active, Responding, Resolved
    priority: int  # 1 (Critical) to 5 (Low)
    timestamp: float

class ActiveEmergencyAI:
    def __init__(self):
        self.active_incidents = {}

    def update_incident(self, incident_id, lat, lng, priority):
        """Active monitoring: updates or creates new emergency nodes."""
        incident = EmergencyLocation(
            id=incident_id,
            lat=lat,
            lng=lng,
            status="Active",
            priority=priority,
            timestamp=time.time()
        )
        self.active_incidents[incident_id] = incident
        return asdict(incident)

    def get_hud_data(self):
        """Returns structured data for the 3D/HD Map HUD."""
        return [asdict(inc) for inc in self.active_incidents.values() if inc.status == "Active"]

# Initialize Engine
ai_engine = ActiveEmergencyAI()
# Example: Adding a critical residential alert
ai_engine.update_incident("RES-001", 14.3521, 121.0588, priority=1)



