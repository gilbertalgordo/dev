import React from 'react';
import { motion } from 'framer-motion';
import { Shield, Cpu, Activity, Terminal } from 'lucide-react';

const AdvancedAssistantLogo = ({ systemStatus = 'active' }) => {
  return (
    <div className="relative flex items-center justify-center w-64 h-64 bg-slate-950 rounded-full border border-slate-800 shadow-2xl overflow-hidden">
      
      {/* Layer 1: Rotating Tech Rings (Matter & API Synchronization) */}
      <motion.div 
        animate={{ rotate: 360 }}
        transition={{ duration: 20, repeat: Infinity, ease: "linear" }}
        className="absolute inset-4 border-2 border-dashed border-emerald-500/30 rounded-full"
      />
      
      {/* Layer 2: Pulse Signal (Active Monitoring) */}
      {systemStatus === 'active' && (
        <motion.div 
          initial={{ scale: 0.8, opacity: 0 }}
          animate={{ scale: 1.5, opacity: [0, 0.5, 0] }}
          transition={{ duration: 2, repeat: Infinity }}
          className="absolute w-32 h-32 bg-emerald-500/20 rounded-full"
        />
      )}

      {/* Layer 3: The Core Logo (The "G" Developer Hub) */}
      <div className="relative z-10 flex flex-col items-center">
        <div className="bg-gradient-to-br from-blue-500 via-emerald-400 to-emerald-600 p-1 rounded-2xl shadow-lg">
          <div className="bg-slate-900 p-4 rounded-xl">
             <span className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-t from-slate-200 to-white">G</span>
          </div>
        </div>
        
        {/* Status Text HUD */}
        <div className="mt-4 flex items-center space-x-2">
          <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse" />
          <span className="text-[10px] font-mono tracking-tighter text-emerald-400 uppercase">
            AI Assistant: Active
          </span>
        </div>
      </div>

      {/* Perimeter Icons (Floating Context) */}
      <div className="absolute inset-0 p-6 flex justify-between items-start pointer-events-none">
         <Cpu size={14} className="text-blue-400 opacity-50" />
         <Shield size={14} className="text-emerald-400 opacity-50" />
      </div>
    </div>
  );
};

export default AdvancedAssistantLogo;



