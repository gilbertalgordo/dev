<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --ninja-color: #0d1117; /* GitHub Dark Mode Background */
            --accent-glow: #238636; /* GitHub Green */
            --hud-line: rgba(56, 139, 253, 0.4); /* GitHub Blue */
        }

        body {
            background-color: #010409;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The Ninja Container */
        .ninja-container {
            position: relative;
            width: 300px;
            height: 400px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        /* Ninja Body Silhouette using Clip-Path */
        .ninja-silhouette {
            width: 100%;
            height: 100%;
            background: var(--ninja-color);
            clip-path: polygon(
                50% 0%, 65% 10%, 75% 5%, 85% 15%, 75% 25%, 80% 40%, 
                95% 45%, 80% 55%, 85% 80%, 70% 95%, 50% 85%, 
                30% 95%, 15% 80%, 20% 55%, 5% 45%, 20% 40%, 
                25% 25%, 15% 15%, 25% 5%, 35% 10%
            );
            animation: stealth-pulse 4s infinite ease-in-out;
        }

        /* Scanning HUD Effect */
        .hud-scan {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--hud-line);
            box-shadow: 0 0 15px var(--hud-line);
            animation: scan 3s infinite linear;
            z-index: 2;
        }

        /* Octocat Eye Glow */
        .eye {
            position: absolute;
            top: 15%;
            width: 10px;
            height: 4px;
            background: var(--accent-glow);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .eye.left { left: 42%; }
        .eye.right { right: 42%; }

        /* Animations */
        @keyframes stealth-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ninja-container">
        <div class="hud-scan"></div>
        <div class="ninja-silhouette"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
    </div>

</body>
</html>

