import os
from google.cloud import vision

# 1. Setup Environment
os.environ['GOOGLE_APPLICATION_CREDENTIALS'] = 'your-service-account.json'

def advanced_lens_search(image_path):
    """Performs an advanced visual search similar to Google Lens."""
    client = vision.ImageAnnotatorClient()

    with open(image_path, 'rb') as image_file:
        content = image_file.read()

    image = vision.Image(content=content)
    
    # Use Web Detection for "Lens-like" visual matching
    # We also include Label Detection for general context
    features = [
        vision.Feature(type_=vision.Feature.Type.WEB_DETECTION),
        vision.Feature(type_=vision.Feature.Type.LABEL_DETECTION),
        vision.Feature(type_=vision.Feature.Type.OBJECT_LOCALIZATION)
    ]
    
    request = vision.AnnotateImageRequest(image=image, features=features)
    response = client.annotate_image(request)
    
    # --- Process Web Results (The "Lens" Part) ---
    web_detection = response.web_detection
    
    print("### Visual Matches & Entities")
    for entity in web_detection.web_entities:
        print(f"- {entity.description} (Confidence: {entity.score:.2%})")

    print("\n### Matching Pages with Images")
    for page in web_detection.pages_with_matching_images:
        print(f"- Title: {page.page_title}\n  URL: {page.url}")

    # --- Process Object Bounding Boxes ---
    print("\n### Identified Objects in Scene")
    for obj in response.localized_object_annotations:
        print(f"- Object: {obj.name} | Score: {obj.score:.2%}")

# Run the search
advanced_lens_search('product_photo.jpg')



