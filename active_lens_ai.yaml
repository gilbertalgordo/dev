import os
from google.cloud import vision

# Set your Google Cloud credentials path
os.environ['GOOGLE_APPLICATION_CREDENTIALS'] = 'path/to/your/service-account-file.json'

def perform_visual_search(image_path):
    client = vision.ImageAnnotatorClient()

    with open(image_path, 'rb') as image_file:
        content = image_file.read()

    image = vision.Image(content=content)

    # Use Web Detection to get results similar to Google Lens
    response = client.web_detection(image=image)
    annotations = response.web_detection

    print("--- Visual Matches (Google Lens style) ---")
    if annotations.web_entities:
        for entity in annotations.web_entities:
            print(f"Entity: {entity.description} (Score: {entity.score})")

    if annotations.pages_with_matching_images:
        print("\n--- Matching Web Pages ---")
        for page in annotations.pages_with_matching_images:
            print(f"URL: {page.url}")

# Example usage
perform_visual_search('my_photo.jpg')



from google.cloud import vision

def search_products_by_image(project_id, location, product_set_id, image_path):
    client = vision.ImageAnnotatorClient()
    
    with open(image_path, 'rb') as image_file:
        content = image_file.read()

    # Define the product search parameters
    product_search_params = vision.ProductSearchParams(
        product_set=f"projects/{project_id}/locations/{location}/productSets/{product_set_id}",
        product_categories=['apparel-v2'], # Example category
    )
    
    image_context = vision.ImageContext(product_search_params=product_search_params)
    response = client.product_search(vision.Image(content=content), image_context=image_context)

    # Process results
    for result in response.product_search_results.results:
        print(f"Found Product: {result.product.display_name} with score {result.score}")



