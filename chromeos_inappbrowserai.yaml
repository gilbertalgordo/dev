/**
 * ChromeOS In-App Browser AI Manager
 * Designed for local execution on Gemini Nano
 */

async function initializeInAppAI() {
  // 1. Check if the AI model is available on this ChromeOS device
  const availability = await ai.languageModel.availability();
  
  if (availability === 'no') {
    console.error("Built-in AI is not supported on this device.");
    return;
  }

  // 2. Create a session with specific system instructions
  const session = await ai.languageModel.create({
    systemPrompt: "You are a helpful assistant integrated into a ChromeOS application."
  });

  return session;
}

async function generateAIResponse(userInput) {
  const aiSession = await initializeInAppAI();
  
  if (!aiSession) return "AI initialization failed.";

  try {
    // 3. Stream the response for a better UX
    const stream = aiSession.promptStreaming(userInput);
    let fullResponse = "";

    for await (const chunk of stream) {
      fullResponse = chunk;
      // Update your UI here with the streaming text
      console.log("Streaming update:", fullResponse);
    }
    
    return fullResponse;
  } catch (error) {
    console.error("AI Prompt Error:", error);
  } finally {
    aiSession.destroy(); // Always clean up sessions to free VRAM
  }
}



/* AI HUD Overlay Style */
.ai-hud-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 350px;
  background: rgba(0, 0, 0, 0.85); /* Semi-transparent */
  border: 1px solid #00f2ff; /* Cyberpunk/Tech Teal */
  border-radius: 8px;
  padding: 15px;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
  backdrop-filter: blur(10px);
}



/**
 * ChromeOS Advanced AI Orchestrator
 * Features: Session Persistence, Multimodal Handling, and Token Quota Management
 */
class ChromeOSAIHUD {
  constructor() {
    this.session = null;
    this.history = [];
    this.isMultimodalSupported = false;
  }

  async initialize() {
    const status = await window.ai.languageModel.availability();
    if (status === 'no') throw new Error("Hardware acceleration (Gemini Nano) not detected.");

    // Detect multimodal capabilities (2026 update)
    const capabilities = await window.ai.languageModel.capabilities();
    this.isMultimodalSupported = capabilities.multimodal || false;

    // Create session with "Archangel" style system instructions & Kaizen logic
    this.session = await window.ai.languageModel.create({
      systemPrompt: `You are an AI assistant with the wisdom and swiftness of the 7 Archangels. 
                     Prioritize Kaizen (continuous efficiency) in your logic. 
                     Be precise, accurate, and provide scientific reasoning.`,
      initialPrompts: [
        { role: 'system', content: 'Format all output for high-definition HUD displays.' }
      ]
    });
    
    console.log("HUD AI Initialized. Quota:", this.session.tokensLeft);
  }

  /**
   * Advanced Prompting with Multimodal Support
   * @param {string} text - The user query
   * @param {Blob|HTMLImageElement} [media] - Optional visual context
   */
  async processQuery(text, media = null) {
    if (!this.session) await this.initialize();

    // Check token quota before processing
    if (this.session.tokensLeft < 100) {
      await this.session.destroy(); // Clear VRAM
      await this.initialize();      // Re-baseline session
    }

    try {
      const promptOptions = media && this.isMultimodalSupported 
        ? { prompt: text, media: [media] } 
        : text;

      const stream = this.session.promptStreaming(promptOptions);
      
      for await (const chunk of stream) {
        this.updateHUD(chunk); // Real-time HUD update
      }

      // Record history for context persistence
      this.history.push({ role: 'user', content: text });
    } catch (err) {
      console.error("AI Logic Error:", err);
    }
  }

  updateHUD(content) {
    // Logic to render text into your 3D/HD HUD interface
    const hudContainer = document.getElementById('ai-hud-output');
    if (hudContainer) hudContainer.innerText = content;
  }
}

// Global Instance
const archangelAI = new ChromeOSAIHUD();
