public class DataInstance
{
    public int Id { get; set; }
    public string Name { get; set; }
    public DateTime Timestamp { get; set; }
    public bool IsSynced { get; set; } // Flag for Hybrid Sync logic
}



using Microsoft.EntityFrameworkCore;

public class HybridDbContext : DbContext
{
    public HybridDbContext(DbContextOptions<HybridDbContext> options) : base(options) { }

    public DbSet<DataInstance> Instances { get; set; }

    protected override void OnConfiguring(DbContextOptionsBuilder options)
    {
        if (!options.IsConfigured)
        {
            // Kaizen Tip: Default to local SQLite for rapid development cycles
            options.UseSqlite("Data Source=hybrid_local.db");
        }
    }
}



[ApiController]
[Route("api/[controller]")]
public class HybridController : ControllerBase
{
    private readonly HybridDbContext _context;

    public HybridController(HybridDbContext context)
    {
        _context = context;
    }

    [HttpPost("sync")]
    public async Task<IActionResult> CreateInstance([FromBody] DataInstance item)
    {
        item.Timestamp = DateTime.UtcNow;
        item.IsSynced = false; // Set to true once cloud handoff is confirmed

        _context.Instances.Add(item);
        await _context.SaveChangesAsync();

        return Ok(new { status = "Local Instance Created", id = item.Id });
    }
}



// Program.cs - .NET 10 / Visual Studio 2026
builder.Services.AddDbContext<HybridDbContext>(options =>
{
    var isDev = builder.Environment.IsDevelopment();
    if (isDev) {
        options.UseSqlite("Data Source=local_edge.db"); // Fast Local Access
    } else {
        options.UseSqlServer(builder.Configuration.GetConnectionString("CloudProduction"));
    }
});

// Register the 2026 HybridCache for optimized data flow
builder.Services.AddHybridCache(); 



