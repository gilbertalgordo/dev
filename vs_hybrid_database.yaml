{
    [Key]
    public Guid InstanceId { get; set; } = Guid.NewGuid();
    public string Payload { get; set; }
    
    // HUD/Metadata for Synchronization Logic
    public DateTime LastModified { get; set; } = DateTime.UtcNow;
    public string VersionTag { get; set; } = "v1.0.0";
    public bool IsDirty { get; set; } = true; // True if local changes haven't reached cloud
}



using Microsoft.Extensions.Caching.Hybrid;

public class SyncEngineService
{
    private readonly HybridDbContext _context;
    private readonly HybridCache _cache;

    public SyncEngineService(HybridDbContext context, HybridCache cache)
    {
        _context = context;
        _cache = cache;
    }

    public async Task<DataInstance> GetOrSyncInstanceAsync(Guid id)
    {
        // Kaizen Strategy: Get from L1 (Memory) -> L2 (Local DB) -> L3 (Cloud)
        return await _cache.GetOrCreateAsync(id.ToString(), async cancel =>
        {
            var localData = await _context.Instances.FindAsync(id);
            
            if (localData != null && localData.IsDirty)
            {
                // Science-based reasoning: Push local changes to Cloud "Master"
                await PushToCloudAsync(localData);
                localData.IsDirty = false;
                await _context.SaveChangesAsync();
            }
            
            return localData;
        });
    }

