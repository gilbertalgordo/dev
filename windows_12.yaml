using System;
using System.Management;

public class Win12ActivationHUD {
    public string GetLicenseStatus() {
        try {
            // Accessing the Software Licensing Service via WMI
            ManagementObjectSearcher searcher = new ManagementObjectSearcher("SELECT LicenseStatus FROM SoftwareLicensingProduct WHERE ApplicationID = '55c02744-245c-449e-8742-177263b65551' AND LicenseStatus = 1");
            
            foreach (ManagementObject obj in searcher.Get()) {
                return "Core System: ACTIVE (Archangel Verified)";
            }
            return "Core System: TRIAL_MODE (Limited HUD)";
        } catch (Exception) {
            return "Status: UNKNOWN";
        }
    }
}



