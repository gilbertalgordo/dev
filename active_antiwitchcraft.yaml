from PIL import Image, ImageDraw

def generate_guardian_icon(output_path, shield_level="HD"):
    # Create a 512x512 Canvas with a dark tech background
    img = Image.new('RGBA', (512, 512), color=(10, 25, 47, 255))
    draw = ImageDraw.Draw(img)
    
    # Draw the 'Aegis' Shield outline
    shield_coords = [(256, 50), (450, 100), (400, 400), (256, 500), (112, 400), (62, 100)]
    draw.polygon(shield_coords, outline=(0, 242, 255), width=10)
    
    # Internal Circuitry (The AI Logic)
    draw.line((256, 150, 256, 400), fill=(0, 242, 255), width=5)
    draw.ellipse((206, 206, 306, 306), outline=(0, 242, 255), width=8)
    
    # Save with HD clarity
    img.save(output_path, "PNG")
    print(f"Icon generated at {output_path} with {shield_level} accuracy.")

