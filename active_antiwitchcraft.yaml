import numpy as np
import math
from collections import Counter

class GuardianAI:
    def __init__(self, sensitivity=3.5):
        self.entropy_threshold = sensitivity
        self.protective_layer_active = True

    def calculate_entropy(self, data):
        """Measures the 'chaos' level of a digital signal."""
        if not data:
            return 0
        entropy = 0
        counter = Counter(data)
        length = len(data)
        for count in counter.values():
            p_x = count / length
            entropy += - p_x * math.log2(p_x)
        return entropy

    def scan_intent(self, signal):
        """Analyzes signal for malicious/anomalous signatures."""
        entropy_score = self.calculate_entropy(signal)
        
        if entropy_score > self.entropy_threshold:
            return "⚠️ ANOMALY DETECTED: High Entropy/Malicious Signature."
        return "✅ SIGNAL CLEAR: Harmony maintained."

# --- Implementation ---
guardian = GuardianAI()
incoming_packet = "f8a29c110b429188e" # Example of a 'chaotic' signal
status = guardian.scan_intent(incoming_packet)
print(f"System Status: {status}")



import re

def purge_malicious_patterns(text):
    # Pattern designed to catch obfuscated script 'sigils'
    malicious_sigils = r"([^\w\s]){4,}" 
    cleansed_text = re.sub(malicious_sigils, "[PATTERN PURIFIED]", text)
    return cleansed_text

raw_input = "Target located. Initiate sequence: !@#$%^&*"
print(purge_malicious_patterns(raw_input))



import numpy as np
import scipy.signal as signal

class ArchangelProtector:
    def __init__(self):
        self.kaizen_threshold = 0.05
        self.history = []

    def frequency_purification(self, stream_data):
        """
        Uses FFT to detect non-harmonic spikes in digital signals.
        Acts as a 'spectral shield' against hidden intent.
        """
        # Convert signal to frequency domain
        frequencies, power_spectrum = signal.welch(stream_data)
        
        # Detect 'Unnatural' Spikes (The Digital Sigil)
        peak_indices = np.where(power_spectrum > np.mean(power_spectrum) * 5)
        
        if len(peak_indices[0]) > 0:
            return "🛡️ MALICIOUS FREQUENCY INTERCEPTED: Purifying..."
        return "✨ HARMONIC PURITY MAINTAINED"

    def apply_kaizen_update(self, success_rate):
        """Superfast adjustment of sensitivity."""
        if success_rate < 0.99:
            self.kaizen_threshold *= 0.95 # Rapid optimization
            return "SYSTEM EVOLVING: Increasing Vigilance."




def active_sigil_filter(input_buffer):
    """
    Scans for high-complexity obfuscation patterns (Digital Sigils).
    """
    # Normalized complexity check
    unique_chars = len(set(input_buffer))
    total_chars = len(input_buffer)
    
    # If entropy vs length ratio is abnormal, it's a hidden payload
    if (unique_chars / total_chars) > 0.85:
        # Trigger 'Seal' protocol
        purified_data = "".join([c for c in input_buffer if c.isalnum() or c in " .?"])
        return f"REDACTED SIGIL: {purified_data}"
    
    return input_buffer

