class MediaProcessor:
    def __init__(self):
        # Default state is OFF
        self.watermark_enabled = False

    def toggle_watermark(self):
        """Switches the watermark state."""
        self.watermark_enabled = not self.watermark_enabled
        status = "ENABLED" if self.watermark_enabled else "DISABLED"
        print(f"System: Watermark is now {status}")

    def generate_output(self, content_name):
        """Simulates generating media with or without a watermark."""
        if self.watermark_enabled:
            return f"Processed {content_name} [WATERMARK APPLIED]"
        else:
            return f"Processed {content_name} [CLEAN OUTPUT]"

# --- Execution ---
app = MediaProcessor()

# 1. Generate clean content
print(app.generate_output("Project_Alpha_Video"))

# 2. Switch the feature ON
app.toggle_watermark()

# 3. Generate watermarked content
print(app.generate_output("Project_Alpha_Video"))




import cv2
import numpy as np

class GeminiMediaController:
    def __init__(self):
        self.watermark_active = True  # The "Switch"

    def toggle_watermark(self, state: bool):
        """Standard switch to enable or disable watermark handling."""
        self.watermark_active = state
        print(f"Watermark handling is now: {'ON' if state else 'OFF'}")

    def process_output(self, image_path):
        """
        Advanced 'Remover' logic using OpenCV Inpainting.
        This identifies a mask area and reconstructs pixels.
        """
        img = cv2.imread(image_path)
        
        if not self.watermark_active:
            # 1. Create a mask of the watermark location (e.g., bottom right)
            # You can also use a pre-made .png mask for the specific Gemini icon
            mask = np.zeros(img.shape[:2], np.uint8)
            
            # Example: Masking the bottom-right corner where sparkles usually appear
            h, w = img.shape[:2]
            cv2.rectangle(mask, (w-100, h-100), (w, h), 255, -1)
            
            # 2. Use Telea Inpainting to 'remove' the watermark seamlessly
            dst = cv2.inpaint(img, mask, 3, cv2.INPAINT_TELEA)
            return dst
        
        return img

# Usage
controller = GeminiMediaController()
controller.toggle_watermark(False) # Turn 'OFF' the watermark in the final output
clean_image = controller.process_output("gemini_gen.png")



