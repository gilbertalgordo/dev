import os
import asyncio
import aiohttp
from google.cloud import secretmanager
from flask import Flask, request, jsonify

app = Flask(__name__)

# --- Configuration ---
PROJECT_ID = os.getenv("GOOGLE_CLOUD_PROJECT")
SECRET_ID = "cti-api-key"  # Name of your secret in Secret Manager

def get_api_key():
    """Fetches the API Key securely from GCP Secret Manager."""
    client = secretmanager.SecretManagerServiceClient()
    name = f"projects/{PROJECT_ID}/secrets/{SECRET_ID}/versions/latest"
    response = client.access_secret_version(request={"name": name})
    return response.payload.data.decode("UTF-8")

class GlobalCTIEngine:
    def __init__(self, api_key):
        self.api_key = api_key
        self.base_url = "https://www.virustotal.com/api/v3"
        self.headers = {"x-apikey": self.api_key}

    async def fetch_indicator(self, session, category, indicator):
        """Asynchronous lookup for specific threat categories."""
        url = f"{self.base_url}/{category}/{indicator}"
        async with session.get(url, headers=self.headers) as response:
            if response.status == 200:
                data = await response.json()
                # Advanced parsing of the 'last_analysis_stats'
                stats = data['data']['attributes'].get('last_analysis_stats', {})
                reputation = data['data']['attributes'].get('reputation', 0)
                return {
                    "indicator": indicator,
                    "malicious_votes": stats.get("malicious", 0),
                    "reputation_score": reputation,
                    "status": "high_risk" if stats.get("malicious", 0) > 3 else "clear"
                }
            return {"indicator": indicator, "error": "Not Found", "code": response.status}

@app.route('/analyze', methods=['POST'])
async def analyze_on_demand():
    """
    On-Demand Endpoint
    Payload: {"ips": ["1.1.1.1"], "domains": ["example.com"]}
    """
    api_key = get_api_key()
    engine = GlobalCTIEngine(api_key)
    request_data = request.get_json()
    
    tasks = []
    async with aiohttp.ClientSession() as session:
        # Process IPs
        for ip in request_data.get('ips', []):
            tasks.append(engine.fetch_indicator(session, 'ip_addresses', ip))
        
        # Process Domains
        for domain in request_data.get('domains', []):
            tasks.append(engine.fetch_indicator(session, 'domains', domain))
            
        results = await asyncio.gather(*tasks)
        
    return jsonify({"global_threat_intel": results})

if __name__ == "__main__":
    app.run(host="0.0.0.0", port=int(os.environ.get("PORT", 8080)))



