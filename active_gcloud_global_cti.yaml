import requests
import json
import os

class GlobalCTIConnector:
    def __init__(self, api_key=None):
        # Fallback to environment variable for GCloud deployments
        self.api_key = api_key or os.getenv('GTI_API_KEY')
        self.base_url = "https://www.virustotal.com/api/v3"
        self.headers = {
            "accept": "application/json",
            "x-apikey": self.api_key
        }

    def inspect_indicator(self, indicator_type, value):
        """
        Queries the global threat database for a specific indicator.
        Types: 'ip_addresses', 'urls', 'files', 'domains'
        """
        endpoint = f"{self.base_url}/{indicator_type}/{value}"
        
        try:
            response = requests.get(endpoint, headers=self.headers)
            response.raise_for_status()
            return response.json()
        except requests.exceptions.HTTPError as e:
            return {"error": str(e), "status_code": response.status_code}

# Example Usage for GCloud Function / On-Demand Request
def main():
    # Replace with your actual key or set environment variable
    cti = GlobalCTIConnector(api_key="YOUR_GTI_API_KEY")
    
    # 1. Check a suspicious IP
    ip_result = cti.inspect_indicator("ip_addresses", "8.8.8.8")
    
    # 2. Extract specific threat score (Google TI Threat Score)
    data = ip_result.get('data', {})
    attributes = data.get('attributes', {})
    reputation = attributes.get('reputation', 0)
    
    print(f"Indicator: {data.get('id')}")
    print(f"Global Reputation Score: {reputation}")
    print(f"Last Analysis Stats: {json.dumps(attributes.get('last_analysis_stats'), indent=2)}")

if __name__ == "__main__":
    main()




