import { DateTime } from 'luxon';

/**
 * Converts a standard UTC timestamp or ISO string into a structured PHT object
 * Handles edge cases like invalid inputs and complex formatting.
 */
export interface PHTTimeResponse {
  isoString: string;
  formattedLong: string;
  isBusinessHours: boolean;
  epochMillis: number;
}

export function getPhilippineTime(inputDate?: string | Date): PHTTimeResponse {
  // 1. Parse or initialize time explicitly in the Asia/Manila zone
  const dt = inputDate 
    ? DateTime.fromISO(new Date(inputDate).toISOString()).setZone('Asia/Manila')
    : DateTime.now().setZone('Asia/Manila');

  if (!dt.isValid) {
    throw new Error(`Invalid date provided: ${dt.invalidReason}`);
  }

  // 2. Business hours evaluation (PH business hours: Mon-Fri, 9 AM - 6 PM PST)
  const isBusinessHours = dt.weekday >= 1 && dt.weekday <= 5 && dt.hour >= 9 && dt.hour < 18;

  return {
    isoString: dt.toISO() ?? '', // e.g., "2026-06-10T17:20:51.000+08:00"
    formattedLong: dt.toFormat('FFFF'), // Full localized string
    isBusinessHours,
    epochMillis: dt.toMillis()
  };
}

// Example Usage:
console.log(JSON.stringify(getPhilippineTime(), null, 2));



import ntplib
from datetime import datetime
from zoneinfo import ZoneInfo

def get_exact_philippine_time():
    """
    Queries an NTP server to fetch highly precise time,
    correcting for server clock drift, localized to Asia/Manila.
    """
    ntp_client = ntplib.NTPClient()
    try:
        # Querying pool.ntp.org (or specific PH servers like ntp.pagasa.dost.gov.ph if active)
        response = ntp_client.request('pool.ntp.org', version=3)
        
        # Convert NTP tx_time (UTC timestamp) to explicit Manila Time Zone
        pht_zone = ZoneInfo("Asia/Manila")
        exact_pht = datetime.fromtimestamp(response.tx_time, tz=pht_zone)
        
        return {
            "precise_pht": exact_pht.isoformat(),
            "offset_seconds": response.offset,
            "stratum": response.stratum
        }
    except Exception as e:
        return {"error": f"NTP synchronization failed: {str(e)}"}

# Example Usage:
print(get_exact_philippine_time())



-- 1. Ensure the session or system fallback configuration defaults properly (Optional)
SET TIME ZONE 'Asia/Manila';

-- 2. Create an advanced table utilizing proper timezone tracking
CREATE TABLE user_logs (
    id SERIAL PRIMARY KEY,
    action_performed VARCHAR(255),
    -- Stores internally in UTC but converts seamlessly to the application's timezone
    created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP 
);

-- 3. Querying data explicitly converting UTC storage to Philippine Standard Time
SELECT 
    id,
    action_performed,
    -- Forces evaluation context explicitly to Asia/Manila regardless of client connection config
    created_at AT TIME ZONE 'Asia/Manila' AS philippine_standard_time
FROM 
    user_logs
WHERE 
    -- Querying by a dynamic range localized to the PH business day
    created_at >= (CURRENT_DATE + TIME '00:00:00') AT TIME ZONE 'Asia/Manila';



package main

import (
	"fmt"
	"time"
)

func main() {
	// Load Location explicitly. Ensure zoneinfo is installed on the host OS.
	loc, err := time.LoadLocation("Asia/Manila")
	if err != nil {
		fmt.Printf("Error loading location: %v\n", err)
		return
	}

	// Fetch current time bound directly to the location context
	phtNow := time.Now().In(loc)

	// Custom format layout in Go uses the standard magic date: Mon Jan 2 15:04:05 MST 2006
	fmt.Println("PHT Time:", phtNow.Format("2006-01-02 15:04:05 PM MST"))

	// Advanced: Calculate midnight tomorrow in PHT for cache evictions/crons
	tomorrowMidnight := time.Date(phtNow.Year(), phtNow.Month(), phtNow.Day()+1, 0, 0, 0, 0, loc)
	durationUntilReset := tomorrowMidnight.Sub(phtNow)
	
	fmt.Printf("Time until PH Midnight: %v\n", durationUntilReset)
}



