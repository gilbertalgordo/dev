import React from 'react';

interface TimeZoneIconProps {
  size?: number;
  isActive?: boolean;
}

export const PhilippineTimeZoneIcon: React.FC<TimeZoneIconProps> = ({ 
  size = 48, 
  isActive = true 
}) => {
  const accentColor = isActive ? "stroke-cyan-400" : "stroke-slate-400";
  const textColor = isActive ? "fill-cyan-400" : "fill-slate-400";

  return (
    <div className="inline-flex flex-col items-center p-2 bg-slate-900 rounded-xl border border-slate-800 shadow-xl">
      <svg 
        width={size} 
        height={size} 
        viewBox="0 0 24 24" 
        fill="none" 
        xmlns="http://www.w3.org/2000/svg"
        className="transition-all duration-300"
      >
        {/* Boundary ring */}
        <circle cx="12" cy="12" r="10" className={`${accentColor} transition-colors`} strokeWidth="1.5" strokeDasharray="2 2" />
        
        {/* Inner Clock Face */}
        <circle cx="12" cy="12" r="8" className="stroke-slate-700" strokeWidth="1" />
        
        {/* Hands pointing explicitly to +8 offset geometry (8 o'clock positioning) */}
        {/* Hour Hand */}
        <line x1="12" y1="12" x2="9" y2="15" className="stroke-slate-200" strokeWidth="1.5" strokeLinecap="round" />
        {/* Minute Hand */}
        <line x1="12" y1="12" x2="12" y2="6" className={`${accentColor}`} strokeWidth="1.5" strokeLinecap="round" />
        
        {/* Center pivot point */}
        <circle cx="12" cy="12" r="1" className={`${textColor}`} />
      </svg>
      
      {/* Sub-label for the HUD UI */}
      <span className={`text-[10px] font-mono mt-1 font-bold ${isActive ? 'text-cyan-400' : 'text-slate-500'}`}>
        UTC +8
      </span>
    </div>
  );
};

export default PhilippineTimeZoneIcon;



