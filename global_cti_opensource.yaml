# Credentials for your local free MISP instance
misp_url = 'https://your-misp-instance.local'
misp_key = 'YOUR_API_KEY'
misp_verifycert = False 

def fetch_global_iocs():
    misp = PyMISP(misp_url, misp_key, misp_verifycert)
    # Fetch attributes from the last 24 hours with a 'High' threat level
    result = misp.search(controller='attributes', type_attribute='ip-dst', last='1d')
    
    iocs = [attr['value'] for attr in result['Attribute']]
    return iocs



import subprocess

def active_block(ip_list):
    """
    Active Defense: Blocks malicious IPs using iptables.
    """
    for ip in ip_list:
        try:
            # Check if already blocked to avoid duplicates
            subprocess.run(["iptables", "-C", "INPUT", "-s", ip, "-j", "DROP"], check=True, capture_output=True)
        except subprocess.CalledProcessError:
            # If not found, add the block rule
            subprocess.run(["iptables", "-A", "INPUT", "-s", ip, "-j", "DROP"])
            print(f"[ACTIVE DEFENSE] Blocked malicious IP: {ip}")

