from taxii2client.v21 import Server, Collection

def fetch_global_intel(api_root_url, collection_id, username, password):
    """Connects to a global TAXII server and retrieves threat data."""
    server = Server(api_root_url, user=username, password=password)
    api_root = server.api_roots[0]  # Standard API root
    collection = Collection(f"{api_root.url}collections/{collection_id}/", 
                            user=username, password=password)
    
    # Fetching the last 100 threat intelligence objects
    envelope = collection.get_objects()
    return envelope.objects

