import os
import json
from typing import TypedDict, List
from langgraph.graph import StateGraph, END
from ollama import Client as OllamaClient
from stix2 import Indicator, Relationship, Bundle

# --- CONFIGURATION ---
OLLAMA_MODEL = "deepseek-r1:14b"
CTI_CONFIDENCE_THRESHOLD = 90

class AgentState(TypedDict):
    raw_intel: str
    parsed_iocs: List[dict]
    risk_score: int
    is_active: bool
    mitigation_plan: str

# 1. THE REASONING NODE
def analyze_threat(state: AgentState):
    client = OllamaClient()
    prompt = f"""
    [SYSTEM] Act as an Autonomous CTI Analyst. 
    [REPORT] {state['raw_intel']}
    [TASK] Extract malicious IPs/URLs and provide a risk score (0-100).
    Return ONLY JSON: {{"iocs": [], "score": 85, "reason": ""}}
    """
    response = client.generate(model=OLLAMA_MODEL, prompt=prompt)
    data = json.loads(response['response'])
    
    return {
        **state,
        "parsed_iocs": data['iocs'],
        "risk_score": data['score'],
        "is_active": data['score'] >= CTI_CONFIDENCE_THRESHOLD
    }

# 2. THE MITIGATION NODE (Active Defense)
def execute_mitigation(state: AgentState):
    if state['is_active']:
        plan = []
        for ioc in state['parsed_iocs']:
            # Simulation of an 'Active' API call to a Firewall or EDR
            # In production: requests.post(FIREWALL_API, json=ioc)
            plan.append(f"EXEC: Blocked {ioc} on Global Edge.")
        
        return {**state, "mitigation_plan": "\n".join(plan)}
    return state

# 3. DEFINE THE GRAPH
workflow = StateGraph(AgentState)
workflow.add_node("analyze", analyze_threat)
workflow.add_node("mitigate", execute_mitigation)

workflow.set_entry_point("analyze")
workflow.add_edge("analyze", "mitigate")
workflow.add_edge("mitigate", END)

cti_agent = workflow.compile()



def generate_global_broadcast(state: AgentState):
    """Packages findings into a STIX 2.1 Bundle for sharing."""
    indicator = Indicator(
        name="AI-Detected C2",
        indicator_types=["malicious-activity"],
        pattern=f"[ipv4-addr:value = '{state['parsed_iocs'][0]}']",
        pattern_type="stix",
        confidence=state['risk_score']
    )
    
    # Relationship: Indicator 'indicates' a generic Malware object
    # This allows other global partners to understand WHY the IP is blocked.
    bundle = Bundle(objects=[indicator])
    return bundle.serialize()
