import openai # Or use local frameworks like DeepSeek/Llama-3

def ai_extract_threat_context(unstructured_report):
    """Uses Agentic AI to extract TTPs and IoCs from raw text."""
    prompt = f"""
    Analyze the following security report and return a JSON object 
    containing: 'malware_family', 'threat_actor', 'ips', 'domains', and 'urgency_score' (1-10).
    Report: {unstructured_report}
    """
    
    response = openai.ChatCompletion.create(
        model="gpt-4-turbo-preview", # Replace with local DeepSeek-R1 for privacy
        messages=[{"role": "user", "content": prompt}]
    )
    return response.choices[0].message.content



