class ActiveDefenseController:
    def __init__(self, threshold=85):
        self.threshold = threshold

    def deploy_mitigation(self, ai_analysis):
        """Automatically updates Firewalls/EDR if confidence exceeds threshold."""
        if ai_analysis['confidence'] >= self.threshold:
            print(f"🚨 CRITICAL THREAT DETECTED: {ai_analysis['threat_actor']}")
            
            for ioc in ai_analysis['indicators']:
                if ioc['type'] == 'ipv4-addr':
                    self._block_ip(ioc['value'])
                    self._create_stix_indicator(ioc)

    def _block_ip(self, ip):
        # Implementation for Cisco/Palo Alto/Fortinet API
        print(f"[ACTION] Null-routing IP {ip} across global edge nodes.")

    def _create_stix_indicator(self, ioc):
        indicator = Indicator(
            name="AI-Detected Malicious IP",
            indicator_types=["malicious-activity"],
            pattern=f"[ipv4-addr:value = '{ioc['value']}']",
            pattern_type="stix",
            description=ioc['desc']
        )
        print(f"[STIX] Created Object: {indicator.id}")
        return indicator

