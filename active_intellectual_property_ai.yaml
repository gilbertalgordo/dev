from sentence_transformers import SentenceTransformer, util
import torch

# Load a pre-trained model for semantic similarity
model = SentenceTransformer('all-MiniLM-L6-v2')

# 1. Your Registered IP (The "Master" Database)
master_ip_repository = [
    "A method for enhancing lithium-ion battery life using graphene-silicon composite anodes.",
    "A proprietary algorithm for real-time sentiment analysis in high-frequency trading."
]

# 2. Incoming Data (Web Scraped or Third-Party Content)
external_content = [
    "We use graphene-silicon composites to improve lithium battery longevity.",
    "How to cook a perfect medium-rare steak at home.",
    "A new real-time sentiment detection tool for stock market traders."
]

# Encode both sets into vector space
master_embeddings = model.encode(master_ip_repository, convert_to_tensor=True)
external_embeddings = model.encode(external_content, convert_to_tensor=True)

# 3. Active Monitoring Logic
print("--- IP Conflict Detection Report ---")
for i, ext_emb in enumerate(external_embeddings):
    # Compute cosine similarity
    cosine_scores = util.cos_sim(ext_emb, master_embeddings)
    
    # Check if any score exceeds a defined threshold (e.g., 0.85)
    max_score = torch.max(cosine_scores).item()
    
    if max_score > 0.85:
        print(f"ALERT: Potential IP Infringement detected!")
        print(f"External Source: '{external_content[i]}'")
        print(f"Similarity Confidence: {max_score:.2f}\n")



import hashlib

def generate_ip_fingerprint(file_path):
    """Generates a SHA-256 hash of an IP asset to act as a digital fingerprint."""
    sha256_hash = hashlib.sha256()
    with open(file_path, "rb") as f:
        # Read file in chunks to handle large datasets
        for byte_block in iter(lambda: f.read(4096), b""):
            sha256_hash.update(byte_block)
    return sha256_hash.hexdigest()

