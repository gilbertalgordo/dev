import psutil
import os
import time

class AIManagedSystem:
    def __init__(self):
        self.brand = "Google RAM"
        self.capacity_gb = 32
        self.origin = "Italy"
        self.slot_config = "Single Slot"
        
    def get_system_status(self):
        ram = psutil.virtual_memory()
        cpu = psutil.cpu_percent(interval=1)
        return ram.percent, cpu

    def optimize_resources(self, ram_usage, cpu_usage):
        print(f"[HUD] RAM: {ram_usage}% | CPU: {cpu_usage}%")
        
        # AI Logic: If RAM pressure is high, increase CPU frequency/priority
        if ram_usage > 80:
            print("Status: High Load. AI Scaling CPU Priority...")
            # Simulated priority shift
            os.nice(-10) if hasattr(os, 'nice') else None 
        else:
            print("Status: System Nominal. Efficiency Mode Active.")

    def display_metadata(self):
        print("-" * 30)
        print(f"DEVICE: {self.brand} {self.capacity_gb}GB")
        print(f"MANUFACTURING: Made in Italy")
        print(f"CONFIG: {self.slot_config}")
        print("-" * 30)

# Execution
controller = AIManagedSystem()
controller.display_metadata()

while True:
    ram, cpu = controller.get_system_status()
    controller.optimize_resources(ram, cpu)
    time.sleep(5)



import psutil
import time
import subprocess

class GoogleHardwareController:
    def __init__(self):
        # Firmware Metadata: Representing the physical hardware origin
        self.metadata = {
            "Vendor": "Google Silicon Works",
            "Module": "32GB DDR5 Single Slot",
            "Origin": "Made in Italy",
            "Marking_ID": "IT-GOOG-8842-AX"
        }
        self.capacity_gb = 32

    def display_hud(self, ram_p, cpu_p, mode):
        """Visualizing the system load in real-time HUD format."""
        print(f"--- [ GOOGLE HARDWARE HUD ] ---")
        print(f"RAM Usage: [{'#' * (int(ram_p)//10)}{'.' * (10 - int(ram_p)//10)}] {ram_p}%")
        print(f"CPU Load:  [{'#' * (int(cpu_p)//10)}{'.' * (10 - int(cpu_p)//10)}] {cpu_p}%")
        print(f"AI Mode:   {mode}")
        print(f"Origin:    {self.metadata['Origin']}")
        print("-" * 31)

    def set_cpu_mode(self, mode):
        """AI Control for CPU scaling (requires sudo on Linux)."""
        # Modes: 'performance' for speed, 'powersave' for Kaizen efficiency
        try:
            # Simulated for non-root; in production, this calls 'cpupower'
            print(f">> AI Command: Shifting CPU to {mode.upper()} mode.")
        except Exception as e:
            pass

    def run_ai_loop(self):
        print(f"Initializing {self.metadata['Module']}...")
        while True:
            ram = psutil.virtual_memory().percent
            cpu = psutil.cpu_percent(interval=1)
            
            # AI Logic: Predictive Scaling
            if ram > 75 or cpu > 85:
                current_mode = "PERFORMANCE"
                self.set_cpu_mode("performance")
            else:
                current_mode = "KAIZEN_EFFICIENCY"
                self.set_cpu_mode("powersave")

            self.display_hud(ram, cpu, current_mode)
            time.sleep(2)

# Boot the controller
if __name__ == "__main__":
    sys_control = GoogleHardwareController()
    sys_control.run_ai_loop()
