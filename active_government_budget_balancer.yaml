import numpy as np
from scipy.optimize import minimize

class BudgetBalancerAI:
    def __init__(self, initial_revenue, sectors):
        self.revenue = initial_revenue
        self.sectors = sectors  # List of sector names
        self.num_sectors = len(sectors)

    def objective_function(self, allocations, weights):
        """
        Goal: Minimize the variance from ideal growth weights 
        while keeping the budget balanced.
        """
        # We want to minimize the difference between actual allocation 
        # and our 'ideal' priority weights.
        return np.sum((allocations - weights)**2)

    def balance_budget(self, priority_weights, debt_ceiling=0):
        # Initial guess: distribute revenue equally
        initial_guess = np.ones(self.num_sectors) * (self.revenue / self.num_sectors)
        
        # Constraints: 
        # 1. Total spending <= Revenue + allowed Debt
        # 2. Each sector must have at least a minimum baseline (e.g., 5% of revenue)
        constraints = [
            {'type': 'ineq', 'fun': lambda x: (self.revenue + debt_ceiling) - np.sum(x)},
        ]
        
        # Bounds: No sector can have negative funding
        bounds = [(self.revenue * 0.05, self.revenue) for _ in range(self.num_sectors)]

        result = minimize(
            self.objective_function, 
            initial_guess, 
            args=(priority_weights,), 
            method='SLSQP', 
            bounds=bounds, 
            constraints=constraints
        )

        return result

# --- Simulation Execution ---
sectors = ["Healthcare", "Defense", "Education", "Infrastructure", "Tech/R&D"]
# AI sets weights based on current socio-economic data (normalized to total revenue)
ideal_weights = np.array([2500, 1500, 2000, 2000, 2000]) 

ai_system = BudgetBalancerAI(initial_revenue=9000, sectors=sectors)
optimized_budget = ai_system.balance_budget(priority_weights=ideal_weights, debt_ceiling=200)

if optimized_budget.success:
    print("## Optimized Fiscal Allocation ##")
    for i, sector in enumerate(sectors):
        print(f"{sector}: ${optimized_budget.x[i]:.2f}B")
    print(f"Total Expenditure: ${np.sum(optimized_budget.x):.2f}B")
else:
    print("Optimization failed to find a balanced solution.")



import numpy as np
import pandas as pd
from sklearn.ensemble import GradientBoostingRegressor

class ActiveFiscalAI:
    def __init__(self, baseline_gdp, sectors):
        self.gdp = baseline_gdp
        self.sectors = sectors
        self.model = GradientBoostingRegressor()
        # Simulated historical data: [Revenue, Inflation, Employment, Last_Expenditure]
        self.history = pd.DataFrame(columns=['revenue', 'inflation', 'employment', 'expenditure'])

    def predict_revenue(self, current_indicators):
        """Predicts upcoming tax revenue based on economic indicators."""
        # In a production environment, this would pull from live FRED/World Bank APIs
        if len(self.history) < 10:
            return self.gdp * 0.25 # Default 25% tax-to-GDP ratio
        
        self.model.fit(self.history[['inflation', 'employment']], self.history['revenue'])
        return self.model.predict([current_indicators])[0]

    def optimize_allocation(self, target_revenue, urgency_matrix):
        """
        Uses a weighted scoring algorithm to distribute funds.
        urgency_matrix: {sector: score 1-10} based on real-time socio-economic needs.
        """
        total_urgency = sum(urgency_matrix.values())
        allocations = {}
        
        # Calculate base allocation per sector
        for sector, score in urgency_matrix.items():
            share = score / total_urgency
            allocations[sector] = target_revenue * share
            
        return allocations

    def run_kaizen_audit(self, allocations, efficiency_data):
        """
        Adjusts the next cycle's weights based on sector performance/waste.
        """
        adjusted_allocations = {}
        for sector, amount in allocations.items():
            # If a sector has high waste (efficiency < 0.8), reduce and reallocate to R&D
            efficiency = efficiency_data.get(sector, 1.0)
            if efficiency < 0.85:
                penalty = amount * 0.05
                adjusted_allocations[sector] = amount - penalty
                adjusted_allocations['Tech/R&D'] = adjusted_allocations.get('Tech/R&D', 0) + penalty
            else:
                adjusted_allocations[sector] = amount
        return adjusted_allocations

# --- Active Deployment Simulation ---
sectors = ["Healthcare", "Infrastructure", "Education", "Defense", "Tech/R&D"]
ai_governor = ActiveFiscalAI(baseline_gdp=1000000, sectors=sectors)

# 1. Real-time indicators: [Inflation: 3.1%, Employment: 94%]
current_stats = [3.1, 94]
projected_revenue = ai_governor.predict_revenue(current_stats)

# 2. Dynamic Urgency (e.g., pandemic or infrastructure crisis increases scores)
live_urgency = {
    "Healthcare": 9.5, 
    "Infrastructure": 7.0, 
    "Education": 8.0, 
    "Defense": 5.0, 
    "Tech/R&D": 8.5
}

initial_plan = ai_governor.optimize_allocation(projected_revenue, live_urgency)

# 3. Efficiency feedback (Kaizen Layer)
# Defense was over budget/wasteful (0.7), Tech was highly efficient (0.98)
efficiency_report = {"Defense": 0.7, "Tech/R&D": 0.98}
final_budget = ai_governor.run_kaizen_audit(initial_plan, efficiency_report)

print(f"## ACTIVE BUDGET PLAN (Projected Revenue: ${projected_revenue:,.2f}M) ##")
for sector, amt in final_budget.items():
    print(f">> {sector}: ${amt:,.2f}M")



