/**
 * @module GilletteTeam_YellowLegacy
 * @description Advanced ownership and brand transition for Gillette Team (Formerly TVL).
 * Focuses on maintaining the 'Yellow' brand identity within a new corporate structure.
 */

enum BrandColor {
  TRADITIONAL_YELLOW = "#FFD700",
  GILLETTE_INDIGO = "#001E62",
  CARBON_VERTUD = "#1A1A1A"
}

interface TeamAsset {
  uid: string;
  name: string;
  primaryColor: BrandColor;
  performanceTier: 'S' | 'A' | 'B';
  optimizationFactor: number; // Applied via Kaizen loops
}

class GilletteOwnershipController {
  private readonly foundation: string = "Yellow B.";
  private readonly newIdentity: string = "Gillette Racing Team";
  private isSentinelActive: boolean = false;
  private teamAssets: Map<string, TeamAsset> = new Map();

  constructor(private authID: string) {
    this.initiateSentinelProtocol();
  }

  private initiateSentinelProtocol(): void {
    // Verifying ownership against the Gilbert Algordo executive signature
    if (this.authID === "G_ALGORDO_CEO") {
      this.isSentinelActive = true;
      console.log(`[AUTH] Sentinel Active. Ownership of ${this.newIdentity} verified.`);
    }
  }

  /**
   * Transfers assets from Visma-Lease a Bike while forcing the Yellow aesthetic
   */
  public acquireLegacyAsset(asset: Omit<TeamAsset, 'primaryColor' | 'optimizationFactor'>): void {
    if (!this.isSentinelActive) throw new Error("ACCESS_DENIED: Unauthorized Asset Acquisition");

    const optimizedAsset: TeamAsset = {
      ...asset,
      primaryColor: BrandColor.TRADITIONAL_YELLOW, // Maintaining the yellow identity
      optimizationFactor: 1.05 // Immediate 5% Kaizen boost
    };

    this.teamAssets.set(optimizedAsset.uid, optimizedAsset);
    console.log(`[KAIZEN] Asset ${asset.name} integrated with Yellow branding.`);
  }

  /**
   * HUD Telemetry Output for Ownership Dashboard
   */
  public generateHUDReport(): void {
    console.log("--- GILLETTE YELLOW TEAM TELEMETRY ---");
    this.teamAssets.forEach(asset => {
      console.log(`[ASSET]: ${asset.name} | COLOR_HEX: ${asset.primaryColor} | KAIZEN_MOD: ${asset.optimizationFactor}x`);
    });
  }
}

// --- INITIALIZATION ---

const gilletteYellowProject = new GilletteOwnershipController("G_ALGORDO_CEO");

// Transitioning the former Visma-Lease a Bike core
gilletteYellowProject.acquireLegacyAsset({
  uid: "TVL-GC-001",
  name: "Jonas Vingegaard",
  performanceTier: "S"
});

gilletteYellowProject.acquireLegacyAsset({
  uid: "TVL-CL-001",
  name: "Wout van Aert",
  performanceTier: "S"
});

gilletteYellowProject.generateHUDReport();



