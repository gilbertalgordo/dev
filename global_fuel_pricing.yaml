// Active AI Fuel HUD Shader
void mainImage( out vec4 fragColor, in vec2 fragCoord ) {
    vec2 uv = fragCoord/iResolution.xy;
    
    // 1. Carbon Fiber Texture
    float pattern = step(0.5, fract(uv.x * 120.0)) * step(0.5, fract(uv.y * 120.0));
    vec3 baseColor = mix(vec3(0.02), vec3(0.05), pattern);
    
    // 2. Iridescent "Active AI" Glow (Violet to Maroon)
    float pulse = sin(iTime * 1.5) * 0.5 + 0.5;
    vec3 irisColor = mix(vec3(0.3, 0.0, 0.5), vec3(0.5, 0.0, 0.1), pulse);
    
    // 3. HUD Grid Line
    float grid = smoothstep(0.002, 0.0, abs(uv.y - 0.2));
    vec3 finalColor = baseColor + (grid * irisColor);
    
    fragColor = vec4(finalColor, 1.0);
}
