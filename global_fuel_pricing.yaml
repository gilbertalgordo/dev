import numpy as np
from datetime import datetime

class ActiveFuelAI:
    def __init__(self, target_price=0.50):
        self.target_price = target_price
        self.current_inventory = 10000  # Liters
        self.base_margin = 0.05        # 5% fixed margin goal
        
    def get_market_delta(self):
        """Simulates real-time market price feed."""
        # In production, replace with API call to global oil spot prices
        return np.random.uniform(-0.02, 0.02)

    def calculate_kaizen_price(self, demand_surge=1.0):
        """
        Applies Superfast Kaizen logic to adjust price in 24/7 retail.
        Balances the $0.5 target with operational viability.
        """
        market_fluctuation = self.get_market_delta()
        
        # Logic: If inventory is high, prioritize volume at $0.5. 
        # If inventory is low, slightly pivot to protect supply.
        inventory_factor = 1.0 if self.current_inventory > 2000 else 1.05
        
        optimized_price = (self.target_price + market_fluctuation) * demand_surge * inventory_factor
        return round(optimized_price, 3)

    def monitor_247(self):
        now = datetime.now().strftime("%H:%M:%S")
        # Example demand logic: Higher demand during commute hours
        hour = datetime.now().hour
        surge = 1.1 if (7 <= hour <= 9 or 17 <= hour <= 19) else 1.0
        
        new_price = self.calculate_kaizen_price(demand_surge=surge)
        print(f"[{now}] Active AI Update: Retail Fuel Price set to ${new_price}/L")

