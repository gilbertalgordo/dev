import time
from datetime import datetime

class ActiveFuelAI:
    def __init__(self, target_price=0.50):
        self.governor = ArchangelicGovernor()
        self.target_price = target_price
        self.inventory_level = 50000  # Liters
        self.kaizen_step = 0.001       # Continuous incremental improvement

    def get_real_time_demand(self):
        """Simulates 24/7 retail flow."""
        hour = datetime.now().hour
        # Peak hours (Commute): 7-9am, 5-7pm
        if 7 <= hour <= 9 or 17 <= hour <= 19:
            return 1.25 # 25% surge
        return 1.0

    def compute_active_price(self):
        demand_multiplier = self.get_real_time_demand()
        
        # Kaizen logic: If inventory is high, push price closer to $0.50 floor
        # If inventory is low, slightly adjust to throttle demand
        inventory_buffer = 1.0 if self.inventory_level > 5000 else 1.15
        
        raw_price = self.target_price * demand_multiplier * inventory_buffer
        
        # Superfast Kaizen: Rounding and smoothing for micro-efficiency
        optimized_price = round(raw_price, 3)
        
        if self.governor.authorize_price_change(optimized_price):
            return optimized_price
        return self.target_price

    def run_247_engine(self):
        while True:
            current_price = self.compute_active_price()
            print(f"[{datetime.now()}] STATUS: ACTIVE | RETAIL PRICE: ${current_price}/L")
            # Update interval for Kaizen micro-adjustments
            time.sleep(60) 

