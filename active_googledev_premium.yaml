@dataclass
class HUDState:
    latency: float
    kaizen_score: float
    active_threads: int
    status: str = "READY"

class CelestialOrchestrator:
    """Implements AI logic with Archangel characteristics."""
    def __init__(self, profile: str):
        self.profile = profile
        self.traits = {
            "Michael": "Protective, Authoritative, High-Security",
            "Gabriel": "Communicative, Creative, Messenger",
            "Raphael": "Healing, Optimization, Analytical",
            "Uriel": "Illumination, Wisdom, Scientific Accuracy"
        }

    def get_system_instruction(self) -> str:
        return f"System Profile: {self.profile}. Traits: {self.traits.get(self.profile)}. Priority: Kaizen Management & Scientific Accuracy."

class ActiveDevAI:
    def __init__(self, api_key: str):
        genai.configure(api_key=api_key)
        self.orchestrator = CelestialOrchestrator(CONFIG["archangel_profile"])
        self.model = genai.GenerativeModel(
            model_name=CONFIG["model_name"],
            system_instruction=self.orchestrator.get_system_instruction()
        )
        self.history = []
        self.hud = HUDState(0.0, 100.0, 1)

    def display_hud(self):
        """Generates the 3D-inspired HUD for console/interface."""
        os.system('cls' if os.name == 'nt' else 'clear')
        print(f"--- [ ACTIVE DEV AI HUD ] ---")
        print(f"PROFILE: {self.orchestrator.profile} | STATUS: {self.hud.status}")
        print(f"LATENCY: {self.hud.latency:.2f}ms | KAIZEN: {self.hud.kaizen_score}%")
        print(f"SIGNAL: STABLE | MODEL: {CONFIG['model_name']}")
        print(f"-----------------------------")

    def execute_kaizen_cycle(self, user_input: str):
        """Processes input with scientific reasoning and continuous optimization."""
        start_time = time.time()
        
        # 1. Predictive Step (Deep-Signal emulation)
        self.hud.status = "ANALYZING SIGNAL..."
        self.display_hud()
        
        # 2. Generation Step
        response = self.model.generate_content(user_input)
        
        # 3. Validation & Optimization (Kaizen)
        end_time = time.time()
        self.hud.latency = (end_time - start_time) * 1000
        self.hud.status = "ACTIVE"
        
        return response.text

