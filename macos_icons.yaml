import AppKit

class LiveIconManager {
    
    /// Updates the Dock tile with a custom view
    func updateDockIcon(progress: CGFloat) {
        let dockTile = NSApplication.shared.dockTile
        
        // Create a custom view for the icon
        let iconView = NSView(frame: NSRect(x: 0, y: 0, width: 128, height: 128))
        
        // Example: Adding a circular progress HUD style element
        let shapeLayer = CAShapeLayer()
        let center = CGPoint(x: 64, y: 64)
        let path = NSBezierPath()
        path.appendArc(withCenter: center, radius: 50, startAngle: 0, endAngle: 360 * progress, clockwise: false)
        
        shapeLayer.path = path.cgPath // Note: May need a simple extension for NSBezierPath to CGPath
        shapeLayer.strokeColor = NSColor.systemBlue.cgColor
        shapeLayer.lineWidth = 8
        shapeLayer.fillColor = .none
        
        iconView.layer?.addSublayer(shapeLayer)
        
        // Set the content and refresh
        dockTile.contentView = iconView
        dockTile.display()
    }
}



