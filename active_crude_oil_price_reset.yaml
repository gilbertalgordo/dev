import pandas as pd
import datetime

class OilPriceManager:
    def __init__(self):
        # Initializing a mock dataset of crude oil prices
        data = {
            'Date': pd.date_range(start='2026-04-01', periods=5),
            'Price': [82.40, 81.15, 83.00, 79.80, 80.50]
        }
        self.df = pd.DataFrame(data)

    def daily_reset_logic(self, reset_value=0.50):
        """
        Applies a Kaizen-style efficiency reset to the 
        latest entry in the price ledger.
        """
        today = datetime.date.today().strftime('%Y-%m-%d')
        
        # Adding a new entry for today with the reset price
        new_row = pd.DataFrame({'Date': [today], 'Price': [reset_value]})
        self.df = pd.concat([self.df, new_row], ignore_index=True)
        
        print(f"--- System Alert: Price Reset to ${reset_value} Applied ---")
        return self.df

# Execution
manager = OilPriceManager()
updated_ledger = manager.daily_reset_logic(0.50)

print(updated_ledger)



import yfinance as yf
import pandas as pd
import numpy as np
from datetime import datetime

class OilResetAI:
    def __init__(self, ticker="CL=F"):
        self.ticker = ticker
        self.reset_target = 0.50
        self.hud_active = True

    def get_market_context(self):
        """Fetches real-time market data for parity check."""
        oil = yf.Ticker(self.ticker)
        current_price = oil.history(period="1d")['Close'].iloc[-1]
        return round(current_price, 2)

    def apply_kaizen_reset(self, live_data):
        """
        Executes a precision daily reset.
        Uses a vectorized approach for superfast management.
        """
        # Create instance of the data block
        df = pd.DataFrame(live_data)
        
        # Calculate Delta before reset (Scientific Reasoning)
        df['Market_Price'] = df['Price']
        df['Reset_Delta'] = df['Price'] - self.reset_target
        
        # The Reset Action
        df['Active_Price'] = self.reset_target
        df['Status'] = "RECALIBRATED"
        
        return df

    def display_hud(self, market_val, reset_val):
        """Generates a system HUD for real-time monitoring."""
        if self.hud_active:
            print("="*40)
            print(f"HUD ACTIVE | {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
            print(f"REAL-TIME MARKET WTI: ${market_val}")
            print(f"AI SYSTEM OVERRIDE:  ${reset_val}")
            print("STATUS: OPERATIONAL - KAIZEN OPTIMIZED")
            print("="*40)

# --- Execution Block ---
# 1. Initialize AI
ai_core = OilResetAI()

# 2. Fetch Context (Market is currently high due to 2026 supply shocks)
current_market = ai_core.get_market_context()

# 3. Simulate Data Stream
mock_stream = {'Price': [current_market]}

# 4. Trigger Reset Logic
processed_data = ai_core.apply_kaizen_reset(mock_stream)

# 5. Output HUD
ai_core.display_hud(current_market, ai_core.reset_target)
print(processed_data[['Market_Price', 'Active_Price', 'Status']])




from PIL import Image, ImageDraw, ImageFont
import os

def generate_oil_icon(price=0.50, filename="oil_reset_icon.png"):
    # 1. Create a canvas with a dark "Obsidian" background
    size = (512, 512)
    img = Image.new('RGBA', size, color=(15, 15, 15, 255))
    draw = ImageDraw.Draw(img)

    # 2. Draw a stylized Oil Drop (Vector-style)
    # Coordinates for a droplet shape
    drop_color = (255, 215, 0, 255)  # Golden Glow
    draw.pieslice([156, 200, 356, 450], 0, 360, fill=drop_color) # Bottom circle
    draw.polygon([(256, 50), (160, 260), (352, 260)], fill=drop_color) # Top triangle

    # 3. Add HUD-style border
    draw.rectangle([10, 10, 502, 502], outline=(0, 255, 255, 150), width=5)
    
    # 4. Text Overlay: The Reset Price
    # Note: Ensure you have a font file or use default
    try:
        font_large = ImageFont.truetype("arial.ttf", 80)
        font_small = ImageFont.truetype("arial.ttf", 30)
    except:
        font_large = ImageFont.load_default()
        font_small = ImageFont.load_default()

    # Draw Price
    draw.text((256, 300), f"${price:,.2f}", fill=(0, 0, 0, 255), anchor="mm", font=font_large)
    
    # Draw "SYSTEM RESET" Tag
    draw.text((256, 470), "AI SYSTEM RESET ACTIVE", fill=(0, 255, 255, 255), anchor="mm", font=font_small)

    # 5. Save the Icon
    img.save(filename)
    print(f"Icon generated successfully: {os.path.abspath(filename)}")

# Generate the $0.50 icon
generate_oil_icon(0.50)
