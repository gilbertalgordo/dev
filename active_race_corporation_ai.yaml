/* Animated HUD Icon Effect */
.race-icon-container {
    width: 48px;
    height: 48px;
    border: 1px solid rgba(0, 242, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.race-icon-container::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 2px;
    background: #00f2ff;
    top: 0;
    animation: scan 2s linear infinite;
    box-shadow: 0 0 10px #00f2ff;
}

@keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
}
