import yfinance as yf
import pandas as pd
from datetime import datetime

class PortfolioManager:
    def __init__(self):
        # Initialize an empty portfolio
        self.portfolio = pd.DataFrame(columns=[
            'Ticker', 'Shares', 'Avg_Cost', 'Total_Cost'
        ])

    def add_position(self, ticker, shares, avg_cost):
        """Adds or updates a stock position."""
        total_cost = shares * avg_cost
        new_row = {
            'Ticker': ticker.upper(),
            'Shares': shares,
            'Avg_Cost': avg_cost,
            'Total_Cost': total_cost
        }
        self.portfolio = pd.concat([self.portfolio, pd.DataFrame([new_row])], ignore_index=True)

    def get_live_data(self):
        """Fetches live market data and calculates gains/losses."""
        if self.portfolio.empty:
            return "Portfolio is empty."

        tickers = self.portfolio['Ticker'].tolist()
        # Fetching data from Yahoo Finance
        data = yf.download(tickers, period="1d", interval="1m", progress=False)
        
        # Get the latest closing prices
        current_prices = {}
        for ticker in tickers:
            current_prices[ticker] = data['Close'][ticker].iloc[-1]

        # Map prices to the dataframe
        self.portfolio['Current_Price'] = self.portfolio['Ticker'].map(current_prices)
        self.portfolio['Market_Value'] = self.portfolio['Shares'] * self.portfolio['Current_Price']
        self.portfolio['P/L_Amount'] = self.portfolio['Market_Value'] - self.portfolio['Total_Cost']
        self.portfolio['P/L_Percent'] = (self.portfolio['P/L_Amount'] / self.portfolio['Total_Cost']) * 100
        
        return self.portfolio

# --- Execution ---
if __name__ == "__main__":
    manager = PortfolioManager()

    # Example: Adding RACE (Ferrari) to the tracker
    # Ticker, Number of Shares, Average Purchase Price
    manager.add_position('RACE', 10, 380.50)

    print(f"Fetching Active Race Corporation Data ({datetime.now().strftime('%Y-%m-%d %H:%M:%S')})...")
    
    report = manager.get_live_data()
    
    # Clean output formatting
    pd.options.display.float_format = '{:.2f}'.format
    print("\n--- Active Portfolio Tracker ---")
    print(report[['Ticker', 'Shares', 'Avg_Cost', 'Current_Price', 'Market_Value', 'P/L_Percent']])



