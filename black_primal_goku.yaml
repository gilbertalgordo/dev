class PrimalGoku:
    def __init__(self):
        self.name = "Goku Black"
        self.state = "Primal"
        self.has_potara = True
        self.appearance = {
            "hair": "Long, Wild, Black",
            "fur": "Dark Grey/Black",
            "eyes": "Silver with Red outline"
        }
        self.abilities = ["Black Kamehameha", "Divine Retribution"]

    def display_status(self):
        status = "Equipped" if self.has_potara else "None"
        print(f"Name: {self.name} ({self.state})")
        print(f"Potara Earrings: {status}")
        print(f"Current Form: {self.appearance['fur']} fur with {self.appearance['hair']} hair.")

# Initialize Character
goku_instance = PrimalGoku()
