import uuid

class Pilot:
    """Represents a Gundam pilot."""
    def __init__(self, name: str):
        self.id = uuid.uuid4()
        self.name = name
        self.authorized_suits = [] # List of MobileSuit IDs the pilot is authorized for

    def __str__(self):
        return f"Pilot(ID: {self.id}, Name: {self.name})"

class MobileSuit:
    """Represents a Gundam mobile suit."""
    def __init__(self, model: str, serial_number: str):
        self.id = uuid.uuid4()
        self.model = model
        self.serial_number = serial_number
        self.authorized_pilots = [] # List of Pilot IDs authorized to access this suit

    def __str__(self):
        return f"MobileSuit(ID: {self.id}, Model: {self.model}, Serial: {self.serial_number})"

class AccessControlSystem:
    """Manages pilots, mobile suits, and their access control."""
    def __init__(self):
        self.pilots = {} # {pilot_id: Pilot_object}
        self.mobile_suits = {} # {suit_id: MobileSuit_object}

    def register_pilot(self, name: str) -> Pilot:
        """Registers a new pilot."""
        pilot = Pilot(name)
        self.pilots[pilot.id] = pilot
        print(f"Registered: {pilot}")
        return pilot

    def register_mobile_suit(self, model: str, serial_number: str) -> MobileSuit:
        """Registers a new mobile suit."""
        suit = MobileSuit(model, serial_number)
        self.mobile_suits[suit.id] = suit
        print(f"Registered: {suit}")
        return suit

    def authorize_pilot_for_suit(self, pilot_id: uuid.UUID, suit_id: uuid.UUID) -> bool:
        """Authorizes a pilot to access a specific mobile suit."""
        if pilot_id not in self.pilots:
            print(f"Error: Pilot with ID {pilot_id} not found.")
            return False
        if suit_id not in self.mobile_suits:
            print(f"Error: Mobile suit with ID {suit_id} not found.")
            return False

        pilot = self.pilots[pilot_id]
        suit = self.mobile_suits[suit_id]

        if suit_id not in pilot.authorized_suits:
            pilot.authorized_suits.append(suit_id)
            print(f"Pilot '{pilot.name}' authorized for suit '{suit.model}' ({suit.serial_number}).")
        else:
            print(f"Pilot '{pilot.name}' is already authorized for suit '{suit.model}'.")

        if pilot_id not in suit.authorized_pilots:
            suit.authorized_pilots.append(pilot_id)
            print(f"Suit '{suit.model}' ({suit.serial_number}) has pilot '{pilot.name}' authorized.")
        else:
            print(f"Suit '{suit.model}' already has pilot '{pilot.name}' authorized.")
        
        return True

    def is_pilot_authorized(self, pilot_id: uuid.UUID, suit_id: uuid.UUID) -> bool:
        """Checks if a pilot is authorized to access a specific mobile suit."""
        if pilot_id not in self.pilots:
            print(f"Access Denied: Pilot with ID {pilot_id} not found.")
            return False
        if suit_id not in self.mobile_suits:
            print(f"Access Denied: Mobile suit with ID {suit_id} not found.")
            return False

        pilot = self.pilots[pilot_id]
        return suit_id in pilot.authorized_suits

    def attempt_access(self, pilot_id: uuid.UUID, suit_id: uuid.UUID) -> str:
        """Attempts to grant access to a mobile suit for a pilot."""
        if self.is_pilot_authorized(pilot_id, suit_id):
            pilot = self.pilots[pilot_id]
            suit = self.mobile_suits[suit_id]
            return f"Access Granted: {pilot.name} can pilot {suit.model} ({suit.serial_number})."
        else:
            pilot = self.pilots.get(pilot_id, None)
            suit = self.mobile_suits.get(suit_id, None)
            pilot_name = pilot.name if pilot else "Unknown Pilot"
            suit_model = suit.model if suit else "Unknown Mobile Suit"
            return f"Access Denied: {pilot_name} is not authorized for {suit_model}."

