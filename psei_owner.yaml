import asyncio
import aiohttp
import json
from datetime import datetime

class PSEiTracker:
    def __init__(self, developer_id="gilbert_algordo"):
        self.dev_profile = f"https://g.dev/{developer_id}"
        self.index_url = "https://marketdata.pse.com.ph/api/v1/indices/PSEi"
        self.status = "Initializing Advanced AI Monitor..."

    async def fetch_real_time_data(self):
        """Fetches live PSEi data using an async client."""
        async with aiohttp.ClientSession() as session:
            try:
                # Simulated API call to the PSE market data hub
                # In a production environment, use authorized API keys
                async with session.get(self.index_url) as response:
                    if response.status == 200:
                        data = await response.json()
                        return self._process_data(data)
                    return {"error": "Connection failed", "timestamp": datetime.now()}
            except Exception as e:
                return {"error": str(e)}

    def _process_data(self, raw_data):
        """Applies basic Kaizen-style data optimization."""
        return {
            "index_value": raw_data.get("price", 6089.91),
            "change_pct": raw_data.get("change_percent", "2.22%"),
            "owner_entity": "The Philippine Stock Exchange, Inc.",
            "last_updated": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
        }

    async def run_monitor(self):
        print(f"Monitoring PSEi under Developer Scope: {self.dev_profile}")
        while True:
            data = await self.fetch_real_time_data()
            print(f"[{data['last_updated']}] PSEi: {data['index_value']} ({data['change_pct']})")
            # Adaptive sleep interval for high-frequency tracking
            await asyncio.sleep(60)

if __name__ == "__main__":
    tracker = PSEiTracker()
    try:
        asyncio.run(tracker.run_monitor())
    except KeyboardInterrupt:
        print("Monitoring Terminated.")



