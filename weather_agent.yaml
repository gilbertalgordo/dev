import { useState, useEffect, useCallback } from 'react';
import { motion, AnimatePresence } from 'motion/react';
import { Search, MapPin, Wind, Droplets, Thermometer, Info, Sparkles, Navigation, Clock } from 'lucide-react';
import { format } from 'date-fns';
import { WeatherIcon } from './components/WeatherIcons';
import { searchLocation, getWeatherData, LocationData, WeatherData } from './services/weatherService';
import { getWeatherInsights, WeatherInsight } from './services/aiService';

export default function App() {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState<LocationData[]>([]);
  const [selectedLocation, setSelectedLocation] = useState<LocationData | null>(null);
  const [weather, setWeather] = useState<WeatherData | null>(null);
  const [insights, setInsights] = useState<WeatherInsight | null>(null);
  const [loading, setLoading] = useState(false);
  const [searching, setSearching] = useState(false);
  const [currentTime, setCurrentTime] = useState(new Date());

  useEffect(() => {
    const timer = setInterval(() => setCurrentTime(new Date()), 60000);
    return () => clearInterval(timer);
  }, []);

  // Initialize with user location if possible
  useEffect(() => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(async (position) => {
        const { latitude, longitude } = position.coords;
        try {
          setLoading(true);
          const data = await getWeatherData(latitude, longitude);
          setWeather(data);
          setSelectedLocation({ id: 0, name: "Current Location", latitude, longitude, country: "" });
          const aiInsights = await getWeatherInsights("your current location", data);
          setInsights(aiInsights);
        } catch (error) {
          console.error("Location init error:", error);
        } finally {
          setLoading(false);
        }
      });
    }
  }, []);

  const handleSearch = useCallback(async (val: string) => {
    setQuery(val);
    if (val.length > 2) {
      setSearching(true);
      const res = await searchLocation(val);
      setResults(res);
      setSearching(false);
    } else {
      setResults([]);
    }
  }, []);

  const selectLocation = async (loc: LocationData) => {
    setQuery('');
    setResults([]);
    setSelectedLocation(loc);
    setLoading(true);
    try {
      const data = await getWeatherData(loc.latitude, loc.longitude);
      setWeather(data);
      const aiInsights = await getWeatherInsights(loc.name, data);
      setInsights(aiInsights);
    } catch (err) {
      console.error(err);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="h-screen bg-[#0A0C10] text-white font-sans flex flex-col overflow-hidden selection:bg-blue-500/30">
      {/* Header */}
      <header className="flex items-center justify-between px-8 py-6 border-b border-gray-800 shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 bg-gradient-to-tr from-blue-600 to-cyan-400 rounded-full blur-[1px]"></div>
          <span className="text-xl font-semibold tracking-tight text-white">SkyCast <span className="text-blue-500">AI</span></span>
        </div>
        
        <div className="flex items-center gap-8">
          <div className="hidden md:flex flex-col items-end">
            <span className="text-[10px] uppercase tracking-widest text-gray-500">Local Environment</span>
            <span className="text-sm font-medium">{format(currentTime, 'h:mm a')} • {selectedLocation?.name || 'Awaiting Input'}</span>
          </div>
          
          <div className="h-10 w-[1px] bg-gray-800 hidden md:block"></div>
          
          <div className="relative w-48 md:w-64">
            <div className="relative flex items-center">
              <Search className="absolute left-3 w-4 h-4 text-gray-500" />
              <input 
                type="text"
                value={query}
                onChange={(e) => handleSearch(e.target.value)}
                placeholder="Change Location..."
                className="w-full bg-[#14181F] border border-gray-700/50 rounded-lg py-2 pl-10 pr-3 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500/50 transition-all placeholder:text-gray-600"
              />
              {searching && (
                <div className="absolute right-3 animate-spin h-3 w-3 border-2 border-blue-500 border-t-transparent rounded-full" />
              )}
            </div>
            
            <AnimatePresence>
              {results.length > 0 && (
                <motion.ul 
                  initial={{ opacity: 0, y: 5 }}
                  animate={{ opacity: 1, y: 0 }}
                  exit={{ opacity: 0, y: 5 }}
                  className="absolute z-20 w-full mt-2 bg-[#0D1016] border border-gray-800 rounded-xl overflow-hidden shadow-2xl"
                >
                  {results.map((loc) => (
                    <li 
                      key={loc.id}
                      onClick={() => selectLocation(loc)}
                      className="px-4 py-3 hover:bg-[#14181F] cursor-pointer transition-colors border-b border-gray-800 last:border-0"
                    >
                      <div className="flex flex-col">
                        <span className="text-sm font-medium">{loc.name}</span>
                        <span className="text-[10px] text-gray-500 uppercase tracking-wider">{loc.country} {loc.admin1 && `• ${loc.admin1}`}</span>
                      </div>
                    </li>
                  ))}
                </motion.ul>
              )}
            </AnimatePresence>
          </div>
        </div>
      </header>

      {/* Main Content Area */}
      <main className="flex-1 grid grid-cols-12 gap-0 overflow-hidden relative">
        {loading ? (
            <div className="col-span-12 flex flex-col items-center justify-center space-y-4">
              <div className="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin" />
              <p className="text-[10px] uppercase font-bold tracking-[0.3em] text-gray-500">Synthesizing Atmospheric Models</p>
            </div>
        ) : weather && selectedLocation ? (
          <>
            {/* Left Panel: Analysis */}
            <div className="col-span-12 lg:col-span-8 p-6 md:p-10 flex flex-col justify-between overflow-y-auto lg:overflow-hidden bg-[#0A0C10]">
              <motion.div
                initial={{ opacity: 0, y: 20 }}
                animate={{ opacity: 1, y: 0 }}
              >
                <div className="inline-block px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-6">
                  Agent Perspective • Real-time Synthesis
                </div>
                
                <h1 className="text-[60px] md:text-[80px] leading-[0.9] font-light text-white tracking-tighter mb-8">
                  Atmospheric <br/> <span className="font-medium text-blue-500 italic uppercase">Stability.</span>
                </h1>

                {insights && (
                  <motion.div 
                    initial={{ opacity: 0 }} 
                    animate={{ opacity: 1 }} 
                    transition={{ delay: 0.3 }}
                    className="max-w-xl text-lg md:text-xl text-gray-400 leading-relaxed font-light"
                  >
                    "{insights.summary}"
                  </motion.div>
                )}
              </motion.div>

              {/* Key Stats Strip */}
              <motion.div 
                initial={{ opacity: 0, y: 20 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ delay: 0.4 }}
                className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8 md:mt-0"
              >
                <div className="bg-[#14181F] p-5 rounded-2xl border border-gray-800/50 hover:border-blue-500/30 transition-colors group">
                  <div className="flex items-center gap-2 mb-2">
                    <Thermometer className="w-3 h-3 text-gray-500 group-hover:text-blue-400 transition-colors" />
                    <p className="text-gray-500 text-[10px] uppercase tracking-widest">Temperature</p>
                  </div>
                  <p className="text-3xl font-semibold text-white">{weather.current.temp}°C</p>
                  <p className="text-blue-400 text-[10px] mt-1 font-medium">{weather.current.description}</p>
                </div>
                
                <div className="bg-[#14181F] p-5 rounded-2xl border border-gray-800/50 hover:border-blue-500/30 transition-colors group">
                  <div className="flex items-center gap-2 mb-2">
                    <Wind className="w-3 h-3 text-gray-500 group-hover:text-blue-400 transition-colors" />
                    <p className="text-gray-500 text-[10px] uppercase tracking-widest">Wind Flow</p>
                  </div>
                  <p className="text-3xl font-semibold text-white">{weather.current.windSpeed} <span className="text-xs font-normal text-gray-500 uppercase">km/h</span></p>
                  <p className="text-gray-400 text-[10px] mt-1">Status: Stable</p>
                </div>

                <div className="bg-[#14181F] p-5 rounded-2xl border border-gray-800/50 hover:border-blue-500/30 transition-colors group">
                  <div className="flex items-center gap-2 mb-2">
                    <Droplets className="w-3 h-3 text-gray-500 group-hover:text-blue-400 transition-colors" />
                    <p className="text-gray-500 text-[10px] uppercase tracking-widest">Saturation</p>
                  </div>
                  <p className="text-3xl font-semibold text-white">{weather.current.humidity}%</p>
                  <p className="text-gray-400 text-[10px] mt-1">Relative Humidity</p>
                </div>

                <div className="bg-[#14181F] p-5 rounded-2xl border border-gray-800/50 hover:border-blue-500/30 transition-colors group">
                  <div className="flex items-center gap-2 mb-2">
                    <Clock className="w-3 h-3 text-gray-500 group-hover:text-blue-400 transition-colors" />
                    <p className="text-gray-500 text-[10px] uppercase tracking-widest">Forecast</p>
                  </div>
                  <p className="text-3xl font-semibold text-white">4%</p>
                  <p className="text-gray-400 text-[10px] mt-1">Precipitation</p>
                </div>
              </motion.div>
            </div>

            {/* Right Panel: Detailed Forecast & Recommendations */}
            <div className="col-span-12 lg:col-span-4 bg-[#0D1016] border-l border-gray-800 p-8 flex flex-col overflow-y-auto">
              <h2 className="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-8 flex items-center gap-2">
                <Navigation className="w-3 h-3" /> 72-Hour Outlook
              </h2>
              
              <div className="space-y-3 mb-10">
                {weather.daily.map((day, idx) => (
                  <motion.div 
                    initial={{ opacity: 0, x: 20 }}
                    animate={{ opacity: 1, x: 0 }}
                    transition={{ delay: 0.5 + (idx * 0.1) }}
                    key={day.date}
                    className={`flex items-center justify-between p-4 rounded-xl border transition-all group ${idx === 0 ? 'bg-[#14181F] border-blue-500/20' : 'bg-transparent border-transparent hover:bg-[#14181F]'}`}
                  >
                    <span className={`w-14 text-sm font-medium ${idx === 0 ? 'text-white' : 'text-gray-400'}`}>
                      {idx === 0 ? 'Today' : format(new Date(day.date), 'EEE')}
                    </span>
                    <div className="flex-1 flex justify-center">
                      <WeatherIcon name={day.icon} className={`w-5 h-5 ${idx === 0 ? 'text-blue-400 drop-shadow-[0_0_8px_rgba(59,130,246,0.3)]' : 'text-gray-500'}`} />
                    </div>
                    <span className={`text-sm font-bold ${idx === 0 ? 'text-white' : 'text-gray-400'}`}>
                      {day.maxTemp}° / {day.minTemp}°
                    </span>
                  </motion.div>
                ))}
              </div>

              {insights && (
                <div className="mt-auto space-y-4">
                  <div className="p-5 bg-[#14181F] rounded-2xl border border-gray-800/50">
                    <p className="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-3">Agent Directives</p>
                    <div className="space-y-3">
                      <div>
                        <p className="text-[9px] text-gray-600 uppercase mb-1">Recommended Activity</p>
                        <p className="text-sm text-gray-300 font-light">{insights.activities.recommended[0]}</p>
                      </div>
                      <div>
                        <p className="text-[9px] text-gray-600 uppercase mb-1">Recommended Attire</p>
                        <p className="text-sm text-gray-300 font-light">{insights.clothing.slice(0, 2).join(', ')}</p>
                      </div>
                    </div>
                  </div>

                  <div className="p-6 bg-gradient-to-br from-blue-600/10 to-purple-600/10 rounded-2xl border border-white/5 relative overflow-hidden group">
                    <div className="absolute top-0 right-0 p-2 opacity-10">
                      <Sparkles className="w-8 h-8 text-blue-400" />
                    </div>
                    <p className="text-[10px] font-bold uppercase tracking-wider text-blue-400 mb-2">Smart Recommendation</p>
                    <p className="text-xs leading-relaxed text-gray-400 font-light italic">
                      {insights.funFact}
                    </p>
                  </div>
                </div>
              )}
            </div>
          </>
        ) : (
          <div className="col-span-12 flex flex-col items-center justify-center p-12 text-center">
            <motion.div
              initial={{ scale: 0.9, opacity: 0 }}
              animate={{ scale: 1, opacity: 1 }}
              className="max-w-md"
            >
              <div className="w-16 h-16 bg-blue-500/10 border border-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-8">
                <Sparkles className="w-8 h-8 text-blue-500/40" />
              </div>
              <h2 className="text-3xl font-light tracking-tight text-white mb-4">Initialize SkyCast Proxy</h2>
              <p className="text-gray-500 text-sm leading-relaxed mb-8">
                  Enter a geographical coordinate or allow sensor mesh access to synthesize real-time atmospheric data models for your location.
              </p>
            </motion.div>
          </div>
        )}
      </main>

      {/* Footer Status Bar */}
      <footer className="px-8 py-4 bg-[#080A0E] border-t border-gray-900 shrink-0 flex justify-between items-center text-[9px] text-gray-600 uppercase tracking-[0.2em] font-medium">
        <div className="hidden md:flex gap-6">
          <span>Sensor Mesh: <span className="text-green-500/70">Active</span></span>
          <span>Latency: 42ms</span>
          <span>Atmospheric Model: GFS-1.0</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-1 h-1 bg-green-500 rounded-full animate-pulse"></div>
          <span>AI Engine Fully Synchronized</span>
        </div>
      </footer>
    </div>
  );
}
