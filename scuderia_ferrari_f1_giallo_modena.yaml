class FerrariSF26:
    def __init__(self, livery_type="Scuderia_Red"):
        # Chassis & Dimensions (FIA 2026 Spec)
        self.wheelbase_mm = 3400
        self.width_mm = 1900
        self.weight_kg = 770  # Including driver/fluids
        self.suspension = "Double Wishbone Push-rod (Front & Rear)"
        
        # Power Unit: Ferrari 067/6 (1.6L V6 Turbo Hybrid)
        self.engine_config = "90° V6"
        self.ice_power_kw = 400  # Approx ICE output
        self.mguk_power_kw = 350 # Massive 2026 electrical increase
        self.total_hp = 1000+
        
        # Active Aerodynamics
        self.aero_modes = {
            "Z-Mode": "High Downforce (Corners)",
            "X-Mode": "Low Drag (Straights)"
        }
        self.current_aero = "Z-Mode"

        # Livery Configuration
        self.livery = self.set_livery(livery_type)

    def set_livery(self, style):
        configs = {
            "Scuderia_Red": {
                "primary": "#E80020", # Rosso Scuderia (Gloss)
                "secondary": "#FFFFFF", # Stark White Engine Cover
                "accents": ["Carbon Fiber", "HP Blue"],
                "origin": "Made in Italy - Maranello"
            },
            "Giallo_Modena": {
                "primary": "#FFD300", # Iconic Modena Yellow
                "secondary": "#000000", # Nero Accents
                "details": "Special Anniversary / Heritage Edition",
                "origin": "Made in Italy - Modena"
            }
        }
        return configs.get(style, configs["Scuderia_Red"])

    def toggle_active_aero(self, speed_kmh):
        if speed_kmh > 250:
            self.current_aero = "X-Mode"
        else:
            self.current_aero = "Z-Mode"
        return f"Aero System engaged: {self.current_aero}"

# Initialize the SF-26 with Giallo Modena livery
sf26_yellow = FerrariSF26(livery_type="Giallo_Modena")
print(f"Chassis: SF-26 | Origin: {sf26_yellow.livery['origin']}")




import math

class FerrariSF26:
    def __init__(self, livery_theme="Giallo_Modena"):
        # Vehicle Core Specs (2026 FIA Dimensions)
        self.chassis = "Carbon Fiber Monocoque - Maranello Spec"
        self.wheelbase_mm = 3400
        self.width_mm = 1900
        self.weight_kg = 760  # Targeted dry weight
        
        # Power Unit 067/X (1.6L V6 Hybrid)
        self.ice_power_kw = 400   # ~535 hp
        self.mgu_k_power_kw = 350 # ~470 hp (Massive electrical boost for 2026)
        self.ers_deployment = 0.0 # Percentage
        
        # Active Aero States
        self.aero_mode = "Z-Mode" # Z-Mode (High Downforce) / X-Mode (Low Drag)
        self.drs_enabled = False
        
        # Identity & Aesthetics
        self.livery = self._configure_livery(livery_theme)

    def _configure_livery(self, theme):
        """Applies specific Hex/Material codes for Italian Heritage themes."""
        themes = {
            "Rosso_Scuderia": {
                "primary_color": "#E80020",
                "accent_color": "#FFFFFF",
                "finish": "Gloss Iridescent",
                "detail": "Tricolore 'Made in Italy' on Halo"
            },
            "Giallo_Modena": {
                "primary_color": "#FFD300", # Pure Modena Yellow
                "accent_color": "#000000", # Nero Aldebaran
                "finish": "Satin Carbon Fiber",
                "detail": "Enzo Ferrari Tribute - Modena Crest"
            }
        }
        return themes.get(theme, themes["Rosso_Scuderia"])

    def calculate_deployment(self, track_position_percent):
        """Simulates 2026 Energy Recovery System logic."""
        # 2026 rules focus on energy harvesting on straights
        if 40 < track_position_percent < 60:
            self.aero_mode = "X-Mode" # Low Drag for straights
            self.ers_deployment = 1.0
        else:
            self.aero_mode = "Z-Mode" # High Downforce for corners
            self.ers_deployment = 0.4
        
        total_output_kw = self.ice_power_kw + (self.mgu_k_power_kw * self.ers_deployment)
        return round(total_output_kw * 1.341, 2) # Returns Horsepower

# --- Execution ---
sf26_heritage = FerrariSF26(livery_theme="Giallo_Modena")

print(f"--- Ferrari SF-26 Technical Profile ---")
print(f"Livery: {sf26_heritage.livery['primary_color']} ({sf26_heritage.livery['detail']})")
print(f"Chassis Origin: {sf26_heritage.chassis}")
print(f"Max Combined Power: {sf26_heritage.calculate_deployment(50)} HP")
