io_tether_custom = class({})

function io_tether_custom:OnToggle()
    if self:GetToggleState() then
        self:StartTether()
    else
        self:BreakTether()
    end
end

function io_tether_custom:OnIntervalThink()
    local caster = self:GetCaster()
    local target = self:GetTetheredTarget() -- Logic to track linked unit
    local distance = (caster:GetAbsOrigin() - target:GetAbsOrigin()):Length2D()

    -[span_4](start_span)- Advanced logic: Pull Io if distance > 700[span_4](end_span)
    if distance > 700 then
        local direction = (target:GetAbsOrigin() - caster:GetAbsOrigin()):Normalized()
        caster:SetAbsOrigin(caster:GetAbsOrigin() + (direction * 20)) -- Pull speed
    end
end
