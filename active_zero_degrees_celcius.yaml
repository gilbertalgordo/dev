<div class="weather-container">
  <div class="sky">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>
  <div class="frost-overlay"></div>
  <div class="hud-display">0°C | OVERCAST</div>
</div>



:root {
  --frost-blue: rgba(220, 245, 255, 0.2);
  --cloud-white: rgba(255, 255, 255, 0.8);
}

body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(to bottom, #7da2a9, #3f585e);
}

/* Frosty screen effect */
.frost-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 50%, var(--frost-blue) 100%);
  pointer-events: none;
}

/* Cloud base properties */
.cloud {
  position: absolute;
  width: 200px;
  height: 60px;
  background: var(--cloud-white);
  border-radius: 50px;
  filter: blur(20px);
  opacity: 0.6;
}

/* Individual Cloud Animations */
.cloud-1 {
  top: 20%;
  animation: drift 25s linear infinite;
}

.cloud-2 {
  top: 45%;
  width: 300px;
  animation: drift 40s linear infinite reverse;
}

.cloud-3 {
  top: 70%;
  animation: drift 30s linear infinite;
}

@keyframes drift {
  from { transform: translateX(-100vw); }
  to { transform: translateX(100vw); }
}

/* HUD Element */
.hud-display {
  position: absolute;
  top: 20px;
  left: 20px;
  font-family: 'Courier New', Courier, monospace;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff;
  font-weight: bold;
}




<div id="canvas-container">
    <div class="hud">
        <div class="stat">TEMP: 0.00°C</div>
        <div class="stat">HUMIDITY: 88%</div>
        <div class="stat">SYSTEM: ACTIVE</div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>



// Fragment Shader Fragment
varying vec2 vUv;
uniform float uTime;

void main() {
    // Generate noise-based clouds
    float noise = smoothstep(0.4, 0.7, sin(vUv.x * 5.0 + uTime * 0.2) * cos(vUv.y * 5.0));
    
    // Cold color palette: Deep Slate to Frost White
    vec3 skyColor = mix(vec3(0.2, 0.3, 0.4), vec3(0.7, 0.8, 0.9), vUv.y);
    vec3 cloudColor = vec3(0.95, 0.98, 1.0);
    
    vec3 finalRGB = mix(skyColor, cloudColor, noise * 0.4);
    
    // Add a "frost" vignette
    float dist = distance(vUv, vec2(0.5));
    finalRGB -= dist * 0.15; 
    
    gl_FragColor = vec4(finalRGB, 1.0);
}



const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const geometry = new THREE.PlaneGeometry(2, 2);
const uniforms = {
    uTime: { value: 0.0 }
};

const material = new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    `,
    fragmentShader: document.querySelector('script[type="x-shader/x-fragment"]').textContent
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

function animate(time) {
    uniforms.uTime.value = time * 0.001;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

window.onresize = () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
};

animate();



body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }

