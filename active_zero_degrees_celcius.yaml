.weather-logo {
  filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
}

/* Rotation for the logo ring */
.cloud-ring {
  transform-origin: center;
  animation: rotateLogo 20s linear infinite;
}

/* Drifting effect for cloud icons */
.cloud-path {
  animation: driftCloud 4s ease-in-out infinite;
}

/* Pulsing frost effect */
.weather-icon svg {
  animation: frostPulse 3s infinite alternate;
}

@keyframes rotateLogo {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes driftCloud {
  0% { transform: translateX(0); opacity: 0.8; }
  50% { transform: translateX(3px); opacity: 1; }
  100% { transform: translateX(0); opacity: 0.8; }
}

@keyframes frostPulse {
  from { filter: drop-shadow(0 0 2px #00d4ff); }
  to { filter: drop-shadow(0 0 8px #ffffff); }
}

.icon-grid {
  display: flex;
  gap: 40px;
  background: #1a1a1a;
  padding: 40px;
  border-radius: 15px;
}

.weather-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
  font-size: 10px;
}
