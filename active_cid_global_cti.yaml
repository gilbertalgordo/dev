        self.is_running = True

    async def fetch_global_threat_feed(self):
        """
        Simulates an 'Active Connect' to global CTI sources (STIX/TAXII).
        """
        mock_feed = [
            {"id": "cti-01", "type": "ipv4", "value": "192.168.100.50", "label": "malicious"},
            {"id": "cti-02", "type": "domain", "value": "auth-update-verify.com", "label": "suspicious"},
        ]
        for incident in mock_feed:
            yield incident
            await asyncio.sleep(2) # Simulating real-time arrival

    async def execute_active_response(self, threat: Dict[str, Any], ai_analysis: Dict[str, Any]):
        """
        Automated response based on AI demand.
        """
        print(f"--- [ACTIVE RESPONSE TRIGGERED] ---")
        print(f"Target: {threat['value']}")
        print(f"AI Score: {ai_analysis['score']}")
        print(f"Action: Isolating endpoint and updating edge firewall rules.")
        print(f"Timestamp: {datetime.now().isoformat()}\n")

    async def start_intelligence_loop(self):
