import matplotlib.pyplot as plt
import matplotlib.patches as patches
import numpy as np

# Configuration
ICON_SIZE = (8, 4)  # Width, Height in inches
DPI = 100
COLS = 4
ROWS = 2
BG_COLOR = "#001B3A"  # Deep Blue
PRIMARY_COLOR = "#00FFFF"  # Cyan
SECONDARY_COLOR = "#FFFFFF"  # White

def setup_ax(fig, position, title):
    """Sets up a clean subplot axis for a technical icon."""
    ax = fig.add_subplot(position)
    ax.set_xlim(0, 100)
    ax.set_ylim(0, 100)
    ax.set_aspect('equal')
    ax.axis('off')
    ax.set_title(title, color=SECONDARY_COLOR, fontsize=10, y=-0.15)
    
    # Outer Octagon Frame
    octagon_coords = [[30, 5], [70, 5], [95, 30], [95, 70], [70, 95], [30, 95], [5, 70], [5, 30]]
    octagon = patches.Polygon(octagon_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=1.5, alpha=0.8)
    ax.add_patch(octagon)
    
    # Subtle inner glow effect
    octagon_glow = patches.Polygon(octagon_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=4, alpha=0.2)
    ax.add_patch(octagon_glow)
    
    return ax

def draw_icon_b21s_34(ax):
    """Icon 1: B-21S 3/4 Front View."""
    # Fuselage/Wings
    wing_coords = [[15, 60], [50, 80], [85, 60], [50, 50]]
    wings = patches.Polygon(wing_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=2)
    ax.add_patch(wings)
    
    # Cockpit/Nose
    nose_coords = [[42, 53], [50, 60], [58, 53], [50, 48]]
    nose = patches.Polygon(nose_coords, closed=True, edgecolor=SECONDARY_COLOR, facecolor=PRIMARY_COLOR, linewidth=1, alpha=0.6)
    ax.add_patch(nose)
    
    # Dorsal Laser Turret
    turret = patches.Circle((50, 68), 5, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1.5)
    ax.add_patch(turret)
    laser_beam = patches.ConnectionPatch((50, 68), (70, 90), "data", "data", edgecolor=SECONDARY_COLOR, linewidth=1.5, arrowstyle="-|>")
    ax.add_artist(laser_beam)

def draw_icon_laser_turret(ax):
    """Icon 2: Laser Turret Schematic."""
    # Base/Power Core
    base_coords = [[30, 15], [70, 15], [80, 25], [20, 25]]
    base = patches.Polygon(base_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=2)
    ax.add_patch(base)
    
    # Internal component lines
    for y in range(30, 60, 5):
        ax.plot([35, 65], [y, y], color=PRIMARY_COLOR, linewidth=0.5, alpha=0.5)
    
    # Laser Emitter
    emitter_coords = [[40, 60], [60, 60], [55, 75], [45, 75]]
    emitter = patches.Polygon(emitter_coords, closed=True, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=2)
    ax.add_patch(emitter)
    
    # Laser Beam
    beam_rect = patches.Rectangle((48, 75), 4, 20, edgecolor='none', facecolor=PRIMARY_COLOR, alpha=0.7)
    ax.add_patch(beam_rect)
    
    # Internal Power Core text (simulated)
    ax.text(50, 42, "CORE", color=SECONDARY_COLOR, fontsize=6, ha='center', fontweight='bold')

def draw_icon_b21s_plan(ax):
    """Icon 3: B-21S Plan View."""
    # Main B-21 Outline
    b21_coords = [[50, 90], [90, 45], [50, 10], [10, 45]]
    b21 = patches.Polygon(b21_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=2)
    ax.add_patch(b21)
    
    # Internal Compartments
    aesa = patches.Rectangle((45, 70), 10, 10, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1)
    ax.add_patch(aesa)
    weap_bay = patches.Rectangle((40, 30), 20, 20, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1)
    ax.add_patch(weap_bay)
    
    # Labels (simulated)
    ax.text(50, 75, "AESA", color=SECONDARY_COLOR, fontsize=5, ha='center')
    ax.text(50, 40, "WEAP\nBAY", color=SECONDARY_COLOR, fontsize=5, ha='center')

def draw_icon_weapons_bay(ax):
    """Icon 4: Weapons Bay Detail."""
    # Bay Frame
    bay = patches.Rectangle((20, 20), 60, 60, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=2)
    ax.add_patch(bay)
    
    # Missiles/DEW-7
    for x in [35, 50, 65]:
        missile_coords = [[x-3, 30], [x+3, 30], [x+3, 65], [x, 75], [x-3, 65]]
        missile = patches.Polygon(missile_coords, closed=True, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1.5)
        ax.add_patch(missile)
        
    # DEW-7 Label (simulated)
    ax.text(50, 45, "DEW-7\nSTORAGE", color=SECONDARY_COLOR, fontsize=6, ha='center', fontweight='bold')

def draw_icon_ms21_sensor(ax):
    """Icon 5: MS-21 Multi-Spectral Sensor."""
    # Sensor Gimbal Housing
    housing_coords = [[30, 30], [70, 30], [80, 50], [70, 70], [30, 70], [20, 50]]
    housing = patches.Polygon(housing_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=2)
    ax.add_patch(housing)
    
    # Aperture array (Cameras)
    circles = [(40, 50), (60, 50), (50, 62)]
    for x, y in circles:
        circ = patches.Circle((x, y), 5, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1.5)
        ax.add_patch(circ)
        # Inner lens
        lens = patches.Circle((x, y), 2, edgecolor='none', facecolor=SECONDARY_COLOR, alpha=0.5)
        ax.add_patch(lens)
        
    # Scan lines
    ax.plot([30, 70], [40, 40], color=PRIMARY_COLOR, linewidth=0.5, alpha=0.5)
    ax.plot([30, 70], [35, 35], color=PRIMARY_COLOR, linewidth=0.5, alpha=0.5)

def draw_icon_hybrid_propulsion(ax):
    """Icon 6: Hybrid Propulsion System."""
    # B-21 Plan (Tail focus)
    b21_tail_coords = [[50, 60], [90, 45], [50, 10], [10, 45]]
    b21_tail = patches.Polygon(b21_tail_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=1.5)
    ax.add_patch(b21_tail)
    
    # Engine Nozzles (Scalloped)
    nozzle1 = patches.Wedge((50, 10), 10, 45, 135, width=3, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1.5)
    ax.add_patch(nozzle1)
    
    # Internal components (simulated)
    boosters = patches.Rectangle((40, 25), 20, 15, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1)
    ax.add_patch(boosters)
    
    # Hybrid Drive text (simulated)
    ax.text(50, 32, "HYBRID\nDRIVE", color=SECONDARY_COLOR, fontsize=5, ha='center')

def draw_icon_conformal_sensors(ax):
    """Icon 7: Conformal Sensor Array."""
    # B-21 Plan Outline
    b21_coords = [[50, 90], [90, 45], [50, 10], [10, 45]]
    b21 = patches.Polygon(b21_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=1.5, alpha=0.6)
    ax.add_patch(b21)
    
    # Conformal Sensor points/rings
    sensor_points = [
        (50, 85), (20, 55), (80, 55), (30, 35), (70, 35),
        (50, 15), (15, 45), (85, 45)
    ]
    for x, y in sensor_points:
        ring = patches.Circle((x, y), 2, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=1, alpha=0.8)
        ax.add_patch(ring)
        point = patches.Circle((x, y), 0.5, edgecolor='none', facecolor=SECONDARY_COLOR)
        ax.add_patch(point)
        
    # Central Camera icon
    camera_body = patches.Rectangle((42, 45), 16, 10, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1.5)
    ax.add_patch(camera_body)
    camera_lens = patches.Circle((50, 50), 3, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1.5)
    ax.add_patch(camera_lens)

def draw_icon_datalink_antenna(ax):
    """Icon 8: Secure Datalink Antenna."""
    # Star-shaped Antenna geometry
    antenna_coords = [
        [50, 85], [60, 60], [85, 50], [60, 40],
        [50, 15], [40, 40], [15, 50], [40, 60]
    ]
    antenna = patches.Polygon(antenna_coords, closed=True, edgecolor=PRIMARY_COLOR, facecolor='none', linewidth=2)
    ax.add_patch(antenna)
    
    # Transmission Waves
    for r in range(15, 35, 5):
        wave = patches.Wedge((50, 50), r, 60, 120, width=1, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1, alpha=0.6)
        ax.add_patch(wave)
        wave_rev = patches.Wedge((50, 50), r, 240, 300, width=1, edgecolor=SECONDARY_COLOR, facecolor='none', linewidth=1, alpha=0.6)
        ax.add_patch(wave_rev)

# Main Generation
fig = plt.figure(figsize=ICON_SIZE, dpi=DPI)
fig.patch.set_facecolor(BG_COLOR)

# Titles for each icon (matching image_6.png text)
icon_titles = [
    "B-21S FRONT-3/4 ICON", "LASER TURRET ICON", "B-21S PLAN VIEW ICON", "WEAPONS BAY",
    "MS-21 SENSOR SUITE", "HYBRID PROPULSION", "CONFORMAL SENSORS", "DATALINK ANTENNA"
]

# Drawing functions map
draw_functions = [
    draw_icon_b21s_34, draw_icon_laser_turret, draw_icon_b21s_plan, draw_icon_weapons_bay,
    draw_icon_ms21_sensor, draw_icon_hybrid_propulsion, draw_icon_conformal_sensors, draw_icon_datalink_antenna
]

# Generate Grid
for i in range(ROWS * COLS):
    position = (ROWS, COLS, i + 1)
    ax = setup_ax(fig, position, icon_titles[i])
    draw_functions[i](ax)

plt.tight_layout()
plt.subplots_adjust(wspace=0.1, hspace=0.3)
plt.show()
