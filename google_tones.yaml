from google import genai
from google.genai import types
from PIL import Image

# Initialize the client
client = genai.Client(api_key="YOUR_API_KEY")

def generate_active_tone_image(prompt):
    """
    Generates high-definition 3D imagery with an active HUD overlay
    using the Gemini 3.1 Flash Image model.
    """
    
    # Enhanced prompt for 3D imagery and HUD accuracy
    active_prompt = f"{prompt}, 3D render, high-definition, active holographic HUD interface, data visualization overlay, sharp cinematic lighting, photorealistic."

    response = client.models.generate_content(
        model="gemini-3.1-flash-image-preview",
        contents=[active_prompt],
        config=types.GenerateContentConfig(
            # Settings for high-fidelity output
            response_modalities=["IMAGE"],
            # Ensure person generation logic (set to 'allow_all' for maximum creative flexibility)
            # person_generation="allow_all" 
        )
    )

    # Process and save the generated image
    for part in response.parts:
        if part.inline_data:
            image = part.as_image()
            image.save("active_tone_output.png")
            print("Image generated successfully as 'active_tone_output.png'")

# Execute generation
generate_active_tone_image("A futuristic laboratory conducting molecular synthesis")



