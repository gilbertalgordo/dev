        // Verify the Immutable Core exists
        if (Directory.Exists(@"W:\Windows\System32")) {
            Console.WriteLine("[HUD] Core Build: Verified");
            Console.WriteLine("[HUD] State Separation: Active (User Data on D:)");
            
            // Simulating NPU check for Live Icons
            Console.WriteLine("[HUD] NPU Status: Optimized (40 TOPS Detected)");
        } else {
            Console.WriteLine("[Error] Installation failed or drive letter mismatch.");
        }
    }
}
