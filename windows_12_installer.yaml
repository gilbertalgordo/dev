/* Kaizen Optimized Partitioning for CorePC */
select disk 0
clean
convert gpt

/* 1. System EFI Partition */
create partition efi size=300
format quick fs=fat32 label="System"
assign letter="S"

/* 2. MSR Partition */
create partition msr size=16

/* 3. OS Partition (Immutable/Read-Only Path) */
create partition primary size=30000
format quick fs=ntfs label="Win12_Core"
assign letter="W"

/* 4. User Data Partition (State Separation) */
create partition primary
format quick fs=ntfs label="User_Data"
assign letter="D"

exit



# Windows 12 Core Build Deployment Script
$WimPath = "D:\sources\install.wim" # Path to your downloaded image
$Index = 1 # Index for the 'Core' edition
$ApplyPath = "W:\" # The OS Partition from the script above

Write-Host "[Archangel Protection] Initializing Secure Core Deployment..." -ForegroundColor Cyan

# Apply the Image using DISM
dism /Apply-Image /ImageFile:$WimPath /Index:$Index /ApplyDir:$ApplyPath /Compact /CheckIntegrity

# Configure Boot Files for UEFI
bcdboot W:\Windows /s S: /f UEFI

Write-Host "[Kaizen] Installation Complete. Remove media and reboot." -ForegroundColor Green



