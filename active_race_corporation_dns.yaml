:root {
    --primary: #007bff;
    --bg: #0a0a0c;
    --text: #e0e0e0;
    --glass: rgba(255, 255, 255, 0.05);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    scroll-behavior: smooth;
}

header {
    padding: 1rem 5%;
    background: rgba(0,0,0,0.8);
    position: fixed;
    width: 90%;
    z-index: 100;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 1.5rem;
    font-weight: bold;
    letter-spacing: 2px;
}

.logo span { color: var(--primary); }

ul { display: flex; list-style: none; }
ul li a { color: white; text-decoration: none; margin-left: 2rem; font-size: 0.9rem; }

.hero {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
    text-align: center;
}

.badge {
    background: var(--primary);
    padding: 5px 15px;
    border-radius: 20px;
    margin: 5px;
    font-size: 0.8rem;
    display: inline-block;
}

.glass-section {
    padding: 4rem 10%;
    background: var(--glass);
    margin: 2rem 5%;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
}

.dns-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 2rem 5%;
}

.card {
    background: #141417;
    padding: 2rem;
    border-radius: 10px;
    border-bottom: 3px solid var(--primary);
}

.status-indicator {
    color: #00ff88;
    font-size: 0.8rem;
    text-transform: uppercase;
    font-weight: bold;
}



