:root {
    --neon-blue: #00f3ff;
    --race-red: #ff003c;
    --hud-bg: rgba(10, 12, 15, 0.95);
    --font-mono: 'Share Tech Mono', monospace;
}

body.race-nexus {
    background: #050505;
    color: var(--neon-blue);
    font-family: var(--font-mono);
    margin: 0;
    overflow: hidden;
    height: 100vh;
}

#grid-canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
    opacity: 0.3;
}

.hud-container {
    position: relative;
    z-index: 10;
    height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1px solid rgba(0, 243, 255, 0.2);
    box-sizing: border-box;
}

.hud-header {
    display: flex;
    justify-content: space-between;
    border-bottom: 2px solid var(--neon-blue);
    padding-bottom: 5px;
    font-size: 0.8rem;
}

.node.active::before {
    content: '●';
    color: #00ff88;
    margin-right: 8px;
    text-shadow: 0 0 10px #00ff88;
}

.intel-module {
    background: rgba(255, 255, 255, 0.03);
    padding: 15px;
    border-left: 4px solid var(--race-red);
    clip-path: polygon(0 0, 100% 0, 100% 80%, 95% 100%, 0 100%);
}

.glitch {
    font-size: 4rem;
    font-weight: 900;
    position: relative;
    color: white;
}



// HUD Initialization
document.addEventListener('DOMContentLoaded', () => {
    initClock();
    simulateDNSLookup();
    drawBackgroundGrid();
});

function initClock() {
    const clock = document.getElementById('live-clock');
    setInterval(() => {
        const now = new Date();
        clock.innerText = `UTC_SYNC: ${now.toISOString().split('T')[1].split('.')[0]}`;
    }, 1000);
}

function simulateDNSLookup() {
    const status = document.getElementById('status-val');
    const stages = ["RESOLVING...", "HANDSHAKE...", "SECURED (GOOGLE DNS)"];
    let i = 0;
    
    const interval = setInterval(() => {
        status.innerText = stages[i];
        status.style.color = i === 2 ? "#00ff88" : "#ff003c";
        i++;
        if (i === stages.length) clearInterval(interval);
    }, 1500);
}

function drawBackgroundGrid() {
    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    ctx.strokeStyle = '#00f3ff';
    ctx.lineWidth = 0.5;

    for (let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}



