import cv2
import torch
import numpy as np

class ActiveSpeedLimitAI:
    def __init__(self, model_path='yolov8n.pt'):
        # Load the computer vision model
        self.model = torch.hub.load('ultralytics/yolov8', 'custom', path=model_path)
        self.current_limit = 55  # Default/fallback limit
        self.vehicle_speed = 0

    def get_vehicle_speed(self):
        """Mock function to simulate reading vehicle speed from CAN bus."""
        return self.vehicle_speed

    def process_frame(self, frame):
        """Detects speed signs in the current video frame."""
        results = self.model(frame)
        detections = results.pandas().xyxy[0] # Get bounding boxes

        for index, row in detections.iterrows():
            if 'speed_limit' in row['name']:
                # Extract the integer from the label (e.g., 'speed_limit_60')
                new_limit = int(''.join(filter(str.isdigit, row['name'])))
                self.update_limit(new_limit)
        
        return results

    def update_limit(self, new_limit):
        if new_limit != self.current_limit:
            print(f"[AI INFO] Speed Limit Changed: {new_limit} mph")
            self.current_limit = new_limit
            self.apply_kaizen_adjustment()

    def apply_kaizen_adjustment(self):
        """Logic to gradually adjust speed (Continuous Improvement)."""
        self.vehicle_speed = self.get_vehicle_speed()
        if self.vehicle_speed > self.current_limit:
            diff = self.vehicle_speed - self.current_limit
            print(f"[ACTION] Reducing speed by {diff} units for safety.")
