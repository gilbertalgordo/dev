/* styles.css */

:root {
    --bg-color: #0d0d0d;
    --text-color: #ffffff;
    --accent-core: #00d4ff; /* Main gilbertalgordo cyan */
    --security-pass: #00ff88; /* Green for certified status */
    --ai-active: #ff00ff; /* Magenta for processing instances */
    --panel-border: #333333;
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.control-dashboard {
    background: rgba(20, 20, 20, 0.9);
    padding: 30px;
    border-radius: 16px;
    border: 1px solid var(--panel-border);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.control-dashboard h2 {
    font-size: 1.2rem;
    margin-bottom: 25px;
    color: #888;
}

.control-btn {
    background: transparent;
    border: 1px solid #444;
    color: #ccc;
    padding: 15px 25px;
    margin: 0 10px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: all 0.2s ease-out;
}

.control-btn:hover {
    border-color: var(--accent-core);
    background: rgba(0, 212, 255, 0.05);
    color: white;
    transform: translateY(-2px);
}

/* Base Icon Styling */
.icon {
    width: 32px;
    height: 32px;
    stroke: currentColor; /* Inherits color from .control-btn */
    transition: stroke 0.3s ease;
}

/* =========================================
   Advanced Animations & State Changes
========================================= */

/* 1. Dashboard Monitor (Pulsing Checkmark on Hover) */
.monitor-icon .checkmark {
    opacity: 0.5;
}

.control-btn:hover .monitor-icon {
    stroke: var(--accent-core);
}

.control-btn:hover .monitor-icon .checkmark {
    opacity: 1;
    animation: check-pulse 1s infinite;
}

@keyframes check-pulse {
    0% { stroke-opacity: 1; stroke-width: 2; }
    50% { stroke-opacity: 0.5; stroke-width: 3; }
    100% { stroke-opacity: 1; stroke-width: 2; }
}

/* 2. Security Certificate (Certified Status Animation) */
.control-btn:hover .cert-icon {
    stroke: var(--security-pass);
}

.cert-icon .lock-check {
    stroke-dasharray: 20;
    stroke-dashoffset: 20;
}

.control-btn:hover .cert-icon .lock-check {
    animation: draw-check 0.5s ease-out forwards;
}

@keyframes draw-check {
    to { stroke-dashoffset: 0; }
}

/* 3. AI Responsive (Processing Instance Rotation) */
.control-btn:hover .ai-icon {
    stroke: var(--ai-active);
}

.control-btn:hover .ai-icon .core {
    fill: rgba(255, 0, 255, 0.2);
}

.ai-icon .outer-ring {
    transform-origin: center;
}

.control-btn:hover .ai-icon .outer-ring {
    animation: rotate-ring 4s linear infinite;
}

@keyframes rotate-ring {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
