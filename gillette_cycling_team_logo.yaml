<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gillette Cycling Kit - Maximum Velocity</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 50px;
            text-align: center;
        }

        /* Jersey Base Shape */
        .jersey {
            width: 280px;
            height: 400px;
            background-color: #000;
            border: 2px solid #333;
            border-radius: 20px 20px 10px 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Yellow Accents */
        .yellow-accent {
            background-color: #FFD700;
            color: #000;
        }

        .collar {
            height: 25px;
            width: 100%;
            position: absolute;
            top: 0;
        }

        .sleeve-cuff {
            height: 15px;
            width: 100%;
            position: absolute;
            bottom: 60%;
        }

        .side-panels {
            position: absolute;
            width: 20px;
            height: 100%;
            background: #FFD700;
        }

        .panel-left { left: 0; }
        .panel-right { right: 0; }

        /* Branding & Logo */
        .logo-main {
            margin-top: 60px;
            font-size: 2.5em;
            letter-spacing: -2px;
            font-style: italic;
        }

        .roadrunner-silhouette {
            width: 180px;
            height: auto;
            margin: 20px auto;
            opacity: 0.9;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
        }

        .text-velocity {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #FFD700;
        }

        /* Rear Pockets */
        .pockets {
            position: absolute;
            bottom: 20px;
            width: 90%;
            left: 5%;
            height: 80px;
            display: flex;
            gap: 5px;
        }

        .pocket {
            flex: 1;
            background: #111;
            border: 1px solid #FFD700;
            border-radius: 5px;
        }

        h2 { margin-bottom: 20px; color: #FFD700; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <h2>Front View</h2>
        <div class="jersey">
            <div class="collar yellow-accent">GILLETTE</div>
            <div class="side-panels panel-left"></div>
            <div class="side-panels panel-right"></div>
            <div class="logo-main">GILLETTE</div>
            <div class="text-velocity">Maximum Velocity</div>
            <svg class="roadrunner-silhouette" viewBox="0 0 100 50" fill="#FFD700">
                <path d="M10,25 Q30,10 50,25 T90,25" stroke="#FFD700" stroke-width="2" fill="none"/>
                <circle cx="90" cy="25" r="3" />
                <text x="15" y="45" font-size="8" fill="#FFD700">LOONEY TUNES</text>
            </svg>
        </div>
    </div>

    <div>
        <h2>Back View</h2>
        <div class="jersey">
            <div class="collar yellow-accent">GILLETTE</div>
            <div class="logo-main" style="font-size: 1.5em; margin-top: 40px;">GILLETTE</div>
            <div style="background: #FFD700; padding: 10px; margin-top: 20px;">
                 <svg class="roadrunner-silhouette" viewBox="0 0 100 50" fill="#000">
                    <path d="M10,25 Q30,10 50,25 T90,25" stroke="#000" stroke-width="3" fill="none"/>
                </svg>
            </div>
            <div class="text-velocity" style="margin-top: 10px;">Roadrunner Edition</div>
            <div class="pockets">
                <div class="pocket"></div>
                <div class="pocket" style="background: #FFD700; color: black; font-size: 0.6em; padding-top: 30px;">#42</div>
                <div class="pocket"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gillette Velocity HUD - Advanced Kit Core</title>
    <style>
        :root {
            --gillette-yellow: #FFD700;
            --pro-black: #0a0a0a;
            --hud-cyan: rgba(0, 255, 255, 0.4);
            --transition-speed: 0.4s;
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* HUD Scanner Overlay */
        .hud-container {
            position: relative;
            display: flex;
            gap: 100px;
            perspective: 1200px;
        }

        .hud-scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--hud-cyan);
            top: 0;
            left: 0;
            box-shadow: 0 0 15px var(--hud-cyan);
            animation: scan 4s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Kit Card 3D Effect */
        .kit-card {
            position: relative;
            width: 320px;
            height: 500px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-radius: 5px;
            transition: transform var(--transition-speed) ease, border-color 0.3s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .kit-card:hover {
            transform: rotateY(-10deg) rotateX(5deg);
            border-color: var(--gillette-yellow);
        }

        .view-label {
            position: absolute;
            top: -40px;
            left: 0;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--gillette-yellow);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Jersey Component Construction */
        .jersey-body {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 380px;
            background: var(--pro-black);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 100%, 0% 100%, 0% 20%);
            border-top: 4px solid var(--gillette-yellow);
        }

        .side-strip {
            position: absolute;
            width: 15px;
            height: 100%;
            background: var(--gillette-yellow);
        }

        .strip-right { right: 0; }

        /* Typography & Logos */
        .brand-main {
            text-align: center;
            margin-top: 40px;
            font-style: italic;
            font-size: 2.2rem;
            font-weight: 900;
            color: white;
            text-shadow: 2px 2px 0px var(--gillette-yellow);
        }

        .velocity-logo {
            display: block;
            margin: 20px auto;
            width: 140px;
            fill: var(--gillette-yellow);
        }

        .tech-specs {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.65rem;
            color: #666;
            line-height: 1.5;
            text-transform: uppercase;
        }

        /* Rear Pocket Array */
        .rear-grid {
            position: absolute;
            bottom: 40px;
            width: 80%;
            left: 10%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .pocket-cell {
            height: 60px;
            border: 1px solid #444;
            background: #111;
        }

        .pocket-center {
            border-color: var(--gillette-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--gillette-yellow);
        }

    </style>
</head>
<body>

<div class="hud-container">
    <div class="hud-scanline"></div>

    <div class="kit-card">
        <span class="view-label">Unit: Front_Active</span>
        <div class="jersey-body">
            <div class="side-strip"></div>
            <div class="side-strip strip-right"></div>
            
            <div class="brand-main">GILLETTE</div>
            
            <svg class="velocity-logo" viewBox="0 0 100 60">
                <path d="M5,45 Q20,15 45,35 T95,10 M10,48 L30,48 M15,52 L25,52" stroke="currentColor" stroke-width="3" fill="none"/>
                <circle cx="95" cy="10" r="2" fill="white"/>
                <text x="10" y="58" font-size="6" font-style="normal">MAX VELOCITY</text>
            </svg>

            <div style="text-align: center; font-size: 0.7rem; letter-spacing: 2px;">
                LOONEY TUNES RACING
            </div>
        </div>
        <div class="tech-specs">
            AERO-DYNAMICS: OPTIMIZED<br>
            FABRIC: CARBON-WEAVE<br>
            COMPRESSION: LEVEL 4
        </div>
    </div>

    <div class="kit-card">
        <span class="view-label">Unit: Rear_Static</span>
        <div class="jersey-body">
            <div style="background: var(--gillette-yellow); height: 80px; margin-top: 20px; display: flex; align-items: center; justify-content: center;">
                 <span style="color: black; font-weight: 900; font-size: 1.4rem;">GILLETTE</span>
            </div>

            <svg class="velocity-logo" style="width: 180px; margin-top: 40px;" viewBox="0 0 100 60">
                <path d="M5,45 Q20,15 45,35 T95,10" stroke="white" stroke-width="4" fill="none"/>
            </svg>

            <div class="rear-grid">
                <div class="pocket-cell"></div>
                <div class="pocket-cell pocket-center">42</div>
                <div class="pocket-cell"></div>
            </div>
        </div>
        <div class="tech-specs">
            STORAGE: TRIPLE POCKET<br>
            VISIBILITY: HIGH-REFLECTIVE<br>
            THERMAL: BREATHABLE
        </div>
    </div>
</div>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gillette Racing | Pro Kit Configurator</title>
    <style>
        :root {
            --gillette-yellow: #fde047;
            --kit-black: #0a0a0a;
            --accent-gray: #262626;
            --hud-line: rgba(253, 224, 71, 0.3);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HUD Header */
        .header {
            width: 100%;
            padding: 20px;
            border-bottom: 1px solid var(--hud-line);
            text-align: center;
            background: linear-gradient(to bottom, #111, #000);
        }

        .header h1 {
            margin: 0;
            font-style: italic;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .header span {
            color: var(--gillette-yellow);
            font-size: 0.8rem;
            letter-spacing: 5px;
        }

        /* Main Display Layout */
        .display-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            padding: 40px;
            max-width: 1200px;
        }

        .kit-sector {
            position: relative;
            background: rgba(20, 20, 20, 0.5);
            border-left: 1px solid var(--hud-line);
            padding: 20px;
            transition: all 0.3s ease;
        }

        .kit-sector:hover {
            background: rgba(40, 40, 40, 0.3);
            border-left-color: var(--gillette-yellow);
        }

        /* Jersey Logic */
        .jersey-view {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .jersey-canvas {
            width: 160px;
            height: 240px;
            background: var(--kit-black);
            position: relative;
            border-radius: 10px 10px 0 0;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .womens-cut {
            width: 145px; /* Slightly narrower taper for women's aero fit */
            border-radius: 15px 15px 5px 5px;
        }

        /* Branding Elements */
        .yellow-stripe {
            position: absolute;
            background: var(--gillette-yellow);
            height: 40px;
            width: 100%;
            top: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .roadrunner-svg {
            width: 80%;
            fill: #000;
        }

        .gillette-logo {
            font-weight: 900;
            font-style: italic;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 15px;
            color: #fff;
        }

        .cuffs {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 8px;
            background: var(--gillette-yellow);
        }

        /* HUD Labels */
        .label {
            font-size: 0.7rem;
            color: var(--gillette-yellow);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
            border-bottom: 1px solid var(--hud-line);
            padding-bottom: 5px;
        }

        .back-view .yellow-stripe {
            top: 40px;
            height: 100px;
        }

        .pockets {
            position: absolute;
            bottom: 15px;
            width: 80%;
            left: 10%;
            display: flex;
            gap: 2px;
        }

        .pocket {
            flex: 1;
            height: 40px;
            border: 1px solid #333;
            background: #111;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>GILLETTE <span>MAXIMUM VELOCITY</span></h1>
</div>

<div class="display-grid">
    
    <div class="kit-sector">
        <span class="label">SKU: M-VELO-2026 // FRONT & REAR</span>
        <div class="jersey-view">
            <div class="jersey-canvas">
                <div class="gillette-logo">GILLETTE</div>
                <div class="yellow-stripe">
                    <svg class="roadrunner-svg" viewBox="0 0 100 40">
                        <path d="M10,20 Q30,5 50,20 T90,20" stroke="black" stroke-width="4" fill="none"/>
                        <circle cx="90" cy="20" r="3" fill="black"/>
                    </svg>
                </div>
                <div class="cuffs"></div>
            </div>
            <div class="jersey-canvas back-view">
                <div class="yellow-stripe">
                    <div style="font-size: 0.6rem; font-weight: bold; text-align: center;">
                        LOONEY TUNES<br>ROADRUNNER
                    </div>
                </div>
                <div class="pockets">
                    <div class="pocket"></div>
                    <div class="pocket" style="background: var(--gillette-yellow); color: #000; font-size: 10px; text-align: center; line-height: 40px; font-weight: 900;">42</div>
                    <div class="pocket"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="kit-sector">
        <span class="label">SKU: W-VELO-2026 // AERO COMPRESSION</span>
        <div class="jersey-view">
            <div class="jersey-canvas womens-cut">
                <div class="gillette-logo">GILLETTE</div>
                <div class="yellow-stripe">
                    <svg class="roadrunner-svg" viewBox="0 0 100 40">
                        <path d="M10,20 Q30,5 50,20 T90,20" stroke="black" stroke-width="4" fill="none"/>
                        <circle cx="90" cy="20" r="3" fill="black"/>
                    </svg>
                </div>
                <div class="cuffs"></div>
            </div>
            <div class="jersey-canvas womens-cut back-view">
                <div class="yellow-stripe">
                    <div style="font-size: 0.6rem; font-weight: bold; text-align: center;">
                        LOONEY TUNES<br>ROADRUNNER
                    </div>
                </div>
                <div class="pockets">
                    <div class="pocket"></div>
                    <div class="pocket" style="background: var(--gillette-yellow); color: #000; font-size: 10px; text-align: center; line-height: 40px; font-weight: 900;">42</div>
                    <div class="pocket"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<div style="margin-top: 20px; color: #444; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;">
    // Accelerated Design System v3.0 // Powered by Gillette Engineering
</div>

</body>
</html>
