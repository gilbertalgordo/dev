import numpy as np

class FerrariF76Aero:
    def __init__(self):
        self.velocity = 0  # m/s
        self.wing_angle = 0  # degrees
        self.drag_coefficient = 0.28
        
    def update_aero(self, speed, steering_angle, g_force):
        """
        Calculates active flap adjustment for the F76's central air channel.
        """
        # Increase wing angle during high-speed cornering for downforce
        if speed > 55 and abs(steering_angle) > 15:
            self.wing_angle = np.clip(g_force * 12, 0, 45)
        # DRS Mode: Flatten wing on straights above 250 km/h
        elif speed > 69:  
            self.wing_angle = 2
            
        return f"F76 Aero State: {self.wing_angle} deg"

