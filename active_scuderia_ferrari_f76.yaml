// Ferrari F76 Airflow Visualization Shader
varying vec2 vUv;
uniform float uTime;
uniform float uVelocity;

void main() {
    // Simulate the 'Double Fuselage' flow separation
    float flowSpeed = uTime * (uVelocity * 0.1);
    float noise = sin(vUv.x * 20.0 - flowSpeed) * cos(vUv.y * 10.0);
    
    // Gradient representing downforce intensity (Red to Blue)
    vec3 colorLow = vec3(0.8, 0.0, 0.0); // Classic Rosso
    vec3 colorHigh = vec3(0.0, 0.5, 1.0); // Aero Blue
    
    vec3 finalFlow = mix(colorLow, colorHigh, clamp(uVelocity / 100.0, 0.0, 1.0));
    
    gl_FragColor = vec4(finalFlow, noise * 0.5 + 0.5);
}



