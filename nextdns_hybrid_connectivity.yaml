# 1. Configure primary profile and enable router mode for LAN-wide coverage
nextdns config set -profile YOUR_PROFILE_ID -setup-router=true

# 2. Split-Horizon: Forward internal domains to your local DNS/Gateway
# This prevents leaking internal hostnames to the public internet
nextdns config set -forwarder internal.lan=192.168.1.1,home.arpa=192.168.1.1

# 3. Enable Reverse DNS (PTR) for internal IP discovery
# Setting bogus-priv to false allows the CLI to resolve local IP names
nextdns config set -bogus-priv=false -discovery-dns=192.168.1.1

# 4. Performance Tuning: Optimized Caching (Kaizen-style)
nextdns config set -cache-size=20MB -max-ttl=10s -cache-max-age=15s

# 5. Privacy & Identification: Report MAC addresses for HUD visibility
nextdns config set -report-client-info=true -mdns=all

# 6. Apply and Restart
nextdns restart



#!/bin/bash
# NextDNS Advanced Hybrid Deployment
# Optimized for: gilbertalgordo/dev environment

CONFIG_ID="your_nextdns_id"
LOCAL_DNS="192.168.1.1"
DOMAIN="corp.local"

echo "### [HUD] Initializing Advanced Hybrid Connectivity..."

# Install if not present
if ! command -v nextdns &> /dev/null; then
    sh -c "$(curl -sL https://nextdns.io/install)"
fi

# Execute Kaizen-optimized configuration
nextdns config set \
    -profile "$CONFIG_ID" \
    -forwarder "$DOMAIN=$LOCAL_DNS" \
    -forwarder "168.192.in-addr.arpa.=$LOCAL_DNS" \
    -discovery-dns "$LOCAL_DNS" \
    -report-client-info=true \
    -auto-activate=true \
    -bogus-priv=false \
    -cache-size=15MB

nextdns restart

echo "### [HUD] Status: Hybrid Mode Active."
nextdns status
