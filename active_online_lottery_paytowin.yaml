import secrets
import numpy as np

class ActiveLotteryAI:
    def __init__(self, range_max=49, pick_count=6):
        self.range_max = range_max
        self.pick_count = pick_count
        self.draw_history = []

    def generate_winning_numbers(self):
        """
        Uses secrets module for cryptographically secure randomness.
        """
        numbers = set()
        while len(numbers) < self.pick_count:
            numbers.add(secrets.randbelow(self.range_max) + 1)
        return sorted(list(numbers))

    def analyze_patterns(self, historical_data):
        """
        Active scanning of historical trends (Hot/Cold numbers).
        Note: While patterns exist, true lotteries remain random.
        """
        counts = np.bincount(historical_data, minlength=self.range_max + 1)
        hot_numbers = np.argsort(counts)[-5:]
        return hot_numbers



