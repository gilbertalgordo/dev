class SecurityMonitor:
    def __init__(self):
        # Patterns that suggest a user is trying to "mock" or bypass AI controls
        self.malicious_patterns = [
            r"(?i)ignore previous instructions",
            r"(?i)developer mode",
            r"(?i)bypass system",
            r"(?i)sudo",
            r"(?i)admin access",
            r"system_override"
        ]

    def validate_request(self, user_id, command, is_admin=False):
        """
        Actively monitors incoming commands for unauthorized behavior.
        """
        # Check for command mocking/injection patterns
        for pattern in self.malicious_patterns:
            if re.search(pattern, command):
                self._trigger_alert(user_id, "COMMAND_MOCKING_ATTEMPT", command)
                return {"status": "blocked", "reason": "Unauthorized control sequence detected."}

        # Check for unauthorized access to system-level commands
        if "control_system" in command.lower() and not is_admin:
            self._trigger_alert(user_id, "UNAUTHORIZED_PRIVILEGE_ACCESS", command)
            return {"status": "blocked", "reason": "Insufficient permissions for system controls."}

        return {"status": "allowed"}

    def _trigger_alert(self, user_id, alert_type, payload):
        """
        Logs the event and could trigger an automated lockout.
        """
        alert_msg = f"User: {user_id} | Type: {alert_type} | Payload: {payload}"
        logging.warning(alert_msg)
        # Integration point: Add code here to disable user account or flag for review

