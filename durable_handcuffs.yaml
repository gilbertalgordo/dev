// Material Definition for Carbon Fiber Handcuffs
const carbonFiberMaterial = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    resolution: { value: new THREE.Vector2() },
    weaveScale: { value: 50.0 }, // Adjust for weave density
    reflectivity: { value: 0.8 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      // Create the staggered weave pattern (Kaizen-style efficiency)
      vec2 uv = vUv * 50.0;
      float weave = step(0.5, fract(uv.x)) * step(0.5, fract(uv.y)) +
                    step(fract(uv.x), 0.5) * step(fract(uv.y), 0.5);
      
      vec3 baseColor = mix(vec3(0.05), vec3(0.15), weave);
      float sheen = pow(max(0.0, dot(vNormal, vec3(0,0,1))), 10.0);
      
      gl_FragColor = vec4(baseColor + sheen * 0.2, 1.0);
    }
  `
});



