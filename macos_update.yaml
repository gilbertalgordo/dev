#!/bin/bash
# High-efficiency macOS Update Script

echo "Checking for macOS system updates..."
# -i installs all recommended updates
# -r triggers a restart if required
sudo softwareupdate -ia --verbose

echo "Cleaning up local caches..."
sudo rm -rf ~/Library/Caches/*
sudo rm -rf /Library/Caches/*

echo "Kaizen Update Complete."



