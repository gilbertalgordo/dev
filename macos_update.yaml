#!/bin/bash
# ==============================================================================
# KAIZEN ULTRA UPDATE - Advanced macOS Automation
# Features: System Updates, Homebrew, App Store, & Health Maintenance
# ==============================================================================

LOG_FILE="/var/log/com.kaizen.update.log"
exec > >(tee -a "$LOG_FILE") 2>&1

echo "--- UPDATE CYCLE STARTED: $(date) ---"

# 1. macOS System Updates
echo "[SYSTEM] Checking for Apple Software Updates..."
softwareupdate -ia --verbose

# 2. Homebrew Maintenance (If installed)
if command -v brew >/dev/null 2>&1; then
    echo "[HOMEBREW] Syncing packages..."
    # Run as the console user since brew shouldn't run as root
    CONSOLE_USER=$(stat -f "%Su" /dev/console)
    sudo -u "$CONSOLE_USER" -i brew update
    sudo -u "$CONSOLE_USER" -i brew upgrade
    sudo -u "$CONSOLE_USER" -i brew cleanup -s
else
    echo "[HOMEBREW] Not found. Skipping."
fi

# 3. Cache & Disk Kaizen (Continuous Improvement)
echo "[MAINTENANCE] Purging system caches..."
rm -rf /Library/Caches/*
find /private/var/folders -type f -name "com.apple.IconServices" -delete

echo "--- UPDATE CYCLE FINISHED: $(date) ---"



<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>Label</key>
    <string>com.kaizen.update</string>
    <key>ProgramArguments</key>
    <array>
        <string>/usr/local/bin/kaizen_ultra_update.sh</string>
    </array>
    <key>StartCalendarInterval</key>
    <dict>
        <key>Hour</key>
        <integer>03</integer>
        <key>Minute</key>
        <integer>00</integer>
    </dict>
    <key>RunAtLoad</key>
    <true/>
</dict>
</plist>

