// Batman Who Laughs - Advanced Iridescent Metal Shader
float4 RenderLaughingBatmanSuit(float3 Normal, float3 ViewDir, float2 UV) {
    // 1. Core Palette
    float3 BaseBlack = float3(0.01, 0.01, 0.01);
    float3 MetalGray = float3(0.18, 0.18, 0.22);
    float3 IndigoDeep = float3(0.15, 0.0, 0.35);
    float3 ElectricBlue = float3(0.0, 0.45, 1.0);

    // 2. Carbon Fiber "Vertud" Micro-Detail
    // High-density tiling to simulate the carbon weave strength
    float weave = sin(UV.x * 800.0) * cos(UV.y * 800.0);
    float vertudMask = smoothstep(0.2, 0.6, weave);

    // 3. Multiverse Iridescence (Light-dependent shift)
    float dotNV = saturate(dot(Normal, ViewDir));
    float fresnel = pow(1.0 - dotNV, 2.5);
    
    // Shift from Indigo to Blue based on the angle of light/view
    float3 colorShift = lerp(IndigoDeep, ElectricBlue, fresnel);

    // 4. "The Metal" - Adding the dark, jagged specular
    float metalness = 0.9; // High reflectivity for the 'Metal' series
    float3 finalMetal = lerp(BaseBlack, colorShift, fresnel * metalness);

    // 5. Final Output with Gray tactical accents
    float3 finalColor = lerp(finalMetal, MetalGray, vertudMask * 0.2);
    
    return float4(finalColor, 1.0);
}



