// Advanced Shader: Dark Metal & Carbon Fiber Hybrid
// Optimized for HD 3D Rendering

float3 GetLaughingBatmanMaterial(float3 Normal, float3 ViewDir, float2 UV) {
    // 1. Define the Indigo-to-Blue Palette
    const float3 IndigoDeep = float3(0.12, 0.02, 0.35);
    const float3 ElectricBlue = float3(0.00, 0.38, 0.95);
    const float3 CarbonGray = float3(0.10, 0.10, 0.12);
    const float3 VoidBlack = float3(0.01, 0.01, 0.01);

    // 2. Structural "Vertud" (Carbon Fiber Weave)
    // Tiling the weave at high frequency for HD detail
    float2 weaveUV = UV * 1024.0;
    float carbonPattern = (sin(weaveUV.x) * cos(weaveUV.y));
    float strengthMask = smoothstep(0.0, 0.4, carbonPattern);

    // 3. Angular Iridescence (Light-Responsive Shift)
    // The "Vertud" reflects different wavelengths based on view angle (Dot Product)
    float angleFactor = saturate(dot(normalize(Normal), normalize(ViewDir)));
    float colorBias = pow(1.0 - angleFactor, 3.0); // Concentrates blue on edges
    
    float3 shiftColor = lerp(IndigoDeep, ElectricBlue, colorBias);

    // 4. Dark Multiverse "Metal" Jagged Highlights
    float metallicEdge = pow(1.0 - angleFactor, 12.0); // Intense specular on spikes
    
    // 5. Final Material Synthesis
    float3 finalBase = lerp(VoidBlack, shiftColor, 0.7);
    float3 finalWithCarbon = lerp(finalBase, CarbonGray, strengthMask * 0.15);
    
    return finalWithCarbon + (ElectricBlue * metallicEdge * 0.5);
}



class LaughingBatmanSystem:
    def __init__(self):
        self.suit_integrity = "98.7%"
        self.active_color_index = 1.45 # Refractive index for Indigo
        self.carbon_fiber_tension = "Optimal"

    def apply_kaizen_optimization(self, light_intensity):
        """
        Real-time adjustment of 'Vertud' fiber orientation 
        to maximize durability and color-shift efficiency.
        """
        if light_intensity > 0.8:
            # Shift to Deep Indigo for better dispersion
            self.active_color_index = 1.62 
            return "HUD: OPTIMIZING SPECTRAL SCATTERING... DONE."
        return "HUD: MAINTAINING STEALTH BLUE."

