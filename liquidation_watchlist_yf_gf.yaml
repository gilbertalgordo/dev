import yfinance as yf
import pandas as pd

# 1. Define your portfolio holdings 
# (You can export your Yahoo Portfolio to CSV and load it here)
portfolio_data = {
    "Ticker": ["AAPL", "GOOGL", "TSLA", "MSFT"],
    "Shares": [10, 5, 15, 8]
}

def liquidate_portfolio(data):
    df = pd.DataFrame(data)
    
    print("Fetching current market prices...")
    
    # Get current prices for all tickers
    tickers = " ".join(df["Ticker"].tolist())
    market_data = yf.download(tickers, period="1d", interval="1m")['Close'].iloc[-1]
    
    # Map prices back to the dataframe
    df["Current_Price"] = df["Ticker"].map(market_data)
    
    # Calculate liquidation value per position
    df["Liquidation_Value"] = df["Shares"] * df["Current_Price"]
    
    total_value = df["Liquidation_Value"].sum()
    
    print("\n--- Liquidation Summary ---")
    print(df[["Ticker", "Shares", "Current_Price", "Liquidation_Value"]])
    print(f"\nTotal Estimated Liquidation Value: ${total_value:,.2f}")
    
    return df

if __name__ == "__main__":
    liquidate_portfolio(portfolio_data)



