import os
from google import genai
from google.genai import types

# 1. Initialize Client (Single Account / Developer Mode)
client = genai.Client(
    vertexai=True,
    project="your-project-id", # Replace with your actual Project ID
    location="us-central1"
)

# 2. Define Tools (Functions the AI can trigger)
def create_mvp_file(filename: str, content: str):
    """Creates a project file with specific code content."""
    with open(filename, "w") as f:
        f.write(content)
    return f"Successfully created {filename}"

# 3. The Startup Builder Class
class StartupAgent:
    def __init__(self):
        self.model_id = "gemini-3-flash" # Optimized for speed/reasoning balance
        self.tools = [create_mvp_file]

    async def build_feature(self, user_goal: str):
        # Configure advanced reasoning and structured tool use
        config = types.GenerateContentConfig(
            tools=self.tools,
            temperature=1.0, # Recommended for Gemini 3 reasoning
            # 'thinking_level' manages the depth of internal planning
            thinking_level="high", 
            include_thoughts=True
        )

        print(f"🚀 Builder Starting: {user_goal}...")
        
        # Async call for non-blocking UI/System interactions
        response = await client.aio.models.generate_content(
            model=self.model_id,
            contents=user_goal,
            config=config
        )

        # Handle Thought Signatures (Reasoning chain)
        if response.candidates[0].thought:
            print(f"\n[AI REASONING]: {response.candidates[0].thought}\n")

        # Execute Function Calls automatically if requested
        for part in response.candidates[0].content.parts:
            if part.function_call:
                # Logic to map function_call to local tools
                print(f"🔧 AI is executing: {part.function_call.name}")
                # (In production, use a dispatcher here)
        
        return response.text

import asyncio
if __name__ == "__main__":
    agent = StartupAgent()
    asyncio.run(agent.build_feature(
        "Generate a FastAPI user authentication route and save it to 'auth.py'"
    ))
