import os
import json
from google import genai
from google.genai import types

# 1. BOILERPLATE: Singleton Client Setup
# Uses your local 'gcloud' login automatically.
client = genai.Client(
    vertexai=True,
    project="your-project-id", # Replace with your GCP Project ID
    location="us-central1"
)

# 2. DEFINITION: The "Startup Builder" Engine
class StartupAIEngine:
    def __init__(self, model_name="gemini-2.0-flash"):
        self.model = model_name

    def generate_structured_mvp(self, feature_request: str):
        """Generates structured JSON data for an app feature."""
        
        # We use a 'response_mime_type' to ensure the AI returns valid JSON
        # that your startup's frontend can actually parse.
        config = types.GenerateContentConfig(
            temperature=0.4,
            response_mime_type="application/json",
            response_schema={
                "type": "OBJECT",
                "properties": {
                    "feature_name": {"type": "STRING"},
                    "implementation_steps": {"type": "ARRAY", "items": {"type": "STRING"}},
                    "code_snippet": {"type": "STRING"},
                    "estimated_complexity": {"type": "STRING"}
                }
            }
        )

        prompt = f"Design a production-ready startup feature for: {feature_request}"
        
        response = client.models.generate_content(
            model=self.model,
            contents=prompt,
            config=config
        )
        
        return json.loads(response.text)

# 3. EXECUTION: Rapid Prototyping
if __name__ == "__main__":
    builder = StartupAIEngine()
    
    print("🚀 Building feature: User Auth System...")
    result = builder.generate_structured_mvp("Firebase Auth with Google Login and custom profile sync")
    
    print(f"\nFeature: {result['feature_name']}")
    print(f"Complexity: {result['estimated_complexity']}")
    print("\nNext Steps:")
    for step in result['implementation_steps']:
        print(f"- {step}")



