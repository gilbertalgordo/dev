/* Simulation of Pro-Kit Thermal Weave */
.thermal-base {
  background-color: #0D0D0D;
  background-image: 
    repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 4px);
  border-left: 20px solid #1A1A1A; /* Slimming side panel effect */
}

/* Bianchi Celeste Reflective Trim */
.reflective-celeste {
  border-top: 2px solid #96DED1;
  box-shadow: 0 0 8px rgba(150, 222, 209, 0.5); /* Simulates 3M reflection */
}

/* Anatomic Fit Logic for Women's Pro-Cut */
.fit-logic-women {
  max-width: 88%;
  margin: 0 auto;
  border-radius: 50% 50% 0 0 / 20% 20% 0 0; /* Simulates contoured shoulders */
}

/* Pro-Tour Zipper Guard */
.zipper-guard {
  width: 8px;
  background: #1A1A1A;
  box-shadow: 2px 0 5px rgba(0,0,0,0.8);
}
