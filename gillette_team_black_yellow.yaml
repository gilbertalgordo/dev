/* Simulation of the Pro-Kit Carbon Weave */
.carbon-black-base {
  background-color: #0D0D0D;
  background-image: 
    linear-gradient(45deg, #111 25%, transparent 25%), 
    linear-gradient(-45deg, #111 25%, transparent 25%), 
    linear-gradient(45deg, transparent 75%, #111 75%), 
    linear-gradient(-45deg, transparent 75%, #111 75%);
  background-size: 4px 4px;
}

/* Bianchi Celeste Accents */
.accent-bianchi {
  border-left: 4px solid #96DED1;
  filter: drop-shadow(0 0 5px rgba(150, 222, 209, 0.3));
}

/* Gillette Yellow "Pop" Layer */
.logo-gillette {
  color: #F2D800;
  text-shadow: 2px 2px 0px #000, -1px -1px 0px #fff;
  font-variation-settings: 'wght' 900, 'wdth' 125;
}

/* Women's Fit Mesh Contour */
.mesh-contour-women {
  clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
  transform: scaleY(0.95); /* Shorter torso optimization */
}



