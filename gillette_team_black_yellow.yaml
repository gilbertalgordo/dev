/* Black Kit Base Texture */
.kit-body-black {
  background-color: #0D0D0D;
  background-image: linear-gradient(180deg, #0D0D0D 0%, #1A1A1A 100%);
  border-bottom: 8px solid #F2D800; /* Yellow leg band */
}

/* Gillette Logo Styling */
.logo-gillette-main {
  color: #F2D800;
  font-family: 'Futura-BoldItalic', sans-serif;
  letter-spacing: -1.5px;
  text-transform: uppercase;
}

/* Bianchi Accent Logic */
.bianchi-accent {
  border-top: 3px solid #96DED1; /* Celeste piping on the seams */
  box-shadow: 0 0 10px rgba(150, 222, 209, 0.2);
}

/* Gender-Specific Geometry Styling */
.fit-women {
  max-width: 85%;
  margin: 0 auto;
  border-radius: 40px 40px 0 0; /* Simulates narrower waist-to-hip ratio */
}

.fit-men {
  max-width: 95%;
  border-radius: 10px 10px 0 0; /* Simulates broader shoulder profile */
}




