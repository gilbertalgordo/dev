/* Simulation of Wind-Resistant Carbon Fabric */
.jacket-matte-black {
  background-color: #0D0D0D;
  background-image: 
    radial-gradient(rgba(255,255,255,0.05) 1px, transparent 0);
  background-size: 10px 10px;
  border-left: 12px solid #1A1A1A; /* Side slimming panel */
  box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
}

/* Bianchi Celeste Reflective Detail */
.bianchi-trim {
  border-top: 3px solid #96DED1;
  filter: drop-shadow(0 0 4px rgba(150, 222, 209, 0.4));
}

/* Women's Pro-Fit Contour Logic */
.fit-contour-w {
  clip-path: ellipse(45% 50% at 50% 50%);
  transition: transform 0.3s ease-in-out;
}



