import numpy as np

class ActiveDefenseAI:
    def __init__(self):
        # Gravitational constant (m/s^2)
        self.g = 9.81 
        self.intercept_status = "READY"
        print(f"[{self.intercept_status}] System Online. Archangel-class Protocols Active.")

    def predict_trajectory(self, pos_0, vel_0, time_step):
        """
        Calculates the future position of a ballistic threat.
        Using: s = s0 + v0*t + 0.5*a*t^2
        """
        x = pos_0[0] + vel_0[0] * time_step
        y = pos_0[1] + vel_0[1] * time_step
        # Gravity only affects the Z-axis (altitude)
        z = pos_0[2] + vel_0[2] * time_step - 0.5 * self.g * (time_step**2)
        
        return np.array([x, y, z])

    def calculate_intercept_vector(self, threat_pos, interceptor_pos, speed_interceptor):
        """
        Calculates the required vector to neutralize the threat.
        """
        distance_vec = threat_pos - interceptor_pos
        distance = np.linalg.norm(distance_vec)
        
        # Time to impact
        time_to_intercept = distance / speed_interceptor
        
        # Directional Unit Vector
        direction = distance_vec / distance
        
        return direction, time_to_intercept

# --- Simulation Run ---
# Threat detected at 5km out, 2km high, moving fast
threat_initial_pos = np.array([5000, 0, 2000]) 
threat_velocity = np.array([-250, 0, -50]) # Moving toward origin at 250m/s

