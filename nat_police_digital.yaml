<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini ID Card</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .id-card {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            width: 300px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .id-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #007bff; /* Example color */
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .id-card-header {
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        .id-card-content {
            margin-top: 20px;
            text-align: left;
        }
        .id-card-content p {
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #333;
        }
        .id-card-content span {
            font-weight: bold;
            color: #555;
        }
        .id-card-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #007bff; /* Example color */
            margin: -40px auto 10px auto;
            position: relative;
            z-index: 1;
            background-color: #eee; /* Placeholder for image */
        }
        .id-card-footer {
            margin-top: 30px;
            font-size: 0.7em;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="id-card">
        <div class="id-card-header">
            Official ID Card
        </div>
        <div class="id-card-photo">
            </div>
        <div class="id-card-content">
            <p><span>Name:</span> John Doe</p>
            <p><span>ID Number:</span> 123456789</p>
            <p><span>Department:</span> Security</p>
            <p><span>Valid From:</span> 2024-01-01</p>
            <p><span>Valid To:</span> 2026-12-31</p>
        </div>
        <div class="id-card-footer">
            <p>This is a sample card. Not for official use.</p>
            <p>Generated for: <a href="https://g.dev/gilbert_algordo" target="_blank">gilbert_algordo</a></p>
        </div>
    </div>

</body>
</html>




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Dev ID | Gilbert Algordo</title>
    <style>
        :root {
            --primary-glow: #00f2ff;
            --accent-gold: #ffcf00; /* Archangel Uriel's light */
            --bg-dark: #050b14;
            --glass: rgba(255, 255, 255, 0.1);
            --font-main: 'Segoe UI', Roboto, Mono, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            perspective: 1000px;
            font-family: var(--font-main);
            color: white;
            overflow: hidden;
        }

        /* 3D Card Container */
        .id-card {
            width: 380px;
            height: 220px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            padding: 20px;
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 15px;
            overflow: hidden;
        }

        /* HUD Scanning Line */
        .id-card::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--primary-glow), transparent);
            opacity: 0.3;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        /* Profile Section */
        .photo-area {
            width: 100px;
            height: 120px;
            border: 2px solid var(--primary-glow);
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 80% 100%, 0 100%);
        }

        .photo-area::before {
            content: 'BIO-SIG';
            font-size: 8px;
            position: absolute;
            top: 2px;
            left: 2px;
            color: var(--primary-glow);
        }

        /* Text Data */
        .info-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .rank {
            font-size: 10px;
            color: var(--accent-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .name {
            font-size: 1.4em;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .dev-link {
            font-size: 11px;
            color: #aaa;
            text-decoration: none;
            margin-top: 10px;
            border-left: 2px solid var(--primary-glow);
            padding-left: 5px;
        }

        .status-grid {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-size: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }

        .status-item span {
            display: block;
            color: var(--primary-glow);
            font-weight: bold;
        }

        /* HUD Corner Accents */
        .corner {
            position: absolute;
            width: 10px;
            height: 10px;
            border: 2px solid var(--accent-gold);
        }
        .top-left { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 10px; right: 10px; border-left: none; border-top: none; }

    </style>
</head>
<body>

    <div class="id-card" id="card">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>

        <div class="photo-area">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>

        <div class="info-area">
            <div class="rank">Lead Systems Architect</div>
            <h1 class="name">Gilbert Algordo</h1>
            <a href="https://g.dev/gilbert_algordo" class="dev-link">G.DEV/GILBERT_ALGORDO</a>
            
            <div class="status-grid">
                <div class="status-item">
                    <span>SECTOR</span>
                    PHILIPPINES.HQ
                </div>
                <div class="status-item">
                    <span>CLEARANCE</span>
                    LEVEL 7 (ARCH)
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const motionMatchMedia = window.matchMedia("(prefers-reduced-motion: no-preference)");

        // 3D Tilt Effect - Visual Accuracy & HD feel
        document.addEventListener('mousemove', (e) => {
            if (motionMatchMedia.matches) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // Reset position on leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
