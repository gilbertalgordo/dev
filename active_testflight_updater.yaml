import hmac, hashlib, os
from fastapi import FastAPI, Request, HTTPException
from appstoreconnect import Api

app = FastAPI()

# Credentials from environment
API_KEY = os.getenv("ASC_KEY_ID")
ISSUER_ID = os.getenv("ASC_ISSUER_ID")
KEY_PATH = "./auth.p8"

def distribute_to_testers(build_id):
    """Logic to push build to specific External Groups"""
    api = Api(API_KEY, KEY_PATH, ISSUER_ID)
    # Fetch specific beta groups (e.g., 'Core-QA-Team')
    groups = api.list_beta_groups(filter={'name': 'Public-Beta'})
    
    for group in groups:
        # Programmatically link the build to the group
        api.add_build_to_beta_group(build_id, group.id)
        print(f"✅ Build {build_id} promoted to {group.name}")

@app.post("/testflight-webhook")
async def apple_webhook(request: Request):
    # Verification: Ensure the request is actually from Apple (using your secret)
    signature = request.headers.get("X-Apple-Signature")
    body = await request.body()
    
    # Process the notification payload
    data = await request.json()
    event_type = data.get("notificationType") # e.g., 'BUILD_READY_FOR_TESTING'
    
    if event_type == "BUILD_READY_FOR_TESTING":
        build_info = data.get("data", {}).get("build", {})
        build_id = build_info.get("id")
        
        print(f"🚀 New Build Detected: {build_info.get('version')}")
        distribute_to_testers(build_id)
        
        return {"status": "success", "action": "distributed"}

    return {"status": "ignored"}



name: AI TestFlight Deployment
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: macos-15 # Use the latest macOS runners for Xcode 17+
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate AI Release Notes
        run: |
          # Simple logic to grab the last 5 commits and format them
          git log -n 5 --pretty=format:"- %s" > beta_notes.txt
          echo "BETA_NOTES<<EOF" >> $GITHUB_ENV
          cat beta_notes.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build & Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'path/to/YourApp.ipa'
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}
          # Advanced: Automatically handle Export Compliance 
          # (Removes the "Missing Compliance" warning in TestFlight)
          app-info: |
            {
              "usesEncryption": false,
              "whatsNew": "${{ env.BETA_NOTES }}"
            }



