import time
from appstoreconnect import Api

# Configuration
KEY_ID = "YOUR_KEY_ID"
ISSUER_ID = "YOUR_ISSUER_ID"
PATH_TO_KEY = "./AuthKey_XXXXXX.p8"
APP_ID = "1234567890"  # Your App's Apple ID

def update_testflight_status():
    # Initialize API
    api = Api(KEY_ID, PATH_TO_KEY, ISSUER_ID)

    try:
        # 1. Fetch the most recent builds for the app
        # Filtering by the specific App ID
        builds = api.list_builds(
            filter={'app': APP_ID},
            sort='-uploadedDate',
            limit=1
        )

        if not builds:
            print("No builds found for this App ID.")
            return

        latest_build = builds[0]
        version = latest_build.version
        status = latest_build.externalBuildState

        print(f"Latest Build: {version} | Status: {status}")

        # 2. Logic: If the build is ready, ensure it's pushed to a group
        if status == "READY_FOR_TESTING":
            print("Build is ready! Distributing to Beta Groups...")
            # Here you would call api.add_test_flight_readers_to_group() 
            # or trigger a notification via Webhook/Slack.
        
        elif status == "PROCESSING":
            print("Build is still in Apple's processing phase. Retrying later...")

    except Exception as e:
        print(f"Error communicating with App Store Connect: {e}")

if __name__ == "__main__":
    update_testflight_status()



