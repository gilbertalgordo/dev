from PIL import Image, ImageDraw, ImageFont
import os

def generate_hud_icon(base_icon_path, build_number, env_name="BETA"):
    """
    Overlays a HUD-style info bar on the app icon for easy identification.
    """
    # 1. Load the 1024x1024 base icon
    img = Image.open(base_icon_path).convert("RGBA")
    canvas = Image.new("RGBA", img.size, (0, 0, 0, 0))
    canvas.paste(img, (0, 0))
    
    draw = ImageDraw.Draw(canvas)
    width, height = img.size

    # 2. Define HUD Overlay (Bottom Banner)
    banner_height = int(height * 0.20)
    banner_color = (0, 0, 0, 180)  # Semi-transparent black
    draw.rectangle([0, height - banner_height, width, height], fill=banner_color)

    # 3. Add AI/Version Text
    # Note: Ensure you have a .ttf font file in your repo (e.g., Roboto or SF)
    try:
        font_main = ImageFont.truetype("Arial.ttf", 80)
        font_sub = ImageFont.truetype("Arial.ttf", 40)
    except:
        font_main = ImageFont.load_default()
        font_sub = ImageFont.load_default()

    # Draw Build Number
    draw.text((50, height - banner_height + 20), f"BUILD: {build_number}", fill="white", font=font_main)
    # Draw Environment Tag
    draw.text((50, height - 60), f"ENV: {env_name.upper()} | AI UPDATER ACTIVE", fill="#00FF00", font=font_sub)

    # 4. Save the decorated icon
    output_path = "AppIcon_Decorated.png"
    canvas.save(output_path)
    print(f"✅ Active HUD Icon generated: {output_path}")

# Example usage for your CI/CD pipeline
if __name__ == "__main__":
    # In a real scenario, BUILD_NUMBER comes from GitHub Actions env
    generate_hud_icon("AppIcon.png", os.getenv("GITHUB_RUN_NUMBER", "1.0.42"), "Staging")



