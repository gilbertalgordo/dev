# Resource for a 99.99% Availability HA VPN Gateway
resource "google_compute_ha_vpn_gateway" "globe_ha_vpn" {
  name    = "globe-hybrid-ha-gateway"
  network = var.vpc_id
  region  = "asia-southeast1" # Proximity to Globe's Manila hub
}

# BGP Configuration for Sub-Second Failover (BFD)
resource "google_compute_router_peer" "globe_peer_1" {
  name                      = "globe-peer-1"
  router                    = google_compute_router.router.name
  peer_ip_address           = "169.254.1.1"
  peer_asn                  = 65000 # Globe Private ASN
  advertised_route_priority = 100
  
  bfd {
    min_transmit_interval = 1000 # 1 second detection
    min_receive_interval  = 1000
    multiplier            = 3
  }
}
