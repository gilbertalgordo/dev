resource "google_compute_ha_vpn_gateway" "ha_gateway" {
  name    = "globe-hybrid-ha-vpn"
  network = google_compute_network.main_vpc.id
  region  = "asia-southeast1" # Singapore region for lowest latency to PH
}

resource "google_compute_router" "router" {
  name    = "globe-bgp-router"
  network = google_compute_network.main_vpc.name
  bgp {
    asn = 65001 # Your Autonomous System Number
  }
}




import requests
import time

# Configuration for Globe Network API (Nokia NEP Integration)
GLOBE_API_ENDPOINT = "https://api.globe.com.ph/network/v1/status"
API_KEY = "your_kaizen_api_key"

def check_connectivity():
    """
    Checks the status of the Hybrid Link 24/7.
    Returns True if Primary Link is healthy.
    """
    try:
        response = requests.get(GLOBE_API_ENDPOINT, headers={"Authorization": f"Bearer {API_KEY}"})
        status = response.json()
        
        # High Availability Logic: Check for 'Healthy' status and latency < 50ms
        if status['link_primary'] == 'UP' and status['latency_ms'] < 50:
            return True
        return False
    except Exception as e:
        print(f"Alert: Monitoring System Error - {e}")
        return False

def main_loop():
    while True:
        if not check_connectivity():
            print("CRITICAL: Primary Globe Link degraded. Initiating SD-WAN failover...")
            # Insert logic to trigger BGP route weighting change here
        else:
            print("Status: 24/7 Connectivity Optimal.")
        time.sleep(10) # Kaizen: Frequent polling for high-availability

if __name__ == "__main__":
    main_loop()




import requests
