// Fragment Shader: IridescentCarbonFiber.glsl
varying vec3 vNormal;
varying vec3 vViewPosition;
uniform float uTime;

void main() {
    // 1. Carbon Fiber Weave Pattern (Procedural)
    vec2 uv = gl_FragCoord.xy * 0.05;
    float weave = step(0.5, sin(uv.x) * cos(uv.y));
    
    // 2. Iridescence Calculation (Fresnel)
    vec3 viewDir = normalize(vViewPosition);
    float fresnel = pow(1.0 - dot(vNormal, viewDir), 3.0);
    
    // 3. RGB Shift (Red -> Indigo -> Violet)
    vec3 colorRed = vec3(0.9, 0.0, 0.1);
    vec3 colorIndigo = vec3(0.29, 0.0, 0.51);
    vec3 colorViolet = vec3(0.56, 0.0, 1.0);
    
    // Cycle hues based on time and angle
    vec3 iridMix = mix(colorRed, colorIndigo, sin(uTime + fresnel * 4.0));
    iridMix = mix(iridMix, colorViolet, cos(uTime + fresnel * 2.0));
    
    // Final composite: Dark carbon base + iridescent highlights
    vec3 baseColor = vec3(0.05, 0.05, 0.05); // Carbon Fiber Black
    vec3 finalColor = mix(baseColor, iridMix, fresnel + (weave * 0.05));
    
    gl_FragColor = vec4(finalColor, 1.0);
}



