.carbon-fiber-iridescent {
  width: 300px;
  height: 400px;
  background: 
    linear-gradient(135deg, rgba(255, 0, 0, 0.4), rgba(75, 0, 130, 0.4), rgba(238, 130, 238, 0.4)),
    repeating-linear-gradient(45deg, #111 0px, #111 2px, #222 2px, #222 4px);
  background-blend-mode: overlay;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
  animation: shiftRGB 5s infinite alternate;
}

@keyframes shiftRGB {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(90deg); }
}



