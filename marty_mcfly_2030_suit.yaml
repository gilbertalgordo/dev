import * as THREE from 'three';

// 1. Custom Shader for Iridescent Carbon Fiber
const IridescentShader = {
  uniforms: {
    "time": { value: 1.0 },
    "baseColor": { value: new THREE.Color(0x111111) }, // Deep Carbon Black
    "iridColor1": { value: new THREE.Color(0xFF0000) }, // Red
    "iridColor2": { value: new THREE.Color(0x4B0082) }, // Indigo
    "iridColor3": { value: new THREE.Color(0xEE82EE) }  // Violet
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vViewPosition;
    void main() {
      vec4 mvPosition = modelViewMatrix * vec4( position, 1.0 );
      vNormal = normalize( normalMatrix * normal );
      vViewPosition = -mvPosition.xyz;
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    uniform float time;
    uniform vec3 baseColor;
    uniform vec3 iridColor1;
    uniform vec3 iridColor2;
    uniform vec3 iridColor3;
    varying vec3 vNormal;
    varying vec3 vViewPosition;

    void main() {
      // Carbon Fiber Weave Simulation
      float weave = step(0.5, sin(gl_FragCoord.x * 0.5) * cos(gl_FragCoord.y * 0.5));
      
      // Calculate Iridescence based on View Angle (Fresnel)
      vec3 viewDir = normalize( vViewPosition );
      float fresnel = pow(1.0 - dot(vNormal, viewDir), 3.0);
      
      // Shift RGB over time
      vec3 iridMix = mix(iridColor1, iridColor2, sin(time + fresnel * 5.0));
      iridMix = mix(iridMix, iridColor3, cos(time + fresnel * 2.0));
      
      vec3 finalColor = mix(baseColor, iridMix, fresnel + (weave * 0.1));
      gl_FragColor = vec4(finalColor, 1.0);
    }
  `
};

// 2. Scene Initialization (The 1950s "Instance")
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // 1950s Blue Sky

// 3. The 2030 Marty Vest Mesh
const vestGeometry = new THREE.CapsuleGeometry(0.5, 1, 4, 16);
const vestMaterial = new THREE.ShaderMaterial(IridescentShader);
const vest = new THREE.Mesh(vestGeometry, vestMaterial);
vest.position.set(0, 1.2, 0);
scene.add(vest);

// 4. 2030 Tech Attachments
// iPhone 2030 (Ultra-thin Glass)
const iphoneGeo = new THREE.BoxGeometry(0.07, 0.15, 0.005);
const iphoneMat = new THREE.MeshPhysicalMaterial({ 
    color: 0x000000, 
    transmission: 0.5, 
    thickness: 0.01 
});
const iphone = new THREE.Mesh(iphoneGeo, iphoneMat);
iphone.position.set(0.6, 1.0, 0.2);
scene.add(iphone);

// Smartwatch HUD (Ray-traced Green Glow)
const watchGeo = new THREE.TorusGeometry(0.04, 0.01, 16, 100);
const watchMat = new THREE.MeshBasicMaterial({ color: 0x00FF00 });
const watch = new THREE.Mesh(watchGeo, watchMat);
watch.position.set(-0.5, 0.9, 0.2);
scene.add(watch);

// 5. Animation Loop
function animate(t) {
  requestAnimationFrame(animate);
  vestMaterial.uniforms.time.value = t * 0.001;
  vest.rotation.y += 0.01; // Preview rotation
  // Render call here...
}
animate();



import React, { useRef } from 'react';
import { Canvas, useFrame } from '@react-three/fiber';
import { MeshDistortMaterial, PerspectiveCamera, Text } from '@react-three/drei';
import * as THREE from 'three';

// 1. Iridescent Carbon Fiber Shader Component
const MartyVestMaterial = () => {
  const materialRef = useRef();

  useFrame(({ clock }) => {
    // Shifting the RGB spectrum over time
    const t = clock.getElapsedTime();
    materialRef.current.color.setHSL((t * 0.1) % 1, 0.8, 0.5);
    materialRef.current.emissive.setHSL((t * 0.1 + 0.5) % 1, 0.9, 0.2);
  });

  return (
    <meshStandardMaterial
      ref={materialRef}
      metalness={1}
      roughness={0.1}
      emissiveIntensity={2}
      // Simulating Carbon Fiber texture with a bump map
      onBeforeCompile={(shader) => {
        shader.fragmentShader = shader.fragmentShader.replace(
          `#include <map_fragment>`,
          `
          float weave = step(0.5, sin(gl_FragCoord.x * 0.8) * cos(gl_FragCoord.y * 0.8));
          diffuseColor.rgb *= (0.8 + weave * 0.2);
          `
        );
      }}
    />
  );
};

// 2. 2030 Tech Instance (The "Gear")
const FuturisticGear = () => {
  return (
    <group>
      {/* Iridescent Carbon Fiber Vest Instance */}
      <mesh position={[0, 0, 0]}>
        <cylinderGeometry args={[0.5, 0.6, 1.2, 32]} />
        <MartyVestMaterial />
      </mesh>

      {/* 2030 Smartwatch with HUD */}
      <mesh position={[-0.7, -0.2, 0.3]}>
        <torusGeometry args={[0.05, 0.01, 16, 100]} />
        <meshStandardMaterial color="#00ff00" emissive="#00ff00" emissiveIntensity={5} />
        <Text
          position={[0, 0.1, 0]}
          fontSize={0.03}
          color="#00ff00"
          anchorX="center"
        >
          YEAR: 1950 | STATUS: STABLE
        </Text>
      </mesh>

      {/* iPhone 2030 (Translucent Slate) */}
      <mesh position={[0.7, -0.1, 0.4]} rotation={[0, -0.5, 0.2]}>
        <boxGeometry args={[0.08, 0.16, 0.005]} />
        <MeshDistortMaterial color="#000" speed={2} distort={0.1} radius={1} />
      </mesh>
    </group>
  );
};

// 3. The 1950s "Backdrop" Scene
export default function HillValley1950Scene() {
