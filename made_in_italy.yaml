import hashlib
import time
from dataclasses import dataclass, asdict

@dataclass
class ProductionStage:
    stage_name: str
    location: str
    contribution_value: float  # Percentage of total value added
    efficiency_score: float    # Kaizen metric (0.0 to 1.0)

class ItalyProductionAI:
    def __init__(self, sku: str):
        self.sku = sku
        self.stages = []
        self.min_it_value = 0.60  # Require 60% value added in Italy
        self.min_kaizen_score = 0.85

    def add_production_stage(self, stage: ProductionStage):
        self.stages.append(stage)

    def calculate_origin_integrity(self):
        it_value = sum(s.contribution_value for s in self.stages if s.location.upper() == "ITALY")
        avg_efficiency = sum(s.efficiency_score for s in self.stages) / len(self.stages)
        
        # Verify against EU 'last substantial transformation' logic
        is_compliant = it_value >= self.min_it_value and avg_efficiency >= self.min_kaizen_score
        return is_compliant, it_value, avg_efficiency

    def generate_cryptographic_marker(self):
        is_valid, it_val, k_score = self.calculate_origin_integrity()
        
        if not is_valid:
            return {"status": "REJECTED", "reason": "Insufficient Italian value or low Kaizen efficiency"}

        # Create a unique hash for the etiquette (Digital Twin ID)
        raw_data = f"{self.sku}-{it_val}-{time.time()}"
        digital_signature = hashlib.sha256(raw_data.encode()).hexdigest()[:16].upper()

        return {
            "marker_id": f"IT-{digital_signature}",
            "origin_ratio": f"{it_val*100}%",
            "kaizen_efficiency": f"{k_score*100}%",
            "etiquette_tier": "PREMIUM" if it_val > 0.8 else "STANDARD",
            "timestamp": time.ctime()
        }

# --- Execution Instance ---
engine = ItalyProductionAI(sku="LUX-BAG-001")
engine.add_production_stage(ProductionStage("Design", "Italy", 0.20, 0.95))
engine.add_production_stage(ProductionStage("Tanning", "Italy", 0.30, 0.90))
engine.add_production_stage(ProductionStage("Assembly", "Italy", 0.45, 0.92))

production_data = engine.generate_cryptographic_marker()
print(f"AI Marker Metadata: {production_data}")
