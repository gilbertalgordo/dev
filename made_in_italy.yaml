import datetime

class ProductionEtiquetteAI:
    def __init__(self, product_id):
        self.product_id = product_id
        self.timestamp = datetime.datetime.now().isoformat()
        self.compliance_status = False

    def verify_origin(self, cost_in_italy, total_cost, transformation_steps):
        """
        Logic to determine if 'Made in Italy' can be legally applied.
        Standard: Significant production stages must happen in Italy.
        """
        local_content_ratio = cost_in_italy / total_cost
        
        # Criteria: > 50% cost or 2+ major transformation steps
        if local_content_ratio > 0.50 or transformation_steps >= 2:
            self.compliance_status = True
            return True
        return False

    def generate_marker(self):
        if self.compliance_status:
            return {
                "product_id": self.product_id,
                "label": "MADE IN ITALY",
                "status": "CERTIFIED",
                "issued_at": self.timestamp,
                "ui_element": "svg_tricolore_v1.0"
            }
        else:
            raise ValueError("Production does not meet 'Made in Italy' requirements.")

# Example Instance
ai_manager = ProductionEtiquetteAI(product_id="ITA-LUX-001")
if ai_manager.verify_origin(cost_in_italy=75, total_cost=100, transformation_steps=3):
    marker_data = ai_manager.generate_marker()
    print(f"Marker Generated: {marker_data}")



