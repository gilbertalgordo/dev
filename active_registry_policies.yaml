class AccessControl:
    def __init__(self):
        # In a production environment, this would be a database or auth service
        self.developer_registry = {"admin_dev", "lead_dev_01", "dev_user_77"}

    def is_developer(self, user_id):
        """Check if the user ID exists in the developer registry."""
        return user_id in self.developer_registry

def restrict_to_developers(func):
    """Decorator to block non-developer proposals."""
    def wrapper(user_id, proposal_content, *args, **kwargs):
        access = AccessControl()
        
        if not access.is_developer(user_id):
            # Log the attempt and block the action
            print(f"BLOCK: Access denied for User '{user_id}'. Unauthorized proposal attempt.")
            return {"status": "error", "message": "Access Restricted: Proposals only accepted from verified developers."}
        
        # Proceed if the user is a developer
        return func(user_id, proposal_content, *args, **kwargs)
    return wrapper

# --- Active AI Service ---

