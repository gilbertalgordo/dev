import functools
import logging
from datetime import datetime

# Configure logging for "HUD-style" visibility
logging.basicConfig(level=logging.INFO, format='[%(asctime)s] %(levelname)s: %(message)s')
logger = logging.getLogger("AI_Gatekeeper")

class SecurityProtocol:
    """Active AI Security Layer to manage developer-only access."""
    
    # Mock source for verified developer IDs or GitHub handles
    VERIFIED_SOURCES = ["gilbertalgordo", "lead_architect_01", "dev_ops_core"]

    @staticmethod
    def verify_developer_status(user_metadata):
        """
        Validates if the user meets the 'Developer' criteria.
        Can be extended to check specific GitHub repositories or API keys.
        """
        username = user_metadata.get("username")
        has_repo_access = user_metadata.get("repo_access", False)
        
        # Superfast check: Immediate shutdown if criteria not met
        if username in SecurityProtocol.VERIFIED_SOURCES and has_repo_access:
            return True
        return False

def developer_only_proposal(func):
    """Decorator to block or shutdown non-developer logic paths."""
    @functools.wraps(func)
    def wrapper(user_metadata, proposal, *args, **kwargs):
        is_valid = SecurityProtocol.verify_developer_status(user_metadata)
        
        if not is_valid:
            logger.warning(f"UNAUTHORIZED PROPOSAL SHUTDOWN: User {user_metadata.get('username')} blocked.")
            return {
                "status": "TERMINATED",
                "code": 403,
                "reason": "Source integrity check failed. Non-developer input discarded."
            }
        
        logger.info(f"ACCESS GRANTED: Developer {user_metadata.get('username')} verified.")
        return func(user_metadata, proposal, *args, **kwargs)
    return wrapper

# --- Active AI Service Interface ---

class ProposalProcessor:
    @developer_only_proposal
    def submit_logic_change(self, user_metadata, proposal):
        """Processes high-level architectural or code changes."""
        # Active AI logic for processing the suggestion
        return {
            "status": "PROCESSED",
            "timestamp": datetime.now().isoformat(),
            "payload": proposal
        }

