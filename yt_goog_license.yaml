// Node.js example using Google APIs Client Library
const {google} = require('googleapis');

const oauth2Client = new google.auth.OAuth2(
  YOUR_CLIENT_ID,
  YOUR_CLIENT_SECRET,
  YOUR_REDIRECT_URL
);

// Generate an authentication URL for the professional user
const scopes = [
  'https://www.googleapis.com/auth/youtube.force-ssl',
  'https://www.googleapis.com/auth/youtubepartner' // Requires professional CMS access
];

const url = oauth2Client.generateAuthUrl({
  access_type: 'offline', // Provides a refresh token for permanent access
  scope: scopes
});

