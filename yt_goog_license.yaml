from googleapiclient.discovery import build
from google.oauth2 import service_account

# Professional SKUs (e.g., Google Workspace Enterprise, Google Voice)
# SKU ID for Google Workspace Enterprise: '1010020027'
PRODUCT_ID = 'Google-Apps'
SKU_ID = '1010020027' 
USER_EMAIL = 'exec@your-international-firm.com'

def assign_pro_license(credentials_path):
    creds = service_account.Credentials.from_service_account_file(
        credentials_path, 
        scopes=['https://www.googleapis.com/auth/apps.licensing']
    )
    
    service = build('licensing', 'v1', credentials=creds)
    
    body = {'userId': USER_EMAIL}
    
    # Programmatically assign the license
    request = service.licenseAssignments().insert(
        productId=PRODUCT_ID, skuId=SKU_ID, body=body
    )
    response = request.execute()
    print(f"License Assigned: {response['userId']}")

