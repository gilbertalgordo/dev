<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#grad1)" rx="20"/>

  <circle cx="150" cy="200" r="120" stroke="#FFD700" stroke-width="1" fill="none" stroke-dasharray="5,5" opacity="0.3" />
  <circle cx="150" cy="200" r="100" stroke="#FFD700" stroke-width="8" fill="none" stroke-dasharray="150,314" opacity="0.6" />
  
  <text x="320" y="160" font-family="Arial, sans-serif" font-weight="900" font-size="52" fill="#FFD700" letter-spacing="2">GILLETTE</text>
  <text x="320" y="210" font-family="Arial, sans-serif" font-weight="300" font-size="40" fill="#FFFFFF" letter-spacing="8">CYCLING</text>
  
  <line x1="320" y1="230" x2="700" y2="230" stroke="#FFD700" stroke-width="2" />
  <text x="320" y="260" font-family="monospace" font-size="14" fill="#FFD700">MAX_VELOCITY: 180 KM/H</text>
  <text x="550" y="260" font-family="monospace" font-size="14" fill="#FFD700">STATUS: ACTIVE</text>

  <path d="M100 220 Q 150 220, 200 180 L 250 180 L 220 200 L 280 200 L 210 230 L 120 230 Z" fill="#FFD700">
    <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite" />
  </path>
  
  <line x1="50" y1="190" x2="120" y2="190" stroke="#FFD700" stroke-width="2" opacity="0.8" />
  <line x1="30" y1="210" x2="100" y2="210" stroke="#FFD700" stroke-width="3" opacity="0.5" />
  <line x1="60" y1="230" x2="130" y2="230" stroke="#FFD700" stroke-width="1" opacity="0.9" />
</svg>





<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFF3B0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>

    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <rect width="100%" height="1" fill="#000" opacity="0.2" />
    </pattern>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#050505" rx="15"/>
  <rect width="800" height="400" fill="url(#scanlines)" rx="15"/>

  <g filter="url(#glow)">
    <circle cx="180" cy="200" r="130" stroke="#FFD700" stroke-width="1" fill="none" stroke-dasharray="10, 20" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 180 200" to="360 180 200" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="200" r="115" stroke="#FFD700" stroke-width="4" fill="none" stroke-dasharray="80, 250" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360 180 200" to="0 180 200" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>

  <g transform="translate(340, 160)">
    <text font-family="Verdana, sans-serif" font-weight="900" font-size="65" fill="url(#goldGrad)" letter-spacing="-2">GILLETTE</text>
    <text y="55" font-family="monospace" font-weight="100" font-size="38" fill="#FFFFFF" letter-spacing="12">CYCLING</text>
    
    <rect y="80" width="300" height="4" fill="#333" />
    <rect y="80" width="240" height="4" fill="#FFD700">
      <animate attributeName="width" values="180;300;260;290" dur="2s" repeatCount="indefinite" />
    </rect>
    <text y="105" font-family="monospace" font-size="12" fill="#FFD700" opacity="0.8">MAX_VELOCITY_TARGET: 180.4 KM/H</text>
  </g>

  <g transform="translate(100, 165) scale(1.2)" filter="url(#glow)">
    <path d="M0 40 Q 30 40, 60 10 L 110 10 L 90 25 L 140 25 L 80 50 L 10 50 Z" fill="#FFD700">
      <animate attributeName="transform" type="translate" values="0,0; 5,0; 0,0" dur="0.1s" repeatCount="indefinite" />
    </path>
    <rect x="-40" y="15" width="30" height="2" fill="#FFD700" opacity="0.6"><animate attributeName="x" values="-40; -100" dur="0.4s" repeatCount="indefinite" /></rect>
    <rect x="-60" y="30" width="50" height="2" fill="#FFD700" opacity="0.4"><animate attributeName="x" values="-60; -120" dur="0.3s" repeatCount="indefinite" /></rect>
  </g>

  <polyline points="20,50 20,20 50,20" stroke="#FFD700" fill="none" stroke-width="3" />
  <polyline points="750,350 780,350 780,320" stroke="#FFD700" fill="none" stroke-width="3" />
</svg>
