// Advanced Material Shader: Golden Carbon Fiber (GCF-v1)
uniform float time;
uniform vec3 goldColor; // #D4AF37
varying vec2 vUv;
varying vec3 vNormal;

void main() {
    // 1. Create the weave pattern (2x2 Twill)
    vec2 uv = vUv * 40.0; // Scale of the carbon weave
    float weave = step(0.5, fract(uv.x + step(0.5, fract(uv.y)) * 0.5));
    
    // 2. Anisotropic Highlight (The "Shimmer")
    float spec = pow(max(dot(vNormal, vec3(0.0, 0.0, 1.0)), 0.0), 32.0);
    vec3 baseGold = goldColor * (0.8 + 0.4 * weave);
    
    // 3. Final Composite with Clearcoat effect
    vec3 finalColor = baseGold + (spec * 0.5);
    gl_FragColor = vec4(finalColor, 1.0);
}



