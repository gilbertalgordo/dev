/* Tiger Lily Dress Theme */
.tiger-lily-dress {
    background-color: #A0522D; /* Burnt Sienna / Earthy Base */
    border-bottom: 20px solid #20B2AA; /* Turquoise geometric trim */
    border-top: 10px solid #20B2AA;
    color: #FF8C00; /* Deep Orange for Lily embroidery */
    font-family: 'Copperplate', serif;
    padding: 20px;
    border-radius: 5px;
    max-width: 400px;
    text-align: center;
}

.embroidery-pattern {
    /* Representing the central lily motif */
    background-image: url('lily-icon.png');
    background-repeat: no-repeat;
    background-position: center;
    height: 150px;
}



def generate_dress_pattern(filename="tiger_lily_pattern.svg"):
    # Dimensions for a basic "short dress" silhouette
    svg_content = f'''
    <svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
        <rect width="100%" height="100%" fill="#f4f4f4" />
        
        <text x="150" y="50" font-family="Arial" font-size="20">Front View</text>
        <path d="M 100 100 L 300 100 L 320 500 L 80 500 Z" 
              fill="#A0522D" stroke="#20B2AA" stroke-width="5" />
        <circle cx="200" cy="300" r="40" fill="#FF8C00" opacity="0.8" /> <text x="550" y="50" font-family="Arial" font-size="20">Back View</text>
        <path d="M 500 100 L 700 100 L 720 500 L 480 500 Z" 
              fill="#A0522D" stroke="#20B2AA" stroke-width="5" />
        <line x1="600" y1="100" x2="600" y2="500" stroke="#8B4513" stroke-dasharray="5,5" /> </svg>
    '''
    
    with open(filename, "w") as f:
        f.write(svg_content)
    print(f"Pattern generated: {filename}")

if __name__ == "__main__":
    generate_dress_pattern()



import * as THREE from 'three';

// Scene Setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Dress Geometry (A-Line Cylinder Approximation)
const geometry = new THREE.CylinderGeometry(0.8, 1.5, 3, 32, 1, true);
const material = new THREE.MeshStandardMaterial({
    color: 0xA0522D, // Earthy Sienna
    roughness: 0.8,
    metalness: 0.1,
    side: THREE.DoubleSide
});

const dress = new THREE.Mesh(geometry, material);
scene.add(dress);

// Programmatic "Embroidery" (Adding Lily Petals via Sprites)
function addLilyDetail(yPos, rotation) {
    const lilyGeo = new THREE.PlaneGeometry(0.5, 0.5);
    const lilyMat = new THREE.MeshLambertMaterial({ 
        color: 0xFF8C00, 
        transparent: true, 
        opacity: 0.9 
    });
    const petal = new THREE.Mesh(lilyGeo, lilyMat);
    petal.position.set(Math.cos(rotation) * 0.9, yPos, Math.sin(rotation) * 0.9);
    petal.lookAt(0, yPos, 0);
    dress.add(petal);
}

// Add trim and lily accents
for (let i = 0; i < 8; i++) {
    addLilyDetail(0, (i / 8) * Math.PI * 2);
}

// Lighting
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    dress.rotation.y += 0.01; // Rotation to show front and back
    renderer.render(scene, camera);
}
animate();



.advanced-fabric {
    width: 300px;
    height: 500px;
    background: 
        /* The "Lily" Accent Layer */
        radial-gradient(circle at 50% 40%, #FF8C00 20px, transparent 21px),
        /* The Turquoise Geometric Trim */
        repeating-linear-gradient(45deg, #20B2AA 0, #20B2AA 10px, #1D928B 10px, #1D928B 20px);
    background-size: 100% 100%, 100% 50px;
    background-position: center, bottom;
    background-repeat: no-repeat;
    
    /* Suede Texture Simulation */
    box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
    position: relative;
    clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); /* A-Line Shape */
}

.advanced-fabric::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('https://www.transparenttextures.com/patterns/felt.png');
    opacity: 0.4;
    mix-blend-mode: multiply;
}
