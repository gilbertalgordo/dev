  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <path d="M50,50 L350,50 L350,250 C350,350 200,450 200,450 C200,450 50,350 50,250 Z" 
        fill="#FFEB00" stroke="#000" stroke-width="8" filter="url(#shadow)"/>

  <rect x="54" y="54" width="98" height="30" fill="#008C45" />
  <rect x="152" y="54" width="96" height="30" fill="#F4F5F0" />
  <rect x="248" y="54" width="98" height="30" fill="#CD212A" />

  <path d="M210,380 C210,380 205,370 200,360 C190,340 180,300 190,260 
           C195,240 210,210 230,200 C240,195 250,190 260,185 L265,170 
           C265,170 255,175 245,178 C230,182 215,185 200,180 
           C185,175 170,160 165,140 L160,120 L150,140 
           C145,155 140,170 130,185 C120,200 110,215 115,240 
           C118,260 130,285 145,300 C155,310 170,320 175,340 
           L180,380 Z" 
        fill="black" />

  <text x="80" y="400" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="black">S</text>
  <text x="270" y="400" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="black">F</text>
  
  <path d="M60,60 L200,60 C100,150 60,300 60,250 Z" fill="white" opacity="0.1" />
</svg>



<!DOCTYPE html>
<html lang="en">
<head>
<style>
  :root {
    --ferrari-yellow: #FFEB00;
    --ferrari-red: #EF1A2D;
    --ferrari-green: #008C45;
    --ferrari-white: #FFFFFF;
  }

  body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

  /* 3D Container for the "Sticker" Look */
  .logo-container {
    position: relative;
    width: 300px;
    height: 420px;
    filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
    transition: transform 0.3s ease;
    cursor: pointer;
  }

  .logo-container:hover {
    transform: rotateX(10deg) rotateY(-10deg) scale(1.05);
  }

  /* The Shield Base */
  .shield {
    width: 100%;
    height: 100%;
    background: var(--ferrari-yellow);
    clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%);
    border: 4px solid black;
    position: relative;
    overflow: hidden;
  }

  /* Tricolore Top Bar */
  .tricolore {
    display: flex;
    height: 40px;
    width: 100%;
    border-bottom: 2px solid black;
  }
  .green { flex: 1; background: var(--ferrari-green); }
  .white { flex: 1; background: var(--ferrari-white); }
  .red   { flex: 1; background: var(--ferrari-red); }

  /* HUD Gloss Overlay */
  .gloss {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%);
    pointer-events: none;
  }

  /* Prancing Horse Placeholder (SVG) */
  .horse-svg {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65%;
    height: auto;
  }

  /* SF Text Styling */
  .sf-label {
    position: absolute;
    bottom: 15%;
    width: 100%;
    display: flex;
    justify-content: space-around;
    font-family: 'Arial Black', sans-serif;
    font-size: 45px;
    color: black;
  }
</style>
</head>
<body>

<div class="logo-container">
  <div class="shield">
    <div class="tricolore">
      <div class="green"></div>
      <div class="white"></div>
      <div class="red"></div>
    </div>
    
    <div class="gloss"></div>

    <svg class="horse-svg" viewBox="0 0 100 120">
      <path d="M55,110 C55,110 50,100 45,95 C35,85 25,60 30,45 C35,35 45,25 60,20 C65,18 70,15 75,10 L80,0 C80,0 70,10 60,12 C50,14 40,15 30,10 C20,5 15,0 10,0 L5,15 C5,15 10,20 15,30 C20,40 25,50 20,65 C18,75 10,85 5,95 C5,95 15,100 25,105 C35,110 45,115 55,110 Z" fill="black" />
    </svg>

    <div class="sf-label">
      <span>S</span>
      <span>F</span>
    </div>
  </div>
</div>

</body>
</html>



