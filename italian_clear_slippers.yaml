import React from "react";
import { MeshTransmissionMaterial } from "@react-three/drei";

const ClearItalianSlipper = () => {
  return (
    <group>
      {/* Upper: High-Durability Clear Mesh */}
      <mesh position={[0, 1, 0]}>
        <boxGeometry args={[1, 0.4, 2]} />
        <MeshTransmissionMaterial
          samples={10}
          resolution={512}
          thickness={0.1}
          anisotropy={0.5}
          distortion={0.2} // Mimics the weave of the mesh
          color="#ffffff"
          roughness={0.1}
        />
      </mesh>

      {/* Sole: Tailored Thick Clear EVA */}
      <mesh position={[0, 0.5, 0]}>
        <boxGeometry args={[1.1, 0.6, 2.2]} />
        <MeshTransmissionMaterial
          ior={1.47} // Refractive index for high-density EVA
          thickness={1.5} 
          chromaticAberration={0.03}
          transmission={1.0}
          clearcoat={1}
          attenuationDistance={0.5}
          attenuationColor="#ffffff"
        />
      </mesh>
    </group>
  );
};



