// Function to update the Live Icon Badge
async function updateLiveStatus(count) {
  if ('setAppBadge' in navigator) {
    try {
      // Sets a numerical HUD-style badge on the icon
      await navigator.setAppBadge(count);
      console.log("HUD Status: Badge Updated to " + count);
    } catch (error) {
      console.error("Badge failed:", error);
    }
  }
}

