import math

class FerrariVisionGT:
    def __init__(self):
        # Hardware Constants
        self.mass = 1250  # kg
        self.ice_max_power = 1030  # CV
        self.electric_max_power = 326  # CV
        self.total_torque_max = 1100  # Nm
        
        # State Variables
        self.current_speed = 0.0  # km/h
        self.steering_angle = 0.0 # degrees
        self.braking_pressure = 0.0 # 0.0 to 1.0
        
    def update_active_aero(self):
        """Logic for Variable Rear Wing & Front Diffuser Flaps"""
        if self.current_speed > 250 and self.braking_pressure > 0.5:
            # Airbrake Mode: Maximize drag
            self.rear_wing_angle = 45.0  
            self.front_diffuser = "Closed"
        elif self.current_speed > 300 and self.steering_angle < 5:
            # DRS / Low Drag Mode: Minimize resistance
            self.rear_wing_angle = 2.0
            self.front_diffuser = "Optimized"
        else:
            # High Downforce Mode: Cornering stability
            self.rear_wing_angle = 15.0
            self.front_diffuser = "Deployed"

    def drive_logic(self, throttle, steering):
        """Torque Vectoring for the Tri-Motor AWD System"""
        self.steering_angle = steering
        
        # Rear Axle: ICE + MGU-K
        rear_torque = throttle * (self.total_torque_max * 0.6)
        
        # Front Axle: Independent dual motors for Torque Vectoring
        # Inner wheel brakes slightly, outer wheel accelerates to 'pivot' the car
        torque_bias = steering * 0.15 
        front_left_torque = (throttle * 0.2) - torque_bias
        front_right_torque = (throttle * 0.2) + torque_bias
        
        return {
            "FL_Motor": front_left_torque,
            "FR_Motor": front_right_torque,
            "Rear_Unit": rear_torque,
            "Aero_State": self.update_active_aero()
        }

# Initialize Instance
vgt_instance = FerrariVisionGT()



