    <title>Ferrari 296 Custom Widebody - Vector Icon Sheet</title>
    <style>
        :root {
            --bg-main: #08080a;
            --bg-card: #111115;
            --border-color: #22222b;
            --ferrari-red: #E30613;
            --accent-glow: rgba(227, 6, 19, 0.15);
            --text-main: #ffffff;
            --text-muted: #666673;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 8px 0;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Icon Grid Layout */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 180px);
            gap: 24px;
            justify-content: center;
            max-width: 600px;
        }

        @media (max-width: 600px) {
            .icon-grid {
                grid-template-columns: repeat(2, 160px);
            }
        }

        /* Individual Icon Card Component */
        .icon-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .icon-card:hover {
            border-color: var(--ferrari-red);
            box-shadow: 0 10px 25px var(--accent-glow);
            transform: translateY(-2px);
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .icon-wrapper svg {
            width: 100%;
            height: 100%;
            transition: stroke 0.25s ease;
        }

        .icon-card:hover .icon-wrapper svg {
            stroke: var(--ferrari-red);
        }

        .icon-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            transition: color 0.25s ease;
        }

        .icon-card:hover .icon-label {
            color: var(--text-main);
        }

        /* Focus Active Indicator Dot */
        .icon-card::after {
            content: '';
            position: absolute;
            bottom: 8px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--ferrari-red);
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .icon-card:hover::after {
            opacity: 1;
        }
    </style>
</head>
