import time
import math

class ActiveSuspensionSystem:
    def __init__(self):
        # Target ride height in mm
        self.target_height = 25.0 
        # Hydraulic pressure limits (Bar)
        self.max_pressure = 250.0
        # G-Force Threshold for Gravitational Auto-Leveling
        self.g_threshold = 0.5 

    def get_sensor_data(self):
        """
        Simulated input from IMU and Laser Ride Height sensors.
        Returns: (lat_g, long_g, [fr_height, fl_height, rr_height, rl_height])
        """
        # In a real F1/Hypercar environment, this pulls from the CAN bus
        return 1.2, -0.8, [22.5, 27.1, 24.8, 25.2]

    def calculate_gravitational_compensation(self, lat_g, long_g):
        """
        Calculates the required pressure offset based on gravitational forces.
        """
        # Compensation factor for lateral and longitudinal load transfer
        lat_adjustment = lat_g * 15.2  
        long_adjustment = long_g * 12.5
        return lat_adjustment, long_adjustment

    def update_hydraulics(self):
        lat_g, long_g, heights = self.get_sensor_data()
        lat_comp, long_comp = self.calculate_gravitational_compensation(lat_g, long_g)

        # corner_pressures = [FrontRight, FrontLeft, RearRight, RearLeft]
        new_pressures = []
        
        for i, height in enumerate(heights):
            # Calculate error from target ride height
            error = self.target_height - height
            
            # Basic Proportional Control + Gravitational Logic
            # Example: If lat_g is positive (right turn), increase pressure on left side
            base_p = (error * 5.0) + 100.0 # Base pressure + height correction
            
            # Apply gravitational offsets based on corner position
            if i % 2 == 0: # Right Side
                p_final = base_p - lat_comp + long_comp
            else: # Left Side
                p_final = base_p + lat_comp + long_comp
                
            new_pressures.append(min(p_final, self.max_pressure))

        self.apply_hydraulic_actuation(new_pressures)

    def apply_hydraulic_actuation(self, pressures):
        # Interface with high-speed solenoid valves
        print(f"Applying Pressures (Bar): FR:{pressures[0]:.1f} | FL:{pressures[1]:.1f} | RR:{pressures[2]:.1f} | RL:{pressures[3]:.1f}")

# Execution Loop (Running at high frequency, e.g., 1000Hz)
system = ActiveSuspensionSystem()
while True:
    system.update_hydraulics()
    time.sleep(0.001)



#include <Wire.h>
#include <InternalIMU.h> // Specialized 6-Axis IMU Library

struct SuspensionCorner {
    int pin_actuator;
    float current_height;
    float target_pressure;
    float damping_coefficient;
};

// Initialize corners: FR, FL, RR, RL
SuspensionCorner corners[4] = {{10, 0, 0, 0.8}, {11, 0, 0, 0.8}, {12, 0, 0, 0.9}, {13, 0, 0, 0.9}};

class ActiveHydraulicSystem {
private:
    const float RIDE_HEIGHT_TARGET = 15.5; // mm (F1 Spec)
    const float MAX_HYDRAULIC_BAR = 280.0;
    float roll_stiffness = 1.25;

public:
    void processGravitationalVector(float latG, float longG, float vertG) {
        for (int i = 0; i < 4; i++) {
            // 1. Calculate Load Transfer
            float load_factor = (latG * getLatSign(i)) + (longG * getLongSign(i));
            
            // 2. Gravitational Automatic Adjustment
            // Increase pressure on the outside/loaded corners
            corners[i].target_pressure = (load_factor * roll_stiffness) * 100.0;
            
            // 3. Vertical G-Force Compensation (Downforce adjustment)
            if (vertG > 1.5) { 
                corners[i].target_pressure += (vertG * 15.0); // Stiffen for high downforce
            }

            applyHydraulicOutput(i, corners[i].target_pressure);
        }
    }

    void applyHydraulicOutput(int corner, float pressure) {
        pressure = constrain(pressure, 10.0, MAX_HYDRAULIC_BAR);
        int signal = map(pressure, 0, MAX_HYDRAULIC_BAR, 0, 4095); // 12-bit DAC
        analogWrite(corners[corner].pin_actuator, signal);
    }

    // Helper functions for corner orientation
    int getLatSign(int i) { return (i % 2 == 0) ? -1 : 1; } // Right vs Left
    int getLongSign(int i) { return (i < 2) ? 1 : -1; }    // Front vs Rear
};

ActiveHydraulicSystem raceSystem;

void loop() {
    float gx, gy, gz;
    IMU.readGForces(&gx, &gy, &gz); // High-speed IMU read
    
    // Execute Kaizen Logic Loop at 2000Hz
    raceSystem.processGravitationalVector(gx, gy, gz);
    delayMicroseconds(500); 
}



