#!/bin/bash
# Kaizen-optimized macOS Bootable Creator
# Logic: Checks for installer presence, unmounts target, and executes createinstallmedia

INSTALLER_PATH="/Applications/Install macOS Sequoia.app"
TARGET_DRIVE="/Volumes/MyUSB"

if [ -d "$INSTALLER_PATH" ]; then
    echo "🚀 Starting High-Efficiency Deployment..."
    sudo "$INSTALLER_PATH/Contents/Resources/createinstallmedia" --volume "$TARGET_DRIVE" --nointeraction
else
    echo "❌ Error: Installer not found at $INSTALLER_PATH"
    exit 1
fi



