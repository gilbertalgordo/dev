import asyncio
from google import genai
from google.genai import types

# Initialize Client using Application Default Credentials (ADC)
client = genai.Client(
    vertexai=True,
    project="your-project-id",
    location="us-central1"
)

MODEL_ID = "gemini-3-flash" # Latest 2026 model

async def setup_and_run():
    # --- ADVANCED FEATURE: CONTEXT CACHING ---
    # Caches large context to save tokens on repeated queries
    print("Creating Context Cache...")
    cache = client.caches.create(
        model=MODEL_ID,
        config=types.CreateCachedContentConfig(
            display_name="dev-mode-cache",
            contents=[
                types.Content(
                    role="user", 
                    parts=[types.Part.from_text("Large developer documentation or system rules here...")]
                )
            ],
            ttl="3600s", # Cache expires in 1 hour
        ),
    )

    # --- ADVANCED FEATURE: ASYNC STREAMING ---
    print(f"Querying {MODEL_ID} with Cache {cache.name}...")
    
    async def get_stream():
        response_stream = await client.aio.models.generate_content_stream(
            model=MODEL_ID,
            contents="How do I optimize this specific function using the rules in the cache?",
            config=types.GenerateContentConfig(
                cached_content=cache.name,
                temperature=0.2, # Lower for technical accuracy
                # Thought signatures help in debugging complex reasoning
                include_thoughts=True 
            ),
        )
        
        async for chunk in response_stream:
            # Handle 'thought' parts for better developer transparency
            if hasattr(chunk, 'thought'):
                print(f"[Thinking]: {chunk.thought}", end="", flush=True)
            print(chunk.text, end="", flush=True)

    await get_stream()

if __name__ == "__main__":
    asyncio.run(setup_and_run())
