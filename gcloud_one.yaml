from google import genai
from google.genai import types

# 1. Initialize the Client
# By setting 'vertexai=True', it uses your Google Cloud project context.
# It automatically finds your credentials from the 'gcloud auth' step above.
client = genai.Client(
    vertexai=True, 
    project="your-project-id", # Replace with your GCP Project ID
    location="us-central1"     # Standard developer region
)

def generate_ai_response(prompt_text):
    try:
        # 2. Call the Model
        response = client.models.generate_content(
            model="gemini-2.0-flash",
            contents=prompt_text,
            config=types.GenerateContentConfig(
                temperature=0.7,
                max_output_tokens=500,
            ),
        )
        
        # 3. Output the text result
        print(f"AI Response:\n{response.text}")

    except Exception as e:
        print(f"An error occurred: {e}")

if __name__ == "__main__":
    user_input = "Write a Python function to sort a list of strings by length."
    generate_ai_response(user_input)




