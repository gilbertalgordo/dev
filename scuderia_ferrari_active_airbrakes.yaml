#include <iostream>
#include <string>

// Simulating automotive CAN bus telemetry data
struct TelemetryFrame {
    float vehicleSpeed;      // km/h
    float brakePressure;     // 0.0 to 1.0 (Master Cylinder)
    float batterySOC;        // State of Charge %
    float mguKOutput;        // kW (+ is deployment, - is harvesting)
    bool  drsRequest;        // Driver input
};

class CockpitDisplayManager {
public:
    enum AeroIconState { AERO_OFF, AERO_LD_DRS, AERO_HD_AIRBRAKE };
    enum HybridIconState { HYBRID_NEUTRAL, HYBRID_HARVEST, HYBRID_BOOST };

    struct DisplayState {
        AeroIconState   aeroIcon;
        std::string     aeroColor; // HEX String for SVG injection
        HybridIconState hybridIcon;
        std::string     hybridColor;
    };

    DisplayState updateDisplay(const TelemetryFrame& data) {
        DisplayState currentOutput;

        // 1. Logic for Active Airbrake Icon
        if (data.vehicleSpeed > 180.0 && data.brakePressure > 0.75) {
            // High speed + heavy braking = Max Downforce (Airbrake)
            currentOutput.aeroIcon = AERO_HD_AIRBRAKE;
            currentOutput.aeroColor = "#EE1C23"; // Ferrari Red
        } 
        else if (data.drsRequest && data.brakePressure < 0.1) {
            currentOutput.aeroIcon = AERO_LD_DRS;
            currentOutput.aeroColor = "#FFFFFF"; // Active White
        } 
        else {
            currentOutput.aeroIcon = AERO_OFF;
            currentOutput.aeroColor = "#333333"; // Dimmed Gray
        }

        // 2. Logic for Hybrid ERS Icon
        if (data.mguKOutput < -20.0) {
            // Significant Energy Harvesting (MGU-K Regen)
            currentOutput.hybridIcon = HYBRID_HARVEST;
            currentOutput.hybridColor = "#00E676"; // Bright Green
        } 
        else if (data.mguKOutput > 50.0) {
            // System is Deploying Max Hybrid Power
            currentOutput.hybridIcon = HYBRID_BOOST;
            currentOutput.hybridColor = "#FF3D00"; // Deep Orange/Red
        } 
        else {
            currentOutput.hybridIcon = HYBRID_NEUTRAL;
            currentOutput.hybridColor = "#FFFFFF"; // Idle White
        }

        return currentOutput;
    }
};

int main() {
    CockpitDisplayManager displayECU;
    
    // Test Case: High Speed Braking into Turn 1 (Airbrake & Regen Active)
    TelemetryFrame heavyBraking = {315.5f, 0.92f, 65.0f, -110.0f, false};
    
    auto uiState = displayECU.updateDisplay(heavyBraking);

    std::cout << "--- COCKPIT ICON DRIVER REPORT ---" << std::endl;
    std::cout << "Airbrake Icon State: " << uiState.aeroIcon << " (Color: " << uiState.aeroColor << ")" << std::endl;
    std::cout << "Hybrid Icon State: " << uiState.hybridIcon << " (Color: " << uiState.hybridColor << ")" << std::endl;

    return 0;
}
