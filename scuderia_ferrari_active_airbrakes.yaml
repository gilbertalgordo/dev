#include <iostream>
#include <algorithm>

struct VehicleTelemetry {
    double velocity;       // m/s
    double brakePressure;  // 0.0 to 1.0
    double batteryLevel;   // %
    bool   isErsActive;    // Energy Recovery System
    double steeringAngle;  // degrees
};

class ScuderiaControlSystem {
public:
    // Aerodynamic Constants
    const double AIRBRAKE_THRESHOLD_VELOCITY = 45.0; // ~160 km/h
    const double DRAG_REDUCTION_ANGLE = 0.0;        // Flat for top speed
    const double MAX_DOWNFORCE_ANGLE = 45.0;        // High angle for braking/cornering

    struct ActuatorState {
        double wingAngle;
        double hybridDeployment; // kW
        std::string mode;
    };

    ActuatorState processDynamics(const VehicleTelemetry& data) {
        ActuatorState state;

        // 1. ACTIVE AIRBRAKE LOGIC
        // Deploy wing if braking hard at high speeds
        if (data.velocity > AIRBRAKE_THRESHOLD_VELOCITY && data.brakePressure > 0.6) {
            state.wingAngle = MAX_DOWNFORCE_ANGLE;
            state.mode = "ACTIVE_AIRBRAKE_DEPLOYED";
        } 
        // DRS (Drag Reduction System) Logic
        else if (data.velocity > 70.0 && data.brakePressure < 0.1) {
            state.wingAngle = DRAG_REDUCTION_ANGLE;
            state.mode = "DRS_ACTIVE";
        } 
        else {
            state.wingAngle = 15.0; // Neutral downforce
            state.mode = "BALANCED_AERO";
        }

        // 2. HYBRID POWER MANAGEMENT (ERS / KERS)
        // If braking, harvest energy (MGU-K)
        if (data.brakePressure > 0.2) {
            state.hybridDeployment = -50.0; // Negative indicates charging
        } 
        // If full throttle (hypothetical), deploy maximum battery power
        else if (data.velocity < 80.0 && data.batteryLevel > 10.0) {
            state.hybridDeployment = 120.0; // Power boost in kW
        } 
        else {
            state.hybridDeployment = 0.0;
        }

        return state;
    }
};

int main() {
    ScuderiaControlSystem f80_ECU;
    
    // Simulate high-speed heavy braking (Airbrake Scenario)
    VehicleTelemetry currentDrive = {85.0, 0.9, 85.0, true, 0.0};
    
    auto result = f80_ECU.processDynamics(currentDrive);

    std::cout << "--- SCUDERIA DYNAMICS REPORT ---" << std::endl;
    std::cout << "Mode: " << result.mode << std::endl;
    std::cout << "Wing Angle: " << result.wingAngle << " degrees" << std::endl;
    std::cout << "Hybrid Flow: " << result.hybridDeployment << " kW" << std::endl;

    return 0;
}



#include <iostream>
#include <vector>
#include <cmath>

// Simulation Constants
const double G = 9.81;
const double SPEED_OF_SOUND = 343.0; // m/s for Mach considerations

struct VehicleState {
    double velocity;       // m/s
    double longitudinalG;  // Acceleration/Deceleration
    double brakePressure;  // 0.0 to 1.0 (Master Cylinder)
    double batterySoC;     // State of Charge (0-100%)
    double pitchAngle;     // Degrees (detects nose-dive)
};

class ScuderiaActiveController {
private:
    // Predictive Load Demand (PLD) Parameters
    double targetDownforce; // Newtons
    double dragCoefficient;

public:
    struct ActuatorCommands {
        double wingAngle;      // 0 (LD) to 45 (HD)
        double gurneyFlap;     // Extension %
        double mguKRegen;      // kW (Negative for harvesting)
        std::string aeroMode;
    };

    ActuatorCommands calculateOptimalState(const VehicleState& state) {
        ActuatorCommands cmd;

        // 1. PREDICTIVE AIRBRAKE & WING LOGIC (HD vs LD)
        // Transitions from Low Drag (LD) to High Downforce (HD) 
        // based on Deceleration Rate and Pitch.
        if (state.brakePressure > 0.7 || state.longitudinalG < -1.5) {
            cmd.wingAngle = 45.0; // Max Airbrake position
            cmd.gurneyFlap = 100.0;
            cmd.aeroMode = "HIGH_DOWNFORCE_BRAKING";
        } 
        else if (state.velocity > 75.0 && state.longitudinalG >= 0) {
            // DRS logic: Minimal angle for straight-line speed
            cmd.wingAngle = 0.0; 
            cmd.gurneyFlap = 0.0;
            cmd.aeroMode = "LOW_DRAG_DRS";
        } 
        else {
            // Cornering balance: Map-based modulation
            cmd.wingAngle = 18.5; 
            cmd.aeroMode = "OPTIMAL_BALANCE";
        }

        // 2. HYBRID ENERGY RECOVERY (MGU-K)
        // High-speed braking allows for aggressive "Regen" harvesting.
        if (cmd.aeroMode == "HIGH_DOWNFORCE_BRAKING" && state.batterySoC < 95.0) {
            // Maximize MGU-K resistance to assist mechanical CCM-R Plus brakes
            cmd.mguKRegen = -150.0; // kW harvesting
        } else {
            cmd.mguKRegen = 0.0;
        }

        return cmd;
    }
};

int main() {
    ScuderiaActiveController ecu;
    VehicleState telemetry = {83.3, -2.1, 0.85, 45.0, -1.2}; // Braking from 300km/h

    auto output = ecu.calculateOptimalState(telemetry);

    std::cout << "--- ACTIVE DYNAMICS SYSTEM ---" << std::endl;
    std::cout << "Status: " << output.aeroMode << std::endl;
    std::cout << "Rear Wing Deployment: " << output.wingAngle << " deg" << std::endl;
    std::cout << "MGU-K Recovery: " << output.mguKRegen << " kW" << std::endl;

    return 0;
}



