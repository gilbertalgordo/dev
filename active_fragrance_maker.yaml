import numpy as np
from rdkit import Chem
from rdkit.Chem import AllChem

class FragranceMakerAI:
    def __init__(self):
        # Ingredient DB: {Name: [SMILES, NoteType, OdorValue, SustainabilityScore]}
        self.palette = {
            "Linalool": ["CC(=CCCC(C)(C=C)O)C", "Top", 0.85, 92],
            "Vanillin": ["O=Cc1ccc(O)c(OC)c1", "Base", 0.95, 88],
            "Benzyl Acetate": ["CC(=O)OCc1ccccc1", "Heart", 0.70, 85],
            "Ambroxan": ["CC12CCCC(C1CC3C2(CCCC3(C)C)O)(C)C", "Base", 0.98, 75]
        }
        self.pyramid_weights = {"Top": 0.20, "Heart": 0.30, "Base": 0.50}

    def analyze_molecular_synergy(self, smiles_a, smiles_b):
        """Calculates Tanimoto similarity to avoid clashing chemical structures."""
        ms = [Chem.MolFromSmiles(smiles_a), Chem.MolFromSmiles(smiles_b)]
        fps = [AllChem.GetMorganFingerprintAsBitVect(x, 2, nBits=1024) for x in ms]
        return AllChem.DataStructs.TanimotoSimilarity(fps[0], fps[1])

    def generate_active_formula(self, target_profile="Fresh"):
        """
        Generates a formula based on target profile and Kaizen efficiency.
        """
        formula = []
        for note, weight in self.pyramid_weights.items():
            # Filter palette for specific note type
            options = [k for k, v in self.palette.items() if v[1] == note]
            selected = np.random.choice(options)
            
            # Calculate ratio based on weight and Odor Value
            ratio = weight * self.palette[selected][2]
            formula.append({"ingredient": selected, "concentration": round(ratio, 4)})
            
        return self._optimize_kaizen(formula)

    def _optimize_kaizen(self, formula):
        """Normalize concentrations to 100% for production readiness."""
        total = sum(item['concentration'] for item in formula)
        for item in formula:
            item['concentration'] = round((item['concentration'] / total) * 100, 2)
        return formula

# Execution
ai_perfumer = FragranceMakerAI()
new_scent = ai_perfumer.generate_active_formula("Luxury")

print("--- AI GENERATED FRAGRANCE FORMULA ---")
for ing in new_scent:
    print(f"{ing['ingredient']}: {ing['concentration']}%")



import torch
import torch.nn as nn
from torch_geometric.nn import GATConv, global_mean_pool

class OdorMapGNN(nn.Module):
    """
    Advanced GNN to predict olfactive labels (e.g., Woody, Floral, Musky)
    from molecular graphs.
    """
    def __init__(self, num_node_features, num_classes=128):
        super(OdorMapGNN, self).__init__()
        # Graph Attention Layers for molecular feature extraction
        self.conv1 = GATConv(num_node_features, 64, heads=4)
        self.conv2 = GATConv(64 * 4, 128, heads=4)
        
        # Latent space embedding (The 'Odor Map')
        self.fc_latent = nn.Linear(128 * 4, 256)
        
        # Classification head for scent labels
        self.classifier = nn.Linear(256, num_classes)
        self.relu = nn.ReLU()

    def forward(self, data):
        x, edge_index, batch = data.x, data.edge_index, data.batch
        
        # 1. Message Passing
        x = self.relu(self.conv1(x, edge_index))
        x = self.relu(self.conv2(x, edge_index))
        
        # 2. Global Pooling (Molecular representation)
        x = global_mean_pool(x, batch)
        
        # 3. Latent Representation
        latent = self.relu(self.fc_latent(x))
        
        # 4. Scent Label Prediction
        out = torch.sigmoid(self.classifier(latent))
        return out, latent



