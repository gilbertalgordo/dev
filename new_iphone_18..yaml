    constexpr double WEIGHT_G = 189.0;
}

enum class HueColor { OFF, CYAN, PURPLE, MAGENTA, STEALTH_ALPHA };
enum class TrayStatus { EMPTY, SINGLE_SIM, DUAL_SIM, COMBO_SD_SIM };

// Subsystem 1: Optics Matrix (Front & Rear Systems)
struct CameraSystem {
    struct RearArray {
        const uint16_t primary_mp = 19;
        const uint16_t ultra_wide_mp = 19;
        const bool mapping_3d_sensor = true;
        const std::string assembly_type = "Circled Modules with Sleek Mesh Corner Exhausts";
        bool flashlight_active = false;
    } rear;

    struct FrontArray {
        const uint16_t cam1_mp = 19;
        const uint16_t cam2_mp = 19;
        bool left_hue_indicator_active = false;
    } front;
};

// Subsystem 2: Power and Computing Infrastructure
class InternalArchitecture {
public:
    struct MiniQuantumBattery {
        const double thickness_mm = 2.1; // Specially optimized for 6.8mm chassis
        const char* tech_type = "Solid-State Quantum Core";
        uint8_t charge_percent = 100;
    } battery;

    struct ProcessorCluster {
        const char* SoC_name = "Apple Micro Chip (A20 Active Architecture)";
        const char* pcb_substrate = "Advanced Red Multi-Layer Motherboard";
        const char* rf_circuitry = "Advanced Communication Circuitry (High-Bandwith Sub-THz)";
        const char* ble_module = "Advance BLE Chip v6.0 (Extended Range Multi-Node)";
    } silicon;
};

// Main System Controller for the iPhone 18 Active
class iPhone18Active {
private:
    CameraSystem optics;
    InternalArchitecture internals;
    
    // Chassis & Peripherals
    const std::string back_cover = "High-Tensile Carbon Fiber Weave";
    const std::string frame_siding = "Grade 5 Titanium Lid Siding";
    const std::string display_glass = "Advance Gorilla Glass (Diamond-Hardened)";
    
    HueColor front_hue_led = HueColor::OFF;
    HueColor rear_hue_led = HueColor::OFF;
    HueColor logo_hue_led = HueColor::OFF;
    
    TrayStatus structural_tray = TrayStatus::EMPTY;
    bool secret_button_tripped = false;

public:
    iPhone18Active() {
        // Physical interface assignment on manufacturing initialization
        structural_tray = TrayStatus::COMBO_SD_SIM; // Accepts Dual SIM + MicroSD Expandability
    }

    // Interactive Logic for Physical Inputs
    void pressSecretButton(bool long_press) {
        // Triggered via the hidden tactile pressure sensor located under the Apple Logo
        secret_button_tripped = true;
        if (long_press) {
            logo_hue_led = HueColor::STEALTH_ALPHA;
            front_hue_led = HueColor::MAGENTA;
            rear_hue_led = HueColor::PURPLE;
            std::cout << "[SYSTEM]: Secret hardware routine engaged. Secure vault active.\n";
        } else {
            logo_hue_led = HueColor::CYAN;
        }
    }

    void updateSystemDiagnostics() {
        std::cout << "--- iPhone 18 Active: Real-Size Engineering Layout ---\n";
        std::cout << "Chassis Dimensions: " << PhysicalSpecs::WIDTH_MM << "mm x " 
                  << PhysicalSpecs::HEIGHT_MM << "mm x " << PhysicalSpecs::DEPTH_MM << "mm\n";
        std::cout << "Exterior: " << back_cover << " with " << frame_siding << "\n";
        std::cout << "Front Panel: " << display_glass << " protecting Dual " 
                  << optics.front.cam1_mp << "MP modules.\n";
        std::cout << "Motherboard Spec: " << internals.silicon.pcb_substrate << "\n";
        std::cout << "Tray State: Dual Sim and SD Card Placement verified.\n";
        std::cout << "--------------------------------------------------------\n";
    }
};

int main() {
    auto activeDevice = std::make_unique<iPhone18Active>();
    activeDevice->updateSystemDiagnostics();
    activeDevice->pressSecretButton(true);
    return 0;
}



