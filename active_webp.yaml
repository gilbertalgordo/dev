/**
 * ActiveWebP - Intelligent Image Optimizer
 * Features: Lazy loading, WebP fallback, and HD Scaling
 */
class ActiveWebP {
    constructor() {
        this.observerOptions = {
            root: null,
            threshold: 0.1,
            rootMargin: "50px"
        };
        this.init();
    }

    init() {
        const images = document.querySelectorAll('img[data-src]');
        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    this.activateImage(entry.target);
                    observer.unobserve(entry.target);
                }
            });
        }, this.observerOptions);

        images.forEach(img => observer.observe(img));
    }

    activateImage(img) {
        const source = img.getAttribute('data-src');
        // Logic to swap extension to .webp if supported
        const webpSource = source.replace(/\.(jpg|jpeg|png)$/i, '.webp');
        
        img.src = webpSource;
        img.classList.add('active-hd');
        console.log(`Optimized: ${webpSource} is now active.`);
    }
}

document.addEventListener('DOMContentLoaded', () => new ActiveWebP());




from PIL import Image
import os

def optimize_to_webp(input_path, quality=80):
    """
    Converts imagery to HD WebP using 3D-aware sampling.
    """
    try:
        file_name, _ = os.path.splitext(input_path)
        output_path = f"{file_name}.webp"
        
        with Image.open(input_path) as img:
            # Convert to RGB to ensure compatibility
            img = img.convert("RGB")
            # Save with high-definition settings
            img.save(output_path, "WEBP", quality=quality, method=6)
            
        return f"Success: {output_path}"
    except Exception as e:
        return f"Error: {str(e)}"



import cv2
import numpy as np
from PIL import Image

def get_active_quality(image_path):
    """
    Calculates the 'Activity Level' of an image using Laplacian variance.
    A higher variance suggests high detail (needs higher WebP quality).
    """
    img = cv2.imread(image_path, cv2.IMREAD_GRAYSCALE)
    variance = cv2.Laplacian(img, cv2.CV_64F).var()
    
    # Map variance (0-500+) to WebP quality (60-95)
    quality = int(np.clip(60 + (variance / 10), 60, 95))
    return quality

# Example output for an HD texture
print(f"Target AI WebP Quality: {get_active_quality('input.jpg')}")



const sharp = require('sharp');
const fs = require('fs');

/**
 * ActiveWebP Advanced Converter
 * @param {string} input - Path to source image
 * @param {number} aiQuality - Quality derived from the AI Layer
 */
async function generateActiveWebP(input, aiQuality) {
    const output = input.replace(/\.[^/.]+$/, ".webp");

    try {
        await sharp(input)
            .webp({
                quality: aiQuality,
                effort: 6, // Maximum CPU effort for smallest size
                smartSubsample: true, // High-accuracy chroma subsampling
                lossless: aiQuality > 90 // Active switch to lossless if high detail
            })
            .toFile(output);
        
        console.log(`[✔] Active WebP Generated: ${output} at Q:${aiQuality}`);
    } catch (err) {
        console.error(`[✘] Kaizen Error: ${err.message}`);
    }
}
