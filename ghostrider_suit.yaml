import bpy

def create_ghost_rider_material():
    # Create a new material
    mat = bpy.data.materials.new(name="GhostRider_Iridescent_Carbon")
    mat.use_nodes = True
    nodes = mat.node_tree.nodes
    links = mat.node_tree.links
    
    # Clear default nodes
    nodes.clear()

    # 1. Base Geometry / Output
    node_out = nodes.new(type='ShaderNodeOutputMaterial')
    node_principled = nodes.new(type='ShaderNodeBsdfPrincipled')
    node_principled.inputs['Roughness'].default_value = 0.2
    
    # 2. Iridescence Logic (Fresnel/Layer Weight)
    # This creates the purple/violet/blue shift based on viewing angle
    node_layer_weight = nodes.new(type='ShaderNodeLayerWeight')
    node_ramp = nodes.new(type='ShaderNodeValToRGB')
    node_ramp.color_ramp.elements[0].color = (0.01, 0.0, 0.02, 1) # Deep Black/Purple
    node_ramp.color_ramp.elements.new(0.5)
    node_ramp.color_ramp.elements[1].color = (0.1, 0.0, 0.3, 1)   # Violet
    node_ramp.color_ramp.elements.new(0.8)
    node_ramp.color_ramp.elements[2].color = (0.0, 0.1, 0.4, 1)   # Deep Blue
    
    # 3. Carbon Fiber Texture (Procedural)
    # Uses a wave texture to simulate the "Vertud" / Carbon weave
    node_tex_coord = nodes.new(type='ShaderNodeTexCoord')
    node_wave = nodes.new(type='ShaderNodeTexWave')
    node_wave.wave_type = 'RINGS'
    node_wave.inputs['Scale'].default_value = 50.0
    node_wave.inputs['Distortion'].default_value = 2.0
    
    # 4. Mix Carbon and Iridescence
    node_mix = nodes.new(type='ShaderNodeMixRGB')
    node_mix.blend_type = 'MULTIPLY'
    
    # Linking
    links.new(node_layer_weight.outputs['Facing'], node_ramp.inputs['Fac'])
    links.new(node_ramp.outputs['Color'], node_mix.inputs[1])
    links.new(node_wave.outputs['Color'], node_mix.inputs[2])
    links.new(node_mix.outputs['Color'], node_principled.inputs['Base Color'])
    links.new(node_principled.outputs['BSDF'], node_out.inputs['Surface'])

    return mat

# Apply to active object
if bpy.context.active_object:
    material = create_ghost_rider_material()
    bpy.context.active_object.data.materials.append(material)



// Ghost Rider "Vertud" Iridescent Shader
precision highp float;

uniform float uTime;
uniform vec3 uViewPos;
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vWorldPos;

// Function to generate the Carbon Fiber "Vertud" weave
float carbonWeave(vec2 uv) {
    vec2 grid = fract(uv * 100.0); // High density weave
    float check = step(0.5, grid.x) * step(0.5, grid.y);
    float lines = sin(uv.x * 500.0) * 0.5 + 0.5;
    return mix(0.8, 1.0, check * lines);
}

void main() {
    // 1. Calculate View Direction for Iridescence
    vec3 viewDir = normalize(uViewPos - vWorldPos);
    float fresnel = pow(1.0 - dot(vNormal, viewDir), 3.0);

    // 2. Multi-tone Iridescent Palette
    vec3 black      = vec3(0.02, 0.02, 0.05);
    vec3 deepPurple = vec3(0.15, 0.0, 0.3);
    vec3 violet     = vec3(0.4, 0.1, 0.6);
    vec3 neonBlue   = vec3(0.0, 0.4, 0.8);
    vec3 metalGray  = vec3(0.3, 0.3, 0.35);

    // 3. Shift colors based on viewing angle (Fresnel)
    vec3 iridColor = mix(black, deepPurple, fresnel);
    iridColor = mix(iridColor, violet, pow(fresnel, 2.0));
    iridColor = mix(iridColor, neonBlue, pow(fresnel, 4.0));
    
    // 4. Add the Carbon Fiber Detail
    float weave = carbonWeave(vUv);
    vec3 finalColor = iridColor * weave;

    // 5. Add "Spectral" highlight (Grayish/Silver rim)
    float rim = pow(fresnel, 8.0);
    finalColor += metalGray * rim;

    gl_FragColor = vec4(finalColor, 1.0);
}
