<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Corporation | Launching Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-center items-center p-6">

    <!-- Header Section -->
    <header class="mb-12 text-center">
        <h1 class="text-5xl font-extrabold tracking-tighter mb-2 italic">
            RACE<span class="text-blue-500">CORP</span>
        </h1>
        <p class="text-gray-400 uppercase tracking-widest text-sm">Engineering the Future of Velocity</p>
    </header>

    <!-- Main Card -->
    <main class="glass max-w-2xl w-full rounded-3xl p-8 md:p-12 text-center shadow-2xl">
        <h2 class="text-3xl font-semibold mb-6">Under Active Development</h2>
        <p class="text-gray-300 mb-8 leading-relaxed">
            We are currently synchronizing our systems for the official launch of the Race Corporation digital ecosystem. Something revolutionary is coming.
        </p>

        <!-- Countdown Timer -->
        <div class="grid grid-cols-4 gap-4 mb-10">
            <div class="flex flex-col">
                <span id="days" class="text-4xl font-bold">00</span>
                <span class="text-xs text-gray-500 uppercase">Days</span>
            </div>
            <div class="flex flex-col">
                <span id="hours" class="text-4xl font-bold">00</span>
                <span class="text-xs text-gray-500 uppercase">Hours</span>
            </div>
            <div class="flex flex-col">
                <span id="minutes" class="text-4xl font-bold">00</span>
                <span class="text-xs text-gray-500 uppercase">Mins</span>
            </div>
            <div class="flex flex-col">
                <span id="seconds" class="text-4xl font-bold text-blue-500">00</span>
                <span class="text-xs text-gray-500 uppercase">Secs</span>
            </div>
        </div>

        <!-- Notify Form -->
        <form class="flex flex-col md:flex-row gap-4">
            <input type="email" placeholder="Enter your email for early access" 
                   class="flex-1 bg-black border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition transform hover:scale-105">
                NOTIFY ME
            </button>
        </form>
    </main>

    <!-- Footer -->
    <footer class="mt-16 text-gray-600 text-xs">
        <p>&copy; 2026 Race Corporation. All rights reserved.</p>
        <p class="mt-2">racecorporation.com | racecorp.com</p>
    </footer>

    <script>
        // Simple countdown logic (30 days from now)
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 30);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceCorp | Active Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: -1; }
        .hud-glass {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }
        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 255, 255, 0.1);
            position: absolute; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="text-cyan-500 uppercase tracking-tighter">

    <div id="canvas-container"></div>

    <!-- MAIN HUD INTERFACE -->
    <div class="relative min-h-screen p-8 flex flex-col justify-between">
        
        <!-- Top Bar: System Status -->
        <header class="flex justify-between items-start">
            <div class="hud-glass p-4 rounded-br-3xl border-l-4 border-cyan-400">
                <h1 class="text-4xl font-black italic tracking-widest">RACE CORP</h1>
                <p class="text-xs opacity-70">Project: Genesis | Build v1.0.4</p>
            </div>
            <div class="hud-glass p-4 text-right">
                <p id="status-text" class="text-sm font-mono text-cyan-300">SYSTEMS: ONLINE</p>
                <p id="clock" class="text-2xl font-bold">00:00:00</p>
            </div>
        </header>

        <!-- Center: Core Mission Control -->
        <main class="flex flex-col items-center">
            <div class="hud-glass p-12 rounded-full border-t-2 border-cyan-400 text-center relative overflow-hidden">
                <div class="scanline"></div>
                <h2 class="text-2xl mb-2 opacity-80">Development Phase</h2>
                <div class="text-7xl font-black mb-6">ACTIVE</div>
                
                <div class="grid grid-cols-3 gap-6 text-xs font-mono mb-8">
                    <div>
                        <p class="text-gray-500">ENGINE</p>
                        <p class="text-cyan-300">SYNCHRONIZED</p>
                    </div>
                    <div>
                        <p class="text-gray-500">NETWORK</p>
                        <p class="text-cyan-300">ENCRYPTED</p>
                    </div>
                    <div>
                        <p class="text-gray-500">TELEMETRY</p>
                        <p class="text-cyan-300">LIVE</p>
                    </div>
                </div>

                <button class="bg-cyan-500 hover:bg-white text-black font-black py-4 px-12 transition-all duration-300 shadow-[0_0_15px_rgba(0,255,255,0.5)]">
                    ENTER ECOSYSTEM
                </button>
            </div>
        </main>

        <!-- Bottom Bar: Data Feeds -->
        <footer class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="hud-glass p-4 text-xs font-mono">
                <p class="text-cyan-300 border-b border-cyan-800 mb-2">DOMAIN REGISTRY</p>
                <p>primary: racecorporation.com</p>
                <p>alias: racecorp.com</p>
            </div>
            <div class="hud-glass p-4 col-span-2 flex flex-col justify-center">
                <div class="w-full bg-gray-900 h-1 mt-1">
                    <div class="bg-cyan-400 h-1" style="width: 78%"></div>
                </div>
                <p class="text-[10px] mt-2 opacity-60">DEPLOYMENT PROGRESS: 78% TO STABLE RELEASE</p>
            </div>
            <div class="hud-glass p-4 text-right flex flex-col justify-end">
                <p class="text-[10px] text-gray-500">&copy; 2026 RACE CORPORATION</p>
            </div>
        </footer>
    </div>

    <script>
        // --- THREE.JS BACKGROUND ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Particle Field
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 5000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 2 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        camera.position.z = 500;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.001;
            points.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }
        animate();

        // UI Updates
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>



