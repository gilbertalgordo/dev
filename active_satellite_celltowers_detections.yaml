import requests
import pandas as pd

def get_cell_towers(lat, lon, radius=5000, api_key="YOUR_API_KEY"):
    """
    Scans for cellular towers within a specified radius (meters).
    """
    url = f"https://opencellid.org/cell/getInArea?key={api_key}&lat={lat}&lon={lon}&radius={radius}&format=json"
    
    response = requests.get(url)
    if response.status_code == 200:
        data = response.json()
        df = pd.DataFrame(data['cells'])
        return df
    else:
        print("Error fetching data.")
        return None

