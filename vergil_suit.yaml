// HUD Instance Logic (Simplified)
function updateHUD(concentrationLevel) {
    const hudScale = Math.min(concentrationLevel / 100, 1.0);
    hologramMesh.scale.set(hudScale, hudScale, hudScale);
    hologramMaterial.opacity = 0.5 + (0.5 * Math.sin(Date.now() * 0.005));
}
