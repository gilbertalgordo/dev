<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <rect width="40" height="40" fill="#0a0a0a"/>
  <path d="M0 0L20 20M20 0L40 20M0 20L20 40M20 20L40 40" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M10 0L30 20M30 0L50 20M-10 20L10 40M10 20L30 40" stroke="#000" stroke-width="1" opacity="0.5"/>
</svg>



.strange-silhouette {
  width: 500px;
  height: 700px;
  /* The Silhouette Shape (using a mask) */
  mask-image: url('doctor_strange_outline.png');
  mask-size: contain;
  mask-repeat: no-repeat;
  
  /* Iridescent Indigo/Violet/Blue/Red/Vertud Gradient */
  background: linear-gradient(
    135deg, 
    #0d0d0d 0%,    /* Black */
    #4b0082 15%,   /* Indigo */
    #8a2be2 30%,   /* Violet */
    #0000ff 45%,   /* Blue */
    #4deeba 60%,   /* Vertud/Seafoam */
    #ff0000 75%,   /* Red */
    #1a1a1a 100%   /* Carbon base */
  );
  
  /* Animation for the "Iridescent" shimmer */
  background-size: 400% 400%;
  animation: iridescentShift 8s ease infinite;
  
  /* Carbon Fiber Texture Overlay */
  position: relative;
}

.strange-silhouette::after {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('carbon_fiber_pattern.svg');
  opacity: 0.3; /* Subtle texture overlay */
  mix-blend-mode: overlay;
}

@keyframes iridescentShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}



// Vertex Shader (Simplified)
varying vec3 vNormal;
varying vec3 vViewPosition;
varying vec2 vUv;

void main() {
    vUv = uv;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    vNormal = normalize(normalMatrix * normal);
    vViewPosition = -mvPosition.xyz;
    gl_Position = projectionMatrix * mvPosition;
}

// Fragment Shader (The Advanced Iridescent Logic)
uniform float uTime;
varying vec3 vNormal;
varying vec3 vViewPosition;
varying vec2 vUv;

void main() {
    vec3 viewDir = normalize(vViewPosition);
    float fresnel = pow(1.0 - dot(viewDir, vNormal), 3.0);

    // Carbon Fiber Pattern Logic (Procedural)
    float carbon = step(0.5, fract(vUv.x * 100.0)) * step(0.5, fract(vUv.y * 100.0));
    vec3 carbonBase = mix(vec3(0.02), vec3(0.1), carbon);

    // Iridescent Color Palette
    vec3 indigo = vec3(0.29, 0.0, 0.51);
    vec3 violet = vec3(0.58, 0.0, 0.83);
    vec3 vertud = vec3(0.3, 0.93, 0.73); // Seafoam/Green
    vec3 deepRed = vec3(0.5, 0.0, 0.0);

    // Color Shifting based on time and view angle
    vec3 iridescentColor = mix(indigo, vertud, sin(uTime + fresnel * 5.0));
    iridescentColor = mix(iridescentColor, deepRed, fresnel);

    // Final Composite: Silhouette (Black) with Iridescent Edges + Carbon Texture
    vec3 finalColor = mix(carbonBase, iridescentColor, fresnel * 0.8);
    
    gl_FragColor = vec4(finalColor, 1.0);
}



.mystic-hud {
  position: absolute;
  border-radius: 50%;
  border: 2px double rgba(77, 238, 186, 0.3); /* Vertud Glow */
  box-shadow: 0 0 20px rgba(138, 43, 226, 0.5); /* Violet Glow */
  animation: rotateHUD 20s linear infinite;
  background-image: repeating-conic-gradient(
    from 0deg,
    transparent 0deg 10deg,
    rgba(255, 0, 0, 0.1) 10deg 20deg
  );
}

@keyframes rotateHUD {
  from { transform: rotate(0deg) scale(1.1); }
  to { transform: rotate(360deg) scale(1.1); }
}
