#include <iostream>

struct ThermalState {
    float engineTemp;
    float waterInjectionRate;
    bool activeSentinelAlert;
};

void optimizeCooling(ThermalState &f76) {
    // Proactive monitoring for maximum efficiency
    if (f76.engineTemp > 105.0) {
        f76.waterInjectionRate = 1.0; // Max flow for H2O V-Power cooling
    } else if (f76.engineTemp > 90.0) {
        f76.waterInjectionRate = 0.5;
    } else {
        f76.waterInjectionRate = 0.1;
    }
}



