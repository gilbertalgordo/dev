class F76PropulsionSystem:
    def __init__(self):
        self.ice_output_kw = 441  # Approx 600hp
        self.ers_output_kw = 441  # 50/50 Power Split
        self.quantum_battery_soc = 1.0  # State of Charge
        self.thermal_efficiency = 0.52

    def calculate_power_distribution(self, throttle_input):
        """
        Calculates the Kaizen-optimized power split for the F76.
        """
        total_request = throttle_input * (self.ice_output_kw + self.ers_output_kw)
        
        # 50/50 split logic under high-load instances
        ice_deployment = min(total_request * 0.5, self.ice_output_kw)
        ers_deployment = min(total_request * 0.5, self.ers_output_kw)
        
        return {
            "ICE_kW": round(ice_deployment, 2),
            "ERS_kW": round(ers_deployment, 2),
            "Total_Power_kW": round(ice_deployment + ers_deployment, 2)
        }

    def quantum_discharge_logic(self, kers_active):
        # Super-absorption logic: instant peak torque availability
        if kers_active and self.quantum_battery_soc > 0.1:
            return "MAX_QUANTUM_BOOST_ACTIVE"
        return "STANDARD_RECOVERY_MODE"



