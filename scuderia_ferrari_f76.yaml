import os

def render_f76_icons(library, output_dir="f76_icons", generate_grid=True):
    """
    Renders F76 SVG icons. Generates individual files and an optional grid.
    Characteristics: Archangel Efficiency, Active Sentinel Compliance.
    """
    if not os.path.exists(output_dir):
        os.makedirs(output_dir)
        print(f"[*] Created output directory: {output_dir}")

    # Standard SVG header/footer
    svg_head = '<svg xmlns="http://www.w3.org/2000/svg" version="1.1"'
    svg_foot = '</svg>'
    
    # 1. Generate individual icons
    generated_files = []
    for icon_name, data in library.items():
        filename = f"{output_dir}/{icon_name}.svg"
        full_svg = f"{svg_head} viewBox='{data['viewBox']}'>{data['path']}{svg_foot}"
        
        with open(filename, 'w') as f:
            f.write(full_svg)
        generated_files.append(filename)

    print(f"[*] Generated {len(generated_files)} individual icon files.")

    # 2. Generate Kaizen Optimization Grid (2 rows x 4 columns)
    if generate_grid:
        grid_filename = f"{output_dir}/f76_icon_grid.svg"
        # 16:9 Aspect Ratio Grid (approx 1600x900)
        grid_head = f'<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="100%" height="100%" fill="#E0E0E0"/>' # Grey Pattern Background
        grid_body = ""
        
        icon_keys = list(library.keys())
        for i in range(8):
            # Calculate grid position (2 rows, 4 columns)
            row = i // 4
            col = i % 4
            x_offset = 150 + (col * 350)  # Horizontal Spacing
            y_offset = 100 + (row * 400)  # Vertical Spacing
            
            icon_data = library[icon_keys[i]]
            # Nest the icon using the <g> tag with transform
            grid_body += f'<g transform="translate({x_offset}, {y_offset}) scale(3)">' # Scale icons up for the grid
            grid_body += icon_data['path']
            grid_body += f'<text x="50" y="110" fill="#333" font-size="12" text-anchor="middle">{icon_data["description"]}</text>'
            grid_body += '</g>'

        full_grid_svg = f"{grid_head}{grid_body}{svg_foot}"
        with open(grid_filename, 'w') as f:
            f.write(full_grid_svg)
        print(f"[*] Generated F76 Icon Grid: {grid_filename}")

# --- Execute Deployment ---
# Characteristics: Precision deployment following Active Sentinel protocols.
render_f76_icons(F76_ICON_LIBRARY)
