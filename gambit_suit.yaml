/* Iridescent Gradient for Armor Plates */
.gambit-armor-iridescence {
  background: linear-gradient(135deg, 
    #4b0082 0%,   /* Indigo */
    #800000 25%,  /* Maroon */
    #ee82ee 50%,  /* Violet */
    #458b74 75%,  /* Vertud */
    #000000 100%  /* Black */
  );
  background-size: 400% 400%;
  animation: iridescentShift 8s ease infinite;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
}

@keyframes iridescentShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}



// GLSL Advanced Iridescence Shader v4.0 (Kaizen Optimized)
// Integrated with Indigo-Maroon-Violet-Vertud Spectral Shift

#version 450 core

layout(location = 0) in vec3 vPosition;
layout(location = 1) in vec3 vNormal;
layout(location = 2) in vec2 vTexCoord;

uniform vec3 viewPos;
uniform float time;

out vec4 FragColor;

struct SuitMaterial {
    vec3 indigo;
    vec3 maroon;
    vec3 violet;
    vec3 vertud; // Deep Teal/Green
    vec3 black;
};

void main() {
    SuitMaterial suit;
    suit.indigo = vec3(0.29, 0.0, 0.51);
    suit.maroon = vec3(0.5, 0.0, 0.0);
    suit.violet = vec3(0.58, 0.0, 0.83);
    suit.vertud = vec3(0.0, 0.5, 0.4); // Scientific teal-shift
    
    // Calculate View-Dependent Vector
    vec3 viewDir = normalize(viewPos - vPosition);
    float cosTheta = dot(normalize(vNormal), viewDir);
    
    // Thin-Film Interference Math (Iridescence)
    // Formula: OPD = 2 * n * d * cos(theta)
    float iridShift = pow(1.0 - cosTheta, 2.5) + sin(time * 0.5);
    
    // Morphing between the specified palette based on viewing angle
    vec3 baseColor = mix(suit.black, suit.indigo, iridShift);
    vec3 midColor = mix(suit.maroon, suit.violet, iridShift * 0.8);
    vec3 accentColor = mix(midColor, suit.vertud, clamp(cosTheta, 0.0, 1.0));

    vec3 finalIridescence = mix(baseColor, accentColor, 0.6);
    
    // HUD Energy Overlay (Kinetic Charge)
    float kineticPulse = step(0.98, sin(time * 10.0 + vPosition.y * 5.0));
    vec3 kineticColor = vec3(1.0, 0.0, 0.8) * kineticPulse;

    FragColor = vec4(finalIridescence + kineticColor, 1.0);
}




