import time
import json
from dataclasses import dataclass, field
from typing import Dict, Any, List
from google import genai
from google.genai import types

@dataclass
class ArchangelProtocol:
    name: str
    virtue: str
    config_overrides: Dict[str, Any]
    active: bool = False

class GeminiAdvancedHUD:
    """
    Advanced Control HUD for Gemini 3 Flash Instances.
    Optimized for superfast Kaizen management & 7 Archangels logic.
    """
    def __init__(self, api_key: str):
        self.client = genai.Client(api_key=api_key)
        self.model_id = "gemini-3-flash"
        self.kaizen_iteration = 0
        
        # Archangel Characteristic Mapping
        self.protocols = {
            "MICHAEL": ArchangelProtocol("Michael", "Protection", {"safety_threshold": "BLOCK_NONE"}),
            "RAPHAEL": ArchangelProtocol("Raphael", "Healing/Precision", {"temperature": 0.2, "top_p": 0.8}),
            "JOPHIEL": ArchangelProtocol("Jophiel", "Beauty/Creativity", {"rendering_mode": "3D_HD", "temperature": 0.9}),
            "URIEL": ArchangelProtocol("Uriel", "Wisdom/Logic", {"thinking_config": {"include_thoughts": True}})
        }
        
        self.active_protocol = self.protocols["URIEL"]
        self.performance_log = []

    def switch_protocol(self, archangel_key: str):
        """Dynamic hot-swapping of AI personality & control logic."""
        if archangel_key in self.protocols:
            self.active_protocol = self.protocols[archangel_key]
            self.display_hud(f"Protocol Switched: {self.active_protocol.name}")

    def execute_kaizen_cycle(self, prompt: str):
        """Superfast iterative loop to refine response accuracy."""
        self.kaizen_iteration += 1
        start_time = time.perf_counter()
        
        # Build Config based on Active Archangel Protocol
        config = types.GenerateContentConfig(
            temperature=self.active_protocol.config_overrides.get("temperature", 0.7),
            top_p=self.active_protocol.config_overrides.get("top_p", 0.95),
            thinking_config=self.active_protocol.config_overrides.get("thinking_config", None)
        )

        response = self.client.models.generate_content(
            model=self.model_id,
            contents=prompt,
            config=config
        )

        latency = (time.perf_counter() - start_time) * 1000
        self.performance_log.append(latency)
        
        self.display_hud(f"Cycle {self.kaizen_iteration} Complete", latency, response)
        return response.text

    def display_hud(self, event: str, latency: float = 0.0, response: Any = None):
        """HD Console HUD reflecting current AI state."""
        print(f"\n{'='*60}")
        print(f" ❖ GEMINI ACTIVE HUD | INSTANCE: {self.model_id} ❖")
        print(f"{'='*60}")
        print(f" ▶ EVENT: {event}")
        print(f" ▶ ARCHANGEL: {self.active_protocol.name} ({self.active_protocol.virtue})")
        print(f" ▶ LATENCY: {latency:.2f}ms")
        if response and hasattr(response, 'usage_metadata'):
            print(f" ▶ TOKENS: {response.usage_metadata.total_token_count}")
        print(f"{'='*60}\n")

