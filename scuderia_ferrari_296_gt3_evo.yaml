// --- Active Icon Component (React/JSX Example) ---

import React from 'react';

// Simplified SVG Asset representation of the 296 GT3 Evo Side Profile
import { ReactComponent as Ferrari296GT3Profile } from './assets/296-gt3-profile.svg';
// Custom Active Aero Indicators
import { ReactComponent as ActiveAeroVortex } from './assets/active-aero.svg';

const ActiveFerrariIcon = ({ state }) => {
    // Base Giallo Modena Style
    const baseStyle = {
        fill: GT3_EVO_ICON_CONFIG.primaryColor.iconShade,
        transition: 'all 0.2s ease-in-out'
    };

    // Apply Active States dynamically
    const getActiveStyles = (currentState) => {
        let activeStyles = {};
        let activeAeroVisible = false;

        if (currentState === 'aeroActive') {
            activeStyles = {
                filter: GT3_EVO_ICON_CONFIG.states.aeroActive.filter,
                transform: 'translateY(-2px)' // Slight lift indication
            };
            activeAeroVisible = true;
        }

        if (currentState === 'kaizen') {
            activeStyles = {
                animation: GT3_EVO_ICON_CONFIG.states.kaizenLoop.animation
            };
        }

        return { activeStyles, activeAeroVisible };
    };

    const { activeStyles, activeAeroVisible } = getActiveStyles(state);

    return (
        <div className="active-ferrari-icon-container" style={{ position: 'relative', display: 'inline-block' }}>
            <Ferrari296GT3Profile 
                className="ferrari-icon-base" 
                style={{ ...baseStyle, ...activeStyles }} 
            />
            
            {activeAeroVisible && (
                <ActiveAeroVortex 
                    className="active-aero-indicator" 
                    style={{
                        position: 'absolute',
                        bottom: '-5px',
                        left: '50%',
                        transform: 'translateX(-50%)',
                        fill: GT3_EVO_ICON_CONFIG.activeColor.hex,
                        width: '40%',
                        opacity: 0.8
                    }}
                />
            )}
        </div>
    );
};

export default ActiveFerrariIcon;
