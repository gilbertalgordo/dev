import pywikibot
from pywikibot import pagegenerators
import re

# Initialize connection
site = pywikibot.Site('en', 'wikipedia')

def active_sentinel():
    """
    Monitors live edits and filters based on bot/AI heuristics.
    Configured for high-speed Kaizen-style performance.
    """
    # Stream recent changes
    gen = site.recentchanges(
        showBot=False,  # Server-side filter for registered bots
        topOnly=True    # Only track the latest revision
    )

    for edit in gen:
        # 1. Heuristic AI/Bot detection based on summary/user behavior
        summary = edit.get('comment', '').lower()
        if re.search(r'(ai|gpt|llm|automated)', summary):
            print(f"[!] AI/Automated Activity Detected: {edit['title']} by {edit['user']}")
            # Implement your removal/flagging logic here
            continue
            
        # 2. Proceed with human-verified edits only
        print(f"[+] Verified Human Edit: {edit['title']} | User: {edit['user']}")

if __name__ == "__main__":
    active_sentinel()



