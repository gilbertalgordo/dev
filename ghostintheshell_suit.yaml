struct MajorSuit_Vertud {
    float3 BaseColor = float3(0.97, 0.97, 1.0); // Iridescent White
    float Pearlescence = 0.85;                  // Color shift intensity
    float Compression = 0.95;                  // DriFit material tightness
    
    struct RGB_Module {
        bool IsActive = true;
        float3 EmissionColor = float3(0.0, 1.0, 0.8); // Cyber-Cyan
        float PulseRate = 0.5;                       // Hz
    } SignalLights;

    struct StealthModule {
        bool ThermopticReady = true;
        float RefractionIndex = 1.33; // Bends light for invisibility
        float TransitionSpeed = 0.2;  // Seconds to full cloak
    } Invisibility;
};



// Calculate the Iridescent White effect
float3 CalculateIridescence(float3 Normal, float3 ViewDir, float3 BaseWhite) {
    float Fresnel = pow(1.0 - saturate(dot(Normal, ViewDir)), 3.0);
    float3 IridShift = float3(0.1, 0.05, 0.3); // Subtle violet-blue shift
    return lerp(BaseWhite, BaseWhite + IridShift, Fresnel);
}

// Thermoptic Invisibility Logic
float4 RenderInvisibility(float2 ScreenUV, float Refraction) {
    if (StealthActive) {
        // Distorts the background pixels to simulate transparency
        float2 DistortedUV = ScreenUV + (NormalMap.xy * Refraction);
        return SceneColorTexture.Sample(DistortedUV);
    }
    return SuitTexture;
}



