import pandas as pd
import numpy as np
import time
import requests
from ta.volatility import BollingerBands
from ta.momentum import RSIIndicator

class TASEActiveAI:
    def __init__(self, api_key, index_symbol="TA35.TA"):
        self.api_key = api_key
        self.symbol = index_symbol
        self.base_url = f"https://eodhd.com/api/real-time/{self.symbol}"
        self.history = pd.DataFrame()

    def fetch_live_data(self):
        """Fetch current TASE index data."""
        params = {"api_token": self.api_key, "fmt": "json"}
        response = requests.get(self.base_url, params=params)
        if response.status_code == 200:
            data = response.json()
            # Standardize for Kaizen processing
            new_row = {
                'timestamp': pd.to_datetime(data['timestamp'], unit='s'),
                'price': data['close'],
                'volume': data['volume']
            }
            return new_row
        return None

    def analyze_signals(self, df):
        """Technical Analysis Layer."""
        if len(df) < 20: return "WAITING"
        
        # Initialize Indicators
        rsi = RSIIndicator(close=df["price"], window=14)
        bb = BollingerBands(close=df["price"], window=20, window_dev=2)
        
        current_rsi = rsi.rsi().iloc[-1]
        price = df["price"].iloc[-1]
        upper_band = bb.bollinger_hband().iloc[-1]
        lower_band = bb.bollinger_lband().iloc[-1]

        # Active Logic: Mean Reversion + Momentum
        if current_rsi < 30 and price <= lower_band:
            return "SIGNAL_BUY"
        elif current_rsi > 70 or price >= upper_band:
            return "SIGNAL_SELL"
        return "NEUTRAL"

    def run_active_loop(self):
        """The Sentinel Loop."""
        print(f"--- TASE Active AI: Monitoring {self.symbol} ---")
        try:
            while True:
                data = self.fetch_live_data()
                if data:
                    self.history = pd.concat([self.history, pd.DataFrame([data])], ignore_index=True)
                    # Keep memory efficient (Kaizen pruning)
                    if len(self.history) > 100: self.history = self.history.iloc[-100:]
                    
                    signal = self.analyze_signals(self.history)
                    print(f"[{data['timestamp']}] Price: {data['price']} | Signal: {signal}")
                
                # TASE updates frequently, but we throttle to prevent API lockout
                time.sleep(15) 
        except KeyboardInterrupt:
            print("System Shutdown.")

