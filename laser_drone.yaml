        """
        Calculates the probability of detection based on the drone's 
        3D orientation (roll, pitch, yaw) relative to a radar source.
        """
        # Vector from drone to radar
        rel_vector = radar_loc - drone_pose['pos']
        dist = np.linalg.norm(rel_vector)
        
        # Simplified RCS Model: Reflection is lowest at the nose (0°)
        # and highest at the broadside (90°).
