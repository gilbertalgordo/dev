/**
 * @brief Scuderia Ferrari SF-26 ECU Core
 * Implements 2026 regulations: Active Aero (Z/X Modes) & Manual Override.
 */
class SF26_VCU {
private:
    // --- SF-26 Power Unit (067/6) Constants ---
    const float MAX_MGU_K_POWER_KW = 350.0f; // 470hp (Up from 120kW)
    const float MAX_ICE_POWER_KW   = 400.0f; // 1.6L V6 Turbo (Sustainably fueled)
    const float ENERGY_RECOVERY_LAP = 8.5f;  // MJ (Increased recovery)
    
    // --- Active Aero Parameters ---
    enum AeroMode { CORNER_Z_MODE, STRAIGHT_X_MODE };
    AeroMode current_aero = CORNER_Z_MODE;

    // --- State Variables ---
    float battery_soc_mj = 4.0f; // Max usable delta per lap
    bool manual_override_available = false;

public:
    /**
     * @brief 2026 "Manual Override Mode" (MOM) Logic
     * Provides 350kW boost up to 337 km/h if within 1s of car ahead.
     */
    float get_mgu_k_deployment(float velocity_ms, bool drs_gap_met) {
        float velocity_kmh = velocity_ms * 3.6f;
        
        // Manual Override (MOM) logic for chasing cars
        if (drs_gap_met && battery_soc_mj > 0.1f) {
            if (velocity_kmh <= 337.0f) return MAX_MGU_K_POWER_KW;
            // Power tapers to zero at 355 km/h
            if (velocity_kmh < 355.0f) {
                return MAX_MGU_K_POWER_KW * (1.0f - (velocity_kmh - 337.0f) / 18.0f);
            }
        }
        
        // Standard Deployment: Full power up to 290 km/h, then tapers
        if (velocity_kmh <= 290.0f) return MAX_MGU_K_POWER_KW;
        return std::max(0.0f, MAX_MGU_K_POWER_KW * (1.0f - (velocity_kmh - 290.0f) / 55.0f));
    }

    /**
     * @brief Active Aerodynamics Switch
     * Operates front and rear wings like "Venetian blinds."
     */
    void update_aero_state(float velocity_ms, float lat_g, float steering_angle) {
        // X-Mode (Low Drag) requirements: High speed, low lateral load
        if (velocity_ms > 75.0f && std::abs(lat_g) < 0.6f && std::abs(steering_angle) < 5.0f) {
            current_aero = STRAIGHT_X_MODE;
        } else {
            // Instant return to Z-Mode (High Downforce) for braking/turning stability
            current_aero = CORNER_Z_MODE;
        }
    }

    void log_status(float v_ms, bool gap) {
        float p_elec = get_mgu_k_deployment(v_ms, gap);
        std::cout << "[SF-26] Speed: " << (int)(v_ms * 3.6f) << " km/h | ";
        std::cout << "Aero: " << (current_aero == STRAIGHT_X_MODE ? "X-MODE" : "Z-MODE") << " | ";
        std::cout << "MGU-K: " << p_elec << " kW" << std::endl;
    }
};

int main() {
    SF26_VCU ferrari_ecu;

    // Simulation 1: Full acceleration on the pit straight at Monza
    std::cout << "--- Straight Line Acceleration ---" << std::endl;
    for (float speed = 60.0f; speed <= 95.0f; speed += 10.0f) {
        ferrari_ecu.update_aero_state(speed, 0.1f, 0.0f);
        ferrari_ecu.log_status(speed, true); // Chasing car (gap met)
    }

    // Simulation 2: Entering Parabolica (Braking and Turning)
    std::cout << "\n--- Corner Entry (Stability Priority) ---" << std::endl;
    ferrari_ecu.update_aero_state(80.0f, 4.5f, 15.0f); // High lat-G, high steering
    ferrari_ecu.log_status(80.0f, false);

    return 0;
}



#include <iostream>
#include <algorithm>
#include <cmath>

/**
 * @brief Scuderia Ferrari SF-26 Integrated Control Unit
 * Manages the 067/6 PU, 350kW MGU-K, and Active Aero Surfaces.
 */
class SF26_Advanced_ECU {
private:
    // --- 067/6 Power Unit & ERS Specs ---
    const float MAX_MGU_K_POWER_KW = 350.0f; // 2026 Reg: ~470hp
    const float MAX_ICE_POWER_KW   = 400.0f; // 1.6L V6 (Sustainable Fuel)
    const float BATTERY_SOC_MAX_MJ = 4.0f;   // Usable delta per lap
    
    // --- Active Aero Configuration ---
    enum AeroState { Z_MODE, X_MODE }; // Z: Cornering/Grip, X: Straight/Low-Drag
    
    struct Telemetry {
        float velocity_ms;
        float lateral_g;
        float battery_mj;
        bool mom_active; // Manual Override Mode
    };

public:
    /**
     * @brief Logic for the 2026 Manual Override Mode (MOM).
     * Provides 350kW boost up to 337 km/h, then tapers to 355 km/h.
     */
    float compute_mgu_k_output(const Telemetry& data) {
        float v_kmh = data.velocity_ms * 3.6f;
        
        // Manual Override Mode (MOM) - Replaces DRS for overtaking
        if (data.mom_active && data.battery_mj > 0.1f) {
            if (v_kmh <= 337.0f) return MAX_MGU_K_POWER_KW;
            if (v_kmh < 355.0f) {
                // Linear taper between 337 and 355 km/h
                return MAX_MGU_K_POWER_KW * (1.0f - (v_kmh - 337.0f) / 18.0f);
            }
            return 0.0f;
        }

        // Standard Energy Map: Full power up to 290 km/h
        if (v_kmh <= 290.0f) return MAX_MGU_K_POWER_KW;
        // Natural energy clipping to prevent over-speeding
        return std::max(0.0f, MAX_MGU_K_POWER_KW * (1.0f - (v_kmh - 290.0f) / 50.0f));
    }

    /**
     * @brief SF-26 "Venetian Blind" Aero Logic.
     * Synchronizes front and rear movable elements to maintain Aero Balance.
     */
    AeroState determine_aero_mode(const Telemetry& data, float steering_angle) {
        // Requirements for X-Mode (Low Drag): High speed, straight wheel, low G-load
        if (data.velocity_ms > 70.0f && std::abs(data.lateral_g) < 0.6f && std::abs(steering_angle) < 5.0f) {
            return X_MODE;
        }
        // Fail-safe: Always return to Z-Mode (High Downforce) for stability
        return Z_MODE;
    }

    void execute_control_cycle(Telemetry& data, float steering) {
        AeroState aero = determine_aero_mode(data, steering);
        float mgu_k = compute_mgu_k_output(data);

        std::cout << "[SF-26] V: " << (int)(data.velocity_ms * 3.6f) << "km/h | "
                  << "Mode: " << (aero == X_MODE ? "X-STRAIGHT" : "Z-CORNER ") << " | "
                  << "MGU-K: " << (int)mgu_k << "kW" << std::endl;
    }
};

int main() {
    SF26_Advanced_ECU ferrari_system;
    
    // Scenario: Overtaking on the Baku straight
    SF26_Advanced_ECU::Telemetry race_data = {88.0f, 0.1f, 3.5f, true}; 
    ferrari_system.execute_control_cycle(race_data, 0.0f);

    // Scenario: Heavy cornering (Z-Mode activation)
    race_data = {65.0f, 4.2f, 3.2f, false};
    ferrari_system.execute_control_cycle(race_data, 18.0f);

    return 0;
}
