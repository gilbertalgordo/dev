import requests

def get_filtered_edits(wiki_url, limit=50):
    session = requests.Session()
    params = {
        "action": "query",
        "format": "json",
        "list": "recentchanges",
        "rclimit": limit,
        "rcshow": "!bot",  # Filters out edits explicitly marked by a bot
        "rcprop": "user|comment|flags|tags"
    }
    
    response = session.get(url=f"{wiki_url}/w/api.php", params=params)
    data = response.json()
    
    edits = data["query"]["recentchanges"]
    
    # Filter for AI-related markers in comments (if users label their edits)
    filtered_edits = [
        edit for edit in edits 
        if "AI" not in edit.get("comment", "").upper()
    ]
    
    return filtered_edits

# Usage
wiki_api = "https://en.wikipedia.org"
clean_data = get_filtered_edits(wiki_api)

for edit in clean_data:
    print(f"User: {edit['user']} | Comment: {edit.get('comment', 'No comment')}")



import pywikibot
from pywikibot import pagegenerators
import re

# Initialize the site
site = pywikibot.Site('en', 'wikipedia')

def is_potentially_ai(edit):
    """
    Heuristic filter for AI-generated content.
    Analyzes edit summaries for common AI-related markers.
    """
    summary = edit.get('comment', '').lower()
    # List of triggers identified by Wikipedia's community guidelines
    ai_markers = ['chatgpt', 'gemini', 'claude', 'generated by', 'llm', 'automated text']
    return any(marker in summary for marker in ai_markers)

def stream_filtered_edits():
    # Fetch recent changes generator
    # hidebots=True filters out accounts registered as bots
    gen = site.recentchanges(
        start=None, 
        end=None, 
        reverse=False, 
        namespaces=None, 
        changetype=None, 
        showBot=False,  # Excludes official bots
        showMinor=None, 
        showPatrolled=None, 
        showAnon=None, 
        showRedirect=None, 
        topOnly=True
    )

    print("--- Monitoring Recent Changes (Excluding Bots and AI heuristics) ---")
    
    for edit in gen:
        # 1. Skip if it's an official bot (handled by showBot=False)
        # 2. Check for AI heuristics
        if is_potentially_ai(edit):
            continue
            
        print(f"Valid Edit | Title: {edit['title']} | User: {edit['user']}")

if __name__ == "__main__":
    stream_filtered_edits()



