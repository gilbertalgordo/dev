from PyQt6.QtWidgets import QLabel
from PyQt6.QtGui import QPixmap, QPainter, QColor, QPen

def create_hud_icon(color_hex, icon_type="shield"):
    """
    Generates a HUD-style icon programmatically.
    Integrates into your existing dashboard modules.
    """
    pixmap = QPixmap(64, 64)
    pixmap.fill(QColor(0, 0, 0, 0))  # Transparent background
    painter = QPainter(pixmap)
    
    # Configure Pen
    pen = QPen(QColor(color_hex))
    pen.setWidth(2)
    painter.setPen(pen)
    
    # Render geometric motif based on type
    if icon_type == "shield":
        painter.drawPolygon([(32, 4), (60, 16), (60, 36), (32, 60), (4, 36), (4, 16)])
    
    painter.end()
    return pixmap
