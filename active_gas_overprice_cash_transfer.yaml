import requests
import hashlib
import json
from datetime import datetime

class GovPaymentGateway:
    def __init__(self, merchant_id, secret_key):
        self.base_url = "https://www.lbp-eservices.com/egps/api/v1/transaction"
        self.merchant_id = merchant_id
        self.secret_key = secret_key

    def generate_checksum(self, payload):
        # Security protocol: SHA-256 hashing of payload + secret key
        raw_string = f"{payload['ref_no']}{payload['amount']}{self.secret_key}"
        return hashlib.sha256(raw_string.encode()).hexdigest()

    def initiate_transfer(self, amount, company_tin, violation_type):
        ref_no = f"PENALTY-{int(datetime.now().timestamp())}"
        
        payload = {
            "merchant_id": self.merchant_id,
            "ref_no": ref_no,
            "amount": f"{amount:.2f}",
            "currency": "PHP",
            "payor_id": company_tin,
            "description": f"Penalty: {violation_type}",
            "callback_url": "https://your-gov-portal.gov.ph/verify"
        }
        
        payload['checksum'] = self.generate_checksum(payload)
        
        try:
            # Active POST request to the Government Payment Switch (GPS)
            response = requests.post(self.base_url, json=payload)
            return response.json()
        except Exception as e:
            return {"status": "Error", "message": str(e)}

