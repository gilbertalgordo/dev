// Advanced Thermoptic Cloak Shader
Shader "Stealth/Major_Kusanagi_Advanced" {
    Properties {
        _MainTex ("Suit Texture (Dri-fit)", 2D) = "white" {}
        _Distortion ("Invisibility Distortion", Range(0, 1)) = 0.5
        _IridescencePower ("RGB Iridescence", Range(0, 5)) = 2.0
        _RefractionIndex ("Refraction Index", Range(0, 1)) = 0.1
    }

    SubShader {
        Tags { "RenderType"="Transparent" "Queue"="Transparent" }
        GrabPass { "_BackgroundTexture" } // Grabs the scene behind the Major

        Pass {
            CGPROGRAM
            #pragma vertex vert
            #pragma fragment frag
            #include "UnityCG.cginc"

            struct appdata {
                float4 vertex : POSITION;
                float3 normal : NORMAL;
                float2 uv : TEXCOORD0;
            };

            struct v2f {
                float4 pos : SV_POSITION;
                float4 grabPos : TEXCOORD0;
                float3 worldNormal : TEXCOORD1;
                float3 viewDir : TEXCOORD2;
            };

            sampler2D _BackgroundTexture;
            float _Distortion;
            float _IridescencePower;

            v2f vert (appdata v) {
                v2f o;
                o.pos = UnityObjectToClipPos(v.vertex);
                o.grabPos = ComputeGrabScreenPos(o.pos);
                o.worldNormal = UnityObjectToWorldNormal(v.normal);
                o.viewDir = normalize(WorldSpaceViewDir(v.vertex));
                return o;
            }

            fixed4 frag (v2f i) : SV_Target {
                // 1. Refraction/Distortion Logic
                float2 distortion = i.worldNormal.xy * _Distortion * 0.05;
                float4 sceneColor = tex2D(_BackgroundTexture, i.grabPos.xy + distortion);

                // 2. Fresnel Iridescence (The "See-Through" edges)
                float fresnel = pow(1.0 - dot(i.worldNormal, i.viewDir), 4.0);
                
                // 3. RGB Shift (Chromatic Aberration)
                float r = tex2D(_BackgroundTexture, i.grabPos.xy + distortion * 1.1).r;
                float g = tex2D(_BackgroundTexture, i.grabPos.xy + distortion).g;
                float b = tex2D(_BackgroundTexture, i.grabPos.xy + distortion * 0.9).b;
                vec3 rgbInvisibility = vec3(r, g, b);

                // 4. Iridescent White Sheen (Dri-fit look)
                float3 iris = float3(fresnel, fresnel * 0.8, fresnel * 1.2) * _IridescencePower;
                
                return fixed4(rgbInvisibility + iris, 1.0);
            }
            ENDCG
        }
    }
}



// Stealth Controller & HUD Sync
class MajorStealthSystem {
    constructor() {
        this.isCloaked = false;
        this.suitMaterial = document.getElementById('major-mesh').material;
        this.hudStatus = document.getElementById('hud-text');
    }

    // Advanced Transition Logic
    toggleCloak() {
        this.isCloaked = !this.isCloaked;
        
        // RGB Glitch Pulse on Activation
        this.triggerRGBGlitch();

        if (this.isCloaked) {
            this.lerpProperty('transmission', 1.0, 500); // Become see-through
            this.lerpProperty('iridescence', 0.8, 500);  // Activate white sheen
            this.hudStatus.innerText = "THERMOPTIC: ACTIVE";
        } else {
            this.lerpProperty('transmission', 0.0, 300); // Become opaque
            this.hudStatus.innerText = "THERMOPTIC: STANDBY";
        }
    }

    triggerRGBGlitch() {
        // Simulates the Vertud/RGB flicker seen in the fountain fight
        let intensity = 1.0;
        const interval = setInterval(() => {
            intensity -= 0.1;
            this.suitMaterial.emissiveIntensity = intensity;
            if (intensity <= 0) clearInterval(interval);
        }, 50);
    }
}
