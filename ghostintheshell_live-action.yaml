// Iridescent Stealth Fragment Shader
varying vec3 vNormal;
varying vec3 vViewPosition;

void main() {
  // Calculate the 'view factor' - how much we are looking at the surface head-on
  float fresnel = pow(1.0 - dot(normalize(vNormal), normalize(vViewPosition)), 3.0);
  
  // RGB Invisibility/Chromatic Aberration effect
  vec3 colorA = vec4(0.0, 1.0, 1.0, 0.5).rgb; // Cyan tint
  vec3 colorB = vec4(1.0, 0.0, 1.0, 0.5).rgb; // Magenta tint
  vec3 iridescent = mix(colorA, colorB, vNormal.y);
  
  // Final Alpha: Transparent in the middle, glowing iridescent white on edges
  float alpha = clamp(fresnel + 0.1, 0.0, 0.8);
  
  gl_FragColor = vec4(iridescent + vec3(0.9), alpha);
}



