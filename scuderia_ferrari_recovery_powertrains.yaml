import numpy as np

class ERS_ControlUnit:
    def __init__(self):
        # Constants for a high-performance hybrid powertrain
        self.max_battery_capacity = 4.0  # MJ (Megajoules)
        self.current_soc = 2.5           # Current State of Charge
        self.mgu_k_limit = 120           # kW limit (per FIA or Hypercar regs)
        self.mgu_h_limit = 90            # kW limit
        
    def harvest_energy(self, braking_force, exhaust_velocity):
        """
        Calculates energy recovery from Kinetic and Heat sources.
        """
        # MGU-K: Recovery during deceleration (Regenerative Braking)
        k_recovery = np.clip(braking_force * 0.85, 0, self.mgu_k_limit)
        
        # MGU-H: Recovery from turbocharger waste heat
        h_recovery = np.clip(exhaust_velocity * 0.60, 0, self.mgu_h_limit)
        
        total_harvested = (k_recovery + h_recovery) / 3600  # Convert kW to MJ/s
        
        # Prevent overcharging
        if self.current_soc + total_harvested < self.max_battery_capacity:
            self.current_soc += total_harvested
        else:
            self.current_soc = self.max_battery_capacity
            
        return k_recovery, h_recovery

    def deploy_boost(self, throttle_position, mode='qualifying'):
        """
        Manages deployment of stored energy for acceleration.
        """
        deployment_map = {'qualifying': 1.0, 'race': 0.85, 'eco': 0.4}
        requested_power = throttle_position * self.mgu_k_limit * deployment_map.get(mode, 0.8)
        
        if self.current_soc > 0.5:  # Reserve buffer
            actual_deployment = requested_power
            self.current_soc -= (actual_deployment / 3600)
        else:
            actual_deployment = 0.0 # Derate to protect battery
            
        return actual_deployment

# Example Execution
ecu = ERS_ControlUnit()
k_rec, h_rec = ecu.harvest_energy(braking_force=150, exhaust_velocity=100)
print(f"MGU-K Recovery: {k_rec}kW | MGU-H Recovery: {h_rec}kW")



import numpy as np

class ScuderiaActiveAI:
    def __init__(self):
        # System Constants
        self.battery_capacity_mj = 4.0 
        self.soc = 2.0  # Current state of charge
        self.thermal_threshold = 0.85 # 85% of max temp
        
    def calculate_recovery_priority(self, telemetry):
        """
        Determines whether to prioritize MGU-H or MGU-K recovery 
        based on current track phase and thermal health.
        """
        temp_factor = np.exp(telemetry['core_temp'] / 100)
        
        # MGU-H (Heat) Priority: High during full-throttle (high exhaust velocity)
        h_priority = telemetry['throttle'] * (1 - self.thermal_threshold)
        
        # MGU-K (Kinetic) Priority: High during deceleration
        k_priority = telemetry['braking_force'] * 1.5
        
        return h_priority, k_priority

    def execute_fast_recovery(self, h_pri, k_pri):
        """
        Active 'Sling-Shot' logic: instantly recovers system equilibrium 
        after a high-discharge event (e.g., Overtake Mode).
        """
        recovery_rate = 0.0
        
        if k_pri > h_pri:
            # Maximum harvesting via regenerative braking
            recovery_rate = min(120.0, k_pri * 10) # kW
        else:
            # Recovering via Turbo-compounding (MGU-H)
            recovery_rate = min(90.0, h_pri * 12) # kW
            
        # Update SOC with high-frequency delta
        delta_mj = (recovery_rate / 1000) * 0.001 # 1ms step
        self.soc = min(self.battery_capacity_mj, self.soc + delta_mj)
        
        return self.soc

# Initialize Active AI System
ferrari_ai = ScuderiaActiveAI()
current_telemetry = {'throttle': 0.1, 'braking_force': 0.9, 'core_temp': 78}
h, k = ferrari_ai.calculate_recovery_priority(current_telemetry)
new_soc = ferrari_ai.execute_fast_recovery(h, k)




