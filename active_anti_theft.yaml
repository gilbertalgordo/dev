                    (startX, startY, endX, endY) = box.astype("int")

                    # --- ACTIVE RESPONSE ---
                    # Logic: If person is detected, trigger HUD Warning and Log
                    cv2.rectangle(frame, (startX, startY), (endX, endY), (0, 0, 255), 3)
                    cv2.putText(frame, "!!! INTRUDER DETECTED !!!", (startX, startY - 10),
                                cv2.FONT_HERSHEY_SIMPLEX, 0.8, (0, 0, 255), 2)
                    
                    # Simulated System Action (e.g., lock doors, sound alarm)
                    execute_countermeasures()

        cv2.imshow("Security Feed - AI HUD", frame)

        if cv2.waitKey(1) & 0xFF == ord('q'):
            break

    cap.release()
    cv2.destroyAllWindows()

