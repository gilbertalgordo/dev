// Utility for HUD background effect
struct VisualEffectView: NSViewRepresentable {
    var material: NSVisualEffectView.Material
    var blendingMode: NSVisualEffectView.BlendingMode

    func makeNSView(context: Context) -> NSVisualEffectView {
        let view = NSVisualEffectView()
        view.material = material
        view.blendingMode = blendingMode
        view.state = .active
        return view
    }

    func updateNSView(_ nsView: NSVisualEffectView, context: Context) {}
}



import SwiftUI
import WebKit
import Combine

class BrowserViewModel: ObservableObject {
    @Published var urlString: String = "https://github.com/gilbertalgordo/dev"
    @Published var isLoading: Bool = false
    @Published var canGoBack: Bool = false
    @Published var canGoForward: Bool = false
    @Published var progress: Double = 0
    
    let webView: WKWebView
    
    init() {
        let config = WKWebViewConfiguration()
        // Kaizen Optimization: Prefetch and optimize rendering
        config.allowsAirPlayForMediaPlayback = false
        self.webView = WKWebView(frame: .zero, configuration: config)
    }
    
    func load() {
        guard let url = URL(string: urlString) else { return }
        webView.load(URLRequest(url: url))
    }
}

struct AdvancedWebView: NSViewRepresentable {
    @ObservedObject var viewModel: BrowserViewModel

    func makeNSView(context: Context) -> WKWebView {
        viewModel.webView.navigationDelegate = context.coordinator
        // HUD Script Injection: Customize the look of loaded sites
        let script = "document.body.style.backgroundColor = 'transparent';"
        let userScript = WKUserScript(source: script, injectionTime: .atDocumentEnd, forMainFrameOnly: true)
        viewModel.webView.configuration.userContentController.addUserScript(userScript)
        
        return viewModel.webView
    }

    func updateNSView(_ nsView: WKWebView, context: Context) {}

    func makeCoordinator() -> Coordinator {
        Coordinator(viewModel)
    }

    class Coordinator: NSObject, WKNavigationDelegate {
        var parent: BrowserViewModel
        var cancellables = Set<AnyCancellable>()

        init(_ parent: BrowserViewModel) {
            self.parent = parent
            super.init()
            
            // KVO for Progress and Navigation State
            parent.webView.publisher(for: \.estimatedProgress)
                .assign(to: \.progress, on: parent)
                .store(in: &cancellables)
                
            parent.webView.publisher(for: \.isLoading)
                .assign(to: \.isLoading, on: parent)
                .store(in: &cancellables)
        }
    }
}



@MainActor
class ArchangelAI: ObservableObject {
    @Published var history: [ChatMessage] = []
    @Published var isThinking: Bool = false

    struct ChatMessage: Identifiable {
        let id = UUID()
        let role: String
        let content: String
    }

    func processCommand(_ input: String, context: String) async {
        isThinking = true
        history.append(ChatMessage(role: "User", content: input))
        
        // Advanced: Context-aware prompt injection
        let prompt = "System: Analyze context [\(context)]. Task: \(input)"
        
        // Simulate high-speed AI inference
        try? await Task.sleep(nanoseconds: 1_000_000_000)
        
        let response = "Kaizen Analysis Complete: Optimization path identified for \(context.prefix(20))..."
        history.append(ChatMessage(role: "Archangel", content: response))
        isThinking = false
    }
}



