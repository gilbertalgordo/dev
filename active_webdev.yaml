// Check if the AI model is ready on the user's device
async function initActiveAI() {
  const canCreate = await window.ai.canCreateTextSession();

  if (canCreate !== "no") {
    const session = await window.ai.createTextSession();
    
    // Active prompt execution
    const response = await session.prompt("Explain the concept of 'Active Web' in 2 sentences.");
    console.log("AI Response:", response);
    
    // Always destroy session when done to free up local resources
    session.destroy();
  } else {
    console.error("AI model not available on this browser/device.");
  }
}

initActiveAI();



import { GoogleGenerativeAI } from "@google/generative-ai";

// Access your API key (ensure this is secured in a backend environment)
