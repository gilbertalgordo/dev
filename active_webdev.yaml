// --- JAVASCRIPT STATE CONTROLLER ---
const body = document.body;

// 1. SET TO IDLE (Default)
function setAI_Idle() {
  body.classList.remove('ai-thinking', 'ai-complete', 'ai-error');
}

// 2. SET TO THINKING (User just sent a prompt)
function setAI_Thinking() {
  body.classList.add('ai-thinking');
}

// 3. SET TO COMPLETE (AI finished generating)
function setAI_Complete() {
  body.classList.remove('ai-thinking');
  body.classList.add('ai-complete');
}

// 4. SET TO ERROR (Network fail, etc.)
function setAI_Error() {
  body.classList.remove('ai-thinking');
  body.classList.add('ai-error');
}

// -- EXAMPLE WORKFLOW TRIGGER --
document.querySelector('#submit-prompt').addEventListener('click', () => {
  setAI_Thinking(); // Icon instantly goes amber and spins rapidly

  // Simulate API Call
  setTimeout(() => {
    // If successful:
    setAI_Complete(); // Icon goes green and stable
  }, 3000);
});
