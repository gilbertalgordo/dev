async function runActiveTask() {
  // Use 'gemini-1.5-flash' for fast, active web responses
  const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

  const prompt = "Generate a responsive CSS grid layout for a dashboard.";

