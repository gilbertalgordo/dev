/** * Advanced Local AI Controller 
 * Targets Gemini Nano (Chrome 2026 Built-in AI)
 */
class ActiveAI {
  constructor() {
    this.session = null;
    this.capabilities = null;
  }

  async initialize(systemPrompt = "You are a helpful web coding assistant.") {
    this.capabilities = await window.ai.canCreateTextSession();
    
    if (this.capabilities !== 'no') {
      this.session = await window.ai.createTextSession({
        systemPrompt,
        temperature: 0.7,
        topK: 3
      });
      console.log("Active AI Initialized Locally.");
    }
  }

  // Streaming implementation for "Active" UI feel
  async streamResponse(userPrompt, onChunk) {
    if (!this.session) await this.initialize();
    
    try {
      const stream = this.session.promptStreaming(userPrompt);
      for await (const chunk of stream) {
        onChunk(chunk);
      }
    } catch (err) {
      console.error("Local AI stream failed:", err);
    }
  }

  destroy() {
    this.session?.destroy();
  }
}



import { GoogleGenerativeAI } from "@google/generative-ai";

const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);

// Define tools the AI can "actively" call
const searchTool = {
  functionDeclarations: [{
    name: "fetchDocumentation",
    description: "Retrieves the latest web.dev docs for a specific technology.",
    parameters: {
      type: "object",
      properties: {
        query: { type: "string", description: "The tech keyword (e.g., 'WebGPU')" }
      },
      required: ["query"]
    }
  }]
};

async function runAgenticTask(userInput) {
  const model = genAI.getGenerativeModel({ 
    model: "gemini-3.1-pro-preview", // Latest 2026 Model
    tools: [searchTool] 
  });

  const chat = model.startChat();
  
  // The model will decide if it needs to call 'fetchDocumentation'
  const result = await chat.sendMessage(userInput);
  const response = result.response;
  
  // Handle potential function calls (Agentic behavior)
  const call = response.functionCalls()?.[0];
  if (call) {
    // Execute your local code logic here and send results back to model
    console.log(`AI is actively requesting docs for: ${call.args.query}`);
  }

  return response.text();
}



/* AI-Active-Icon.css */

:root {
  /* Default/Idle State Colors */
  --ai-icon-core-primary: hsl(210, 100%, 60%);   /* calm blue */
  --ai-icon-core-secondary: hsl(210, 100%, 85%);
  --ai-icon-border: hsl(210, 20%, 80%);
  --ai-icon-rotation-speed: 6s;
  --ai-icon-pulse-speed: 2.5s;
}

/* Base Icon Container styling */
.ai-status-icon {
  width: 48px;
  height: 48px;
  display: inline-block;
}

.ai-status-icon svg {
  width: 100%;
  height: 100%;
  overflow: visible; /* Allows glows to render */
}

/* Kinetic Core Styling */
.ai-kinetic-core {
  fill: url(#ai-core-gradient);
  transform-origin: center;
  stroke: var(--ai-icon-core-secondary);
  stroke-width: 0.5;
  
  /* Always pulse when active, but change speed */
  animation: ai-pulse var(--ai-icon-pulse-speed) ease-in-out infinite;
}

.ai-kinetic-core text {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 800;
  fill: #fff;
  font-size: 10px;
  text-anchor: middle;
}


/* --- THE "ACTIVE" STATES --- */

/* 1. STATE: THINKING (Rapid Rotation) */
body.ai-thinking {
  --ai-icon-core-primary: hsl(35, 100%, 60%);   /* amber */
  --ai-icon-core-secondary: hsl(35, 100%, 85%);
  --ai-icon-rotation-speed: 0.8s;
  --ai-icon-pulse-speed: 0.5s;
}

body.ai-thinking .ai-kinetic-core {
  animation: ai-rotate var(--ai-icon-rotation-speed) linear infinite,
             ai-pulse var(--ai-icon-pulse-speed) ease-in-out infinite;
}

/* 2. STATE: COMPLETE/SUCCESS (Stable Green) */
body.ai-complete {
  --ai-icon-core-primary: hsl(150, 80%, 50%);    /* green */
  --ai-icon-core-secondary: hsl(150, 100%, 85%);
  --ai-icon-border: var(--ai-icon-core-primary);
}

/* 3. STATE: ERROR (Pulsing Red) */
body.ai-error {
  --ai-icon-core-primary: hsl(0, 100%, 65%);    /* red */
  --ai-icon-core-secondary: hsl(0, 100%, 85%);
  --ai-icon-border: var(--ai-icon-core-primary);
  --ai-icon-pulse-speed: 1s;
}

body.ai-error .ai-kinetic-core {
  animation: ai-pulse var(--ai-icon-pulse-speed) ease-in-out infinite;
}


/* --- ANIMATIONS --- */

@keyframes ai-rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes ai-pulse {
  0%, 100% { opacity: 0.95; transform: scale(1); filter: blur(0px); }
  50% { opacity: 1; transform: scale(1.05); filter: blur(1px); }
}




<div class="ai-status-icon" role="img" aria-label="AI System Status Indicator">
