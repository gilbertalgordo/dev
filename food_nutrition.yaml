<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD Nutrition Pyramid</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --hud-cyan: #00f2ff;
            --layer-1: #ff4d4d; /* Fats */
            --layer-2: #ffcc00; /* Protein/Dairy */
            --layer-3: #4caf50; /* Fruits/Veg */
            --layer-4: #8d6e63; /* Grains */
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .pyramid-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Pyramid Sections */
        .section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
            margin-bottom: 4px;
        }

        .section:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* Shape clipping for the pyramid look */
        .fats { 
            height: 15%; width: 20%; background: var(--layer-1); 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .protein { 
            height: 20%; width: 45%; background: var(--layer-2); 
            clip-path: polygon(22% 0%, 78% 0%, 100% 100%, 0% 100%);
        }
        .produce { 
            height: 25%; width: 75%; background: var(--layer-3); 
            clip-path: polygon(17% 0%, 83% 0%, 100% 100%, 0% 100%);
        }
        .grains { 
            height: 30%; width: 100%; background: var(--layer-4); 
            clip-path: polygon(12.5% 0%, 87.5% 0%, 100% 100%, 0% 100%);
        }

        /* HUD Text Overlay */
        .label {
            position: absolute;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="pyramid-container">
        <div class="section fats"><span class="label">Fats & Sweets</span></div>
        <div class="section protein"><span class="label">Protein & Dairy</span></div>
        <div class="section produce"><span class="label">Fruits & Veggies</span></div>
        <div class="section grains"><span class="label">Whole Grains</span></div>
    </div>

</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Nutrition HUD</title>
    <style>
        :root {
            --hud-bg: #050a0f;
            --hud-accent: #00f2ff;
            --font-main: 'Courier New', monospace;
        }

        body {
            background-color: var(--hud-bg);
            color: var(--hud-accent);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            gap: 40px;
            align-items: center;
            padding: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        svg {
            filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.5));
        }

        polygon {
            cursor: pointer;
            transition: all 0.3s ease;
            stroke: var(--hud-accent);
            stroke-width: 1;
        }

        polygon:hover {
            fill-opacity: 0.8;
            stroke-width: 3;
            transform: scale(1.02);
            transform-origin: center;
        }

        .data-panel {
            width: 300px;
            padding: 20px;
            border-left: 2px solid var(--hud-accent);
            background: rgba(0, 242, 255, 0.05);
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: var(--hud-accent);
            opacity: 0.3;
            position: absolute;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        h2 { margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        .stat { margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="scanline"></div>
    
    <svg width="400" height="400" viewBox="0 0 100 100">
        <polygon id="fats" points="50,5 35,25 65,25" fill="#300" 
                 onmouseover="updateHUD('Fats & Oils', 'Sparse', 'Energy storage, hormone production')"/>
        
        <polygon id="protein" points="35,26 65,26 75,45 25,45" fill="#320" 
                 onmouseover="updateHUD('Protein & Dairy', '2-3 Servings', 'Muscle repair, bone density')"/>
        
        <polygon id="veggies" points="25,46 75,46 85,70 15,70" fill="#030" 
                 onmouseover="updateHUD('Vitamins & Fiber', '5-9 Servings', 'Immune support, digestion')"/>
        
        <polygon id="grains" points="15,71 85,71 95,95 5,95" fill="#321" 
                 onmouseover="updateHUD('Complex Carbs', '6-11 Servings', 'Primary fuel, fiber source')"/>
    </svg>

    <div class="data-panel" id="hud">
        <h2 id="hud-title">System Ready</h2>
        <p class="stat">SELECT A SECTOR TO INITIALIZE SCAN</p>
        <div id="hud-details"></div>
    </div>
</div>

<script>
    function updateHUD(title, dose, functionText) {
        document.getElementById('hud-title').innerText = title;
        document.getElementById('hud-details').innerHTML = `
            <div class="stat"><strong>OPTIMAL INTAKE:</strong> ${dose}</div>
            <div class="stat"><strong>BIOLOGICAL ROLE:</strong> ${functionText}</div>
            <div class="stat"><strong>STATUS:</strong> ANALYZING...</div>
        `;
    }
</script>

</body>
</html>
