// A custom shader for the Iron Man 2020 Arno Stark Suit
const ArnoStarkSuitMaterial = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    baseColor: { value: new THREE.Color(0x4B0082) }, // Indigo Base
    accentColor1: { value: new THREE.Color(0xFF0000) }, // Red
    accentColor2: { value: new THREE.Color(0x8A2BE2) }, // Violet/Purple
    energyColor: { value: new THREE.Color(0x0000FF) }, // Blue Nanotech Glow
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    uniform float time;
    
    // Carbon Fiber Weave Pattern
    float carbonFiber(vec2 uv) {
      vec2 grid = fract(uv * 50.0);
      return step(0.5, grid.x) * step(0.5, grid.y) + step(0.5, 1.0-grid.x) * step(0.5, 1.0-grid.y);
    }

    void main() {
      // Base indigo-violet gradient
      vec3 color = mix(vec3(0.29, 0.0, 0.51), vec3(0.54, 0.17, 0.89), vUv.y);
      
      // Apply Carbon Fiber Texture
      float pattern = carbonFiber(vUv);
      color *= (0.8 + 0.2 * pattern);

      // Nanotech "Vertud" Pulse (Moving Blue/Violet Lines)
      float pulse = sin(vUv.y * 20.0 + time * 2.0) * 0.5 + 0.5;
      vec3 nanotechGlow = vec3(0.0, 0.5, 1.0) * pulse * 0.3;
      
      // Edge Highlight (Fresnel effect)
      float fresnel = pow(1.0 - dot(vNormal, vec3(0,0,1)), 3.0);
      color += fresnel * vec3(1.0, 0.0, 0.0); // Red highlights on edges

      gl_FragColor = vec4(color + nanotechGlow, 1.0);
    }
  `
});



