// Arno Stark Material: Iridescent Carbon Fiber
const arnoMaterial = new THREE.ShaderMaterial({
    uniforms: {
        baseColor: { value: new THREE.Color(suitSpecs.primary) },
        iridColor: { value: new THREE.Color(suitSpecs.secondary) },
        time: { value: 0.0 }
    },
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            vViewPosition = -mvPosition.xyz;
            gl_Position = projectionMatrix * mvPosition;
        }
    `,
    fragmentShader: `
        uniform vec3 baseColor;
        uniform vec3 iridColor;
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        void main() {
            float viewDotNormal = dot(normalize(vNormal), normalize(vViewPosition));
            float fresnel = pow(1.0 - clamp(viewDotNormal, 0.0, 1.0), 3.0);
            
            // Nano-carbon weave simulation
            vec3 color = mix(baseColor, iridColor, fresnel);
            if(mod(gl_FragCoord.x + gl_FragCoord.y, 4.0) > 2.0) color *= 0.8; 
            
            gl_FragColor = vec4(color, 1.0);
        }
    `
});

