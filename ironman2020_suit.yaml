class ArnoStarkArmor {
private:
    float vertudEnergyLevel;
    SuitMaterial currentSurface;

public:
    ArnoStarkArmor() : vertudEnergyLevel(100.0f) {}

    // Manages the indigo/violet/red color shift based on energy output
    void updateVisualState(float powerDraw) {
        if (powerDraw > 75.0f) {
            currentSurface.accentHex = "#FF0000"; // Shifts to Red in high-power mode
            std::cout << "Red Overdrive Detected: Carbon Fiber Reinforcing..." << std::endl;
        } else {
            currentSurface.accentHex = "#8A2BE2"; // Standard Violet/Purple
        }
    }

    void deployNanotech(std::string weaponType) {
        std::cout << "Deploying " << weaponType << " via Indigo Nanotech Latice." << std::endl;
        vertudEnergyLevel -= 15.5f;
    }
};



uniform float u_time;
varying vec3 v_normal;
varying vec2 v_uv;

void main() {
    // 1. Base Carbon Fiber Pattern
    float pattern = step(0.5, fract(v_uv.x * 100.0)) * step(0.5, fract(v_uv.y * 100.0));
    vec3 carbonColor = vec3(0.05, 0.05, 0.07); // Dark carbon base

    // 2. The Arno 2020 Color Gradient (Indigo to Purple)
    vec3 indigo = vec3(0.29, 0.0, 0.51);
    vec3 violet = vec3(0.58, 0.0, 0.82);
    vec3 baseArmor = mix(indigo, violet, sin(u_time * 0.5) * 0.5 + 0.5);

    // 3. Vertud Energy Glow (Blue/Violet Nanotech seams)
    float seamGlow = pow(1.0 - pattern, 3.0);
    vec3 energyStream = vec3(0.2, 0.4, 1.0) * (sin(u_time * 2.0) * 0.5 + 0.5);

    // Final Composite
    vec3 finalColor = mix(carbonColor, baseArmor, 0.6) + (energyStream * seamGlow);
    gl_FragColor = vec4(finalColor, 1.0);
}


// Fragment Shader Snippet
uniform vec3 baseColor; // Red/Indigo
uniform vec3 iridColor; // Violet/Blue
varying vec3 vNormal;
varying vec3 vViewPosition;

void main() {
    float fresnel = dot(normalize(vNormal), normalize(vViewPosition));
    fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
    
    // Mix colors based on viewing angle for iridescence
    vec3 finalColor = mix(baseColor, iridColor, pow(fresnel, 2.0));
    
    // Simulating Carbon Fiber Micro-pattern
    float pattern = sin(gl_FragCoord.x * 0.5) * cos(gl_FragCoord.y * 0.5);
    finalColor *= (0.9 + 0.1 * pattern);

    gl_FragColor = vec4(finalColor, 1.0);
}



