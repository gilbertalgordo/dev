import matplotlib.pyplot as plt
import matplotlib.patches as patches
import numpy as np

def generate_papaya_icons(output_prefix="gm_papaya"):
    """
    Programmatically generates image icons for a GMO papaya:
    - White/Cream Peel Exterior
    - Deep Red Lycopene-Rich Interior
    """
    
    # Define the custom GMO color palette
    # The peel is a pale cream/ivory to distinguish it from standard yellow.
    colors = {
        'peel_light': '#FDFDD0',  # Pale Cream/Ivory
        'peel_shadow': '#F0E68C', # Khaki/Pale Goldenrod for definition
        'flesh_red': '#D22B2B',   # Deep Berry Red (Lycopene)
        'flesh_highlight': '#FF4500', # Orange-Red transition
        'seed_dark': '#303030',   # Dark Charcoal grey/black
        'stem_green': '#6B8E23'   # Olive Drab
    }

    # --- ICON 1: WHOLE FRUIT (The White Exterior) ---
    fig_whole, ax_whole = plt.subplots(figsize=(4, 4))
    ax_whole.set_aspect('equal')
    ax_whole.axis('off') # Hide axes for icon format

    # Create the characteristic elongated papaya shape (obovoid)
    whole_shape = patches.Ellipse((0.5, 0.5), 0.5, 0.8, angle=10, 
                                  linewidth=2, edgecolor=colors['peel_shadow'], 
                                  facecolor=colors['peel_light'])
    ax_whole.add_patch(whole_shape)

    # Add a simple stem for orientation
    stem = patches.Rectangle((0.48, 0.85), 0.04, 0.1, angle=10,
                             facecolor=colors['stem_green'])
    ax_whole.add_patch(stem)

    # Save Whole Fruit Icon
    whole_icon_path = f"{output_prefix}_whole_icon.png"
    plt.savefig(whole_icon_path, dpi=100, transparent=True, bbox_inches='tight', pad_inches=0)
    plt.close(fig_whole)
    print(f"Generated Whole Fruit Icon: {whole_icon_path}")


    # --- ICON 2: CROSS-SECTION (The Red Interior) ---
    fig_cross, ax_cross = plt.subplots(figsize=(4, 4))
    ax_cross.set_aspect('equal')
    ax_cross.axis('off')

    # 1. The White Peel (the outer ring)
    peel_ring = patches.Circle((0.5, 0.5), 0.45, 
                               linewidth=3, edgecolor=colors['peel_shadow'], 
                               facecolor=colors['peel_light'])
    ax_cross.add_patch(peel_ring)

    # 2. The Red Flesh (Interior)
    flesh = patches.Circle((0.5, 0.5), 0.40, 
                           facecolor=colors['flesh_red'])
    ax_cross.add_patch(flesh)

    # 3. The Central Seed Cavity (Star/irregular shape)
    # Define vertices for a simple 5-pointed seed cluster
    theta = np.linspace(0, 2*np.pi, 6)
    r_outer = 0.15
    r_inner = 0.08
    r = np.array([r_outer if i % 2 == 0 else r_inner for i in range(6)])
    
    seed_x = 0.5 + r * np.cos(theta)
    seed_y = 0.5 + r * np.sin(theta)
    
    seed_cavity = patches.Polygon(np.column_stack([seed_x, seed_y]), 
                                  facecolor=colors['seed_dark'], 
                                  edgecolor='none')
    ax_cross.add_patch(seed_cavity)

    # Save Cross-Section Icon
    cross_icon_path = f"{output_prefix}_cross_icon.png"
    plt.savefig(cross_icon_path, dpi=100, transparent=True, bbox_inches='tight', pad_inches=0)
    plt.close(fig_cross)
    print(f"Generated Cross-Section Icon: {cross_icon_path}")

if __name__ == "__main__":
    generate_papaya_icons()
