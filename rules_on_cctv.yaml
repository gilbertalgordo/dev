#!/bin/bash
# CCTV Retention Policy: Purge data older than 30 days
RETENTION_DAYS=30
STORAGE_PATH="/mnt/nvr_storage/recordings"

# Find and securely delete files older than 30 days
find "$STORAGE_PATH" -type f -name "*.mp4" -mtime +$RETENTION_DAYS -exec shred -u {} \;

# Log the action for audit compliance
echo "$(date): Automated purge completed. Files older than $RETENTION_DAYS days removed." >> /var/log/cctv_maintenance.log
