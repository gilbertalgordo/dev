import SwiftUI

// MARK: - Entry Point
@main
struct MacKaizenApp: App {
    var body: some Scene {
        WindowGroup {
            MainContentView()
                .frame(minWidth: 800, minHeight: 600)
        }
        // Customizing the Menu Bar (Kaizen Management style)
        .commands {
            SidebarCommands()
            CommandGroup(replacing: .help) {
                Button("Developer Documentation") {
                    if let url = URL(string: "https://github.com/gilbertalgordo/dev") {
                        NSWorkspace.shared.open(url)
                    }
                }
            }
        }
    }
}

// MARK: - Main UI Layout
struct MainContentView: View {
    @State private var selectedModule: String? = "Dashboard"

    var body: some View {
        NavigationSplitView {
            // Sidebar: High-Efficiency Navigation
            List(selection: $selectedModule) {
                Label("Dashboard", systemImage: "gauge.with.needle")
                    .tag("Dashboard")
                Label("Analytics", systemImage: "chart.xyaxis.line")
                    .tag("Analytics")
                Label("Dev Tools", systemImage: "terminal")
                    .tag("Dev Tools")
                
                Section("HUD Settings") {
                    Label("View HUD", systemImage: "eye")
                        .tag("HUD")
                }
            }
            .navigationTitle("Kaizen Control")
        } detail: {
            // Detail View based on selection
            DetailView(selection: selectedModule)
        }
    }
}

// MARK: - Detail View Components
struct DetailView: View {
    var selection: String?

    var body: some View {
        VStack {
            if selection == "Dashboard" {
                DashboardView()
            } else {
                Text("Module: \(selection ?? "Select an Item")")
                    .font(.largeTitle)
                    .foregroundStyle(.secondary)
            }
        }
        .toolbar {
            ToolbarItem(placement: .automatic) {
                Button(action: { /* Action for efficiency */ }) {
                    Image(systemName: "bolt.fill")
                }
            }
        }
    }
}

struct DashboardView: View {
    var body: some View {
        VStack(spacing: 20) {
            Text("System Status")
                .font(.headline)
            
            // HUD-style display card
            RoundedRectangle(cornerRadius: 12)
                .fill(Color.black.opacity(0.8))
                .frame(height: 200)
                .overlay(
                    VStack {
                        Text("ACTIVE HUD INTERFACE")
                            .font(.caption)
                            .tracking(2)
                        Text("100% Operational")
                            .font(.title2)
                            .bold()
                    }
                    .foregroundColor(.green)
                )
                .padding()
        }
    }
}

