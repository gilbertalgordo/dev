// MARK: - SwiftUI Bridge
struct MetalHUDView: NSViewRepresentable {
    func makeNSView(context: Context) -> MTKView {
        let mtkView = MTKView()
        mtkView.isPaused = false
        mtkView.enableSetNeedsDisplay = false
        context.coordinator.renderer = HUDRenderer(metalView: mtkView)
        return mtkView
    }

    func updateNSView(_ nsView: MTKView, context: Context) {}

    func makeCoordinator() -> Coordinator {
        Coordinator()
    }

    class Coordinator {
        var renderer: HUDRenderer?
    }
}

// MARK: - Application Window
struct AdvancedMacApp: View {
    var body: some View {
        ZStack {
            // Layer 1: The Scientific Data/3D Background
            MetalHUDView()
                .edgesIgnoringSafeArea(.all)
            
            // Layer 2: The HUD Glass Overlay
            VStack {
                HStack {
                    VStack(alignment: .leading) {
                        Text("SYSTEM_ARCHANGEL_CORE")
                            .font(.system(.caption, design: .monospaced))
                        Text("STABLE")
                            .foregroundColor(.cyan)
                    }
                    Spacer()
                    Text(Date(), style: .timer)
                }
                .padding()
                .background(VisualEffectView(material: .hudWindow, blendingMode: .withinWindow))
                
                Spacer()
            }
        }
    }
}

// Helper for Frosted Glass HUD Effect
struct VisualEffectView: NSViewRepresentable {
    let material: NSVisualEffectView.Material
    let blendingMode: NSVisualEffectView.BlendingMode

    func makeNSView(context: Context) -> NSVisualEffectView {
        let view = NSVisualEffectView()
        view.material = material
        view.blendingMode = blendingMode
        view.state = .active
        return view
    }

    func updateNSView(_ nsView: NSVisualEffectView, context: Context) {}
}
