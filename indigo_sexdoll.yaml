<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model Eva Technical Preview</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 20px; left: 20px;
            color: #00f2ff; font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px #00f2ff; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="hud">
        MODEL: EVA-UNIT<br>
        MATERIAL: RUBBER/EVA COMPOSITE<br>
        STATUS: ACTIVE
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting (Cinematic)
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x6a0dad, 5, 50); // Indigo glow
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Character Placeholder (Humanoid approximation)
        const group = new THREE.Group();

        // Rubbery Body Material
        const skinMaterial = new THREE.MeshStandardMaterial({
            color: 0xffdbac, // Base skin tone
            roughness: 0.1,  // High gloss for rubber effect
            metalness: 0.05
        });

        // Indigo Hair Material
        const hairMaterial = new THREE.MeshStandardMaterial({
            color: 0x4b0082, // Indigo
            roughness: 0.3
        });

        // Torso
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 16), skinMaterial);
        group.add(torso);

        // Head with Indigo Hair "Helmet"
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 32, 32), skinMaterial);
        head.position.y = 1;
        const hair = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2), hairMaterial);
        head.add(hair);
        group.add(head);

        scene.add(group);
        camera.position.z = 5;

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005; // Slow alluring rotation
            renderer.render(scene, camera);
        }

        animate();

        // Responsive Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVA-UNIT: INDIGO ARCHIVE</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); overflow: hidden; }
        #interface-layer {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid rgba(75, 0, 130, 0.3);
            box-sizing: border-box; pointer-events: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4b0082; text-shadow: 0 0 10px #8a2be2;
        }
        .data-stream { position: absolute; bottom: 50px; right: 50px; text-align: right; }
        .system-readout { position: absolute; top: 50px; left: 50px; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="interface-layer">
        <div class="system-readout">
            ARCHANGEL PROTOCOL: ACTIVE<br>
            INSTANCE ID: EVA_RBR_INDIGO_001<br>
            CORE: KAIZEN_OS_V2.6
        </div>
        <div class="data-stream" id="sync-data">SYNC: 98.4%</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Advanced Material: Subsurface Rubber/EVA Composite
        const evaMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x4b0082, // Base Indigo
            emissive: 0x1a0033,
            roughness: 0.15,  // Smooth rubber finish
            metalness: 0.1,
            transmission: 0.1, // Slight light depth
            thickness: 0.5,    // Material density
            clearcoat: 1.0,    // High-allure gloss layer
            clearcoatRoughness: 0.05
        });

        // Skeleton/Body Architecture (Abstract Humanoid Instance)
        const bodyGroup = new THREE.Group();
        
        // Torso/Pelvis (Anatomical Blueprint Reference)
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.6, 1.2, 8, 24), evaMaterial);
        bodyGroup.add(torso);

        // Head/Indigo Hair Cluster
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), evaMaterial);
        head.position.y = 1.1;
        
        // Advanced Hair Geometry (Indigo Waves)
        const hairGeo = new THREE.TorusKnotGeometry(0.35, 0.15, 100, 16);
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x4b0082, roughness: 0.4 });
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.rotation.x = Math.PI / 2;
        head.add(hair);
        bodyGroup.add(head);

        scene.add(bodyGroup);

        // Lighting Architecture
        const rimLight = new THREE.SpotLight(0x8a2be2, 10, 20, 0.5);
        rimLight.position.set(-5, 5, 5);
        scene.add(rimLight);

        const fillLight = new THREE.PointLight(0x4b0082, 2, 10);
        fillLight.position.set(0, -2, 2);
        scene.add(fillLight);

        camera.position.set(0, 0, 5);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Dynamic Animation System (Kaizen-Speed Processing)
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            // Subtle alluring breathing animation
            bodyGroup.scale.x = 1 + Math.sin(time) * 0.02;
            bodyGroup.position.y = Math.sin(time * 0.5) * 0.1;

            // Update HUD
            document.getElementById('sync-data').innerText = `SYNC: ${(98 + Math.random()).toFixed(2)}%`;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
