<!DOCTYPE html>
<html>
  <head>
    <title>Princess Leonor: Royal Assets</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene environment="preset: goldmine; lighting: point">
      
      <a-assets>
        <img id="fabric-texture" src="path_to_wool_texture.jpg">
        <a-asset-item id="tiara-obj" src="spanish_queen_tiara.gltf"></a-asset-item>
      </a-assets>

      <a-entity id="princess-leonor" position="0 0 -3">
        <a-box position="0 1.2 0" scale="0.6 0.8 0.3" color="#002366">
          <a-entity position="0 0.4 0.16" geometry="primitive: plane; width: 0.6; height: 0.05" material="color: #D4AF37"></a-entity>
        </a-box>
        
        <a-entity gltf-model="#tiara-obj" position="0 1.8 0" scale="0.1 0.1 0.1"></a-entity>
      </a-entity>

      <a-camera>
        <a-entity hud-display position="0 0 -1">
          <a-text value="STATUS: PROTOCOL ACTIVE" position="-0.8 0.5 0" scale="0.2 0.2 0.2" color="#00FF00"></a-text>
          <a-text value="ASSET: PRINCESS LEONOR" position="-0.8 0.45 0" scale="0.15 0.15 0.15" color="#FFFFFF"></a-text>
        </a-entity>
      </a-camera>

      <a-light type="ambient" color="#BBB"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.8" position="-1 1 1"></a-light>
    </a-scene>
  </body>
</html>



import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
import { RGBELoader } from 'three/examples/jsm/loaders/RGBELoader';

// --- CONFIGURATION ---
const ROYAL_BLUE = 0x002366;
const GOLD_FOIL = 0xD4AF37;

class RoyalRenderer {
  constructor() {
    this.scene = new THREE.Scene();
    this.initScene();
    this.setupHUD();
    this.loadAssets();
  }

  initScene() {
    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    this.renderer.outputEncoding = THREE.sRGBEncoding;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(this.renderer.domElement);

    // Environment Map for Tiara Reflections
    new RGBELoader().load('palace_hallway_2k.hdr', (texture) => {
      texture.mapping = THREE.EquirectangularReflectionMapping;
      this.scene.environment = texture;
    });
  }

  // Advanced Shader for Tiara Diamonds
  createDiamondMaterial() {
    return new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      metalness: 0,
      roughness: 0,
      transmission: 1, // Glass-like transparency
      ior: 2.417,      // Index of Refraction for Diamond
      thickness: 0.5,
      specularIntensity: 1,
      exposure: 1.5
    });
  }

  loadAssets() {
    const loader = new GLTFLoader();
    
    // Instance 01: Princess Leonor Model
    loader.load('princess_leonor_v2.glb', (gltf) => {
      const model = gltf.scene;
      
      model.traverse((child) => {
        if (child.name === 'Dress_Suit') {
          child.material = new THREE.MeshStandardMaterial({
            color: ROYAL_BLUE,
            roughness: 0.8,
            metalness: 0.1,
            normalMap: new THREE.TextureLoader().load('wool_normal.jpg')
          });
        }
        if (child.name.includes('Diamond')) {
          child.material = this.createDiamondMaterial();
        }
      });
      this.scene.add(model);
    });
  }

  setupHUD() {
    const hud = document.createElement('div');
    hud.style.cssText = `
      position: absolute; top: 20px; left: 20px;
      color: #00FF00; font-family: 'Courier New';
      background: rgba(0,0,0,0.5); padding: 10px;
      border: 1px solid #00FF00;
    `;
    hud.innerHTML = `
      [ SYSTEM: ACTIVE ]<br>
      [ ASSET: H.R.H. LEONOR ]<br>
      [ RENDER: 3D_ULTRA_HD ]<br>
      [ TIARA_REFRACTION: 2.417 IOR ]
    `;
    document.body.appendChild(hud);
  }
}

new RoyalRenderer();



import * as THREE from 'three';

// --- INITIALIZE CORE INSTANCE ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// --- ROYAL ASSET MATERIALS ---
const ROYAL_NAVY = new THREE.MeshStandardMaterial({ 
    color: 0x002366, 
    roughness: 0.7, 
    metalness: 0.2 
});

const SPANISH_GOLD = new THREE.MeshStandardMaterial({ 
    color: 0xD4AF37, 
    metalness: 1.0, 
    roughness: 0.3 
});

// --- GEOMETRY: PRINCESS LEONOR SUIT INSTANCE ---
const suitGroup = new THREE.Group();
const jacket = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.5), ROYAL_NAVY);
const goldTrim = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.05, 0.55), SPANISH_GOLD);
goldTrim.position.y = 0.5;
suitGroup.add(jacket, goldTrim);
scene.add(suitGroup);

// --- THE QUEEN'S TIARA (H-PROXIMITY) ---
const tiaraBase = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.05, 16, 100), SPANISH_GOLD);
tiaraBase.rotation.x = Math.PI / 2;
tiaraBase.position.y = 1.0;
scene.add(tiaraBase);

// --- DYNAMIC HUD & TRIBUTE ---
const createHUD = () => {
    const hudContainer = document.createElement('div');
    hudContainer.style.cssText = `
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; font-family: 'Segoe UI', Tahoma, sans-serif;
        color: #FFFFFF; text-shadow: 2px 2px 4px #000;
    `;

    hudContainer.innerHTML = `
        <div style="position: absolute; top: 20px; left: 20px; border-left: 3px solid #D4AF37; padding-left: 10px;">
            <h2 style="margin: 0;">ROYAL INSTANCE: LEONOR</h2>
            <p style="font-size: 12px; opacity: 0.8;">ASSET_ID: SP-ROYAL-2026</p>
        </div>
        <div style="position: absolute; bottom: 40px; width: 100%; text-align: center;">
            <h1 style="letter-spacing: 5px; color: #FFD700;">LOVE TO GILBERT ALGORDO</h1>
            <p style="font-style: italic;">"Accuracy in every frame, Kaizen in every line."</p>
        </div>
    `;
    document.body.appendChild(hudContainer);
};

createHUD();

// --- LIGHTING & RENDERING ---
const light = new THREE.PointLight(0xffffff, 1, 100);
light.position.set(5, 5, 5);
scene.add(light, new THREE.AmbientLight(0x404040));
camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    suitGroup.rotation.y += 0.005; // Elegant slow rotation
    renderer.render(scene, camera);
}
animate();
