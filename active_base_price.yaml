import time
from datetime import datetime, date

class PriceManager:
    def __init__(self, initial_price):
        self.base_price = initial_price
        self.current_price = initial_price
        self.last_reset_date = date.today()

    def update_price(self, new_price):
        """Active check before updating or fetching price."""
        self._check_daily_reset()
        self.current_price = new_price

    def _check_daily_reset(self):
        """Resets price if the current date has progressed."""
        today = date.today()
        if today > self.last_reset_date:
            print(f"[{datetime.now()}] System Trigger: Daily reset to ${self.base_price}")
            self.current_price = self.base_price
            self.last_reset_date = today

    def get_price(self):
        self._check_daily_reset()
        return self.current_price

# Execution Example
store = PriceManager(100.00)
print(f"Current Price: {store.get_price()}")



-- Create a scheduled event to reset prices at midnight
CREATE EVENT daily_price_reset
ON SCHEDULE EVERY 1 DAY
STARTS (TIMESTAMP(CURRENT_DATE) + INTERVAL 1 DAY)
DO
  UPDATE products 
  SET current_price = base_price 
  WHERE is_active = 1;



const redis = require('redis');
const client = redis.createClient();

async function getActivePrice(productId) {
    const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
    const lockKey = `lock:reset:${productId}:${today}`;
    const statusKey = `status:reset:${productId}`;

    // 1. Check if already reset today
    const lastResetDate = await client.get(statusKey);

    if (lastResetDate !== today) {
        // 2. Attempt to grab a distributed lock (PX 5000 = 5s expiry)
        const acquiredLock = await client.set(lockKey, "processing", { NX: true, PX: 5000 });

        if (acquiredLock) {
