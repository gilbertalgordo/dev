    // Return the fresh price from DB
    return await db.query("SELECT current_price FROM products WHERE id = ?", [productId]);
}



WITH price_check AS (
    SELECT 
        id,
        base_price,
        current_price,
        last_reset_timestamp,
        -- Check if current time is past 00:00:00 of the current day
        (CURRENT_DATE > last_reset_timestamp::date) AS needs_reset
    FROM products
    WHERE id = :product_id
),
updater AS (
    UPDATE products
    SET 
        current_price = price_check.base_price,
        last_reset_timestamp = CURRENT_TIMESTAMP
    FROM price_check
    WHERE products.id = price_check.id AND price_check.needs_reset = TRUE
    RETURNING products.current_price
)
SELECT current_price FROM updater
UNION ALL
SELECT current_price FROM price_check WHERE NOT needs_reset;
