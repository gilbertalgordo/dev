let map, marker, path, watchID;
let coords = [];
let totalDistance = 0;

function initMap() {
    // Initialize map centered on a default location
    map = new google.maps.Map(document.getElementById("map"), {
        zoom: 15,
        center: { lat: 0, lng: 0 },
        mapTypeId: 'terrain' // Better for cycling/outdoor activities
    });

    // Initialize the Polyline (the activity path)
    path = new google.maps.Polyline({
        path: coords,
        geodesic: true,
        strokeColor: "#FF0000",
        strokeOpacity: 1.0,
        strokeWeight: 4,
    });
    path.setMap(map);

    startTracking();
}

function startTracking() {
    if (navigator.geolocation) {
        // watchPosition updates whenever the device moves
        watchID = navigator.geolocation.watchPosition(
            (position) => {
                const newPos = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };

                updateActivity(newPos);
            },
            (error) => console.log("Error: " + error.message),
            { enableHighAccuracy: true, distanceFilter: 5 }
        );
    }
}

function updateActivity(newPos) {
    // 1. Calculate distance if there's a previous point
    if (coords.length > 0) {
        const lastPos = coords[coords.length - 1];
        const dist = google.maps.geometry.spherical.computeDistanceBetween(
            new google.maps.LatLng(lastPos),
            new google.maps.LatLng(newPos)
        );
        totalDistance += dist;
        document.getElementById("distance").innerText = (totalDistance / 1000).toFixed(2);
    }

    // 2. Update Path and Marker
    coords.push(newPos);
    path.setPath(coords);

    if (marker) marker.setMap(null); // Clear old marker
    marker = new google.maps.Marker({
        position: newPos,
        map: map,
        icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 7,
            fillColor: "#4285F4",
            fillOpacity: 1,
            strokeWeight: 2,
            strokeColor: "white"
        }
    });

    map.panTo(newPos); // Keep map centered on the user
}

window.onload = initMap;



