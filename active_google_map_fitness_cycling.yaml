class ActiveTracker {
    constructor() {
        this.pathData = [];
        this.totalDist = 0;
        this.lastPosition = null;
        this.init();
    }

    async init() {
        const { Map } = await google.maps.importLibrary("maps");
        this.map = new Map(document.getElementById("map"), {
            zoom: 16,
            center: { lat: 14.5995, lng: 120.9842 }, // Example center
            mapId: "FITNESS_TRACKER_ID", // For advanced vector maps
            disableDefaultUI: true
        });

        this.polyline = new google.maps.Polyline({
            strokeColor: "#00E5FF",
            strokeWeight: 6,
            map: this.map
        });

        this.startEngine();
    }

    startEngine() {
        navigator.geolocation.watchPosition(
            (pos) => this.processUpdate(pos),
            (err) => console.error(err),
            { enableHighAccuracy: true, maximumAge: 0 }
        );
    }

    processUpdate(pos) {
        const current = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            alt: pos.coords.altitude || 0,
            speed: pos.coords.speed || 0 // Speed in m/s
        };

        // Accuracy Filter: Ignore points with high horizontal accuracy error
        if (pos.coords.accuracy > 20) return; 

        if (this.lastPosition) {
            const delta = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(this.lastPosition),
                new google.maps.LatLng(current)
            );
            
            // Stationary Check: Only add points if moving > 2 meters
            if (delta > 2) {
                this.totalDist += delta;
                this.updateUI(current);
            }
        }
        
        this.lastPosition = current;
        this.pathData.push(current);
        this.polyline.setPath(this.pathData);
        this.map.panTo(current);
    }

    updateUI(data) {
        document.getElementById('speed').innerText = (data.speed * 3.6).toFixed(1);
        document.getElementById('distance').innerText = (this.totalDist / 1000).toFixed(2);
        document.getElementById('alt').innerText = Math.round(data.alt);
    }
}

new ActiveTracker();



// tracker.js (Advanced Module)

class ActivityIconManager {
  constructor(mapInstance) {
    this.map = mapInstance;
    this.currentMarker = null;
    
    // Define the base anchor point and size for all icons
    this.iconBase = {
      size: new google.maps.Size(64, 64), // The size of your exported PNG
      scaledSize: new google.maps.Size(48, 48), // The size it appears on map
      anchor: new google.maps.Point(24, 24) // Center the icon over the coordinate
    };
  }

  // Call this function when the user selects a new activity (e.g., from 'Run' to 'Cycle')
  updateActivityIcon(position, activityType) {
    // Clear the old marker if it exists
    if (this.currentMarker) {
      this.currentMarker.setMap(null);
    }

    // Determine the correct image URL based on the type
    let imageUrl;
    switch(activityType) {
      case 'MTB':     imageUrl = 'icons/icon-mtb.png'; break;
      case 'WALK':    imageUrl = 'icons/icon-walk.png'; break;
      default:        imageUrl = 'icons/icon-cycle.png'; // Default
    }

    // Create the new styled marker
    this.currentMarker = new google.maps.Marker({
      position: position,
      map: this.map,
      title: `${activityType} Activity Active`,
      icon: {
        url: imageUrl,
        ...this.iconBase // Spread the base configuration
      },
      // Optimization: ensures the icon doesn't 'jump' during rapid movement
      optimized: false 
    });
  }
}

