// Analyser.js (Advanced Module)

const milestones = [
  { lat: 14.5995, lng: 120.9842, type: 'RUN', label: 'Start Point' },
  { lat: 14.6050, lng: 120.9890, type: 'WORKOUT', label: 'Outdoor Gym Checkpoint' },
  { lat: 14.6120, lng: 120.9950, type: 'YOGA', label: 'Cool Down Zone' }
];

function setMilestoneMarkers(map, milestoneData) {
  milestoneData.forEach(point => {
    
    // Select icon and glowing border color dynamically based on the image design
    let iconUrl;
    let borderColor;
    
    switch(point.type) {
      case 'YOGA':
        iconUrl = 'icons/icon-yoga.png';
        borderColor = '#A855F7'; // Purple glow from the image
        break;
      case 'WORKOUT':
        iconUrl = 'icons/icon-workout.png';
        borderColor = '#EF4444'; // Red glow from the image
        break;
      default: // RUN
        iconUrl = 'icons/icon-run.png';
        borderColor = '#F97316'; // Orange glow from the image
    }

    // Use AdvancedMarkers (if enabled in your API project) for accessibility and styling
    const marker = new google.maps.marker.AdvancedMarkerElement({
      map: map,
      position: { lat: point.lat, lng: point.lng },
      title: point.label,
      content: buildCustomHtmlIcon(iconUrl, borderColor) // Use Approach 3 helper
    });
  });
}



// StyleHelper.js

/**
 * Creates the HTML structure required to replicate the glowing icon style
 * @param {string} iconUrl - The path to the transparent PNG icon (e.g., 'icons/icon-cycle.png')
 * @param {string} glowColor - The Hex or RGB color for the outer ring glow
 * @returns {HTMLElement}
 */
function buildCustomHtmlIcon(iconUrl, glowColor) {
  const container = document.createElement('div');
  
  // Apply CSS that mimics the visual style provided in the generated image asset
  container.style.cssText = `
    width: 50px; 
    height: 50px; 
    border-radius: 50%; 
    background: rgba(255, 255, 255, 0.2); /* Semi-transparent background */
    backdrop-filter: blur(4px); /* Slight blur for realism */
    border: 3px solid ${glowColor}; 
    box-shadow: 0 0 15px ${glowColor}, inset 0 0 10px ${glowColor}; /* Strong glow effect */
    display: flex; 
    align-items: center; 
    justify-content: center;
    transform: translate(-50%, -50%); /* Center the complex shape */
    transition: transform 0.2s ease-out;
  `;

  const img = document.createElement('img');
  img.src = iconUrl;
  img.style.cssText = `
    width: 70%; 
    height: 70%; 
    object-fit: contain;
  `;

  container.appendChild(img);
  return container;
}
