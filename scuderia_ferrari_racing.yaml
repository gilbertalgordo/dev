/* Racing HUD Icon Styling */
.hud-icon {
  width: 120px;
  height: 120px;
  background: #1a1a1a;
  border: 2px solid #CC0000;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: 'Orbitron', sans-serif; /* Racing style font */
  position: relative;
  overflow: hidden;
}

.speed-value {
  font-size: 24px;
  font-weight: bold;
  color: #fff;
  animation: jitter 0.1s infinite;
}

.unit { font-size: 10px; color: #CC0000; }

.hybrid-glow {
  position: absolute;
  width: 100%;
  height: 5px;
  bottom: 20%;
  background: linear-gradient(90deg, transparent, #00FF00, transparent);
  animation: flow 1s linear infinite;
}

@keyframes jitter {
  0% { transform: translate(0,0); }
  50% { transform: translate(1px, -1px); }
  100% { transform: translate(0,0); }
}

@keyframes flow {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}
