from pydantic import BaseModel, Field
from typing import List, Optional

class PartSpecification(BaseModel):
    part_id: str
    category: str  # e.g., "Aero", "Powertrain", "Suspension"
    material: str
    weight_kg: float
    compatibility_tags: List[str]  # e.g., ["GT3", "LeMans", "AWD"]
    modifier_type: str  # e.g., "Performance Upgrade", "Weight Reduction"

class RaceCarSpec(BaseModel):
    chassis_id: str
    engine_type: str
    current_weight: float
    max_torque_nm: int



import random

class RaceAIService:
    """Mock AI Service for Automotive Specifications"""
    
    def suggest_modifiers(self, car: RaceCarSpec, available_parts: List[PartSpecification]):
        # Logic: Find parts that match the car's tags and improve performance
        recommendations = []
        for part in available_parts:
            if any(tag in car.engine_type for tag in part.compatibility_tags):
                recommendations.append(part)
        
        # Sort by weight reduction or performance impact
        return sorted(recommendations, key=lambda x: x.weight_kg)[:3]

# Example Usage
ai_engine = RaceAIService()



