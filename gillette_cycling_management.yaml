import datetime

class CyclingTeamAI:
    def __init__(self, team_name, principal_sponsor):
        self.team_name = team_name
        self.principal_sponsor = principal_sponsor
        self.vault_balance = 0.0
        self.roster = {}
        self.sponsorships = []
        self.expense_ledger = []
        
        # Performance metrics for Kaizen optimization
        self.efficiency_rating = 1.0 

    def add_sponsorship(self, partner_name, amount, tier="Regular"):
        """Tiers: Head, Principal, Technical"""
        contract = {
            "partner": partner_name,
            "amount": amount,
            "tier": tier,
            "active": True
        }
        self.sponsorships.append(contract)
        self.vault_balance += amount
        print(f"[SYSTEM] {tier} Sponsorship secured from {partner_name}: +€{amount:,.2f}")

    def onboard_rider(self, name, annual_salary, role="Domestique"):
        monthly_rate = annual_salary / 12
        self.roster[name] = {
            "salary": annual_salary,
            "monthly": monthly_rate,
            "role": role,
            "total_paid": 0.0
        }

    def process_payroll(self):
        print(f"\n--- Monthly Payroll: {datetime.date.today().strftime('%B %Y')} ---")
        for rider, data in self.roster.items():
            amount = data['monthly']
            if self.vault_balance >= amount:
                self.vault_balance -= amount
                data['total_paid'] += amount
                print(f"PAID: {rider} ({data['role']}) - €{amount:,.2f}")
            else:
                print(f"CRITICAL: Insufficient funds for {rider}!")

    def reimburse_expense(self, rider_name, amount, category):
        """Automated reimbursement logic"""
        if rider_name in self.roster:
            receipt = {
                "rider": rider_name,
                "amount": amount,
                "category": category,
                "timestamp": datetime.datetime.now()
            }
            self.expense_ledger.append(receipt)
            self.vault_balance -= amount
            print(f"[REIMBURSE] {rider_name}: €{amount} for {category} processed.")

    def get_team_status(self):
        """Active HUD Telemetry Summary"""
        print(f"\n### {self.team_name.upper()} ACTIVE HUD ###")
        print(f"Principal: {self.principal_sponsor}")
        print(f"Current Vault: €{self.vault_balance:,.2f}")
        print(f"Active Roster: {len(self.roster)} riders")
        print("----------------------------------")

# --- EXECUTION ---
gillette_yellow = CyclingTeamAI("Gillette Team Yellow", "Gillette")

# Initialize Sponsorships
gillette_yellow.add_sponsorship("Gillette", 25000000, tier="Principal")
gillette_yellow.add_sponsorship("Yellow Tech", 5000000, tier="Head")

# Onboard Core Roster (2026 Average WorldTour Salaries)
gillette_yellow.onboard_rider("Lead Sprinter", 1500000, role="GC Leader")
gillette_yellow.onboard_rider("Climbing Specialist", 450000, role="Domestique")

# Operations
gillette_yellow.process_payroll()
gillette_yellow.reimburse_expense("Lead Sprinter", 1200, "Altitude Camp Travel")
gillette_yellow.get_team_status()



import asyncio
import time
from dataclasses import dataclass, field
from typing import List, Dict

@dataclass
class Expense:
    rider_id: str
    amount: float
    category: str
    status: str = "Pending"

@dataclass
class Sponsorship:
    name: str
    annual_value: float
    tier: str  # Principal, Head, Technical
    active: bool = True

class ActiveGilletteAI:
    def __init__(self):
        self.vault = 0.0
        self.roster = {}
        self.sponsors = []
        self.ledger = []
        self.kaizen_efficiency = 1.05  # 5% optimization target per cycle

    def add_sponsorship(self, partner: Sponsorship):
        self.sponsors.append(partner)
        # Allocate initial quarterly payment
        initial_injection = partner.annual_value / 4
        self.vault += initial_injection
        print(f"[HUD] {partner.tier} Sponsor Active: {partner.name} | Injection: +€{initial_injection:,.2f}")

    def add_rider(self, rider_id: str, name: str, salary: float):
        self.roster[rider_id] = {
            "name": name,
            "annual_salary": salary,
            "monthly_rate": (salary / 12) * self.kaizen_efficiency,
            "paid_ytd": 0.0
        }

    async def process_reimbursements(self, expenses: List[Expense]):
        """Active scanning of incoming expense claims"""
        for e in expenses:
            if self.vault >= e.amount:
                self.vault -= e.amount
                e.status = "Disbursed"
                self.ledger.append(e)
                print(f"[REIMBURSE] {e.rider_id}: €{e.amount} ({e.category}) -> SUCCESS")
            await asyncio.sleep(0.1) # Simulate high-speed processing

    def display_telemetry(self):
        """HUD-style output of team status"""
        print("\n" + "="*40)
        print(f" GILLETTE TEAM YELLOW - ACTIVE STATUS ")
        print("="*40)
        print(f" VAULT BALANCE : €{self.vault:,.2f}")
        print(f" TOTAL SPONSORS: {len(self.sponsors)}")
        print(f" KAIZEN INDEX  : {self.kaizen_efficiency:.2f}x")
        print("-" * 40)

# --- SYSTEM INITIALIZATION ---

async def main():
    team_ai = ActiveGilletteAI()

    # Define Sponsorship Tiers
    team_ai.add_sponsorship(Sponsorship("Gillette", 12000000, "Principal"))
    team_ai.add_sponsorship(Sponsorship("Yellow Tech", 4000000, "Head"))

    # Roster Management
    team_ai.add_rider("RID-001", "Lead Sprinter", 2000000)
    team_ai.add_rider("RID-002", "Mountain Ace", 850000)

    # Simulated Live Expenses
    live_expenses = [
        Expense("RID-001", 1500.0, "Wind Tunnel Testing"),
        Expense("RID-002", 450.0, "Physiotherapy"),
        Expense("RID-001", 2200.0, "Carbon Wheel Replacement")
    ]

    # Execute Active Processing
    team_ai.display_telemetry()
    await team_ai.process_reimbursements(live_expenses)
    
    print("\n[SYSTEM] All Active Payment Loops Completed.")

if __name__ == "__main__":
    asyncio.run(main())
