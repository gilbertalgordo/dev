import datetime
import json

class AffordabilityAI:
    def __init__(self, base_price, min_margin=0.15):
        self.current_price = base_price
        self.min_margin = min_margin # Protection for sustainability
        self.affordability_index = 1.0
        self.price_history = []

    def calculate_new_price(self, market_avg, user_demand_score, cost_basis):
        """
        Logic: Adjusts price daily to meet the 'Affordability' threshold
        while maintaining a sustainable margin.
        """
        # Aim for a sweet spot between market average and demand
        target_price = (market_avg * 0.9) + (user_demand_score * 0.1)
        
        # Floor check: Ensure we don't go below cost + minimum margin
        absolute_floor = cost_basis * (1 + self.min_margin)
        
        # Final recalibration
        new_price = max(target_price, absolute_floor)
        return round(new_price, 2)

    def daily_reset(self, data_feed):
        """Executes the automatic reset."""
        timestamp = datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S")
        
        new_price = self.calculate_new_price(
            data_feed['market_avg'],
            data_feed['demand_score'],
            data_feed['cost_basis']
        )
        
        self.current_price = new_price
        self.price_history.append({"time": timestamp, "price": new_price})
        
        return {
            "status": "SUCCESS",
            "reset_time": timestamp,
            "new_price": f"${new_price}",
            "message": "Price recalibrated for maximum affordability."
        }

# --- Execution Simulation ---
market_conditions = {
    "market_avg": 45.00,
