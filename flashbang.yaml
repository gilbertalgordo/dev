using UnityEngine;
using UnityEngine.UI;
using System.CollectionsCollections.Generic;

public class FlashbangHUD : MonoBehaviour
{
    public Image flashOverlay; // A white UI Image covering the screen
    private float currentIntensity = 0f;

    void Update()
    {
        if (currentIntensity > 0)
        {
            // Kaizen: Gradual reduction of intensity for a smooth recovery
            currentIntensity -= Time.deltaTime * 0.5f; 
            flashOverlay.color = new Color(1, 1, 1, currentIntensity);
        }
    }

    public void TriggerFlash(float distance)
    {
        // Scientific Reasoning: Light intensity follows the Inverse Square Law
        // but for gameplay, we cap the maximum blindness.
        float impact = Mathf.Clamp01(10f / distance); 
        currentIntensity = impact;
        
        // Trigger auditory 'ringing' here if desired
    }
}



using UnityEngine;

public class FlashbangInstance : MonoBehaviour
{
    public float fuseTime = 3.0f;
    public float radius = 15.0f;
    public GameObject explosionEffect; // 3D VFX instance

    void Start()
    {
        Invoke("Detonate", fuseTime);
    }

    void Detonate()
    {
        // 1. Spawn the 3D visual effect
        Instantiate(explosionEffect, transform.position, Quaternion.identity);

        // 2. Locate all potential targets in radius
        Collider[] targets = Physics.OverlapSphere(transform.position, radius);

        foreach (var target in targets)
        {
            if (target.CompareTag("Player"))
            {
                float dist = Vector3.Distance(transform.position, target.transform.position);
                
                // Check for Line of Sight (Scientific Accuracy: You can't be blinded through a wall)
                if (!Physics.Linecast(transform.position, target.transform.position))
                {
                    target.GetComponent<FlashbangHUD>().TriggerFlash(dist);
                }
            }
        }

        Destroy(gameObject); // Clean up instance
    }
}



using UnityEngine;
using UnityEngine.Rendering;
using UnityEngine.Rendering.Universal; // For URP

public class AdvancedFlashbangHUD : MonoBehaviour
{
    [Header("Components")]
    public Volume postProcessVolume;
    public AudioSource tinnitusSource;
    
    private ColorAdjustments colorAdjustments;
    private float currentBlindness = 0f;

    void Start()
    {
        postProcessVolume.profile.TryGet(out colorAdjustments);
    }

    void Update()
    {
        if (currentBlindness > 0)
        {
            // Kaizen: Constant optimization of recovery speed
            currentBlindness = Mathf.MoveTowards(currentBlindness, 0, Time.deltaTime * 0.4f);
            
            // Map 0-1 blindness to Post-Processing Exposure (e.g., 0 to 10EV)
            colorAdjustments.postExposure.value = currentBlindness * 10f;
            
            // HUD Audio: Dynamic Tinnitus volume based on blindness
            tinnitusSource.volume = currentBlindness;
        }
    }

    public void ApplyFlash(float intensity)
    {
        currentBlindness = Mathf.Clamp01(currentBlindness + intensity);
    }
}



using UnityEngine;

public class AdvancedFlashbangInstance : MonoBehaviour
{
    public float maxRadius = 20f;
    public LayerMask obstructionMask;

    public void Detonate()
    {
        Collider[] targets = Physics.OverlapSphere(transform.position, maxRadius);

        foreach (var col in targets)
        {
            if (col.CompareTag("Player"))
            {
                Vector3 directionToGrenade = (transform.position - col.transform.position).normalized;
                float distance = Vector3.Distance(transform.position, col.transform.position);

                // Scientific Reasoning: Check if the flash is in the player's FOV
                // Dot Product: 1 = looking directly, 0 = 90 degrees away, -1 = looking back
                float viewFactor = Vector3.Dot(col.transform.forward, directionToGrenade);
                
                // Raycast check for physical obstructions (walls/crates)
                if (!Physics.Raycast(transform.position, -directionToGrenade, distance, obstructionMask))
                {
                    float intensity = CalculateIntensity(distance, viewFactor);
                    col.GetComponent<AdvancedFlashbangHUD>().ApplyFlash(intensity);
                }
            }
        }
        Destroy(gameObject);
    }

    private float CalculateIntensity(float dist, float view)
    {
        // Inverse Square Law for distance
        float distFalloff = 1f - (dist / maxRadius);
        
        // Directional multiplier: Full blind if looking at it, 20% if looking away (peripheral)
        float viewMultiplier = view > 0.5f ? 1.0f : 0.2f; 
        
        return Mathf.Clamp01(distFalloff * viewMultiplier);
    }
}
